    <style>
        :root {
            --color-dark-blue: #1B3A5C;
            --color-orange: #E8792F;
            --color-light-blue: #EBF5FF;
            --color-light-yellow: #FFFBEB;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }

        .text-dark-blue { color: var(--color-dark-blue); }
        .bg-dark-blue { background-color: var(--color-dark-blue); }
        .text-orange { color: var(--color-orange); }
        .border-orange { border-color: var(--color-orange); }
        .bg-light-blue { background-color: var(--color-light-blue); }
        .bg-light-yellow { background-color: var(--color-light-yellow); }
        .hero-section { background-color: var(--color-dark-blue); }

        .code-block {
            background-color: #1e293b;
            border-left: 4px solid var(--color-orange);
            padding: 1rem;
            border-radius: 0.5rem;
            position: relative;
        }

        .code-text {
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            margin: 0;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .copy-button {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background-color: var(--color-orange);
            color: white;
            padding: 0.25rem 0.75rem;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.75rem;
            transition: opacity 0.2s;
        }

        .copy-button:hover {
            opacity: 0.8;
        }

        .step-number {
            background-color: var(--color-orange);
            color: white;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .section-header {
            color: var(--color-dark-blue);
            font-size: 1.875rem;
            font-weight: bold;
            border-left: 4px solid var(--color-orange);
            padding-left: 1rem;
            margin: 2rem 0 1.5rem 0;
        }

        .nav-sidebar {
            position: fixed;
            left: 0;
            top: 4rem;
            width: 240px;
            height: calc(100vh - 4rem);
            background-color: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            z-index: 40;
        }

        .nav-item {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            color: var(--color-dark-blue);
            transition: all 0.2s;
        }

        .nav-item:hover {
            background-color: #e8f4f8;
            border-left-color: var(--color-orange);
        }

        .nav-item.active {
            background-color: var(--color-light-blue);
            border-left-color: var(--color-orange);
            font-weight: 600;
        }

        .main-content {
            margin-left: 240px;
            padding: 2rem;
        }

        .sticky-navbar {
            position: sticky;
            top: 0;
            height: 4rem;
            background-color: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 50;
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--color-dark-blue);
        }

        .language-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #d0d0d0;
            background-color: white;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            color: var(--color-dark-blue);
        }

        .lang-btn.active {
            background-color: var(--color-orange);
            color: white;
            border-color: var(--color-orange);
        }

        .lang-btn:hover {
            border-color: var(--color-orange);
        }

        .info-box {
            background-color: var(--color-light-blue);
            border-left: 4px solid #3b82f6;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1.5rem 0;
        }

        .warning-box {
            background-color: var(--color-light-yellow);
            border-left: 4px solid #fbbf24;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1.5rem 0;
        }

        .table-responsive {
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        th {
            background-color: var(--color-dark-blue);
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        td {
            border: 1px solid #e0e0e0;
            padding: 1rem;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        .hero-text {
            color: white;
        }

        .back-link {
            color: var(--color-orange);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .link-button {
            color: var(--color-orange);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .link-button:hover {
            text-decoration: underline;
        }

        .problem-item {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-left: 4px solid var(--color-orange);
            background-color: #fafafa;
        }

        @media (max-width: 768px) {
            .nav-sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
                width: 200px;
                z-index: 45;
            }

            .nav-sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 1rem;
            }

            .sticky-navbar {
                padding: 0 1rem;
            }

            .language-buttons {
                gap: 0.25rem;
            }

            .lang-btn {
                padding: 0.375rem 0.75rem;
                font-size: 0.75rem;
            }
        }

        [dir="rtl"] .nav-sidebar {
            left: auto;
            right: 0;
            border-right: none;
            border-left: 1px solid #e0e0e0;
        }

        [dir="rtl"] .nav-item {
            border-left: none;
            border-right: 3px solid transparent;
            padding: 0.75rem 1.5rem;
        }

        [dir="rtl"] .nav-item:hover {
            border-right-color: var(--color-orange);
        }

        [dir="rtl"] .nav-item.active {
            border-right-color: var(--color-orange);
        }

        [dir="rtl"] .main-content {
            margin-left: 0;
            margin-right: 240px;
        }

        [dir="rtl"] .section-header {
            border-left: none;
            border-right: 4px solid var(--color-orange);
            padding-left: 0;
            padding-right: 1rem;
        }

        [dir="rtl"] .code-block {
            border-left: none;
            border-right: 4px solid var(--color-orange);
        }

        [dir="rtl"] .copy-button {
            left: 0.5rem;
            right: auto;
        }

        [dir="rtl"] .back-link {
            flex-direction: row-reverse;
        }

        [dir="rtl"] .problem-item {
            border-left: none;
            border-right: 4px solid var(--color-orange);
        }

        [dir="rtl"] .info-box {
            border-left: none;
            border-right: 4px solid #3b82f6;
        }

        [dir="rtl"] .warning-box {
            border-left: none;
            border-right: 4px solid #fbbf24;
        }

        [dir="rtl"] .step-number {
            margin-left: auto;
            margin-right: 0;
        }
    </style>
</head>

                section8Labs: "Tüm laboratuvar belgeleri:",

        const sectionIds = [
            'what-is-docker',
            'why-docker-bigdata',
            'core-concepts',
            'system-requirements',
            'installation',
            'first-lab',
            'troubleshooting',
            'next-steps'
        ];

        function DockerGuide() {
            const [language, setLanguage] = useState('de');
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [activeSection, setActiveSection] = useState('what-is-docker');
            const [copiedCode, setCopiedCode] = useState(null);

            const t = translations[language];
            const isRTL = language === 'ar';

            const copyToClipboard = (code, id) => {
                navigator.clipboard.writeText(code);
                setCopiedCode(id);
                setTimeout(() => setCopiedCode(null), 2000);
            };

            const CodeBlock = ({ code, id }) => (
                <div className="code-block">
                    <p className="code-text">{code}</p>
                    <button
                        className="copy-button"
                        onClick={() => copyToClipboard(code, id)}
                    >
                        {copiedCode === id ? t.copiedButton : t.copyButton}
                    </button>
                </div>
            );

            const StepItem = ({ number, title, description, code, codeId }) => (
                <div className="flex gap-4 mb-6">
                    <div className="step-number">{number}</div>
                    <div className="flex-1">
                        <h4 className="text-lg font-semibold text-dark-blue mb-2">{title}</h4>
                        <p className="text-gray-700 mb-3">{description}</p>
                        {code && <CodeBlock code={code} id={codeId} />}
                    </div>
                </div>
            );

            return (
                <div dir={isRTL ? 'rtl' : 'ltr'}>
                    {/* Sticky Navbar */}
                    <div className="sticky-navbar">
                        <div className="navbar-brand">{t.bigDataLab}</div>
                        <div className="language-buttons">
                            {Object.keys(translations).map((lang) => (
                                <button
                                    key={lang}
                                    className={`lang-btn ${language === lang ? 'active' : ''}`}
                                    onClick={() => {
                                        setLanguage(lang);
                                        setActiveSection('what-is-docker');
                                    }}
                                >
                                    {lang.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Main Layout */}
                    <div className="flex">
                        {/* Sidebar Navigation */}
                        <nav className={`nav-sidebar ${sidebarOpen ? 'open' : ''}`}>
                            <a href="index.html" className="nav-item hover:bg-blue-50">
                                ← {t.backToOverview}
                            </a>
                            {sectionIds.map((id) => {
                                let label = '';
                                if (id === 'what-is-docker') label = t.section1Title;
                                else if (id === 'why-docker-bigdata') label = t.section2Title;
                                else if (id === 'core-concepts') label = t.section3Title;
                                else if (id === 'system-requirements') label = t.section4Title;
                                else if (id === 'installation') label = t.section5Title;
                                else if (id === 'first-lab') label = t.section6Title;
                                else if (id === 'troubleshooting') label = t.section7Title;
                                else if (id === 'next-steps') label = t.section8Title;

                                return (
                                    <button
                                        key={id}
                                        className={`nav-item w-full text-left ${activeSection === id ? 'active' : ''}`}
                                        onClick={() => {
                                            setActiveSection(id);
                                            document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
                                        }}
                                    >
                                        {label}
                                    </button>
                                );
                            })}
                        </nav>

                        {/* Main Content */}
                        <main className="main-content">
                            {/* Hero Section */}
                            <div className="hero-section text-white rounded-lg p-8 mb-8">
                                <h1 className="text-4xl font-bold mb-4">{t.title}</h1>
                                <p className="text-lg max-w-2xl">
                                    {t.section1Intro}
                                </p>
                            </div>

                            {/* Section 1: What is Docker */}
                            <section id="what-is-docker" className="mb-12">
                                <h2 className="section-header">{t.section1Title}</h2>
                                <p className="text-gray-700 mb-4">{t.section1Analogy}</p>
                                <div className="info-box">
                                    <p className="font-semibold mb-2 text-dark-blue">Problem ohne Docker:</p>
                                    <p className="text-gray-700">{t.section1Problem}</p>
                                </div>
                                <p className="text-gray-700 mt-4">{t.section1Visual}</p>
                            </section>

                            {/* Section 2: Why Docker for Big Data */}
                            <section id="why-docker-bigdata" className="mb-12">
                                <h2 className="section-header">{t.section2Title}</h2>
                                <ul className="space-y-3">
                                    {[
                                        t.section2Point1,
                                        t.section2Point2,
                                        t.section2Point3,
                                        t.section2Point4,
                                        t.section2Point5
                                    ].map((point, idx) => (
                                        <li key={idx} className="flex gap-3 items-start">
                                            <div className="step-number text-sm">{idx + 1}</div>
                                            <span className="text-gray-700 pt-1">{point}</span>
                                        </li>
                                    ))}
                                </ul>
                            </section>

                            {/* Section 3: Core Concepts */}
                            <section id="core-concepts" className="mb-12">
                                <h2 className="section-header">{t.section3Title}</h2>
                                <p className="text-gray-700 mb-6">{t.section3Intro}</p>

                                <div className="space-y-6">
                                    {[
                                        { title: t.conceptImage, desc: t.conceptImageDesc },
                                        { title: t.conceptContainer, desc: t.conceptContainerDesc },
                                        { title: t.conceptDesktop, desc: t.conceptDesktopDesc },
                                        { title: t.conceptCompose, desc: t.conceptComposeDesc }
                                    ].map((concept, idx) => (
                                        <div key={idx} className="bg-light-blue p-4 rounded-lg border-l-4 border-blue-500">
                                            <h4 className="font-bold text-dark-blue mb-2">{concept.title}</h4>
                                            <p className="text-gray-700">{concept.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* Section 4: System Requirements */}
                            <section id="system-requirements" className="mb-12">
                                <h2 className="section-header">{t.section4Title}</h2>
                                <p className="text-gray-700 mb-4">{t.section4Intro}</p>
                                <div className="table-responsive">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th></th>
                                                <th>Windows</th>
                                                <th>macOS</th>
                                                <th>Linux</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td className="font-semibold">{t.reqOS}</td>
                                                <td>{t.reqWin}</td>
                                                <td>{t.reqMac}</td>
                                                <td>{t.reqLinux}</td>
                                            </tr>
                                            <tr>
                                                <td className="font-semibold">{t.reqRAM}</td>
                                                <td colSpan="3">{t.reqRAMMin}</td>
                                            </tr>
                                            <tr>
                                                <td className="font-semibold">{t.reqDisk}</td>
                                                <td colSpan="3">{t.reqDiskMin}</td>
                                            </tr>
                                            <tr>
                                                <td className="font-semibold">{t.reqExtra}</td>
                                                <td>{t.reqWSL}</td>
                                                <td>-</td>
                                                <td>-</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </section>

                            {/* Section 5: Installation */}
                            <section id="installation" className="mb-12">
                                <h2 className="section-header">{t.section5Title}</h2>
                                <p className="text-gray-700 mb-6">{t.section5Intro}</p>

                                <StepItem
                                    number="1"
                                    title={t.step1Title}
                                    description={t.step1Desc}
                                />
                                <StepItem
                                    number="2"
                                    title={t.step2Title}
                                    description={t.step2Desc}
                                />
                                <StepItem
                                    number="3"
                                    title={t.step3Title}
                                    description={t.step3Desc}
                                />
                                <StepItem
                                    number="4"
                                    title={t.step4Title}
                                    description={t.step4Desc}
                                />
                                <StepItem
                                    number="5"
                                    title={t.step5Title}
                                    description={t.step5Desc}
                                    code="docker --version"
                                    codeId="cmd-version"
                                />
                                <StepItem
                                    number="6"
                                    title={t.step6Title}
                                    description={t.step6Desc}
                                    code="docker run hello-world"
                                    codeId="cmd-helloworld"
                                />
                                <div className="info-box">
                                    <p>{t.step6Success}</p>
                                </div>
                            </section>

                            {/* Section 6: First Lab */}
                            <section id="first-lab" className="mb-12">
                                <h2 className="section-header">{t.section6Title}</h2>
                                <p className="text-gray-700 mb-6">{t.section6Intro}</p>

                                <StepItem
                                    number="1"
                                    title={t.labStep1Title}
                                    description={t.labStep1Desc}
                                    code="git clone https://github.com/swrobuts/bigdata.git"
                                    codeId="cmd-clone"
                                />
                                <StepItem
                                    number="2"
                                    title={t.labStep2Title}
                                    description={t.labStep2Desc}
                                    code="cd bigdata"
                                    codeId="cmd-cd"
                                />
                                <StepItem
                                    number="3"
                                    title={t.labStep3Title}
                                    description={t.labStep3Desc}
                                    code="pip install faker pandas pyarrow && python data/generate_megastore_data.py"
                                    codeId="cmd-data"
                                />
                                <StepItem
                                    number="4"
                                    title={t.labStep4Title}
                                    description={t.labStep4Desc}
                                    code="cd docker && chmod +x start-lab.sh && ./start-lab.sh mongodb"
                                    codeId="cmd-start-lab"
                                />
                                <StepItem
                                    number="5"
                                    title={t.labStep5Title}
                                    description={t.labStep5Desc}
                                    code="http://localhost:8081"
                                    codeId="cmd-localhost"
                                />
                                <div className="info-box">
                                    <p>{t.labStep5Note}</p>
                                </div>
                                <StepItem
                                    number="6"
                                    title={t.labStep6Title}
                                    description={t.labStep6Desc}
                                    code="./start-lab.sh stop"
                                    codeId="cmd-stop"
                                />
                            </section>

                            {/* Section 7: Troubleshooting */}
                            <section id="troubleshooting" className="mb-12">
                                <h2 className="section-header">{t.section7Title}</h2>
                                <p className="text-gray-700 mb-6">{t.section7Intro}</p>

                                {[
                                    { problem: t.problemNotStarting, solution: t.solutionNotStarting },
                                    { problem: t.problemPort, solution: t.solutionPort },
                                    {
                                        problem: t.problemDisk,
                                        solution: t.solutionDisk,
                                        code: 'docker system prune'
                                    },
                                    {
                                        problem: t.problemExit,
                                        solution: t.solutionExit,
                                        code: 'docker logs <container-name>'
                                    },
                                    { problem: t.problemConnect, solution: t.solutionConnect }
                                ].map((item, idx) => (
                                    <div key={idx} className="problem-item">
                                        <h4 className="font-bold text-dark-blue mb-2">❓ {item.problem}</h4>
                                        <p className="text-gray-700">{item.solution}</p>
                                        {item.code && (
                                            <div className="mt-3">
                                                <CodeBlock code={item.code} id={`troubleshoot-${idx}`} />
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </section>

                            {/* Section 8: Next Steps */}
                            <section id="next-steps" className="mb-12">
                                <h2 className="section-header">{t.section8Title}</h2>
                                <p className="text-gray-700 mb-4">{t.section8Intro}</p>
                                <div className="warning-box">
                                    <p className="font-semibold text-dark-blue">{t.section8Tip}</p>
                                </div>
                                <h4 className="text-lg font-bold text-dark-blue mt-6 mb-4">{t.section8Labs}</h4>
                                <ul className="space-y-2 mb-6">
                                    <li>
                                        <a href="mongodb-lab.html" className="link-button">
                                            {t.mongodbLab}
                                        </a>
                                    </li>
                                    <li>
                                        <a href="postgres-lab.html" className="link-button">
                                            {t.postgresLab}
                                        </a>
                                    </li>
                                    <li>
                                        <a href="elasticsearch-lab.html" className="link-button">
                                            {t.elasticsearchLab}
                                        </a>
                                    </li>
                                    <li>
                                        <a href="kafka-lab.html" className="link-button">
                                            {t.kafkaLab}
                                        </a>
                                    </li>
                                </ul>
                                <div className="info-box">
                                    <p className="text-lg font-semibold">{t.section8Conclusion}</p>
                                </div>
                            </section>

                            {/* Footer */}
                            <footer className="border-t border-gray-200 pt-8 mt-12 pb-8">
                                <a href="index.html" className="back-link">
                                    ← {t.backToOverview}
                                </a>
                            </footer>
                        </main>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<DockerGuide />, document.getElementById('root'));
    </script>
</body>
</html>
