<html lang="de">
<head>
    <meta charset="UTF-8">

    <title>Docker Anfängerleitfaden - Big Data Lab</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <style>
        :root {
            --color-dark-blue: #1B3A5C;
            --color-orange: #E8792F;
            --color-light-blue: #EBF5FF;
            --color-light-yellow: #FFFBEB;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        }

        .text-dark-blue { color: var(--color-dark-blue); }
        .bg-dark-blue { background-color: var(--color-dark-blue); }
        .text-orange { color: var(--color-orange); }
        .border-orange { border-color: var(--color-orange); }
        .bg-light-blue { background-color: var(--color-light-blue); }
        .bg-light-yellow { background-color: var(--color-light-yellow); }
        .hero-section { background-color: var(--color-dark-blue); }

        .code-block {
            background-color: #1e293b;
            border-left: 4px solid var(--color-orange);
            padding: 1rem;
            border-radius: 0.5rem;
            position: relative;
        }

        .code-text {
            color: #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            margin: 0;
            word-break: break-all;
            white-space: pre-wrap;
        }

        .copy-button {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background-color: var(--color-orange);
            color: white;
            padding: 0.25rem 0.75rem;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.75rem;
            transition: opacity 0.2s;
        }

        .copy-button:hover {
            opacity: 0.8;
        }

        .step-number {
            background-color: var(--color-orange);
            color: white;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .section-header {
            color: var(--color-dark-blue);
            font-size: 1.875rem;
            font-weight: bold;
            border-left: 4px solid var(--color-orange);
            padding-left: 1rem;
            margin: 2rem 0 1.5rem 0;
        }

        .nav-sidebar {
            position: fixed;
            left: 0;
            top: 4rem;
            width: 240px;
            height: calc(100vh - 4rem);
            background-color: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            z-index: 40;
        }

        .nav-item {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            color: var(--color-dark-blue);
            transition: all 0.2s;
        }

        .nav-item:hover {
            background-color: #e8f4f8;
            border-left-color: var(--color-orange);
        }

        .nav-item.active {
            background-color: var(--color-light-blue);
            border-left-color: var(--color-orange);
            font-weight: 600;
        }

        .main-content {
            margin-left: 240px;
            padding: 2rem;
        }

        .sticky-navbar {
            position: sticky;
            top: 0;
            height: 4rem;
            background-color: white;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 50;
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--color-dark-blue);
        }

        .language-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #d0d0d0;
            background-color: white;
            border-radius: 0.375rem;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
            color: var(--color-dark-blue);
        }

        .lang-btn.active {
            background-color: var(--color-orange);
            color: white;
            border-color: var(--color-orange);
        }

        .lang-btn:hover {
            border-color: var(--color-orange);
        }

        .info-box {
            background-color: var(--color-light-blue);
            border-left: 4px solid #3b82f6;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1.5rem 0;
        }

        .warning-box {
            background-color: var(--color-light-yellow);
            border-left: 4px solid #fbbf24;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1.5rem 0;
        }

        .table-responsive {
            overflow-x: auto;
            margin: 1.5rem 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
        }

        th {
            background-color: var(--color-dark-blue);
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        td {
            border: 1px solid #e0e0e0;
            padding: 1rem;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        .hero-text {
            color: white;
        }

        .back-link {
            color: var(--color-orange);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .link-button {
            color: var(--color-orange);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .link-button:hover {
            text-decoration: underline;
        }

        .problem-item {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-left: 4px solid var(--color-orange);
            background-color: #fafafa;
        }

        @media (max-width: 768px) {
            .nav-sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
                width: 200px;
                z-index: 45;
            }

            .nav-sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 1rem;
            }

            .sticky-navbar {
                padding: 0 1rem;
            }

            .language-buttons {
                gap: 0.25rem;
            }

            .lang-btn {
                padding: 0.375rem 0.75rem;
                font-size: 0.75rem;
            }
        }

        [dir="rtl"] .nav-sidebar {
            left: auto;
            right: 0;
            border-right: none;
            border-left: 1px solid #e0e0e0;
        }

        [dir="rtl"] .nav-item {
            border-left: none;
            border-right: 3px solid transparent;
            padding: 0.75rem 1.5rem;
        }

        [dir="rtl"] .nav-item:hover {
            border-right-color: var(--color-orange);
        }

        [dir="rtl"] .nav-item.active {
            border-right-color: var(--color-orange);
        }

        [dir="rtl"] .main-content {
            margin-left: 0;
            margin-right: 240px;
        }

        [dir="rtl"] .section-header {
            border-left: none;
            border-right: 4px solid var(--color-orange);
            padding-left: 0;
            padding-right: 1rem;
        }

        [dir="rtl"] .code-block {
            border-left: none;
            border-right: 4px solid var(--color-orange);
        }

        [dir="rtl"] .copy-button {
            left: 0.5rem;
            right: auto;
        }

        [dir="rtl"] .back-link {
            flex-direction: row-reverse;
        }

        [dir="rtl"] .problem-item {
            border-left: none;
            border-right: 4px solid var(--color-orange);
        }

        [dir="rtl"] .info-box {
            border-left: none;
            border-right: 4px solid #3b82f6;
        }

        [dir="rtl"] .warning-box {
            border-left: none;
            border-right: 4px solid #fbbf24;
        }

        [dir="rtl"] .step-number {
            margin-left: auto;
            margin-right: 0;
        }
    </style>
</head>

                                <StepItem
                                    number="4"
                                    title={t.step4Title}
                                    description={t.step4Desc}
                                />
                                <StepItem
                                    number="5"
                                    title={t.step5Title}
                                    description={t.step5Desc}
                                    code="docker --version"
                                    codeId="cmd-version"
                                />
                                <StepItem
                                    number="6"
                                    title={t.step6Title}
                                    description={t.step6Desc}
                                    code="docker run hello-world"
                                    codeId="cmd-helloworld"
                                />
                                <div className="info-box">
                                    <p>{t.step6Success}</p>
                                </div>
                            </section>

                            {/* Section 6: First Lab */}
                            <section id="first-lab" className="mb-12">
                                <h2 className="section-header">{t.section6Title}</h2>
                                <p className="text-gray-700 mb-6">{t.section6Intro}</p>

                                <StepItem
                                    number="1"
                                    title={t.labStep1Title}
                                    description={t.labStep1Desc}
                                    code="git clone https://github.com/swrobuts/bigdata.git"
                                    codeId="cmd-clone"
                                />
                                <StepItem
                                    number="2"
                                    title={t.labStep2Title}
                                    description={t.labStep2Desc}
                                    code="cd bigdata"
                                    codeId="cmd-cd"
                                />
                                <StepItem
                                    number="3"
                                    title={t.labStep3Title}
                                    description={t.labStep3Desc}
                                    code="pip install faker pandas pyarrow && python data/generate_megastore_data.py"
                                    codeId="cmd-data"
                                />
                                <StepItem
                                    number="4"
                                    title={t.labStep4Title}
                                    description={t.labStep4Desc}
                                    code="cd docker && chmod +x start-lab.sh && ./start-lab.sh mongodb"
                                    codeId="cmd-start-lab"
                                />
                                <div className="flex gap-4 mb-6">
                                    <div className="step-number">5</div>
                                    <div className="flex-1">
                                        <h4 className="text-lg font-semibold text-dark-blue mb-2">{t.labStep5Title}</h4>
                                        <p className="text-gray-700 mb-3">{t.labStep5Desc}</p>
                                        <a href="http://localhost:8081" target="_blank" rel="noopener noreferrer"
                                           style={{color: '#E8792F', fontWeight: 'bold', fontSize: '1.1rem', textDecoration: 'underline'}}>
                                            http://localhost:8081
                                        </a>
                                    </div>
                                </div>
                                <div className="info-box">
                                    <p>{t.labStep5Note}</p>
                                </div>
                                <StepItem
                                    number="6"
                                    title={t.labStep6Title}
                                    description={t.labStep6Desc}
                                    code="./start-lab.sh stop"
                                    codeId="cmd-stop"
                                />
                            </section>

                            {/* Section 7: Troubleshooting */}
                            <section id="troubleshooting" className="mb-12">
                                <h2 className="section-header">{t.section7Title}</h2>
                                <p className="text-gray-700 mb-6">{t.section7Intro}</p>

                                {[
                                    { problem: t.problemNotStarting, solution: t.solutionNotStarting },
                                    { problem: t.problemPort, solution: t.solutionPort },
                                    {
                                        problem: t.problemDisk,
                                        solution: t.solutionDisk,
                                        code: 'docker rm -f megastore-mongodb megastore-mongo-express megastore-duckdb megastore-neo4j megastore-spark 2>/dev/null; echo Done!'
                                    },
                                    {
                                        problem: t.problemExit,
                                        solution: t.solutionExit,
                                        code: 'docker logs <container-name>'
                                    },
                                    { problem: t.problemConnect, solution: t.solutionConnect }
                                ].map((item, idx) => (
                                    <div key={idx} className="problem-item">
                                        <h4 className="font-bold text-dark-blue mb-2">❓ {item.problem}</h4>
                                        <p className="text-gray-700">{item.solution}</p>
                                        {item.code && (
                                            <div className="mt-3">
                                                <CodeBlock code={item.code} id={`troubleshoot-${idx}`} />
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </section>

                            {/* Section 8: Cleanup */}
                            <section id="cleanup" className="mb-12">
                                <h2 className="section-header">{t.section9Title}</h2>
                                <p className="text-gray-700 mb-6">{t.section9Intro}</p>

                                <div className="space-y-6">
                                    <div>
                                        <h4 className="font-bold text-dark-blue mb-2">{t.cleanupCheck}</h4>
                                        <p className="text-gray-700 mb-3">{t.cleanupCheckDesc}</p>
                                        <CodeBlock code="docker system df" id="cmd-df" />
                                    </div>

                                    <div>
                                        <h4 className="font-bold text-dark-blue mb-2">{t.cleanupStop}</h4>
                                        <p className="text-gray-700 mb-3">{t.cleanupStopDesc}</p>
                                        <CodeBlock code="docker rm -f megastore-mongodb megastore-mongo-express megastore-duckdb megastore-neo4j megastore-spark 2>/dev/null; echo 'Done!'" id="cmd-stopall" />
                                    </div>

                                    <div>
                                        <h4 className="font-bold text-dark-blue mb-2">{t.cleanupImages}</h4>
                                        <p className="text-gray-700 mb-3">{t.cleanupImagesDesc}</p>
                                        <CodeBlock code="docker rmi mongo:7.0 mongo-express:latest neo4j:5.18-community 2>/dev/null; echo 'Done!'" id="cmd-rmimages" />
                                    </div>

                                    <div>
                                        <h4 className="font-bold text-dark-blue mb-2">{t.cleanupVolumes}</h4>
                                        <p className="text-gray-700 mb-3">{t.cleanupVolumesDesc}</p>
                                        <CodeBlock code="docker volume rm mongodb_data neo4j_data neo4j_conf 2>/dev/null; docker network rm megastore 2>/dev/null; echo 'Done!'" id="cmd-rmvolumes" />
                                    </div>
                                </div>

                                <p className="text-gray-700 mt-6 mb-4">{t.cleanupDesktopDesc}</p>

                                <div className="info-box">
                                    <p className="text-gray-700">{t.cleanupWarning}</p>
                                </div>
                            </section>

                            {/* Section 9: Next Steps */}
                            <section id="next-steps" className="mb-12">
                                <h2 className="section-header">{t.section8Title}</h2>
                                <p className="text-gray-700 mb-4">{t.section8Intro}</p>
                                <div className="warning-box">
                                    <p className="font-semibold text-dark-blue">{t.section8Tip}</p>
                                </div>
                                <h4 className="text-lg font-bold text-dark-blue mt-6 mb-4">{t.section8Labs}</h4>
                                <ul className="space-y-2 mb-6">
                                    <li>
                                        <a href="lab-mongodb.html" className="link-button">
                                            {t.mongodbLab}
                                        </a>
                                    </li>
                                    <li>
                                        <a href="lab-duckdb.html" className="link-button">
                                            {t.duckdbLab}
                                        </a>
                                    </li>
                                    <li>
                                        <a href="lab-neo4j.html" className="link-button">
                                            {t.neo4jLab}
                                        </a>
                                    </li>
                                    <li>
                                        <a href="lab-spark.html" className="link-button">
                                            {t.sparkLab}
                                        </a>
                                    </li>
                                </ul>
                                <div className="info-box">
                                    <p className="text-lg font-semibold">{t.section8Conclusion}</p>
                                </div>
                            </section>

                            {/* Footer */}
                            <footer className="border-t border-gray-200 pt-8 mt-12 pb-8">
                                <a href="index.html" className="back-link">
                                    ← {t.backToOverview}
                                </a>
                            </footer>
                        </main>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<DockerGuide />, document.getElementById('root'));
    </script>
</body>
</html>
