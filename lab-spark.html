            ex7Objective: 'Pencere işlevleriyle gruplar üzerinde hesaplama yapma – verileri yoğunlaştırmadan',
            ex7Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql import functions as F\n\nspark = SparkSession.builder.appName(\'WindowDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\n\n# Fenster pro Kunde, nach Datum sortiert\nwindow = Window.partitionBy(\'customer_id\').orderBy(\'order_date\')\n\nresult = orders.withColumn(\'order_num\', F.row_number().over(window)) \\\n               .withColumn(\'cumulative_spend\', F.sum(\'total_amount\').over(window))\n\nresult.select(\'customer_id\', \'order_date\', \'total_amount\', \'order_num\', \'cumulative_spend\').show(10)',
            ex7Output: '+----------+----------+------------+---------+----------------+\n|customer_id|order_date|total_amount|order_num|cumulative_spend|\n+----------+----------+------------+---------+----------------+\n|         1|2023-01-05|      125.99|        1|          125.99|\n|         1|2023-02-12|      349.50|        2|          475.49|\n+----------+----------+------------+---------+----------------+',
            ex7Explain: 'Pencere işlevleri, satırları yoğunlaştırmadan bir bölüm üzerinde değerleri hesaplar. partitionBy(\'customer_id\') = müşteri başına kendi pencere. row_number() pencere içindeki satırları numaralandırır. sum().over(window) = koşan kümülatif toplam. groupBy gerekmez – tüm satırlar korunur.',
            ex7Practice: 'Her müşteri için sipariş değerine göre her siparişin sırasını hesaplayın (en yüksek önce). F.rank().over(Window.partitionBy(\'customer_id\').orderBy(F.desc(\'total_amount\'))) kullanın.',
            ex7Hint: 'İpucu: window2 = Window.partitionBy(\'customer_id\').orderBy(F.desc(\'total_amount\')), ardından .withColumn(\'betrag_rang\', F.rank().over(window2))',
            ex7Solution: 'window2 = Window.partitionBy(\'customer_id\').orderBy(F.desc(\'total_amount\'))\nresult = orders.withColumn(\'betrag_rang\', F.rank().over(window2))\nresult.select(\'customer_id\', \'order_date\', \'total_amount\', \'betrag_rang\').show(10)',
            ex8Objective: 'Spark DataFrame\'lerine kendi Python işlevlerini uygulama (Kullanıcı Tanımlı İşlevler)',
            ex8Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.sql.types import StringType, FloatType\n\nspark = SparkSession.builder.appName(\'UDFDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\n\n# UDF definieren\n@F.udf(returnType=StringType())\ndef categorize_order(amount):\n    if amount is None: return \'Unbekannt\'\n    if amount < 50: return \'Klein\'\n    if amount < 200: return \'Mittel\'\n    if amount < 500: return \'Groß\'\n    return \'Premium\'\n\nresult = orders.withColumn(\'kategorie\', categorize_order(\'total_amount\'))\nresult.groupBy(\'kategorie\').count().orderBy(\'count\', ascending=False).show()',
            ex8Output: '+---------+-----+\n|kategorie|count|\n+---------+-----+\n|   Mittel|  423|\n|     Groß|  312|\n|    Klein|  187|\n|  Premium|   78|\n+---------+-----+',
            ex8Explain: '@F.udf(returnType=StringType()): Bir Python işlevini Spark KTF\'ye dönüştüren dekoratör. returnType dönüş türünü belirtir (StringType, FloatType, IntegerType, vb.). KTF\'ler güçlüdür ancak yerleşik İşlevlerden daha yavaştır – yalnızca Spark alternatifi yoksa kullanın.',
            ex8Practice: 'İndirim hesaplayan bir discount_udf KTF\'si yazın: status=\'completed\' → 0%, status=\'returned\' → 10%, aksi takdirde 5%. Bunu durum alanına uygulayın.',
            ex8Hint: 'İpucu: @F.udf(returnType=FloatType()) def discount_udf(status): return 0.0 if status==\'completed\' else 0.1 if status==\'returned\' else 0.05',
            ex8Solution: '@F.udf(returnType=FloatType())\ndef discount_udf(status):\n    if status == \'completed\': return 0.0\n    if status == \'returned\': return 0.10\n    return 0.05\n\nresult = orders.withColumn(\'rabatt\', discount_udf(\'status\'))\nresult.select(\'order_id\', \'status\', \'total_amount\', \'rabatt\').show(10)',
            ex9Objective: 'DataFrame\'leri Parquet olarak kaydetme ve yeniden yükleme – Büyük Veri için standart dosya biçimi',
            ex9Code: 'from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName(\'ParquetDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\n\n# Als Parquet speichern (spaltenorientiert, komprimiert)\norders.write.mode(\'overwrite\').parquet(\'/tmp/orders_parquet/\')\n\n# Parquet wieder einlesen\ndf_parquet = spark.read.parquet(\'/tmp/orders_parquet/\')\ndf_parquet.printSchema()\ndf_parquet.select(\'order_id\', \'total_amount\', \'status\').show(5)\n\n# Nur bestimmte Spalten lesen (Column Pruning)\ndf_small = spark.read.parquet(\'/tmp/orders_parquet/\').select(\'customer_id\', \'total_amount\')\nprint(\'Anzahl Zeilen:\', df_small.count())',
            ex9Output: 'root\n |-- order_id: integer (nullable = true)\n |-- customer_id: integer (nullable = true)\n |-- total_amount: double (nullable = true)\n |-- status: string (nullable = true)\n\nSatır sayısı: 1000',
            ex9Explain: 'Parquet sütun yönelimlidir: Yalnızca gerekli sütunlar okunur (Sütun Budaması = önemli ölçüde daha az G/Ç). Otomatik sıkıştırma. printSchema() okuma sonrasında türleri gösterir – Parquet veri türlerini korur, CSV bunları kaybeder. mode(\'overwrite\') mevcut dosyaları üzerine yazar.',
            ex9Practice: 'Parquet dosyasını yükleyin ve yalnızca \'completed\' siparişlerini filtreleyin. Bunları /tmp/completed_orders/ içinde yeni bir Parquet olarak kaydedin. Satırları sayın.',
            ex9Hint: 'İpucu: df_parquet.filter(F.col(\'status\') == \'completed\').write.mode(\'overwrite\').parquet(\'/tmp/completed_orders/\')',
            ex9Solution: 'from pyspark.sql import functions as F\ndf = spark.read.parquet(\'/tmp/orders_parquet/\')\ncompleted = df.filter(F.col(\'status\') == \'completed\')\ncompleted.write.mode(\'overwrite\').parquet(\'/tmp/completed_orders/\')\nprint(\'Completed orders:\', completed.count())',
            ex10Objective: 'Spark SQL: SQL sorguları doğrudan DataFrame\'ler üzerinde yürütün – SQL bilgisi olanlar için ideal',
            ex10Code: 'from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName(\'SparkSQLDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\ncustomers = spark.read.csv(\'/home/jovyan/data/customers.csv\', header=True, inferSchema=True)\n\n# DataFrame\'leri geçici görünümler olarak kaydedin\norders.createOrReplaceTempView(\'orders\')\ncustomers.createOrReplaceTempView(\'customers\')\n\n# SQL\'i doğrudan yürütün\nresult = spark.sql(\"\"\"\n    SELECT c.name, COUNT(o.order_id) AS bestellungen,\n           ROUND(SUM(o.total_amount), 2) AS gesamtumsatz\n    FROM orders o\n    JOIN customers c ON o.customer_id = c.customer_id\n    WHERE o.status = \'completed\'\n    GROUP BY c.name\n    ORDER BY gesamtumsatz DESC\n    LIMIT 10\n\"\"\")\nresult.show()',
            ex10Output: '+-------------+------------+-------------+\n|         name|bestellungen|gesamtumsatz |\n+-------------+------------+-------------+\n| Alice Müller|          12|       2340.5|\n|Bob Schneider|           9|       1890.2|\n+-------------+------------+-------------+',
            ex10Explain: 'createOrReplaceTempView(): DataFrame\'i SQL görünümü olarak kaydeder (yalnızca bu oturumda). spark.sql(): Herhangi bir SQL sorgusu yürütür – tüm standart SQL özellikleri kullanılabilir. Avantaj: SQL bilgisi olanlar yeni bir API öğrenmeleri gerekmez. Sonuç yine bir DataFrame\'dir.',
            ex10Practice: 'Tamamlanmış siparişlerden aylık geliri (year, month, revenue) hesaplayan bir SQL sorgusu yazın. YEAR(order_date) ve MONTH(order_date) kullanın.',
            ex10Hint: 'İpucu: spark.sql(\'SELECT YEAR(order_date) as year, MONTH(order_date) as month, ROUND(SUM(total_amount),2) as revenue FROM orders WHERE status=\"completed\" GROUP BY year, month ORDER BY year, month\')',
            ex10Solution: 'result = spark.sql(\"\"\"\n    SELECT YEAR(order_date) AS year, MONTH(order_date) AS month,\n           ROUND(SUM(total_amount), 2) AS revenue,\n           COUNT(*) AS order_count\n    FROM orders\n    WHERE status = \'completed\'\n    GROUP BY year, month\n    ORDER BY year, month\n\"\"\")\nresult.show()',
            ex11Objective: 'Yapılandırılmış Akışı Simüle Edin: Toplu İşlemi Mini-Akış Olarak Anlayın',
            ex11Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nimport time\n\nspark = SparkSession.builder.appName(\'StreamingDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\n\n# Akışı simüle edin: Verileri toplu olarak işleyin\nbatch_size = 100\ntotal = orders.count()\n\nfor i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    stats = batch.agg(\n        F.count(\'*\').alias(\'bestellungen\'),\n        F.round(F.sum(\'total_amount\'), 2).alias(\'umsatz\')\n    ).collect()[0]\n    print(f\'Batch {i//batch_size + 1}: {stats.bestellungen} Bestellungen, {stats.umsatz}€\')\n    time.sleep(0.5)',
            ex11Output: 'Batch 1: 100 Siparişler, 23456.78€\nBatch 2: 100 Siparişler, 19834.21€\nBatch 3: 100 Siparişler, 21109.55€',
            ex11Explain: 'Gerçek Spark Akışı Kafka, S3 veya Soketlerden okur. Bu simülasyon prensibi gösterir: Veriler toplu olarak gelir ve hemen işlenir. subtract() zaten işlenen verileri kaldırır. Gerçek sistemde: spark.readStream.format(\'kafka\').',
            ex11Practice: 'Simülasyonu genişletin: Her toplu iş için \'completed\' siparişlerin yüzdesini de hesaplayın.',
            ex11Hint: 'İpucu: completed_pct = batch.filter(F.col(\'status\')==\'completed\').count() / batch.count() * 100 ekleyin.',
            ex11Solution: 'for i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    n_total = batch.count()\n    n_completed = batch.filter(F.col(\'status\') == \'completed\').count()\n    umsatz = batch.agg(F.round(F.sum(\'total_amount\'), 2)).collect()[0][0]\n    pct = round(n_completed / n_total * 100, 1) if n_total > 0 else 0\n    print(f\'Batch {i//batch_size + 1}: {n_total} Orders, {umsatz}€, {pct}% completed\')',
            ex12Objective: 'Spark MLlib ile tam bir ML ardışık düzeni oluşturun: Özellik Mühendisliği + Model',
            ex12Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nspark = SparkSession.builder.appName(\'MLDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\n\n# Özellik Mühendisliği\ncustomer_features = orders.groupBy(\'customer_id\').agg(\n    F.count(\'*\').alias(\'n_orders\'),\n    F.avg(\'total_amount\').alias(\'avg_amount\'),\n    F.sum(\'total_amount\').alias(\'total_spent\'),\n    (F.sum(F.when(F.col(\'status\')==\'completed\', 1).otherwise(0)) / F.count(\'*\')).alias(\'completion_rate\')\n)\n\n# Etiket: Yüksek değerli müşteri (total_spent > 500)\ncustomer_features = customer_features.withColumn(\'is_high_value\', (F.col(\'total_spent\') > 500).cast(\'integer\'))\n\ncustomer_features.show(5)',
            ex12Output: '+-----------+--------+----------+-----------+---------------+-------------+\n|customer_id|n_orders|avg_amount|total_spent|completion_rate|is_high_value|\n+-----------+--------+----------+-----------+---------------+-------------+\n|          1|       5|    234.56|    1172.80|            0.8|            1|\n|          2|       3|     89.99|     269.97|            1.0|            0|\n+-----------+--------+----------+-----------+---------------+-------------+',
            ex12Explain: 'Spark MLlib Ardışık Düzeni: 1. groupBy/agg ile Özellik Mühendisliği. 2. VectorAssembler özellikleri bir vektörde birleştirir. 3. StandardScaler özellikleri normalleştirir. 4. LogisticRegression sınıflandırır. Pipeline.fit() tüm aşamaları sırasıyla eğitir.',
            ex12Practice: 'Tam ML ardışık düzenini eğitin: VectorAssembler, StandardScaler ve LogisticRegression ekleyin. Eğitim doğruluğu ile değerlendirin.',
            ex12Hint: 'İpucu: assembler = VectorAssembler(inputCols=[\'n_orders\',\'avg_amount\',\'completion_rate\'], outputCol=\'features\'), ardından Pipeline(stages=[assembler, scaler, lr]).fit(train_data)',
            ex12Solution: 'from pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nassembler = VectorAssembler(inputCols=[\'n_orders\', \'avg_amount\', \'completion_rate\'], outputCol=\'features_raw\')\nscaler = StandardScaler(inputCol=\'features_raw\', outputCol=\'features\')\nlr = LogisticRegression(featuresCol=\'features\', labelCol=\'is_high_value\')\n\ntrain, test = customer_features.randomSplit([0.8, 0.2], seed=42)\npipeline = Pipeline(stages=[assembler, scaler, lr])\nmodel = pipeline.fit(train)\npredictions = model.transform(test)\nacc = predictions.filter(F.col(\'prediction\') == F.col(\'is_high_value\')).count() / predictions.count()\nprint(f\'Genauigkeit: {acc:.1%}\')',

            challengeHint: 'İpucu: groupBy(), agg() ile count() ve sum() fonksiyonlarını ve orderBy() ile limit() kullanınız',
            challengeSolution: 'from pyspark.sql.functions import count, sum, when\n\n# Dosyaların yüklenmesi\ncustomers = spark.read.csv(\"/home/jovyan/data/customers.csv\", header=True, inferSchema=True)\norders = spark.read.csv(\"/home/jovyan/data/orders.csv\", header=True, inferSchema=True)\n\n# RFM Hesaplaması\ndf_rfm = customers.join(orders, \"customer_id\") \\\n    .groupBy(\"customer_id\", \"name\") \\\n    .agg(\n        count(\"order_id\").alias(\"frequency\"),\n        sum(\"order_total\").alias(\"monetary\")\n    )\n\n# Gelire göre ilk 10 müşteri\ndf_rfm.orderBy(\"monetary\", ascending=False).limit(10).show()\n\n# İsteğe bağlı: High-Value Segmentasyonu\ndf_rfm_segment = df_rfm.withColumn(\"segment\",\n    when(col(\"monetary\") > 10000, \"High-Value\").otherwise(\"Standard\")\n)\ndf_rfm_segment.filter(col(\"segment\") == \"High-Value\").show()',

                                    <span className="expandable-chevron">▼</span>
                                </div>
                                {expandedCode === 'challenge' && (
                                    <div className="expandable-content">
                                        <div className="code-block">
                                            <button className="copy-btn" onClick={() => copyToClipboard(t.challengeSolution)}>{t.copy}</button>
                                            <code>{t.challengeSolution}</code>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <h2 className="subsection-header">{t.verification}</h2>
                            <p>{t.challengeExpected}</p>

                            <button className="btn-accent" onClick={() => setActiveSection('quiz')} style={{marginTop: '2rem'}}>{t.nextExercise}</button>
                        </div>
                    );
                }

                // Quiz
                if (activeSection === 'quiz') {
                    return (
                        <div className="section active">
                            <h1 className="section-header">{t.quizTitle}</h1>
                            <p>{t.quizDesc}</p>

                            {[1,2,3,4,5,6].map(qNum => (
                                <div key={qNum} className="quiz-item">
                                    <div className="quiz-item-question">
                                        {qNum === 1 && t.quizQ1}
                                        {qNum === 2 && t.quizQ2}
                                        {qNum === 3 && t.quizQ3}
                                        {qNum === 4 && t.quizQ4}
                                        {qNum === 5 && t.quizQ5}
                                        {qNum === 6 && t.quizQ6}
                                    </div>
                                    <div style={{marginTop: '1rem', paddingTop: '1rem', borderTop: '1px solid #e5e7eb'}}>
                                        {qNum === 1 && (
                                            <>
                                                {['a', 'b', 'c', 'd'].map(opt => (
                                                    <div key={opt} className={'quiz-option' + (quizAnswers['q1'] === opt ? (opt === t.quizQ1Correct ? ' correct' : ' incorrect') : '')} onClick={() => handleQuizAnswer('q1', opt)}>
                                                        {opt === 'a' && t.quizQ1A}
                                                        {opt === 'b' && t.quizQ1B}
                                                        {opt === 'c' && t.quizQ1C}
                                                        {opt === 'd' && t.quizQ1D}
                                                    </div>
                                                ))}
                                                {quizAnswers['q1'] && (
                                                    <div style={{marginTop: '1rem', padding: '0.5rem', borderRadius: '0.35rem', background: quizAnswers['q1'] === 'b' ? '#ecfdf5' : '#fef2f2', color: quizAnswers['q1'] === 'b' ? '#059669' : '#dc2626'}}>
                                                        {quizAnswers['q1'] === 'b' ? t.correct : t.incorrect} {t.quizQ1Explain}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                        {qNum === 2 && (
                                            <>
                                                {['a', 'b', 'c', 'd'].map(opt => (
                                                    <div key={opt} className={'quiz-option' + (quizAnswers['q2'] === opt ? (opt === t.quizQ2Correct ? ' correct' : ' incorrect') : '')} onClick={() => handleQuizAnswer('q2', opt)}>
                                                        {opt === 'a' && t.quizQ2A}
                                                        {opt === 'b' && t.quizQ2B}
                                                        {opt === 'c' && t.quizQ2C}
                                                        {opt === 'd' && t.quizQ2D}
                                                    </div>
                                                ))}
                                                {quizAnswers['q2'] && (
                                                    <div style={{marginTop: '1rem', padding: '0.5rem', borderRadius: '0.35rem', background: quizAnswers['q2'] === 'b' ? '#ecfdf5' : '#fef2f2', color: quizAnswers['q2'] === 'b' ? '#059669' : '#dc2626'}}>
                                                        {quizAnswers['q2'] === 'b' ? t.correct : t.incorrect} {t.quizQ2Explain}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                        {qNum === 3 && (
                                            <>
                                                {['a', 'b', 'c', 'd'].map(opt => (
                                                    <div key={opt} className={'quiz-option' + (quizAnswers['q3'] === opt ? (opt === t.quizQ3Correct ? ' correct' : ' incorrect') : '')} onClick={() => handleQuizAnswer('q3', opt)}>
                                                        {opt === 'a' && t.quizQ3A}
                                                        {opt === 'b' && t.quizQ3B}
                                                        {opt === 'c' && t.quizQ3C}
                                                        {opt === 'd' && t.quizQ3D}
                                                    </div>
                                                ))}
                                                {quizAnswers['q3'] && (
                                                    <div style={{marginTop: '1rem', padding: '0.5rem', borderRadius: '0.35rem', background: quizAnswers['q3'] === 'c' ? '#ecfdf5' : '#fef2f2', color: quizAnswers['q3'] === 'c' ? '#059669' : '#dc2626'}}>
                                                        {quizAnswers['q3'] === 'c' ? t.correct : t.incorrect} {t.quizQ3Explain}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                        {qNum === 4 && (
                                            <>
                                                {['a', 'b', 'c', 'd'].map(opt => (
                                                    <div key={opt} className={'quiz-option' + (quizAnswers['q4'] === opt ? (opt === t.quizQ4Correct ? ' correct' : ' incorrect') : '')} onClick={() => handleQuizAnswer('q4', opt)}>
                                                        {opt === 'a' && t.quizQ4A}
                                                        {opt === 'b' && t.quizQ4B}
                                                        {opt === 'c' && t.quizQ4C}
                                                        {opt === 'd' && t.quizQ4D}
                                                    </div>
                                                ))}
                                                {quizAnswers['q4'] && (
                                                    <div style={{marginTop: '1rem', padding: '0.5rem', borderRadius: '0.35rem', background: quizAnswers['q4'] === 'b' ? '#ecfdf5' : '#fef2f2', color: quizAnswers['q4'] === 'b' ? '#059669' : '#dc2626'}}>
                                                        {quizAnswers['q4'] === 'b' ? t.correct : t.incorrect} {t.quizQ4Explain}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                        {qNum === 5 && (
                                            <>
                                                {['a', 'b', 'c', 'd'].map(opt => (
                                                    <div key={opt} className={'quiz-option' + (quizAnswers['q5'] === opt ? (opt === t.quizQ5Correct ? ' correct' : ' incorrect') : '')} onClick={() => handleQuizAnswer('q5', opt)}>
                                                        {opt === 'a' && t.quizQ5A}
                                                        {opt === 'b' && t.quizQ5B}
                                                        {opt === 'c' && t.quizQ5C}
                                                        {opt === 'd' && t.quizQ5D}
                                                    </div>
                                                ))}
                                                {quizAnswers['q5'] && (
                                                    <div style={{marginTop: '1rem', padding: '0.5rem', borderRadius: '0.35rem', background: quizAnswers['q5'] === 'b' ? '#ecfdf5' : '#fef2f2', color: quizAnswers['q5'] === 'b' ? '#059669' : '#dc2626'}}>
                                                        {quizAnswers['q5'] === 'b' ? t.correct : t.incorrect} {t.quizQ5Explain}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                        {qNum === 6 && (
                                            <>
                                                {['a', 'b', 'c', 'd'].map(opt => (
                                                    <div key={opt} className={'quiz-option' + (quizAnswers['q6'] === opt ? (opt === t.quizQ6Correct ? ' correct' : ' incorrect') : '')} onClick={() => handleQuizAnswer('q6', opt)}>
                                                        {opt === 'a' && t.quizQ6A}
                                                        {opt === 'b' && t.quizQ6B}
                                                        {opt === 'c' && t.quizQ6C}
                                                        {opt === 'd' && t.quizQ6D}
                                                    </div>
                                                ))}
                                                {quizAnswers['q6'] && (
                                                    <div style={{marginTop: '1rem', padding: '0.5rem', borderRadius: '0.35rem', background: quizAnswers['q6'] === 'b' ? '#ecfdf5' : '#fef2f2', color: quizAnswers['q6'] === 'b' ? '#059669' : '#dc2626'}}>
                                                        {quizAnswers['q6'] === 'b' ? t.correct : t.incorrect} {t.quizQ6Explain}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                </div>
                            ))}

                            <button className="btn-accent" onClick={() => setActiveSection('outlook')} style={{marginTop: '2rem'}}>{t.nextExercise}</button>
                        </div>
                    );
                }

                // Outlook
                if (activeSection === 'outlook') {
                    return (
                        <div className="section active">
                            <h1 className="section-header">{t.outlookTitle}</h1>

                            <div className="outlook-part">
                                <div className="outlook-title">{t.advancedTitle}</div>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="1">{t.advancedTopic1}</StepItem>
                                    <StepItem number="2">{t.advancedTopic2}</StepItem>
                                    <StepItem number="3">{t.advancedTopic3}</StepItem>
                                    <StepItem number="4">{t.advancedTopic4}</StepItem>
                                </div>
                            </div>

                            <div className="outlook-part">
                                <div className="outlook-title">{t.aiTitle}</div>
                                <p>{t.aiDesc}</p>
                            </div>

                            <div className="outlook-part">
                                <div className="outlook-title">{t.promptExamplesTitle}</div>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="1">{t.prompt1}</StepItem>
                                    <StepItem number="2">{t.prompt2}</StepItem>
                                    <StepItem number="3">{t.prompt3}</StepItem>
                                </div>
                            </div>

                            <div className="outlook-part">
                                <div className="outlook-title">{t.resourcesTitle}</div>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="1"><a href="https://spark.apache.org/docs/latest/" style={{color: '#E8792F', textDecoration: 'none'}} target="_blank">Apache Spark Official Docs</a></StepItem>
                                    <StepItem number="2"><a href="https://spark.apache.org/docs/latest/tuning.html" style={{color: '#E8792F', textDecoration: 'none'}} target="_blank">Spark Performance Tuning</a></StepItem>
                                    <StepItem number="3"><a href="https://spark.apache.org/docs/latest/api/python/" style={{color: '#E8792F', textDecoration: 'none'}} target="_blank">PySpark API</a></StepItem>
                                    <StepItem number="4">Learning Spark (O'Reilly)</StepItem>
                                </div>
                            </div>

                            <button className="btn-accent" onClick={() => setActiveSection('troubleshooting')} style={{marginTop: '2rem'}}>{t.nextExercise}</button>
                        </div>
                    );
                }

                // Troubleshooting
                if (activeSection === 'troubleshooting') {
                    return (
                        <div className="section active">
                            <h1 className="section-header">{t.tsTitle}</h1>

                            <div className="card">
                                <h3 style={{fontWeight: 600, marginBottom: '0.5rem'}}>{t.ts1Title}</h3>
                                <p>{t.ts1Desc}</p>
                            </div>

                            <div className="card">
                                <h3 style={{fontWeight: 600, marginBottom: '0.5rem'}}>{t.ts2Title}</h3>
                                <p>{t.ts2Desc}</p>
                            </div>

                            <div className="card">
                                <h3 style={{fontWeight: 600, marginBottom: '0.5rem'}}>{t.ts3Title}</h3>
                                <p>{t.ts3Desc}</p>
                            </div>

                            <div className="card">
                                <h3 style={{fontWeight: 600, marginBottom: '0.5rem'}}>{t.ts4Title}</h3>
                                <p>{t.ts4Desc}</p>
                            </div>

                            <div className="card">
                                <h3 style={{fontWeight: 600, marginBottom: '0.5rem'}}>{t.ts5Title}</h3>
                                <p>{t.ts5Desc}</p>
                            </div>
                        </div>
                    );
                }
            };

            return (
                <div>
                    <div className="header">
                        <div style={{display: 'flex', alignItems: 'center', gap: '1rem'}}>
                            <a href="index.html" style={{color: 'white', textDecoration: 'none', fontSize: '0.9rem', opacity: 0.8, whiteSpace: 'nowrap'}}>{t.backToHome}</a>
                            <h1 className="header-title">Apache Spark Lab</h1>
                        </div>
                        <div className="lang-switcher">
                            {['de', 'en', 'ar', 'uk', 'es', 'tr'].map(lang => (
                                <button key={lang} className={'lang-btn' + (language === lang ? ' active' : '')} onClick={() => setLanguage(lang)}>
                                    {lang.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="sidebar">
                        {sidebarItems.map(item => (
                            <button key={item.id} className={'sidebar-item' + (activeSection === item.id ? ' active' : '')} onClick={() => setActiveSection(item.id)}>
                                {t[item.label]}
                            </button>
                        ))}
                    </div>

                    <div className="main-content">
                        {renderSection()}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<LabApp />, document.getElementById('root'));
    </script>
</body>
</html>
