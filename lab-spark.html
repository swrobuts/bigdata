            const ref = useRef(null);

            useEffect(() => {
                if (ref.current) {
                    ref.current.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                }
            }, [code]);

            const copyCode = () => {
                navigator.clipboard.writeText(code);
                const button = ref.current?.querySelector('.copy-button');
                if (button) {
                    button.classList.add('copied');
                    setTimeout(() => button.classList.remove('copied'), 2000);
                }
            };

            return (
                <div className="code-block" ref={ref}>
                    <div className="code-block-header">
                        <span>{language}</span>
                        <button className="copy-button" onClick={copyCode}>{t?.ui?.copy || 'Copy'}</button>
                    </div>
                    <div className="code-block-content">
                        <pre><code className={`language-${language}`}>{code}</code></pre>
                    </div>
                </div>
            );
        };

                        </div>
                    </nav>

                    <div style={{ display: 'flex', flex: 1 }}>
                        <aside className="sidebar" style={{ width: '250px', minWidth: '250px' }}>
                            <nav style={{ display: 'flex', flexDirection: 'column', gap: '0.25rem' }}>
                                {Object.entries(t.sidebar).map(([key, value]) => (
                                    <a key={key} href={`#${key}`} onClick={(e) => { e.preventDefault(); setActiveSection(key); }} className="sidebar-link" style={{ color: activeSection === key ? '#E25A1C' : '#1B3A5C' }}>{value}</a>
                                ))}
                            </nav>
                        </aside>

                        <main style={{ flex: 1, maxWidth: '900px', margin: '0 auto', width: '100%', padding: '2rem 1.5rem' }}>
                            <section className="hero-section" style={{ marginBottom: '3rem', marginLeft: '-1.5rem', marginRight: '-1.5rem', marginTop: '-2rem', paddingLeft: '1.5rem', paddingRight: '1.5rem' }}>
                                <div className="hero-content">
                                    <h1 style={{ fontSize: '3rem', fontWeight: 'bold', marginBottom: '1rem' }}>{t.hero.title}</h1>
                                    <p style={{ fontSize: '1.25rem', marginBottom: '0.5rem' }}>{t.hero.chapter}</p>
                                    {t.hero.prerequisites && <p style={{ fontSize: '0.95rem', marginBottom: '2rem', opacity: 0.95 }}>📋 {t.hero.prerequisites}</p>}
                                    <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center', flexWrap: 'wrap' }}>
                                        <span className="difficulty-badge difficulty-advanced">{t.hero.advanced}</span>
                                        <span style={{ color: 'white' }}>⏱️ {t.hero.estimatedTime}: {t.hero.hours}</span>
                                    </div>
                                </div>
                            </section>

                            {activeSection === 'learningObjectives' && (
                                <section id="learningObjectives" className="section">
                                    <h2 className="section-header">{t.sidebar.learningObjectives}</h2>
                                    <ul className="numbered-list">
                                        {t.objectives.map((obj, idx) => (<li key={idx}><span>{obj}</span></li>))}
                                    </ul>
                                    {t.reflection && t.reflection.companies && (
                                        <div style={{ marginTop: '2rem' }}>
                                            <h3 className="subsection-header">{t.reflection.companies.title}</h3>
                                            <ul className="check-list">
                                                {t.reflection.companies.list.map((item, idx) => (
                                                    <li key={idx}>
                                                        <span>
                                                            {item.name}: {item.desc}
                                                            <a className="source-link" href={item.link} target="_blank" rel="noopener noreferrer">[Source]</a>
                                                        </span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </section>
                            )}

                            {activeSection === 'setupInstallation' && (
                                <section id="setupInstallation" className="section">
                                    <h2 className="section-header">{t.sidebar.setupInstallation}</h2>
                                    <CodeBlock code="docker run --name spark-jupyter -p 8888:8888 -p 4040:4040 -v $(pwd)/data:/home/jovyan/data jupyter/pyspark-notebook:latest" language="bash" t={t} />
                                </section>
                            )}

                            {activeSection === 'theoryOverview' && (
                                <section id="theoryOverview" className="section">
                                    <h2 className="section-header">{t.theory.title}</h2>

                                    <div className="card learning-box mb-6">
                                        <h3 className="subsection-header">{t.theory.whatIsSpark}</h3>
                                        <p>{t.theory.whatIsSparkDesc}</p>
                                    </div>

                                    <div className="card learning-box mb-6">
                                        <h3 className="subsection-header">{t.theory.rddVsDataFrame}</h3>
                                        <p>{t.theory.rddVsDataFrameDesc}</p>
                                    </div>

                                    <div className="card learning-box mb-6">
                                        <h3 className="subsection-header">{t.theory.lazyEvaluation}</h3>
                                        <p>{t.theory.lazyEvaluationDesc}</p>
                                    </div>

                                    <div className="card learning-box mb-6">
                                        <h3 className="subsection-header">{t.theory.architecture}</h3>
                                        <p>{t.theory.architectureDesc}</p>
                                    </div>

                                    <div className="card learning-box">
                                        <h3 className="subsection-header">{t.theory.transformationsVsActions}</h3>
                                        <p>{t.theory.transformationsVsActionsDesc}</p>
                                    </div>
                                </section>
                            )}

                            {activeSection === 'dataModel' && (
                                <section id="dataModel" className="section">
                                    <h2 className="section-header">{t.dataModel.title}</h2>
                                    <p className="mb-6">{t.dataModel.intro}</p>

                                    <div className="card mb-6">
                                        <h3 className="subsection-header">{t.dataModel.dataFlow}</h3>
                                        <p>{t.dataModel.dataFlow}</p>
                                    </div>

                                    <div className="card mb-6">
                                        <h3 className="subsection-header">{t.ui.dataSchema}</h3>
                                        <ul style={{ lineHeight: '1.8' }}>
                                            <li>• {t.dataModel.customers}</li>
                                            <li>• {t.dataModel.products}</li>
                                            <li>• {t.dataModel.orders}</li>
                                            <li>• {t.dataModel.orderItems}</li>
                                        </ul>
                                        <p style={{ marginTop: '1rem' }}>{t.dataModel.schema}</p>
                                    </div>
                                </section>
                            )}

                            {activeSection === 'exercise1' && (
                                <section id="exercise1" className="section">
                                    <h2 className="section-header">{t.sidebar.exercise1}</h2>
                                    <p>{t.exercise1.intro}</p>
                                    <CodeBlock code={`from pyspark.sql import SparkSession

spark = SparkSession.builder.appName("MegaStore").master("local[*]").getOrCreate()
orders = spark.read.parquet("data/orders.parquet")
orders.printSchema()
orders.show(5)`} language="python" t={t} />
                                    <button onClick={() => setActiveSection('exercise2')} style={{ marginTop: '2rem', padding: '0.75rem 1.5rem', backgroundColor: '#E25A1C', color: 'white', border: 'none', borderRadius: '0.375rem', cursor: 'pointer', fontWeight: '600', fontSize: '1rem' }}>{t.ui.nextExercise}</button>
                                </section>
                            )}

                            {activeSection === 'exercise2' && (
                                <section id="exercise2" className="section">
                                    <h2 className="section-header">{t.sidebar.exercise2}</h2>
                                    <p>{t.exercise2.intro}</p>
                                    <CodeBlock code={`from pyspark.sql.functions import col, sum, count, round as spark_round

order_items = spark.read.parquet("data/order_items.parquet")
products = spark.read.csv("data/products.csv", header=True, inferSchema=True)

revenue_by_category = order_items \\
    .join(products, "product_id") \\
    .groupBy("category") \\
    .agg(spark_round(sum(col("quantity") * col("unit_price")), 2).alias("revenue")) \\
    .orderBy(col("revenue").desc())

revenue_by_category.show()`} language="python" t={t} />
                                    <button onClick={() => setActiveSection('exercise3')} style={{ marginTop: '2rem', padding: '0.75rem 1.5rem', backgroundColor: '#E25A1C', color: 'white', border: 'none', borderRadius: '0.375rem', cursor: 'pointer', fontWeight: '600', fontSize: '1rem' }}>{t.ui.nextExercise}</button>
                                </section>
                            )}

                            {activeSection === 'exercise3' && (
                                <section id="exercise3" className="section">
                                    <h2 className="section-header">{t.sidebar.exercise3}</h2>
                                    <p>{t.exercise3.intro}</p>
                                    <CodeBlock code={`from pyspark.sql.window import Window
from pyspark.sql.functions import row_number, lag

orders.createOrReplaceTempView("orders")
window_spec = Window.partitionBy("customer_id").orderBy("order_date")
orders_with_rank = orders.withColumn("order_rank", row_number().over(window_spec))
orders_with_rank.show()`} language="python" t={t} />
                                    <button onClick={() => setActiveSection('exercise4')} style={{ marginTop: '2rem', padding: '0.75rem 1.5rem', backgroundColor: '#E25A1C', color: 'white', border: 'none', borderRadius: '0.375rem', cursor: 'pointer', fontWeight: '600', fontSize: '1rem' }}>{t.ui.nextExercise}</button>
                                </section>
                            )}

                            {activeSection === 'exercise4' && (
                                <section id="exercise4" className="section">
                                    <h2 className="section-header">{t.sidebar.exercise4}</h2>
                                    <p>{t.exercise4.intro}</p>
                                    <CodeBlock code={"orders_rdd = orders.rdd\ncustomer_revenue = orders_rdd \\\n    .map(lambda row: (row.customer_id, float(row.order_total))) \\\n    .reduceByKey(lambda a, b: a + b) \\\n    .sortBy(lambda x: -x[1])\n\nfor customer_id, revenue in customer_revenue.take(10):\n    print(f\"Customer {customer_id}: ${revenue:.2f}\")"} language="python" t={t} />
                                    <button onClick={() => setActiveSection('exercise5')} style={{ marginTop: '2rem', padding: '0.75rem 1.5rem', backgroundColor: '#E25A1C', color: 'white', border: 'none', borderRadius: '0.375rem', cursor: 'pointer', fontWeight: '600', fontSize: '1rem' }}>{t.ui.nextExercise}</button>
                                </section>
                            )}

                            {activeSection === 'exercise5' && (
                                <section id="exercise5" className="section">
                                    <h2 className="section-header">{t.sidebar.exercise5}</h2>
                                    <p>{t.exercise5.intro}</p>
                                    <CodeBlock code={`orders.cache()
orders.count()
orders.groupBy("customer_id").agg(sum("order_total")).explain(True)`} language="python" t={t} />
                                    <button onClick={() => setActiveSection('challenges')} style={{ marginTop: '2rem', padding: '0.75rem 1.5rem', backgroundColor: '#E25A1C', color: 'white', border: 'none', borderRadius: '0.375rem', cursor: 'pointer', fontWeight: '600', fontSize: '1rem' }}>{t.ui.nextExercise}</button>
                                </section>
                            )}

                            {activeSection === 'challenges' && (
                                <section id="challenges" className="section">
                                    <h2 className="section-header">{t.challenges.title}</h2>
                                    <ChallengeCard level={1} t={t} />
                                    <ChallengeCard level={2} t={t} />
                                    <ChallengeCard level={3} t={t} />
                                    <ChallengeCard level={4} t={t} />
                                </section>
                            )}

                            {activeSection === 'selfCheck' && (
                                <section id="selfCheck" className="section">
                                    <h2 className="section-header">{t.selfCheck.title}</h2>
                                    <div className="space-y-3">
                                        {t.selfCheck.questions.map((item, i) => (
                                            <SelfCheckQuestion key={i} question={item.q} answer={item.a} />
                                        ))}
                                    </div>
                                </section>
                            )}

                            {activeSection === 'reflection' && (
                                <section id="reflection" className="section">
                                    <h2 className="section-header">{t.reflection.title}</h2>
                                    <div className="space-y-4 mb-8">
                                        {t.reflection.prompts.map((prompt, i) => (
                                            <div key={i} className="card hypothesis-box">
                                                <h4 className="font-bold mb-2">{prompt.title}</h4>
                                                <p>{prompt.desc}</p>
                                            </div>
                                        ))}
                                    </div>

                                    <h3 className="subsection-header">{t.reflection.realWorld}</h3>
                                    <div className="space-y-3">
                                        {t.reflection.useCases.map((useCase, i) => (
                                            <div key={i} className="card insight-box">
                                                <h4 className="font-bold mb-2">{useCase.title}</h4>
                                                <p>{useCase.desc}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}

                            {activeSection === 'troubleshooting' && (
                                <section id="troubleshooting" className="section">
                                    <h2 className="section-header">{t.troubleshooting.title}</h2>
                                    <h3 className="subsection-header">{t.troubleshooting.commonErrors}</h3>
                                    <div className="space-y-3">
                                        {t.troubleshooting.errors.map((error, i) => (
                                            <div key={i} className="card">
                                                <h4 className="font-bold mb-2">{error.problem}</h4>
                                                <p style={{ color: '#4b5563' }}><strong>{t.ui.solution}</strong> {error.solution}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<LabApp />);
    </script>
</body>
</html>
