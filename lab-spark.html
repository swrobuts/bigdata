                ex7Objective: "Berechnungen über Gruppen mit Window Functions – ohne Daten zu verdichten",
                ex7Code: "from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql import functions as F\n\nspark = SparkSession.builder.appName('WindowDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\n\n# Fenster pro Kunde, nach Datum sortiert\nwindow = Window.partitionBy('customer_id').orderBy('order_date')\n\nresult = orders.withColumn('order_num', F.row_number().over(window)) \\\n               .withColumn('cumulative_spend', F.sum('total_amount').over(window))\n\nresult.select('customer_id', 'order_date', 'total_amount', 'order_num', 'cumulative_spend').show(10)",
                ex7Output: "+----------+----------+------------+---------+----------------+\n|customer_id|order_date|total_amount|order_num|cumulative_spend|\n+----------+----------+------------+---------+----------------+\n|         1|2023-01-05|      125.99|        1|          125.99|\n|         1|2023-02-12|      349.50|        2|          475.49|\n+----------+----------+------------+---------+----------------+",
                ex7Explain: "Window Functions berechnen Werte über eine Partition ohne Zeilen zu verdichten. partitionBy('customer_id') = eigenes Fenster pro Kunde. row_number() nummeriert Zeilen innerhalb des Fensters. sum().over(window) = laufende kumulative Summe. Kein groupBy nötig – alle Zeilen bleiben erhalten.",
                ex7Practice: "Berechnen Sie den Rang jeder Bestellung pro Kunde nach Bestellwert (höchste zuerst). Verwenden Sie F.rank().over(Window.partitionBy('customer_id').orderBy(F.desc('total_amount'))).",
                ex7Hint: "Tipp: window2 = Window.partitionBy('customer_id').orderBy(F.desc('total_amount')), dann .withColumn('betrag_rang', F.rank().over(window2))",
                ex7Solution: "window2 = Window.partitionBy('customer_id').orderBy(F.desc('total_amount'))\nresult = orders.withColumn('betrag_rang', F.rank().over(window2))\nresult.select('customer_id', 'order_date', 'total_amount', 'betrag_rang').show(10)",
                ex8Objective: "Eigene Python-Funktionen auf Spark DataFrames anwenden (User Defined Functions)",
                ex8Code: "from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.sql.types import StringType, FloatType\n\nspark = SparkSession.builder.appName('UDFDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\n\n# UDF definieren\n@F.udf(returnType=StringType())\ndef categorize_order(amount):\n    if amount is None: return 'Unbekannt'\n    if amount < 50: return 'Klein'\n    if amount < 200: return 'Mittel'\n    if amount < 500: return 'Groß'\n    return 'Premium'\n\nresult = orders.withColumn('kategorie', categorize_order('total_amount'))\nresult.groupBy('kategorie').count().orderBy('count', ascending=False).show()",
                ex8Output: "+---------+-----+\n|kategorie|count|\n+---------+-----+\n|   Mittel|  423|\n|     Groß|  312|\n|    Klein|  187|\n|  Premium|   78|\n+---------+-----+",
                ex8Explain: "@F.udf(returnType=StringType()): Dekoriert eine Python-Funktion zur Spark-UDF. returnType gibt den Rückgabetyp an (StringType, FloatType, IntegerType, etc.). UDFs sind mächtig aber langsamer als built-in Functions – nur nutzen wenn keine Spark-Alternative existiert.",
                ex8Practice: "Schreiben Sie eine UDF discount_udf die einen Rabatt berechnet: status='completed' → 0%, status='returned' → 10%, sonst 5%. Wenden Sie sie auf das status-Feld an.",
                ex8Hint: "Tipp: @F.udf(returnType=FloatType()) def discount_udf(status): return 0.0 if status=='completed' else 0.1 if status=='returned' else 0.05",
                ex8Solution: "@F.udf(returnType=FloatType())\ndef discount_udf(status):\n    if status == 'completed': return 0.0\n    if status == 'returned': return 0.10\n    return 0.05\n\nresult = orders.withColumn('rabatt', discount_udf('status'))\nresult.select('order_id', 'status', 'total_amount', 'rabatt').show(10)",
                ex9Objective: "DataFrames als Parquet speichern und wieder laden – das Standard-Dateiformat für Big Data",
                ex9Code: "from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName('ParquetDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\n\n# Als Parquet speichern (spaltenorientiert, komprimiert)\norders.write.mode('overwrite').parquet('/tmp/orders_parquet/')\n\n# Parquet wieder einlesen\ndf_parquet = spark.read.parquet('/tmp/orders_parquet/')\ndf_parquet.printSchema()\ndf_parquet.select('order_id', 'total_amount', 'status').show(5)\n\n# Nur bestimmte Spalten lesen (Column Pruning)\ndf_small = spark.read.parquet('/tmp/orders_parquet/').select('customer_id', 'total_amount')\nprint('Anzahl Zeilen:', df_small.count())",
                ex9Output: "root\n |-- order_id: integer (nullable = true)\n |-- customer_id: integer (nullable = true)\n |-- total_amount: double (nullable = true)\n |-- status: string (nullable = true)\n\nAnzahl Zeilen: 1000",
                ex9Explain: "Parquet ist spaltenorientiert: Nur benötigte Spalten werden gelesen (Column Pruning = deutlich weniger I/O). Automatische Kompression. printSchema() zeigt die Typen nach dem Einlesen – Parquet erhält Datentypen, CSV verliert sie. mode('overwrite') überschreibt vorhandene Dateien.",
                ex9Practice: "Laden Sie die Parquet-Datei und filtern Sie nur 'completed'-Bestellungen. Speichern Sie diese als neues Parquet in /tmp/completed_orders/. Zählen Sie die Zeilen.",
                ex9Hint: "Tipp: df_parquet.filter(F.col('status') == 'completed').write.mode('overwrite').parquet('/tmp/completed_orders/')",
                ex9Solution: "from pyspark.sql import functions as F\ndf = spark.read.parquet('/tmp/orders_parquet/')\ncompleted = df.filter(F.col('status') == 'completed')\ncompleted.write.mode('overwrite').parquet('/tmp/completed_orders/')\nprint('Completed orders:', completed.count())",
                ex10Objective: "Spark SQL: SQL-Abfragen direkt auf DataFrames ausführen – ideal für SQL-Kennende",
                ex10Code: "from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName('SparkSQLDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\ncustomers = spark.read.csv('/home/jovyan/data/customers.csv', header=True, inferSchema=True)\n\n# DataFrames als temporäre Views registrieren\norders.createOrReplaceTempView('orders')\ncustomers.createOrReplaceTempView('customers')\n\n# SQL direkt ausführen\nresult = spark.sql(\"\"\"\n    SELECT c.name, COUNT(o.order_id) AS bestellungen,\n           ROUND(SUM(o.total_amount), 2) AS gesamtumsatz\n    FROM orders o\n    JOIN customers c ON o.customer_id = c.customer_id\n    WHERE o.status = 'completed'\n    GROUP BY c.name\n    ORDER BY gesamtumsatz DESC\n    LIMIT 10\n\"\"\")\nresult.show()",
                ex10Output: "+-------------+------------+-------------+\n|         name|bestellungen|gesamtumsatz |\n+-------------+------------+-------------+\n| Alice Müller|          12|       2340.5|\n|Bob Schneider|           9|       1890.2|\n+-------------+------------+-------------+",
                ex10Explain: "createOrReplaceTempView(): Registriert den DataFrame als SQL-View (nur in dieser Session). spark.sql(): Führt beliebige SQL-Abfragen aus – alle Standard-SQL-Features verfügbar. Vorteil: SQL-Kennende brauchen keine neue API zu lernen. Ergebnis ist wieder ein DataFrame.",
                ex10Practice: "Schreiben Sie eine SQL-Abfrage die den monatlichen Umsatz (year, month, revenue) aus completed-Bestellungen berechnet. Verwenden Sie YEAR(order_date) und MONTH(order_date).",
                ex10Hint: "Tipp: spark.sql('SELECT YEAR(order_date) as year, MONTH(order_date) as month, ROUND(SUM(total_amount),2) as revenue FROM orders WHERE status=\"completed\" GROUP BY year, month ORDER BY year, month')",
                ex10Solution: "result = spark.sql(\"\"\"\n    SELECT YEAR(order_date) AS year, MONTH(order_date) AS month,\n           ROUND(SUM(total_amount), 2) AS revenue,\n           COUNT(*) AS order_count\n    FROM orders\n    WHERE status = 'completed'\n    GROUP BY year, month\n    ORDER BY year, month\n\"\"\")\nresult.show()",
                ex11Objective: "Structured Streaming simulieren: Batch-Verarbeitung als Mini-Streaming verstehen",
                ex11Code: "from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nimport time\n\nspark = SparkSession.builder.appName('StreamingDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\n\n# Streaming simulieren: Daten in Batches verarbeiten\nbatch_size = 100\ntotal = orders.count()\n\nfor i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    stats = batch.agg(\n        F.count('*').alias('bestellungen'),\n        F.round(F.sum('total_amount'), 2).alias('umsatz')\n    ).collect()[0]\n    print(f'Batch {i//batch_size + 1}: {stats.bestellungen} Bestellungen, {stats.umsatz}€')\n    time.sleep(0.5)",
                ex11Output: "Batch 1: 100 Bestellungen, 23456.78€\nBatch 2: 100 Bestellungen, 19834.21€\nBatch 3: 100 Bestellungen, 21109.55€",
                ex11Explain: "Echtes Spark Streaming liest aus Kafka, S3 oder Sockets. Diese Simulation zeigt das Prinzip: Daten kommen in Batches an und werden sofort verarbeitet. subtract() entfernt bereits verarbeitete Daten. Im echten System: spark.readStream.format('kafka').",
                ex11Practice: "Erweitern Sie die Simulation: Berechnen Sie pro Batch auch den Anteil der 'completed'-Bestellungen in Prozent.",
                ex11Hint: "Tipp: Fügen Sie completed_pct = batch.filter(F.col('status')=='completed').count() / batch.count() * 100 hinzu.",
                ex11Solution: "for i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    n_total = batch.count()\n    n_completed = batch.filter(F.col('status') == 'completed').count()\n    umsatz = batch.agg(F.round(F.sum('total_amount'), 2)).collect()[0][0]\n    pct = round(n_completed / n_total * 100, 1) if n_total > 0 else 0\n    print(f'Batch {i//batch_size + 1}: {n_total} Orders, {umsatz}€, {pct}% completed')",
                ex12Objective: "Eine vollständige ML-Pipeline mit Spark MLlib bauen: Feature Engineering + Modell",
                ex12Code: "from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nspark = SparkSession.builder.appName('MLDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\n\n# Feature Engineering\ncustomer_features = orders.groupBy('customer_id').agg(\n    F.count('*').alias('n_orders'),\n    F.avg('total_amount').alias('avg_amount'),\n    F.sum('total_amount').alias('total_spent'),\n    (F.sum(F.when(F.col('status')=='completed', 1).otherwise(0)) / F.count('*')).alias('completion_rate')\n)\n\n# Label: Hochwertkunde (total_spent > 500)\ncustomer_features = customer_features.withColumn('is_high_value', (F.col('total_spent') > 500).cast('integer'))\n\ncustomer_features.show(5)",
                ex12Output: "+-----------+--------+----------+-----------+---------------+-------------+\n|customer_id|n_orders|avg_amount|total_spent|completion_rate|is_high_value|\n+-----------+--------+----------+-----------+---------------+-------------+\n|          1|       5|    234.56|    1172.80|            0.8|            1|\n|          2|       3|     89.99|     269.97|            1.0|            0|\n+-----------+--------+----------+-----------+---------------+-------------+",
                ex12Explain: "Spark MLlib-Pipeline: 1. Feature Engineering mit groupBy/agg. 2. VectorAssembler kombiniert Features zu einem Vektor. 3. StandardScaler normalisiert Features. 4. LogisticRegression klassifiziert. Pipeline.fit() trainiert alle Stufen in Sequenz.",
                ex12Practice: "Trainieren Sie die vollständige ML-Pipeline: Fügen Sie VectorAssembler, StandardScaler und LogisticRegression hinzu. Evaluieren Sie mit der Trainingsgenauigkeit.",
                ex12Hint: "Tipp: assembler = VectorAssembler(inputCols=['n_orders','avg_amount','completion_rate'], outputCol='features'), dann Pipeline(stages=[assembler, scaler, lr]).fit(train_data)",
                ex12Solution: "from pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nassembler = VectorAssembler(inputCols=['n_orders', 'avg_amount', 'completion_rate'], outputCol='features_raw')\nscaler = StandardScaler(inputCol='features_raw', outputCol='features')\nlr = LogisticRegression(featuresCol='features', labelCol='is_high_value')\n\ntrain, test = customer_features.randomSplit([0.8, 0.2], seed=42)\npipeline = Pipeline(stages=[assembler, scaler, lr])\nmodel = pipeline.fit(train)\npredictions = model.transform(test)\nacc = predictions.filter(F.col('prediction') == F.col('is_high_value')).count() / predictions.count()\nprint(f'Genauigkeit: {acc:.1%}')",
                challengeName: "Challenge: RFM-Analyse",
                challengeDesc: "Berechnen Sie RFM-Metriken (Recency, Frequency, Monetary) für Kunden und identifizieren Sie Top-Kunden.",
                challengeSteps: "Schritte:",
                challengeStep1: "Laden Sie customers.csv und orders.csv",
                challengeStep2: "Joinen Sie beide Tabellen über customer_id",
                challengeStep3: "Gruppieren Sie nach Kunde und berechnen Sie: Anzahl Bestellungen (Frequency) und Gesamtumsatz (Monetary)",
                challengeStep4: "Sortieren Sie nach Gesamtumsatz absteigend",
                challengeStep5: "Zeigen Sie die Top-10 Kunden nach Umsatz",
                challengeStep6: "Optional: Erstellen Sie ein Segment 'High-Value' für Kunden mit Umsatz > 10000$",
                challengeHint: "Hinweis: Verwenden Sie groupBy(), agg() mit count() und sum(), und orderBy() mit limit()",
                challengeSolution: "from pyspark.sql.functions import count, sum, when\n\n# Beide Dateien laden\ncustomers = spark.read.csv(\"/home/jovyan/data/customers.csv\", header=True, inferSchema=True)\norders = spark.read.csv(\"/home/jovyan/data/orders.csv\", header=True, inferSchema=True)\n\n# RFM Berechnung\ndf_rfm = customers.join(orders, \"customer_id\") \\\n    .groupBy(\"customer_id\", \"name\") \\\n    .agg(\n        count(\"order_id\").alias(\"frequency\"),\n        sum(\"order_total\").alias(\"monetary\")\n    )\n\n# Top-10 Kunden nach Umsatz\ndf_rfm.orderBy(\"monetary\", ascending=False).limit(10).show()\n\n# Optional: High-Value Segmentierung\ndf_rfm_segment = df_rfm.withColumn(\"segment\",\n    when(col(\"monetary\") > 10000, \"High-Value\").otherwise(\"Standard\")\n)\ndf_rfm_segment.filter(col(\"segment\") == \"High-Value\").show()",

                ex7Objective: "Calculations across groups with Window Functions – without collapsing rows",
                ex7Code: "from pyspark.sql import SparkSession\nfrom pyspark.sql.window import Window\nfrom pyspark.sql import functions as F\n\nspark = SparkSession.builder.appName('WindowDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\n\n# Window per customer, ordered by date\nwindow = Window.partitionBy('customer_id').orderBy('order_date')\n\nresult = orders.withColumn('order_num', F.row_number().over(window)) \\\n               .withColumn('cumulative_spend', F.sum('total_amount').over(window))\n\nresult.select('customer_id', 'order_date', 'total_amount', 'order_num', 'cumulative_spend').show(10)",
                ex7Output: "+----------+----------+------------+---------+----------------+\n|customer_id|order_date|total_amount|order_num|cumulative_spend|\n+----------+----------+------------+---------+----------------+\n|         1|2023-01-05|      125.99|        1|          125.99|\n|         1|2023-02-12|      349.50|        2|          475.49|\n+----------+----------+------------+---------+----------------+",
                ex7Explain: "Window Functions compute values over a partition without collapsing rows. partitionBy('customer_id') = separate window per customer. row_number() numbers rows within the window. sum().over(window) = running cumulative total. No groupBy needed – all rows remain.",
                ex7Practice: "Calculate the rank of each order per customer by order amount (highest first). Use F.rank().over(Window.partitionBy('customer_id').orderBy(F.desc('total_amount'))).",
                ex7Hint: "Hint: window2 = Window.partitionBy('customer_id').orderBy(F.desc('total_amount')), then .withColumn('amount_rank', F.rank().over(window2))",
                ex7Solution: "window2 = Window.partitionBy('customer_id').orderBy(F.desc('total_amount'))\nresult = orders.withColumn('amount_rank', F.rank().over(window2))\nresult.select('customer_id', 'order_date', 'total_amount', 'amount_rank').show(10)",
                ex8Objective: "Apply custom Python functions to Spark DataFrames (User Defined Functions)",
                ex8Code: "from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.sql.types import StringType, FloatType\n\nspark = SparkSession.builder.appName('UDFDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\n\n# Define UDF\n@F.udf(returnType=StringType())\ndef categorize_order(amount):\n    if amount is None: return 'Unknown'\n    if amount < 50: return 'Small'\n    if amount < 200: return 'Medium'\n    if amount < 500: return 'Large'\n    return 'Premium'\n\nresult = orders.withColumn('category', categorize_order('total_amount'))\nresult.groupBy('category').count().orderBy('count', ascending=False).show()",
                ex8Output: "+--------+-----+\n|category|count|\n+--------+-----+\n|  Medium|  423|\n|   Large|  312|\n|   Small|  187|\n| Premium|   78|\n+--------+-----+",
                ex8Explain: "@F.udf(returnType=StringType()): Decorates a Python function as a Spark UDF. returnType specifies the return type (StringType, FloatType, IntegerType, etc.). UDFs are powerful but slower than built-in functions – use only when no Spark alternative exists.",
                ex8Practice: "Write a UDF discount_udf that calculates a discount: status='completed' → 0%, status='returned' → 10%, else 5%. Apply it to the status field.",
                ex8Hint: "Hint: @F.udf(returnType=FloatType()) def discount_udf(status): return 0.0 if status=='completed' else 0.1 if status=='returned' else 0.05",
                ex8Solution: "@F.udf(returnType=FloatType())\ndef discount_udf(status):\n    if status == 'completed': return 0.0\n    if status == 'returned': return 0.10\n    return 0.05\n\nresult = orders.withColumn('discount', discount_udf('status'))\nresult.select('order_id', 'status', 'total_amount', 'discount').show(10)",
                ex9Objective: "Save DataFrames as Parquet and reload them – the standard file format for Big Data",
                ex9Code: "from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName('ParquetDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\n\n# Save as Parquet (columnar, compressed)\norders.write.mode('overwrite').parquet('/tmp/orders_parquet/')\n\n# Read Parquet back\ndf_parquet = spark.read.parquet('/tmp/orders_parquet/')\ndf_parquet.printSchema()\ndf_parquet.select('order_id', 'total_amount', 'status').show(5)\n\n# Read only specific columns (Column Pruning)\ndf_small = spark.read.parquet('/tmp/orders_parquet/').select('customer_id', 'total_amount')\nprint('Row count:', df_small.count())",
                ex9Output: "root\n |-- order_id: integer (nullable = true)\n |-- customer_id: integer (nullable = true)\n |-- total_amount: double (nullable = true)\n |-- status: string (nullable = true)\n\nRow count: 1000",
                ex9Explain: "Parquet is columnar: only required columns are read (Column Pruning = much less I/O). Automatic compression. printSchema() shows types after loading – Parquet preserves data types, CSV loses them. mode('overwrite') replaces existing files.",
                ex9Practice: "Load the Parquet file and filter only 'completed' orders. Save them as new Parquet to /tmp/completed_orders/. Count the rows.",
                ex9Hint: "Hint: df_parquet.filter(F.col('status') == 'completed').write.mode('overwrite').parquet('/tmp/completed_orders/')",
                ex9Solution: "from pyspark.sql import functions as F\ndf = spark.read.parquet('/tmp/orders_parquet/')\ncompleted = df.filter(F.col('status') == 'completed')\ncompleted.write.mode('overwrite').parquet('/tmp/completed_orders/')\nprint('Completed orders:', completed.count())",
                ex10Objective: "Spark SQL: run SQL queries directly on DataFrames – ideal for those with SQL experience",
                ex10Code: "from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName('SparkSQLDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\ncustomers = spark.read.csv('/home/jovyan/data/customers.csv', header=True, inferSchema=True)\n\n# Register DataFrames as temporary views\norders.createOrReplaceTempView('orders')\ncustomers.createOrReplaceTempView('customers')\n\n# Run SQL directly\nresult = spark.sql(\"\"\"\n    SELECT c.name, COUNT(o.order_id) AS orders,\n           ROUND(SUM(o.total_amount), 2) AS total_revenue\n    FROM orders o\n    JOIN customers c ON o.customer_id = c.customer_id\n    WHERE o.status = 'completed'\n    GROUP BY c.name\n    ORDER BY total_revenue DESC\n    LIMIT 10\n\"\"\")\nresult.show()",
                ex10Output: "+-------------+------+-------------+\n|         name|orders|total_revenue|\n+-------------+------+-------------+\n| Alice Mueller|    12|       2340.5|\n|Bob Schneider |     9|       1890.2|\n+-------------+------+-------------+",
                ex10Explain: "createOrReplaceTempView(): Registers the DataFrame as a SQL view (session-scoped only). spark.sql(): Executes any SQL query – all standard SQL features available. Advantage: SQL users don't need to learn a new API. Result is a DataFrame again.",
                ex10Practice: "Write a SQL query calculating monthly revenue (year, month, revenue) from completed orders. Use YEAR(order_date) and MONTH(order_date).",
                ex10Hint: "Hint: spark.sql('SELECT YEAR(order_date) as year, MONTH(order_date) as month, ROUND(SUM(total_amount),2) as revenue FROM orders WHERE status=\"completed\" GROUP BY year, month ORDER BY year, month')",
                ex10Solution: "result = spark.sql(\"\"\"\n    SELECT YEAR(order_date) AS year, MONTH(order_date) AS month,\n           ROUND(SUM(total_amount), 2) AS revenue,\n           COUNT(*) AS order_count\n    FROM orders\n    WHERE status = 'completed'\n    GROUP BY year, month\n    ORDER BY year, month\n\"\"\")\nresult.show()",
                ex11Objective: "Simulate Structured Streaming: understand batch processing as mini-streaming",
                ex11Code: "from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nimport time\n\nspark = SparkSession.builder.appName('StreamingDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\n\n# Simulate streaming: process data in batches\nbatch_size = 100\ntotal = orders.count()\n\nfor i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    stats = batch.agg(\n        F.count('*').alias('orders'),\n        F.round(F.sum('total_amount'), 2).alias('revenue')\n    ).collect()[0]\n    print(f'Batch {i//batch_size + 1}: {stats.orders} orders, {stats.revenue}€')\n    time.sleep(0.5)",
                ex11Output: "Batch 1: 100 orders, 23456.78€\nBatch 2: 100 orders, 19834.21€\nBatch 3: 100 orders, 21109.55€",
                ex11Explain: "Real Spark Streaming reads from Kafka, S3 or sockets. This simulation shows the concept: data arrives in batches and is processed immediately. subtract() removes already processed data. In real systems: spark.readStream.format('kafka').",
                ex11Practice: "Extend the simulation: calculate per batch also the percentage of 'completed' orders.",
                ex11Hint: "Hint: Add completed_pct = batch.filter(F.col('status')=='completed').count() / batch.count() * 100",
                ex11Solution: "for i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    n_total = batch.count()\n    n_completed = batch.filter(F.col('status') == 'completed').count()\n    revenue = batch.agg(F.round(F.sum('total_amount'), 2)).collect()[0][0]\n    pct = round(n_completed / n_total * 100, 1) if n_total > 0 else 0\n    print(f'Batch {i//batch_size + 1}: {n_total} orders, {revenue}€, {pct}% completed')",
                ex12Objective: "Build a complete ML pipeline with Spark MLlib: Feature Engineering + Model",
                ex12Code: "from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nspark = SparkSession.builder.appName('MLDemo').getOrCreate()\norders = spark.read.csv('/home/jovyan/data/orders.csv', header=True, inferSchema=True)\n\n# Feature Engineering\ncustomer_features = orders.groupBy('customer_id').agg(\n    F.count('*').alias('n_orders'),\n    F.avg('total_amount').alias('avg_amount'),\n    F.sum('total_amount').alias('total_spent'),\n    (F.sum(F.when(F.col('status')=='completed', 1).otherwise(0)) / F.count('*')).alias('completion_rate')\n)\n\n# Label: high-value customer (total_spent > 500)\ncustomer_features = customer_features.withColumn('is_high_value', (F.col('total_spent') > 500).cast('integer'))\ncustomer_features.show(5)",
                ex12Output: "+-----------+--------+----------+-----------+---------------+-------------+\n|customer_id|n_orders|avg_amount|total_spent|completion_rate|is_high_value|\n+-----------+--------+----------+-----------+---------------+-------------+\n|          1|       5|    234.56|    1172.80|            0.8|            1|\n|          2|       3|     89.99|     269.97|            1.0|            0|\n+-----------+--------+----------+-----------+---------------+-------------+",
                ex12Explain: "Spark MLlib Pipeline: 1. Feature Engineering with groupBy/agg. 2. VectorAssembler combines features into a vector. 3. StandardScaler normalizes features. 4. LogisticRegression classifies. Pipeline.fit() trains all stages in sequence.",
                ex12Practice: "Train the complete ML pipeline: add VectorAssembler, StandardScaler and LogisticRegression. Evaluate with training accuracy.",
                ex12Hint: "Hint: assembler = VectorAssembler(inputCols=['n_orders','avg_amount','completion_rate'], outputCol='features'), then Pipeline(stages=[assembler, scaler, lr]).fit(train_data)",
                ex12Solution: "from pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nassembler = VectorAssembler(inputCols=['n_orders', 'avg_amount', 'completion_rate'], outputCol='features_raw')\nscaler = StandardScaler(inputCol='features_raw', outputCol='features')\nlr = LogisticRegression(featuresCol='features', labelCol='is_high_value')\n\ntrain, test = customer_features.randomSplit([0.8, 0.2], seed=42)\npipeline = Pipeline(stages=[assembler, scaler, lr])\nmodel = pipeline.fit(train)\npredictions = model.transform(test)\nacc = predictions.filter(F.col('prediction') == F.col('is_high_value')).count() / predictions.count()\nprint(f'Accuracy: {acc:.1%}')",
                challengeName: "Challenge: RFM Analysis",
                challengeDesc: "Calculate RFM metrics (Recency, Frequency, Monetary) for customers and identify top customers.",

                challengeStep1: "Load customers.csv and orders.csv",

                challengeStep5: "Show the top 10 customers by revenue",
                challengeStep6: "Optional: Create a 'High-Value' segment for customers with revenue > 10000$",
                challengeHint: "Hint: Use groupBy(), agg() with count() and sum(), and orderBy() with limit()",
                challengeSolution: "from pyspark.sql.functions import count, sum, when\n\n# Load both files\ncustomers = spark.read.csv(\"/home/jovyan/data/customers.csv\", header=True, inferSchema=True)\norders = spark.read.csv(\"/home/jovyan/data/orders.csv\", header=True, inferSchema=True)\n\n# RFM calculation\ndf_rfm = customers.join(orders, \"customer_id\") \\\n    .groupBy(\"customer_id\", \"name\") \\\n    .agg(\n        count(\"order_id\").alias(\"frequency\"),\n        sum(\"order_total\").alias(\"monetary\")\n    )\n\n# Top 10 customers by revenue\ndf_rfm.orderBy(\"monetary\", ascending=False).limit(10).show()\n\n# Optional: High-Value segmentation\ndf_rfm_segment = df_rfm.withColumn(\"segment\",\n    when(col(\"monetary\") > 10000, \"High-Value\").otherwise(\"Standard\")\n)\ndf_rfm_segment.filter(col(\"segment\") == \"High-Value\").show()",

            ex11Code: 'from pyspark.sql import SparkSession
from pyspark.sql import functions as F
import time

spark = SparkSession.builder.appName(\'StreamingDemo\').getOrCreate()
orders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)

# حاكِ التدفق: معالجة البيانات في دفعات
batch_size = 100
total = orders.count()

for i in range(0, min(total, 300), batch_size):
    batch = orders.limit(i + batch_size).subtract(orders.limit(i))
    stats = batch.agg(
        F.count(\'*\').alias(\'الطلبات\'),
        F.round(F.sum(\'total_amount\'), 2).alias(\'الإيرادات\')
    ).collect()[0]
    print(f\'الدفعة {i//batch_size + 1}: {stats.الطلبات} طلبات، {stats.الإيرادات}€\')
    time.sleep(0.5)',

            ex12Code: 'from pyspark.sql import SparkSession
from pyspark.sql import functions as F
from pyspark.ml.feature import VectorAssembler, StandardScaler
from pyspark.ml.classification import LogisticRegression
from pyspark.ml import Pipeline

spark = SparkSession.builder.appName(\'MLDemo\').getOrCreate()
orders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)

# هندسة الميزات
customer_features = orders.groupBy(\'customer_id\').agg(
    F.count(\'*\').alias(\'n_orders\'),
    F.avg(\'total_amount\').alias(\'avg_amount\'),
    F.sum(\'total_amount\').alias(\'total_spent\'),
    (F.sum(F.when(F.col(\'status\')==\'completed\', 1).otherwise(0)) / F.count(\'*\')).alias(\'completion_rate\')
)

# التسمية: العميل ذو القيمة العالية (total_spent > 500)
customer_features = customer_features.withColumn(\'is_high_value\', (F.col(\'total_spent\') > 500).cast(\'integer\'))

customer_features.show(5)',

            ex12Explain: 'خط أنابيب Spark MLlib: 1. هندسة الميزات من groupBy/agg. 2. VectorAssembler يجمع الميزات في متجه. 3. StandardScaler تطبّع الميزات. 4. LogisticRegression يؤدي التصنيف. يُدرّب Pipeline.fit() جميع المراحل بالتسلسل.',
            ex12Practice: 'درّب خط الأنابيب الكامل للتعلم الآلي: أضف VectorAssembler و StandardScaler و LogisticRegression. قيّم بالدقة على بيانات التدريب.',
            ex12Hint: 'تلميح: assembler = VectorAssembler(inputCols=[\'n_orders\',\'avg_amount\',\'completion_rate\'], outputCol=\'features\')، ثم Pipeline(stages=[assembler, scaler, lr]).fit(train_data)',
            ex12Solution: 'from pyspark.ml.feature import VectorAssembler, StandardScaler
from pyspark.ml.classification import LogisticRegression
from pyspark.ml import Pipeline

assembler = VectorAssembler(inputCols=[\'n_orders\', \'avg_amount\', \'completion_rate\'], outputCol=\'features_raw\')
scaler = StandardScaler(inputCol=\'features_raw\', outputCol=\'features\')
lr = LogisticRegression(featuresCol=\'features\', labelCol=\'is_high_value\')

train, test = customer_features.randomSplit([0.8, 0.2], seed=42)

predictions = model.transform(test)

print(f\'الدقة: {acc:.1%}\')',

            ex7Solution: 'window2 = Window.partitionBy(\\\\\\\\\\\\\\\'customer_id\\\\\\\\\\\\\\\').orderBy(F.desc(\\\\\\\\\\\\\\\'total_amount\\\\\\\\\\\\\\\'))\nresult = orders.withColumn(\\\\\\\\\\\\\\\'amount_rank\\\\\\\\\\\\\\\', F.rank().over(window2))\nresult.select(\\\\\\\\\\\\\\\'customer_id\\\\\\\\\\\\\\\', \\\\\\\\\\\\\\\'order_date\\\\\\\\\\\\\\\', \\\\\\\\\\\\\\\'total_amount\\\\\\\\\\\\\\\', \\\\\\\\\\\\\\\'amount_rank\\\\\\\\\\\\\\\').show(10)',
            ex8Objective: 'طبّق دوال Python المخصصة على DataFrame Spark (الدوال المعرفة من قبل المستخدم)',
            ex8Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.sql.types import StringType, FloatType\n\nspark = SparkSession.builder.appName(\\\\\\\\\\\\\\\'UDFDemo\\\\\\\\\\\\\\\').getOrCreate()\norders = spark.read.csv(\\\\\\\\\\\\\\\'/home/jovyan/data/orders.csv\\\\\\\\\\\\\\\', header=True, inferSchema=True)\n\n# حدّد UDF\n@F.udf(returnType=StringType())\ndef categorize_order(amount):\n    if amount is None: return \\\\\\\\\\\\\\\'غير معروف\\\\\\\\\\\\\\\'\n    if amount < 50: return \\\\\\\\\\\\\\\'صغير\\\\\\\\\\\\\\\'\n    if amount < 200: return \\\\\\\\\\\\\\\'متوسط\\\\\\\\\\\\\\\'\n    if amount < 500: return \\\\\\\\\\\\\\\'كبير\\\\\\\\\\\\\\\'\n    return \\\\\\\\\\\\\\\'بريميوم\\\\\\\\\\\\\\\'\n\nresult = orders.withColumn(\\\\\\\\\\\\\\\'categoria\\\\\\\\\\\\\\\', categorize_order(\\\\\\\\\\\\\\\'total_amount\\\\\\\\\\\\\\\'))\nresult.groupBy(\\\\\\\\\\\\\\\'categoria\\\\\\\\\\\\\\\').count().orderBy(\\\\\\\\\\\\\\\'count\\\\\\\\\\\\\\\', ascending=False).show()',
            ex8Output: '+---------+-----+\n|categoria|count|\n+---------+-----+\n|  متوسط|  423|\n|   كبير|  312|\n|    صغير|  187|\n|  بريميوم|   78|\n+---------+-----+',
            ex8Explain: '@F.udf(returnType=StringType()): يحول دالة Python إلى UDF Spark. يحدد returnType نوع الإرجاع (StringType, FloatType, IntegerType وما إلى ذلك). وظائف UDF قوية لكنها أبطأ من الدوال المدمجة - استخدمها فقط إذا لم تكن هناك بديل Spark.',
            ex8Practice: 'اكتب discount_udf التي تحسب الخصومات: status=\\\\\\\\\\\\\\\'completed\\\\\\\\\\\\\\\' → 0%، status=\\\\\\\\\\\\\\\'returned\\\\\\\\\\\\\\\' → 10%، وإلا → 5%. طبقها على حقل الحالة.',
            ex8Hint: 'تلميح: @F.udf(returnType=FloatType()) def discount_udf(status): return 0.0 if status==\\\\\\\\\\\\\\\'completed\\\\\\\\\\\\\\\' else 0.1 if status==\\\\\\\\\\\\\\\'returned\\\\\\\\\\\\\\\' else 0.05',
            ex8Solution: '@F.udf(returnType=FloatType())\ndef discount_udf(status):\n    if status == \\\\\\\\\\\\\\\'completed\\\\\\\\\\\\\\\': return 0.0\n    if status == \\\\\\\\\\\\\\\'returned\\\\\\\\\\\\\\\': return 0.10\n    return 0.05\n\nresult = orders.withColumn(\\\\\\\\\\\\\\\'descuento\\\\\\\\\\\\\\\', discount_udf(\\\\\\\\\\\\\\\'status\\\\\\\\\\\\\\\'))\nresult.select(\\\\\\\\\\\\\\\'order_id\\\\\\\\\\\\\\\', \\\\\\\\\\\\\\\'status\\\\\\\\\\\\\\\', \\\\\\\\\\\\\\\'total_amount\\\\\\\\\\\\\\\', \\\\\\\\\\\\\\\'descuento\\\\\\\\\\\\\\\').show(10)',
            ex9Objective: 'احفظ DataFrame كـ Parquet وحمله مرة أخرى - صيغة الملف القياسية لـ Big Data',
            ex9Code: 'from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName(\\\\\\\\\\\\\\\'ParquetDemo\\\\\\\\\\\\\\\').getOrCreate()\norders = spark.read.csv(\\\\\\\\\\\\\\\'/home/jovyan/data/orders.csv\\\\\\\\\\\\\\\', header=True, inferSchema=True)\n\n# احفظ كـ Parquet (موجه للأعمدة، مضغوط)\norders.write.mode(\\\\\\\\\\\\\\\'overwrite\\\\\\\\\\\\\\\').parquet(\\\\\\\\\\\\\\\'/tmp/orders_parquet/\\\\\\\\\\\\\\\')\n\n# حمّل Parquet مرة أخرى\ndf_parquet = spark.read.parquet(\\\\\\\\\\\\\\\'/tmp/orders_parquet/\\\\\\\\\\\\\\\')\ndf_parquet.printSchema()\ndf_parquet.select(\\\\\\\\\\\\\\\'order_id\\\\\\\\\\\\\\\', \\\\\\\\\\\\\\\'total_amount\\\\\\\\\\\\\\\', \\\\\\\\\\\\\\\'status\\\\\\\\\\\\\\\').show(5)\n\n# اقرأ أعمدة محددة فقط (Column Pruning)\ndf_small = spark.read.parquet(\\\\\\\\\\\\\\\'/tmp/orders_parquet/\\\\\\\\\\\\\\\').select(\\\\\\\\\\\\\\\'customer_id\\\\\\\\\\\\\\\', \\\\\\\\\\\\\\\'total_amount\\\\\\\\\\\\\\\')\nprint(\\\\\\\\\\\\\\\'عدد الصفوف:\\\\\\\\\\\\\\\', df_small.count())',
            ex9Output: 'root\n |-- order_id: integer (nullable = true)\n |-- customer_id: integer (nullable = true)\n |-- total_amount: double (nullable = true)\n |-- status: string (nullable = true)\n\nعدد الصفوف: 1000',
            ex9Explain: 'Parquet موجه نحو الأعمدة: يتم قراءة الأعمدة الضرورية فقط (حذف الأعمدة = عمليات إدخال/إخراج أقل بكثير). ضغط تلقائي. تُظهر printSchema() الأنواع بعد القراءة – يحتفظ Parquet بأنواع البيانات، بينما يفقدها CSV. mode(\'overwrite\') يستبدل الملفات الموجودة.',
            ex9Practice: 'حمّل ملف Parquet وصفّ فقط الطلبات بحالة \'completed\'. احفظها كملف Parquet جديد في المجلد /tmp/completed_orders/. احسب عدد الصفوف.',
            ex9Hint: 'تلميح: df_parquet.filter(F.col(\'status\') == \'completed\').write.mode(\'overwrite\').parquet(\'/tmp/completed_orders/\')',
            ex9Solution: 'from pyspark.sql import functions as F\ndf = spark.read.parquet(\'/tmp/orders_parquet/\')\ncompleted = df.filter(F.col(\'status\') == \'completed\')\ncompleted.write.mode(\'overwrite\').parquet(\'/tmp/completed_orders/\')\nprint(\'Completed orders:\', completed.count())',
            ex10Objective: 'Spark SQL: نفّذ استعلامات SQL مباشرة على DataFrames – مثالي لمن يعرفون SQL',
            ex10Code: 'from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName(\'SparkSQLDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\ncustomers = spark.read.csv(\'/home/jovyan/data/customers.csv\', header=True, inferSchema=True)\n\n# سجّل DataFrames كعروض مؤقتة\norders.createOrReplaceTempView(\'orders\')\ncustomers.createOrReplaceTempView(\'customers\')\n\n# نفّذ SQL مباشرة\nresult = spark.sql("""\n    SELECT c.name, COUNT(o.order_id) AS الطلبات,\n           ROUND(SUM(o.total_amount), 2) AS إجمالي_الإيرادات\n    FROM orders o\n    JOIN customers c ON o.customer_id = c.customer_id\n    WHERE o.status = \'completed\'\n    GROUP BY c.name\n    ORDER BY إجمالي_الإيرادات DESC\n    LIMIT 10\n""")\nresult.show()',
            ex10Output: '+-------------+--------+---------------+\n|         name|الطلبات|إجمالي_الإيرادات|\n+-------------+--------+---------------+\n| Alice Müller|      12|        2340.5|\n|Bob Schneider|       9|        1890.2|\n+-------------+--------+---------------+',
            ex10Explain: 'createOrReplaceTempView(): يسجّل DataFrame كعرض SQL (في هذه الجلسة فقط). spark.sql(): ينفّذ أي استعلام SQL – جميع إمكانيات SQL القياسية متاحة. الميزة: من يعرفون SQL لا يحتاجون لتعلم واجهة برمجية جديدة. النتيجة هي DataFrame مرة أخرى.',
            ex10Practice: 'اكتب استعلام SQL يحسب الإيرادات الشهرية (السنة، الشهر، الإيرادات) من الطلبات المكتملة. استخدم YEAR(order_date) و MONTH(order_date).',
            ex10Hint: 'تلميح: spark.sql(\'SELECT YEAR(order_date) as year, MONTH(order_date) as month, ROUND(SUM(total_amount),2) as revenue FROM orders WHERE status="completed" GROUP BY year, month ORDER BY year, month\')',
            ex10Solution: 'result = spark.sql("""\n    SELECT YEAR(order_date) AS year, MONTH(order_date) AS month,\n           ROUND(SUM(total_amount), 2) AS revenue,\n           COUNT(*) AS order_count\n    FROM orders\n    WHERE status = \'completed\'\n    GROUP BY year, month\n    ORDER BY year, month\n""")\nresult.show()',
            ex11Objective: 'حاكِ Structured Streaming: افهم معالجة الدفعات كتدفقات صغيرة',
            ex11Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nimport time\n\nspark = SparkSession.builder.appName(\'StreamingDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\n\n# حاكِ التدفق: معالجة البيانات في دفعات\nbatch_size = 100\ntotal = orders.count()\n\nfor i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    stats = batch.agg(\n        F.count(\'*\').alias(\'الطلبات\'),\n        F.round(F.sum(\'total_amount\'), 2).alias(\'الإيرادات\')\n    ).collect()[0]\n    print(f\'الدفعة {i//batch_size + 1}: {stats.الطلبات} طلبات، {stats.الإيرادات}€\')\n    time.sleep(0.5)',
            ex11Output: 'الدفعة 1: 100 طلبات، 23456.78€\nالدفعة 2: 100 طلبات، 19834.21€\nالدفعة 3: 100 طلبات، 21109.55€',
            ex11Explain: 'Spark Streaming الحقيقي يقرأ من Kafka أو S3 أو المقابس. هذه المحاكاة توضح المبدأ: تأتي البيانات في دفعات وتُعالج على الفور. subtract() تزيل البيانات المعالجة بالفعل. في الأنظمة الحقيقية: spark.readStream.format(\'kafka\').',
            ex11Practice: 'وسّع المحاكاة: احسب لكل دفعة أيضًا نسبة الطلبات بحالة \'completed\'.',
            ex11Hint: 'تلميح: أضف completed_pct = batch.filter(F.col(\'status\')==\'completed\').count() / batch.count() * 100.',
            ex11Solution: 'for i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    n_total = batch.count()\n    n_completed = batch.filter(F.col(\'status\') == \'completed\').count()\n    الإيرادات = batch.agg(F.round(F.sum(\'total_amount\'), 2)).collect()[0][0]\n    pct = round(n_completed / n_total * 100, 1) if n_total > 0 else 0\n    print(f\'الدفعة {i//batch_size + 1}: {n_total} طلبات، {الإيرادات}€، {pct}% مكتملة\')',
            ex12Objective: 'بناء خط أنابيب تعلم آلي كامل مع Spark MLlib: هندسة الميزات + النموذج',
            ex12Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nspark = SparkSession.builder.appName(\'MLDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\n\n# هندسة الميزات\ncustomer_features = orders.groupBy(\'customer_id\').agg(\n    F.count(\'*\').alias(\'n_orders\'),\n    F.avg(\'total_amount\').alias(\'avg_amount\'),\n    F.sum(\'total_amount\').alias(\'total_spent\'),\n    (F.sum(F.when(F.col(\'status\')==\'completed\', 1).otherwise(0)) / F.count(\'*\')).alias(\'completion_rate\')\n)\n\n# التسمية: العميل ذو القيمة العالية (total_spent > 500)\ncustomer_features = customer_features.withColumn(\'is_high_value\', (F.col(\'total_spent\') > 500).cast(\'integer\'))\n\ncustomer_features.show(5)',
            ex12Output: '+-----------+--------+----------+-----------+---------------+-------------+\n|customer_id|n_orders|avg_amount|total_spent|completion_rate|is_high_value|\n+-----------+--------+----------+-----------+---------------+-------------+\n|          1|       5|    234.56|    1172.80|            0.8|            1|\n|          2|       3|     89.99|     269.97|            1.0|            0|\n+-----------+--------+----------+-----------+---------------+-------------+',
            ex12Explain: 'خط أنابيب Spark MLlib: 1. هندسة الميزات من groupBy/agg. 2. VectorAssembler يجمع الميزات في متجه. 3. StandardScaler تطبّع الميزات. 4. LogisticRegression يؤدي التصنيف. يُدرّب Pipeline.fit() جميع المراحل بالتسلسل.',
            ex12Practice: 'درّب خط الأنابيب الكامل للتعلم الآلي: أضف VectorAssembler و StandardScaler و LogisticRegression. قيّم بالدقة على بيانات التدريب.',
            ex12Hint: 'تلميح: assembler = VectorAssembler(inputCols=[\'n_orders\',\'avg_amount\',\'completion_rate\'], outputCol=\'features\')، ثم Pipeline(stages=[assembler, scaler, lr]).fit(train_data)',
            ex12Solution: 'from pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nassembler = VectorAssembler(inputCols=[\'n_orders\', \'avg_amount\', \'completion_rate\'], outputCol=\'features_raw\')\nscaler = StandardScaler(inputCol=\'features_raw\', outputCol=\'features\')\nlr = LogisticRegression(featuresCol=\'features\', labelCol=\'is_high_value\')\n\ntrain, test = customer_features.randomSplit([0.8, 0.2], seed=42)\npipeline = Pipeline(stages=[assembler, scaler, lr])\nmodel = pipeline.fit(train)\npredictions = model.transform(test)\nacc = predictions.filter(F.col(\'prediction\') == F.col(\'is_high_value\')).count() / predictions.count()\nprint(f\'الدقة: {acc:.1%}\')',

            challengeStep6: 'إضافي: أنشئ قطاع \'High-Value\' للعملاء الذين تتجاوز إيراداتهم 10000 دولار',
            challengeHint: 'تلميح: استخدم groupBy() و agg() مع دوال count() و sum() و orderBy() مع limit()',
            challengeSolution: 'from pyspark.sql.functions import count, sum, when\n\n# حمّل الملفين\ncustomers = spark.read.csv(\\\\\\\\\\\\\\\\"/home/jovyan/data/customers.csv\\\\\\\\\\\\\\\\", header=True, inferSchema=True)\norders = spark.read.csv(\\\\\\\\\\\\\\\\"/home/jovyan/data/orders.csv\\\\\\\\\\\\\\\\", header=True, inferSchema=True)\n\n# حساب RFM\ndf_rfm = customers.join(orders, \\\\\\\\\\\\\\\\"customer_id\\\\\\\\\\\\\\\\") \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\n    .groupBy(\\\\\\\\\\\\\\\\"customer_id\\\\\\\\\\\\\\\\", \\\\\\\\\\\\\\\\"name\\\\\\\\\\\\\\\\") \\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\\n    .agg(\n        count(\\\\\\\\\\\\\\\\"order_id\\\\\\\\\\\\\\\\").alias(\\\\\\\\\\\\\\\\"frequency\\\\\\\\\\\\\\\\"),\n        sum(\\\\\\\\\\\\\\\\"order_total\\\\\\\\\\\\\\\\").alias(\\\\\\\\\\\\\\\\"monetary\\\\\\\\\\\\\\\\")\n    )\n\n# أفضل 10 عملاء حسب الإيرادات\ndf_rfm.orderBy(\\\\\\\\\\\\\\\\"monetary\\\\\\\\\\\\\\\\", ascending=False).limit(10).show()\n\n# إضافي: تقسيم High-Value\ndf_rfm_segment = df_rfm.withColumn(\\\\\\\\\\\\\\\\"segment\\\\\\\\\\\\\\\\",\n    when(col(\\\\\\\\\\\\\\\\"monetary\\\\\\\\\\\\\\\\") > 10000, \\\\\\\\\\\\\\\\"High-Value\\\\\\\\\\\\\\\\").otherwise(\\\\\\\\\\\\\\\\"Standard\\\\\\\\\\\\\\\\")\n)\ndf_rfm_segment.filter(col(\\\\\\\\\\\\\\\\"segment\\\\\\\\\\\\\\\\") == \\\\\\\\\\\\\\\\"High-Value\\\\\\\\\\\\\\\\").show()',

            ex11Code: 'from pyspark.sql import SparkSession
from pyspark.sql import functions as F
import time

    ).collect()[0]

from pyspark.sql import functions as F

)

            ex7Hint: 'Підказка: window2 = Window.partitionBy(\\\\\\\'customer_id\\\\\\\').orderBy(F.desc(\\\\\\\'total_amount\\\\\\\')), потім .withColumn(\\\\\\\'amount_rank\\\\\\\', F.rank().over(window2))',
            ex7Solution: 'window2 = Window.partitionBy(\\\\\\\'customer_id\\\\\\\').orderBy(F.desc(\\\\\\\'total_amount\\\\\\\'))\nresult = orders.withColumn(\\\\\\\'amount_rank\\\\\\\', F.rank().over(window2))\nresult.select(\\\\\\\'customer_id\\\\\\\', \\\\\\\'order_date\\\\\\\', \\\\\\\'total_amount\\\\\\\', \\\\\\\'amount_rank\\\\\\\').show(10)',
            ex8Objective: 'Застосуйте користувацькі функції Python до DataFrame Spark (користувацькі визначені функції)',
            ex8Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.sql.types import StringType, FloatType\n\nspark = SparkSession.builder.appName(\\\\\\\'UDFDemo\\\\\\\').getOrCreate()\norders = spark.read.csv(\\\\\\\'/home/jovyan/data/orders.csv\\\\\\\', header=True, inferSchema=True)\n\n# Визначити UDF\n@F.udf(returnType=StringType())\ndef categorize_order(amount):\n    if amount is None: return \\\\\\\'Невідомо\\\\\\\'\n    if amount < 50: return \\\\\\\'Малий\\\\\\\'\'\n    if amount < 200: return \\\\\\\'Середній\\\\\\\'\n    if amount < 500: return \\\\\\\'Великий\\\\\\\'\n    return \\\\\\\'Преміум\\\\\\\'\n\nresult = orders.withColumn(\\\\\\\'categoria\\\\\\\', categorize_order(\\\\\\\'total_amount\\\\\\\'))\nresult.groupBy(\\\\\\\'categoria\\\\\\\').count().orderBy(\\\\\\\'count\\\\\\\', ascending=False).show()',

            ex8Explain: '@F.udf(returnType=StringType()): Перетворює функцію Python на UDF Spark. returnType визначає тип повернення (StringType, FloatType, IntegerType тощо). UDF є потужними, але повільнішими за вбудовані функції – використовуйте їх лише якщо немає альтернативи Spark.',
            ex8Practice: 'Напишіть discount_udf, яка обчислює знижки: status=\\\\\\\'completed\\\\\\\' → 0%, status=\\\\\\\'returned\\\\\\\' → 10%, інакше → 5%. Застосуйте її до поля статусу.',
            ex8Hint: 'Підказка: @F.udf(returnType=FloatType()) def discount_udf(status): return 0.0 if status==\\\\\\\'completed\\\\\\\' else 0.1 if status==\\\\\\\'returned\\\\\\\' else 0.05',
            ex8Solution: '@F.udf(returnType=FloatType())\ndef discount_udf(status):\n    if status == \\\\\\\'completed\\\\\\\': return 0.0\n    if status == \\\\\\\'returned\\\\\\\': return 0.10\n    return 0.05\n\nresult = orders.withColumn(\\\\\\\'descuento\\\\\\\', discount_udf(\\\\\\\'status\\\\\\\'))\nresult.select(\\\\\\\'order_id\\\\\\\', \\\\\\\'status\\\\\\\', \\\\\\\'total_amount\\\\\\\', \\\\\\\'descuento\\\\\\\').show(10)',
            ex9Objective: 'Збережіть DataFrame як Parquet та завантажте їх повторно – стандартний формат файлу для Big Data',
            ex9Code: 'from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName(\\\\\\\'ParquetDemo\\\\\\\').getOrCreate()\norders = spark.read.csv(\\\\\\\'/home/jovyan/data/orders.csv\\\\\\\', header=True, inferSchema=True)\n\n# Зберегти як Parquet (орієнтований на колони, стиснутий)\norders.write.mode(\\\\\\\'overwrite\\\\\\\').parquet(\\\\\\\'/tmp/orders_parquet/\\\\\\\')\n\n# Завантажити Parquet знову\ndf_parquet = spark.read.parquet(\\\\\\\'/tmp/orders_parquet/\\\\\\\')\ndf_parquet.printSchema()\ndf_parquet.select(\\\\\\\'order_id\\\\\\\', \\\\\\\'total_amount\\\\\\\', \\\\\\\'status\\\\\\\').show(5)\n\n# Читати тільки конкретні колони (Column Pruning)\ndf_small = spark.read.parquet(\\\\\\\'/tmp/orders_parquet/\\\\\\\').select(\\\\\\\'customer_id\\\\\\\', \\\\\\\'total_amount\\\\\\\')\nprint(\\\\\\\'Кількість рядків:\\\\\\\', df_small.count())',
            ex9Output: 'root\n |-- order_id: integer (nullable = true)\n |-- customer_id: integer (nullable = true)\n |-- total_amount: double (nullable = true)\n |-- status: string (nullable = true)\n\nКількість рядків: 1000',
            ex9Explain: 'Parquet є орієнтованим на стовпці: читаються лише необхідні стовпці (Скорочення стовпців = значно менше операцій введення-виведення). Автоматичне стиснення. printSchema() показує типи після читання – Parquet зберігає типи даних, CSV їх втрачає. mode(\\\'overwrite\\\') перезаписує існуючі файли.',
            ex9Practice: 'Завантажте файл Parquet та відфільтруйте лише замовлення зі статусом \\\'completed\\\'. Збережіть їх як новий файл Parquet у папку /tmp/completed_orders/. Підрахуйте кількість рядків.',
            ex9Hint: 'Порада: df_parquet.filter(F.col(\\\'status\\\') == \\\'completed\\\').write.mode(\\\'overwrite\\\').parquet(\\\'/tmp/completed_orders/\\\')',
            ex9Solution: 'from pyspark.sql import functions as F\ndf = spark.read.parquet(\\\'/tmp/orders_parquet/\\\')\ncompleted = df.filter(F.col(\\\'status\\\') == \\\'completed\\\')\ncompleted.write.mode(\\\'overwrite\\\').parquet(\\\'/tmp/completed_orders/\\\')\nprint(\\\'Completed orders:\\\', completed.count())',
            ex10Objective: 'Spark SQL: Виконуйте запити SQL безпосередньо на DataFrames – ідеально для тих, хто знає SQL',
            ex10Code: 'from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName(\\\'SparkSQLDemo\\\').getOrCreate()\norders = spark.read.csv(\\\'/home/jovyan/data/orders.csv\\\', header=True, inferSchema=True)\ncustomers = spark.read.csv(\\\'/home/jovyan/data/customers.csv\\\', header=True, inferSchema=True)\n\n# Зареєструйте DataFrames як тимчасові представлення\norders.createOrReplaceTempView(\\\'orders\\\')\ncustomers.createOrReplaceTempView(\\\'customers\\\')\n\n# Виконайте SQL безпосередньо\nresult = spark.sql(\\\\\\\\"\\\\\\\\"\\\\\\\\"\n    SELECT c.name, COUNT(o.order_id) AS замовлення,\n           ROUND(SUM(o.total_amount), 2) AS загальний_дохід\n    FROM orders o\n    JOIN customers c ON o.customer_id = c.customer_id\n    WHERE o.status = \\\'completed\\\'\n    GROUP BY c.name\n    ORDER BY загальний_дохід DESC\n    LIMIT 10\n\\\\\\\\"\\\\\\\\"\\\\\\\\")\nresult.show()',
            ex10Output: '+-------------+--------+---------------+\n|         name|замовлення|загальний_дохід|\n+-------------+--------+---------------+\n| Alice Müller|      12|        2340.5|\n|Bob Schneider|       9|        1890.2|\n+-------------+--------+---------------+',
            ex10Explain: 'createOrReplaceTempView(): Реєструє DataFrame як SQL-представлення (тільки в цій сесії). spark.sql(): Виконує будь-який SQL-запит – усі стандартні можливості SQL доступні. Перевага: ті, хто знає SQL, не повинні вивчати новий API. Результат знову є DataFrame.',
            ex10Practice: 'Напишіть SQL-запит, який обчислює місячний дохід (рік, місяць, дохід) із завершених замовлень. Використовуйте YEAR(order_date) та MONTH(order_date).',
            ex10Hint: 'Порада: spark.sql(\\\'SELECT YEAR(order_date) as year, MONTH(order_date) as month, ROUND(SUM(total_amount),2) as revenue FROM orders WHERE status=\\\\\\\\"completed\\\\\\\\" GROUP BY year, month ORDER BY year, month\\\')',
            ex10Solution: 'result = spark.sql(\\\\\\\\"\\\\\\\\"\\\\\\\\"\n    SELECT YEAR(order_date) AS year, MONTH(order_date) AS month,\n           ROUND(SUM(total_amount), 2) AS revenue,\n           COUNT(*) AS order_count\n    FROM orders\n    WHERE status = \\\'completed\\\'\n    GROUP BY year, month\n    ORDER BY year, month\n\\\\\\\\"\\\\\\\\"\\\\\\\\")\nresult.show()',
            ex11Objective: 'Імітуйте Structured Streaming: Розумійте обробку за партіями як мініпотоки',
            ex11Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nimport time\n\nspark = SparkSession.builder.appName(\\\'StreamingDemo\\\').getOrCreate()\norders = spark.read.csv(\\\'/home/jovyan/data/orders.csv\\\', header=True, inferSchema=True)\n\n# Імітуйте потік: обробляйте дані партіями\nbatch_size = 100\ntotal = orders.count()\n\nfor i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    stats = batch.agg(\n        F.count(\\\'*\\\').alias(\\\'замовлення\\\'),\n        F.round(F.sum(\\\'total_amount\\\'), 2).alias(\\\'дохід\\\')\n    ).collect()[0]\n    print(f\\\'Партія {i//batch_size + 1}: {stats.замовлення} Замовлень, {stats.дохід}€\\\')\n    time.sleep(0.5)',
            ex11Output: 'Партія 1: 100 Замовлень, 23456.78€\nПартія 2: 100 Замовлень, 19834.21€\nПартія 3: 100 Замовлень, 21109.55€',
            ex11Explain: 'Справжній Spark Streaming читає з Kafka, S3 або сокетів. Ця імітація демонструє принцип: дані надходять партіями та обробляються негайно. subtract() видаляє вже оброблені дані. У реальних системах: spark.readStream.format(\\\'kafka\\\').',
            ex11Practice: 'Розширте імітацію: для кожної партії також обчисліть відсоток замовлень зі статусом \\\'completed\\\'.',
            ex11Hint: 'Порада: додайте completed_pct = batch.filter(F.col(\\\'status\\\')==\\\'completed\\\').count() / batch.count() * 100.',
            ex11Solution: 'for i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    n_total = batch.count()\n    n_completed = batch.filter(F.col(\\\'status\\\') == \\\'completed\\\').count()\n    дохід = batch.agg(F.round(F.sum(\\\'total_amount\\\'), 2)).collect()[0][0]\n    pct = round(n_completed / n_total * 100, 1) if n_total > 0 else 0\n    print(f\\\'Партія {i//batch_size + 1}: {n_total} Замовлень, {дохід}€, {pct}% завершено\\\')',
            ex12Objective: 'Побудуйте повний конвеєр машинного навчання зі Spark MLlib: Інженерія характеристик + Модель',
            ex12Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nspark = SparkSession.builder.appName(\\\'MLDemo\\\').getOrCreate()\norders = spark.read.csv(\\\'/home/jovyan/data/orders.csv\\\', header=True, inferSchema=True)\n\n# Інженерія характеристик\ncustomer_features = orders.groupBy(\\\'customer_id\\\').agg(\n    F.count(\\\'*\\\').alias(\\\'n_orders\\\'),\n    F.avg(\\\'total_amount\\\').alias(\\\'avg_amount\\\'),\n    F.sum(\\\'total_amount\\\').alias(\\\'total_spent\\\'),\n    (F.sum(F.when(F.col(\\\'status\\\')==\\\'completed\\\', 1).otherwise(0)) / F.count(\\\'*\\\')).alias(\\\'completion_rate\\\')\n)\n\n# Мітка: клієнт високої вартості (total_spent > 500)\ncustomer_features = customer_features.withColumn(\\\'is_high_value\\\', (F.col(\\\'total_spent\\\') > 500).cast(\\\'integer\\\'))\n\ncustomer_features.show(5)',
            ex12Output: '+-----------+--------+----------+-----------+---------------+-------------+\n|customer_id|n_orders|avg_amount|total_spent|completion_rate|is_high_value|\n+-----------+--------+----------+-----------+---------------+-------------+\n|          1|       5|    234.56|    1172.80|            0.8|            1|\n|          2|       3|     89.99|     269.97|            1.0|            0|\n+-----------+--------+----------+-----------+---------------+-------------+',
            ex12Explain: 'Конвеєр Spark MLlib: 1. Інженерія характеристик з groupBy/agg. 2. VectorAssembler об\'єднує характеристики у вектор. 3. StandardScaler нормалізує характеристики. 4. LogisticRegression виконує класифікацію. Pipeline.fit() послідовно тренує всі етапи.',
            ex12Practice: 'Тренуйте повний конвеєр машинного навчання: додайте VectorAssembler, StandardScaler та LogisticRegression. Оцініть за точністю тренування.',
            ex12Hint: 'Порада: assembler = VectorAssembler(inputCols=[\\\'n_orders\\\',\\\'avg_amount\\\',\\\'completion_rate\\\'], outputCol=\\\'features\\\'), потім Pipeline(stages=[assembler, scaler, lr]).fit(train_data)',
            ex12Solution: 'from pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nassembler = VectorAssembler(inputCols=[\\\'n_orders\\\', \\\'avg_amount\\\', \\\'completion_rate\\\'], outputCol=\\\'features_raw\\\')\nscaler = StandardScaler(inputCol=\\\'features_raw\\\', outputCol=\\\'features\\\')\nlr = LogisticRegression(featuresCol=\\\'features\\\', labelCol=\\\'is_high_value\\\')\n\ntrain, test = customer_features.randomSplit([0.8, 0.2], seed=42)\npipeline = Pipeline(stages=[assembler, scaler, lr])\nmodel = pipeline.fit(train)\npredictions = model.transform(test)\nacc = predictions.filter(F.col(\\\'prediction\\\') == F.col(\\\'is_high_value\\\')).count() / predictions.count()\nprint(f\\\'Точність: {acc:.1%}\\\')',

            challengeStep4: 'Впорядкуйте в спадному порядку за загальними доходами',
            challengeStep5: 'Виведіть 10 найкращих клієнтів за доходами',
            challengeStep6: 'Додатково: Створіть сегмент \'High-Value\' для клієнтів з доходами більше 10000 доларів',
            challengeHint: 'Порада: використовуйте groupBy(), agg() з функціями count() та sum(), orderBy() з limit()',
            challengeSolution: 'from pyspark.sql.functions import count, sum, when\n\n# Завантажте обидва файли\ncustomers = spark.read.csv(\\\\\\\\"/home/jovyan/data/customers.csv\\\\\\\\", header=True, inferSchema=True)\norders = spark.read.csv(\\\\\\\\"/home/jovyan/data/orders.csv\\\\\\\\", header=True, inferSchema=True)\n\n# Обчислення RFM\ndf_rfm = customers.join(orders, \\\\\\\\"customer_id\\\\\\\\") \\\\\\\\\\\\\\\\\n    .groupBy(\\\\\\\\"customer_id\\\\\\\\", \\\\\\\\"name\\\\\\\\") \\\\\\\\\\\\\\\\\n    .agg(\n        count(\\\\\\\\"order_id\\\\\\\\").alias(\\\\\\\\"frequency\\\\\\\\"),\n        sum(\\\\\\\\"order_total\\\\\\\\").alias(\\\\\\\\"monetary\\\\\\\\")\n    )\n\n# 10 найкращих клієнтів за доходами\ndf_rfm.orderBy(\\\\\\\\"monetary\\\\\\\\", ascending=False).limit(10).show()\n\n# Додатково: Сегментація High-Value\ndf_rfm_segment = df_rfm.withColumn(\\\\\\\\"segment\\\\\\\\",\n    when(col(\\\\\\\\"monetary\\\\\\\\") > 10000, \\\\\\\\"High-Value\\\\\\\\").otherwise(\\\\\\\\"Standard\\\\\\\\")\n)\ndf_rfm_segment.filter(col(\\\\\\\\"segment\\\\\\\\") == \\\\\\\\"High-Value\\\\\\\\").show()',

            ex11Objective: 'Simula Structured Streaming: comprende el procesamiento de lotes como pequeños flujos',
            ex11Code: 'from pyspark.sql import SparkSession
from pyspark.sql import functions as F
import time

spark = SparkSession.builder.appName(\\\'StreamingDemo\\\').getOrCreate()
orders = spark.read.csv(\\\'/home/jovyan/data/orders.csv\\\', header=True, inferSchema=True)

# Simula el flujo: procesa datos en lotes
batch_size = 100
total = orders.count()

for i in range(0, min(total, 300), batch_size):
    batch = orders.limit(i + batch_size).subtract(orders.limit(i))
    stats = batch.agg(
        F.count(\\\'*\\\').alias(\\\'pedidos\\\'),
        F.round(F.sum(\\\'total_amount\\\'), 2).alias(\\\'ingresos\\\')
    ).collect()[0]
    print(f\\\'Lote {i//batch_size + 1}: {stats.pedidos} pedidos, {stats.ingresos}€\\\')
    time.sleep(0.5)',

Lote 2: 100 pedidos, 19834.21€
Lote 3: 100 pedidos, 21109.55€',

            ex12Objective: 'Construye una canalización de aprendizaje automático completa con Spark MLlib: ingeniería de características + modelo',
            ex12Code: 'from pyspark.sql import SparkSession
from pyspark.sql import functions as F
from pyspark.ml.feature import VectorAssembler, StandardScaler
from pyspark.ml.classification import LogisticRegression
from pyspark.ml import Pipeline

spark = SparkSession.builder.appName(\\\'MLDemo\\\').getOrCreate()
orders = spark.read.csv(\\\'/home/jovyan/data/orders.csv\\\', header=True, inferSchema=True)

# Ingeniería de características
customer_features = orders.groupBy(\\\'customer_id\\\').agg(
    F.count(\\\'*\\\').alias(\\\'n_orders\\\'),
    F.avg(\\\'total_amount\\\').alias(\\\'avg_amount\\\'),
    F.sum(\\\'total_amount\\\').alias(\\\'total_spent\\\'),
    (F.sum(F.when(F.col(\\\'status\\\')==\\\'completed\\\', 1).otherwise(0)) / F.count(\\\'*\\\')).alias(\\\'completion_rate\\\')
)

# Etiqueta: cliente de alto valor (total_spent > 500)
customer_features = customer_features.withColumn(\\\'is_high_value\\\', (F.col(\\\'total_spent\\\') > 500).cast(\\\'integer\\\'))

customer_features.show(5)',

            ex12Explain: 'Tubería Spark MLlib: 1. Ingeniería de características desde groupBy/agg. 2. VectorAssembler agrupa las características en un vector. 3. StandardScaler normaliza las características. 4. LogisticRegression realiza la clasificación. Pipeline.fit() entrena todas las etapas secuencialmente.',
            ex12Practice: 'Entrena la tubería completa de aprendizaje automático: añade VectorAssembler, StandardScaler y LogisticRegression. Evalúa con precisión en los datos de entrenamiento.',
            ex12Hint: 'Sugerencia: assembler = VectorAssembler(inputCols=[\'n_orders\',\'avg_amount\',\'completion_rate\'], outputCol=\'features\'), luego Pipeline(stages=[assembler, scaler, lr]).fit(train_data)',
            ex12Solution: 'from pyspark.ml.feature import VectorAssembler, StandardScaler
from pyspark.ml.classification import LogisticRegression
from pyspark.ml import Pipeline

assembler = VectorAssembler(inputCols=[\'n_orders\', \'avg_amount\', \'completion_rate\'], outputCol=\'features_raw\')
scaler = StandardScaler(inputCol=\'features_raw\', outputCol=\'features\')
lr = LogisticRegression(featuresCol=\'features\', labelCol=\'is_high_value\')

train, test = customer_features.randomSplit([0.8, 0.2], seed=42)
pipeline = Pipeline(stages=[assembler, scaler, lr])
model = pipeline.fit(train)
predictions = model.transform(test)
acc = predictions.filter(F.col(\'prediction\') == F.col(\'is_high_value\')).count() / predictions.count()
print(f\'Precisión: {acc:.1%}\')',

            ex10Code: 'from pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName(\'SparkSQLDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\ncustomers = spark.read.csv(\'/home/jovyan/data/customers.csv\', header=True, inferSchema=True)\n\n# Registre los DataFrames como vistas temporales\norders.createOrReplaceTempView(\'orders\')\ncustomers.createOrReplaceTempView(\'customers\')\n\n# Ejecute SQL directamente\nresult = spark.sql(\\\\"\\\\"\\\\"\n    SELECT c.name, COUNT(o.order_id) AS pedidos,\n           ROUND(SUM(o.total_amount), 2) AS ingresos_totales\n    FROM orders o\n    JOIN customers c ON o.customer_id = c.customer_id\n    WHERE o.status = \'completed\'\n    GROUP BY c.name\n    ORDER BY ingresos_totales DESC\n    LIMIT 10\n\\\\"\\\\"\\\\")\nresult.show()',
            ex10Output: '+-------------+--------+---------------+\n|         name|pedidos|ingresos_totales|\n+-------------+--------+---------------+\n| Alice Müller|      12|        2340.5|\n|Bob Schneider|       9|        1890.2|\n+-------------+--------+---------------+',
            ex10Explain: 'createOrReplaceTempView(): Registra el DataFrame como una vista SQL (solo en esta sesión). spark.sql(): Ejecuta cualquier consulta SQL – todas las características SQL estándar están disponibles. Ventaja: quienes conocen SQL no necesitan aprender una nueva API. El resultado es nuevamente un DataFrame.',
            ex10Practice: 'Escriba una consulta SQL que calcule los ingresos mensuales (año, mes, ingresos) a partir de pedidos completados. Use YEAR(order_date) y MONTH(order_date).',
            ex10Hint: 'Sugerencia: spark.sql(\'SELECT YEAR(order_date) as year, MONTH(order_date) as month, ROUND(SUM(total_amount),2) as revenue FROM orders WHERE status=\\\\"completed\\\\" GROUP BY year, month ORDER BY year, month\')',
            ex10Solution: 'result = spark.sql(\\\\"\\\\"\\\\"\n    SELECT YEAR(order_date) AS year, MONTH(order_date) AS month,\n           ROUND(SUM(total_amount), 2) AS revenue,\n           COUNT(*) AS order_count\n    FROM orders\n    WHERE status = \'completed\'\n    GROUP BY year, month\n    ORDER BY year, month\n\\\\"\\\\"\\\\")\nresult.show()',
            ex11Objective: 'Simule Structured Streaming: Comprenda el procesamiento por lotes como mini flujos',
            ex11Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nimport time\n\nspark = SparkSession.builder.appName(\'StreamingDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\n\n# Simule el flujo: procese datos en lotes\nbatch_size = 100\ntotal = orders.count()\n\nfor i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    stats = batch.agg(\n        F.count(\'*\').alias(\'pedidos\'),\n        F.round(F.sum(\'total_amount\'), 2).alias(\'ingresos\')\n    ).collect()[0]\n    print(f\'Lote {i//batch_size + 1}: {stats.pedidos} Pedidos, {stats.ingresos}€\')\n    time.sleep(0.5)',
            ex11Output: 'Lote 1: 100 Pedidos, 23456.78€\nLote 2: 100 Pedidos, 19834.21€\nLote 3: 100 Pedidos, 21109.55€',
            ex11Explain: 'Spark Streaming real lee desde Kafka, S3 o sockets. Esta simulación muestra el principio: los datos llegan en lotes y se procesan inmediatamente. subtract() elimina datos ya procesados. En sistemas reales: spark.readStream.format(\'kafka\').',
            ex11Practice: 'Amplíe la simulación: para cada lote, calcule también el porcentaje de pedidos con estado \'completed\'.',
            ex11Hint: 'Sugerencia: agregue completed_pct = batch.filter(F.col(\'status\')==\'completed\').count() / batch.count() * 100.',
            ex11Solution: 'for i in range(0, min(total, 300), batch_size):\n    batch = orders.limit(i + batch_size).subtract(orders.limit(i))\n    n_total = batch.count()\n    n_completed = batch.filter(F.col(\'status\') == \'completed\').count()\n    ingresos = batch.agg(F.round(F.sum(\'total_amount\'), 2)).collect()[0][0]\n    pct = round(n_completed / n_total * 100, 1) if n_total > 0 else 0\n    print(f\'Lote {i//batch_size + 1}: {n_total} Pedidos, {ingresos}€, {pct}% completados\')',
            ex12Objective: 'Construya un pipeline completo de aprendizaje automático con Spark MLlib: Ingeniería de características + Modelo',
            ex12Code: 'from pyspark.sql import SparkSession\nfrom pyspark.sql import functions as F\nfrom pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nspark = SparkSession.builder.appName(\'MLDemo\').getOrCreate()\norders = spark.read.csv(\'/home/jovyan/data/orders.csv\', header=True, inferSchema=True)\n\n# Ingeniería de características\ncustomer_features = orders.groupBy(\'customer_id\').agg(\n    F.count(\'*\').alias(\'n_orders\'),\n    F.avg(\'total_amount\').alias(\'avg_amount\'),\n    F.sum(\'total_amount\').alias(\'total_spent\'),\n    (F.sum(F.when(F.col(\'status\')==\'completed\', 1).otherwise(0)) / F.count(\'*\')).alias(\'completion_rate\')\n)\n\n# Etiqueta: cliente de alto valor (total_spent > 500)\ncustomer_features = customer_features.withColumn(\'is_high_value\', (F.col(\'total_spent\') > 500).cast(\'integer\'))\n\ncustomer_features.show(5)',
            ex12Output: '+-----------+--------+----------+-----------+---------------+-------------+\n|customer_id|n_orders|avg_amount|total_spent|completion_rate|is_high_value|\n+-----------+--------+----------+-----------+---------------+-------------+\n|          1|       5|    234.56|    1172.80|            0.8|            1|\n|          2|       3|     89.99|     269.97|            1.0|            0|\n+-----------+--------+----------+-----------+---------------+-------------+',
            ex12Explain: 'Pipeline de Spark MLlib: 1. Ingeniería de características con groupBy/agg. 2. VectorAssembler combina características en un vector. 3. StandardScaler normaliza las características. 4. LogisticRegression realiza la clasificación. Pipeline.fit() entrena todas las etapas secuencialmente.',
            ex12Practice: 'Entrene el pipeline completo de aprendizaje automático: agregue VectorAssembler, StandardScaler y LogisticRegression. Evalúe con precisión de entrenamiento.',
            ex12Hint: 'Sugerencia: assembler = VectorAssembler(inputCols=[\'n_orders\',\'avg_amount\',\'completion_rate\'], outputCol=\'features\'), luego Pipeline(stages=[assembler, scaler, lr]).fit(train_data)',
            ex12Solution: 'from pyspark.ml.feature import VectorAssembler, StandardScaler\nfrom pyspark.ml.classification import LogisticRegression\nfrom pyspark.ml import Pipeline\n\nassembler = VectorAssembler(inputCols=[\'n_orders\', \'avg_amount\', \'completion_rate\'], outputCol=\'features_raw\')\nscaler = StandardScaler(inputCol=\'features_raw\', outputCol=\'features\')\nlr = LogisticRegression(featuresCol=\'features\', labelCol=\'is_high_value\')\n\ntrain, test = customer_features.randomSplit([0.8, 0.2], seed=42)\npipeline = Pipeline(stages=[assembler, scaler, lr])\nmodel = pipeline.fit(train)\npredictions = model.transform(test)\nacc = predictions.filter(F.col(\'prediction\') == F.col(\'is_high_value\')).count() / predictions.count()\nprint(f\'Precisión: {acc:.1%}\')',
            challengeName: 'Desafío: Análisis RFM',
            challengeDesc: 'Calcule métricas RFM (Recencia, Frecuencia, Monto) para clientes e identifique los mejores clientes.',
            challengeSteps: 'Pasos:',
            challengeStep1: 'Cargue los archivos customers.csv y orders.csv',
            challengeStep2: 'Combine ambas las tablas en customer_id',
            challengeStep3: 'Agrupe por cliente y calcule: Número de pedidos (Frequency) e ingresos totales (Monetary)',

            challengeStep6: 'Opcional: Cree un segmento \'High-Value\' para clientes con ingresos superiores a 10000 dólares',
            challengeHint: 'Sugerencia: utilice groupBy(), agg() con las funciones count() y sum(), orderBy() con limit()',
            challengeSolution: 'from pyspark.sql.functions import count, sum, when\n\n# Cargue ambos archivos\ncustomers = spark.read.csv(\\\\"/home/jovyan/data/customers.csv\\\\", header=True, inferSchema=True)\norders = spark.read.csv(\\\\"/home/jovyan/data/orders.csv\\\\", header=True, inferSchema=True)\n\n# Cálculo RFM\ndf_rfm = customers.join(orders, \\\\"customer_id\\\\") \\\\\\\\\n    .groupBy(\\\\"customer_id\\\\", \\\\"name\\\\") \\\\\\\\\n    .agg(\n        count(\\\\"order_id\\\\").alias(\\\\"frequency\\\\"),\n        sum(\\\\"order_total\\\\").alias(\\\\"monetary\\\\")\n    )\n\n# Los 10 mejores clientes por ingresos\ndf_rfm.orderBy(\\\\"monetary\\\\", ascending=False).limit(10).show()\n\n# Opcional: Segmentación High-Value\ndf_rfm_segment = df_rfm.withColumn(\\\\"segment\\\\",\n    when(col(\\\\"monetary\\\\") > 10000, \\\\"High-Value\\\\").otherwise(\\\\"Standard\\\\")\n)\ndf_rfm_segment.filter(col(\\\\"segment\\\\") == \\\\"High-Value\\\\").show()',
