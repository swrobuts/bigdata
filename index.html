                const [count, setCount] = useState(0);
                const [hasStarted, setHasStarted] = useState(false);
                const ref = useRef(null);

                useEffect(() => {
                    const observer = new IntersectionObserver(
                        ([entry]) => {
                            if (entry.isIntersecting && !hasStarted) {
                                setHasStarted(true);
                            }
                        },
                        { threshold: 0.5 }
                    );
                    if (ref.current) observer.observe(ref.current);
                    return () => observer.disconnect();
                }, [hasStarted]);

                useEffect(() => {
                    if (!hasStarted) return;
                    const startTime = Date.now();
                    const numEnd = parseFloat(end);
                    const timer = setInterval(() => {
                        const elapsed = Date.now() - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        const eased = 1 - Math.pow(1 - progress, 3);
                        setCount(Math.round(eased * numEnd));
                        if (progress >= 1) clearInterval(timer);
                    }, 16);
                    return () => clearInterval(timer);
                }, [hasStarted, end, duration]);

                                                    </div>
                                                    <p className="text-gray-600 text-sm leading-relaxed mb-5">{labInfo.desc}</p>
                                                    <div className="flex items-center font-bold text-sm transition-all group-hover:gap-3 gap-1" style={{color: lab.color}}>
                                                        <span>{labInfo.cta}</span>
                                                        <span className="transition-transform group-hover:translate-x-1">&rarr;</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </a>
                                    );
                                })}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="text-white py-20 px-6" style={{background: "rgba(17,24,39,0.97)"}}>
                        <div className="max-w-6xl mx-auto text-center">
                            <p className="text-lg mb-4">{t.footer.built}</p>
                            <p className="text-gray-400 mb-2">{t.footer.thws}</p>
                            <p className="text-gray-400 mb-6">{t.footer.professor}</p>
                            <div className="border-t border-gray-700 pt-8">
                                <a
                                    href="https://github.com/swrobuts/bigdata"
                                    className="text-orange-500 hover:text-orange-400 font-semibold transition-colors"
                                >
                                    {t.footer.github} →
                                </a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
