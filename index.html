            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

                transform: translateX(40px);

            align-items: center;

        }

            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .data-flow {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .data-flow-item {
            background: white;
            border: 2px solid #E8792F;
            border-radius: 0.5rem;
            padding: 1rem 1.5rem;
            font-weight: 600;
            color: #1B3A5C;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }

            font-size: 1.5rem;
            color: #E8792F;
            font-weight: bold;
            animation: arrowPulse 2s ease-in-out infinite;
        }

                opacity: 1;
            }
            50% {
                opacity: 0.5;
                transform: translateX(5px);
            }
        }

            background: white;

            position: sticky;
            top: 0;
            z-index: 50;

            display: flex;
            justify-content: space-between;

            background: linear-gradient(135deg, #1B3A5C 0%, #2D5A7B 100%);

            background-clip: text;
        }

            gap: 0.5rem;
            align-items: center;

            cursor: pointer;
            font-weight: 600;

            background: #E8792F;
            color: white;
            border-color: #E8792F;
        }

        .lang-btn:hover {
            border-color: #E8792F;
        }

            height: 1px;
            background: linear-gradient(to right, transparent, #2D5A7B, transparent);

            background: #f8fafc;
            border: 1px solid #e2e8f0;

            padding: 2rem;

                                {t.about.title}

                            <div className="grid md:grid-cols-2 gap-12">
                                <div className="scroll-reveal">
                                    <p className="text-lg text-gray-700 leading-relaxed mb-6">
                                        {t.about.description}

                                </div>
                                <div className="scroll-reveal">
                                    <h3 className="text-2xl font-bold text-orange-500 mb-6">{t.about.learning}</h3>

                                                <span className="text-gray-700">{obj}</span>

                                    </ul>
                                </div>
                            </div>

                    <section id="case-study-section" className="py-20 px-6 bg-gradient-to-br from-gray-50 to-white">

                            <h2 className="text-4xl md:text-5xl font-black text-gray-900 mb-12 text-center scroll-reveal">
                                {t.case_study.title}
                            </h2>
                            <p className="text-xl text-gray-700 text-center mb-12 scroll-reveal">
                                {t.case_study.intro}

                            <div className="grid md:grid-cols-4 gap-6 mb-16">
                                {[
                                    { icon: icons.users, text: t.case_study.customer },

                                    { icon: icons.creditCard, text: t.case_study.transactions },
                                    { icon: icons.trendingUp, text: t.case_study.analytics }
                                ].map((item, idx) => (
                                    <div key={idx} className="bg-white border-2 border-gray-200 rounded-lg p-6 text-center scroll-reveal hover:border-orange-500 transition-colors">
                                        <div className="mb-3 flex justify-center" style={{ color: '#1B3A5C' }}>
                                            <LucideIcon d={item.icon} size={36} />
                                        </div>
                                        <p className="text-gray-700 font-semibold">{item.text}</p>
                                    </div>
                                ))}
                            </div>

                            <div className="scroll-reveal">
                                <h3 className="text-2xl font-bold text-center text-gray-900 mb-8">{t.case_study.flow}</h3>
                                <div className="data-flow bg-white p-6 rounded-lg border-2 border-gray-200">
                                    <div className="data-flow-item">{t.case_study.orders}</div>

                                    <div className="data-flow-item">MongoDB</div>
                                    <div className="data-flow-arrow">→</div>
                                    <div className="data-flow-item">Neo4j</div>

                                    <div className="data-flow-item">DuckDB</div>
                                    <div className="data-flow-arrow">→</div>
                                    <div className="data-flow-item">Spark</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section id="labs-section" className="py-20 px-6 bg-white">

                            <h2 className="text-4xl md:text-5xl font-black text-gray-900 mb-16 text-center scroll-reveal">
                                {t.labs.title}
                            </h2>

                            <div className="grid md:grid-cols-2 gap-8">
                                {labsData.map((lab, idx) => {
                                    const labInfo = t.labs[lab.key];
                                    const difficultyMap = {
                                        beginner: 'difficulty-beginner',
                                        intermediate: 'difficulty-intermediate',
                                        advanced: 'difficulty-advanced'
                                    };

                                    return (
                                        <div key={idx} className="lab-card bg-white border-2 border-gray-200 rounded-lg overflow-hidden scroll-reveal">
                                            <div className="bg-gradient-to-br from-gray-50 to-gray-100 p-8 flex items-center gap-4">
                                                <div className="icon-wrapper flex items-center justify-center" style={{ background: lab.color }}>
                                                    <TechLogo name={lab.key} size={28} />
                                                </div>
                                                <div>
                                                    <h3 className="text-2xl font-bold text-gray-900">{labInfo.name}</h3>
                                                    <p className="text-gray-600">{labInfo.subtitle}</p>
                                                </div>
                                            </div>

                                            <div className="p-8">
                                                <div className="mb-4">
                                                    <p className="text-sm text-gray-600 font-semibold">{labInfo.chapter}</p>
                                                </div>

                                                <p className="text-gray-700 mb-6 leading-relaxed">
                                                    {labInfo.desc}
                                                </p>

                                                <div className="flex items-center justify-between">
                                                    <span className={`difficulty-badge ${difficultyMap[lab.difficulty]}`}>
                                                        {labInfo.difficulty}
                                                    </span>
                                                    <a
                                                        href={`lab-${lab.key}.html`}
                                                        className="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded transition-colors"
                                                    >
                                                        {labInfo.cta}
                                                    </a>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </section>

                    <section id="getting-started-section" className="py-20 px-6" style={{ background: '#1B3A5C' }}>
                        <div className="max-w-4xl mx-auto text-center">
                            <h2 className="text-4xl md:text-5xl font-black text-white mb-6 scroll-reveal">
                                {t.getting_started.title}
                            </h2>
                            <p className="text-xl text-blue-200 mb-4 scroll-reveal">
                                {t.getting_started.docker}
                            </p>
                            <p className="text-lg text-blue-300 mb-10 scroll-reveal">
                                {t.getting_started.prereq}
                            </p>
                            <a
                                href="docker-guide.html"

                            <div className="mt-8 grid md:grid-cols-3 gap-6 scroll-reveal">
                                <div className="bg-white bg-opacity-10 rounded-lg p-6">
                                    <div className="text-3xl font-bold text-white mb-2">1</div>
                                    <p className="text-blue-200">{t.getting_started.step2}</p>
                                </div>
                                <div className="bg-white bg-opacity-10 rounded-lg p-6">
                                    <div className="text-3xl font-bold text-white mb-2">2</div>
                                    <p className="text-blue-200">{t.getting_started.step3}</p>
                                </div>
                                <div className="bg-white bg-opacity-10 rounded-lg p-6">
                                    <div className="text-3xl font-bold text-white mb-2">3</div>
                                    <p className="text-blue-200">{t.getting_started.copy}</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <div className="section-divider"></div>

                    <section id="architecture-section" className="py-20 px-6 bg-white">
                        <div className="max-w-6xl mx-auto">
                            <h2 className="text-4xl md:text-5xl font-black text-gray-900 mb-8 text-center scroll-reveal">
                                {t.architecture.title}
                            </h2>
                            <p className="text-xl text-gray-600 text-center mb-16 scroll-reveal">
                                {t.architecture.desc}
                            </p>

                            <div className="grid md:grid-cols-4 gap-6 scroll-reveal">
                                {[
                                    { icon: icons.database, label: t.architecture.lake, desc: 'Raw Data' },
                                    { icon: icons.settings, label: t.architecture.processing, desc: 'Transform' },
                                    { icon: icons.building, label: t.architecture.warehouse, desc: 'Organize' },
                                    { icon: icons.lightbulb, label: t.architecture.insights, desc: 'Insight' }
                                ].map((item, idx) => (
                                    <div key={idx} className="bg-white border-2 border-gray-200 rounded-lg p-8 text-center hover:border-orange-500 transition-colors">
                                        <div className="mb-4 flex justify-center" style={{ color: '#1B3A5C' }}>
                                            <LucideIcon d={item.icon} size={40} />
                                        </div>
                                        <h3 className="text-xl font-bold text-gray-900 mb-2">{item.label}</h3>
                                        <p className="text-sm text-gray-600">{item.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <footer className="bg-gradient-to-r from-gray-900 to-gray-800 text-white py-16 px-6">
                        <div className="max-w-6xl mx-auto text-center">
                            <p className="text-lg mb-4">{t.footer.built}</p>
                            <p className="text-gray-400 mb-2">{t.footer.thws}</p>
                            <p className="text-gray-400 mb-6">{t.footer.professor}</p>
                            <div className="border-t border-gray-700 pt-8">
                                <a
                                    href="https://github.com/thws-bigdata"
                                    className="text-orange-500 hover:text-orange-400 font-semibold transition-colors"
                                >
                                    {t.footer.github} →
                                </a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
