        body {
            background-color: #fafbfc;

            background-color: #E8792F;

            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            font-weight: 600;

            border-radius: 0.5rem;

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: #E8792F;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .copy-btn:hover { opacity: 0.9; }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: white;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            padding-top: 5rem;
            z-index: 40;
        }
        .main-content {
            margin-left: 280px;
            padding: 2rem;
            padding-top: 5rem;
            max-width: 900px;
        }
        .sidebar-item {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .sidebar-item:hover { background: #f5f5f5; }
        .numbered-list { list-style: none; padding: 0; margin: 0; counter-reset: item; }
        .numbered-list li { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; line-height: 1.6; }
        .numbered-list li::before { counter-increment: item; content: counter(item); display: inline-flex; align-items: center; justify-content: center; min-width: 32px; height: 32px; background: #E8792F; color: white; border-radius: 50%; font-size: 0.85rem; font-weight: 700; flex-shrink: 0; }
        .check-list { list-style: none; padding: 0; margin: 0; }
        .check-list li { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; line-height: 1.6; }
        .check-list li::before { content: "✓"; display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 28px; background: #E8792F; color: white; border-radius: 50%; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
        .source-link { font-size: 0.75rem; color: #888; margin-left: 0.25rem; text-decoration: none; }
        .source-link:hover { color: #E8792F; text-decoration: underline; }
        .language-switcher { display: flex; gap: 0.5rem; align-items: center; }
        .lang-btn { padding: 0.5rem 0.75rem; border-radius: 0.375rem; border: 2px solid #e5e7eb; background: white; cursor: pointer; font-weight: 600; font-size: 0.875rem; color: #666; transition: all 0.2s; }
        .lang-btn.active { background: #E8792F; color: white; border-color: #E8792F; }
        .lang-btn:hover { border-color: #E8792F; }
        .sidebar-item.active {
            border-left-color: #E8792F;
            background: #fef5f1;
            font-weight: 600;
            color: #E8792F;
        }
        .section { display: none; margin-bottom: 3rem; }
        .section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .quiz-item { border-left: 4px solid #E8792F; padding-left: 1rem; margin: 1rem 0; }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;

        .badge-intermediate { background: #fef08a; color: #7c2d12; }
        .badge-advanced { background: #fed7aa; color: #7c2d12; }
        .badge-boss { background: #fecaca; color: #7f1d1d; }
        .expandable {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .expandable:hover { background: #f3f4f6; }
        .expandable-header { font-weight: 600; color: #E8792F; display: flex; align-items: center; justify-content: space-between; }
        .expandable-content { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; }
        .expandable.expanded .expandable-content { display: block; }
        .expandable-chevron { transition: transform 0.2s; }
        .expandable.expanded .expandable-chevron { transform: rotate(180deg); }

            background: #1B3A5C;
            color: #00d084;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            margin: 1rem 0;
            border-left: 4px solid #E8792F;

            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            z-index: 50;

            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;

        .back-btn {
            background: none;
            border: none;
            color: #E8792F;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;

            padding: 0.5rem 1rem;
            border: 1px solid #E8792F;
            border-radius: 0.4rem;
            background: white;
            color: #1B3A5C;
            cursor: pointer;

            padding: 1rem;
            text-align: left;
            border: 1px solid #e0e0e0;

            background: #fef5f1;
            font-weight: 700;
            color: #E8792F;
        }
        .comparison-table tr:hover { background: #fafbfc; }
        .hint-box {
            background: #fffbeb;
            border-left: 4px solid #E8792F;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        .hint-title { font-weight: 600; color: #E8792F; margin-bottom: 0.5rem; }
        [dir="rtl"] { direction: rtl; text-align: right; }
        [dir="rtl"] .sidebar { left: auto; right: 0; border-right: none; border-left: 1px solid #e0e0e0; }
        [dir="rtl"] .main-content { margin-left: 0; margin-right: 280px; }
        [dir="rtl"] .back-btn { margin-left: 0; margin-right: 1rem; }

        [dir="rtl"] .sidebar-item.active { border-right-color: #E8792F; }

            background: #fef5f1;
            border-left: 4px solid #E8792F;
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }

</head>

        function App() {
            const [lang, setLang] = React.useState('en');
            const [activeSection, setActiveSection] = React.useState('overview');
            const [expandedQuizzes, setExpandedQuizzes] = React.useState({});
            const [expandedHints, setExpandedHints] = React.useState({});

            const isRTL = lang === 'ar';

                setExpandedHints(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const copyToClipboard = (code) => {
                navigator.clipboard.writeText(code);
                alert('Copied to clipboard!');

            const sections = [

                'exercise1', 'exercise2', 'exercise3', 'exercise4',
                'exercise5', 'exercise6', 'exercise7', 'exercise8',

                            ))}
                        </div>
                    </div>

                    <div className="sidebar">
                        {sections.map(section => (

                                key={section}
                                className={`sidebar-item ${activeSection === section ? 'active' : ''}`}
                                onClick={() => setActiveSection(section)}
                            >
                                {t[section]}
                            </div>
                        ))}
                    </div>

                    <div className="main-content">
                        {activeSection === 'overview' && <OverviewSection t={t} />}
                        {activeSection === 'technology' && <TechnologySection t={t} />}
                        {activeSection === 'setup' && <SetupSection t={t} copyToClipboard={copyToClipboard} toggleHint={toggleHint} expandedHints={expandedHints} />}
                        {activeSection === 'fundamentals' && <FundamentalsSection t={t} copyToClipboard={copyToClipboard} toggleQuiz={toggleQuiz} toggleHint={toggleHint} expandedQuizzes={expandedQuizzes} expandedHints={expandedHints} />}
                        {activeSection === 'exercise1' && <Exercise1 t={t} copyToClipboard={copyToClipboard} toggleHint={toggleHint} expandedHints={expandedHints} />}
                        {activeSection === 'exercise2' && <Exercise2 t={t} copyToClipboard={copyToClipboard} toggleHint={toggleHint} expandedHints={expandedHints} />}
                        {activeSection === 'exercise3' && <Exercise3 t={t} copyToClipboard={copyToClipboard} toggleHint={toggleHint} expandedHints={expandedHints} />}
                        {activeSection === 'exercise4' && <Exercise4 t={t} copyToClipboard={copyToClipboard} toggleHint={toggleHint} expandedHints={expandedHints} />}
                        {activeSection === 'exercise5' && <Exercise5 t={t} copyToClipboard={copyToClipboard} toggleHint={toggleHint} expandedHints={expandedHints} />}

        function TechnologySection({ t }) {

                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>

                    <div className="card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>What IS a Graph Database?</h3>
                        <p style={{ marginBottom: '1rem' }}>A graph database stores data as nodes (entities) connected by relationships (edges) with properties on both.</p>
                        <div style={{ background: '#f9fafb', padding: '1rem', borderRadius: '0.5rem', marginBottom: '1rem', marginTop: '1rem' }}>
                            <strong>Property Graph Model Components:</strong>
                            <ul className="numbered-list" style={{ marginTop: '0.5rem' }}>
                                <li><strong>Nodes:</strong> Entities like Person, Product, Account</li>
                                <li><strong>Relationships:</strong> Connections with types (BOUGHT, FOLLOWS, CONTAINS)</li>
                                <li><strong>Properties:</strong> Key-value data on nodes and relationships</li>
                                <li><strong>Labels:</strong> Categories that group nodes (node types)</li>
                            </ul>
                        </div>
                        <p><strong>Example:</strong> A person node has name and email properties. They PURCHASED a product (relationship with date and quantity properties).</p>
                    </div>

                            <thead>
                                <tr>
                                    <th>Use Case</th>
                                    <th>Graph Database</th>
                                    <th>SQL</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Friend-of-friend queries</td>
                                    <td style={{ color: '#0b663c', fontWeight: '600' }}>O(depth) - Constant</td>
                                    <td>O(n joins) - Exponential</td>
                                </tr>
                                <tr>
                                    <td>Finding 3-hop patterns</td>
                                    <td style={{ color: '#0b663c', fontWeight: '600' }}>Native graph patterns</td>
                                    <td>Requires 3 JOINs</td>
                                </tr>
                                <tr>
                                    <td>Fraud ring detection</td>
                                    <td style={{ color: '#0b663c', fontWeight: '600' }}>Direct traversal</td>
                                    <td>Complex subqueries</td>
                                </tr>
                                <tr>

                                    <button className="copy-btn" onClick={() => copyToClipboard('MATCH (d:Device) <-[:USES_DEVICE]- (a:Account) WITH d, COUNT(a) AS ring_size WHERE ring_size > 1 RETURN d.id, ring_size ORDER BY ring_size DESC')}>Copy</button>
                                    <code style={{ whiteSpace: 'pre-wrap' }}>MATCH (d:Device) &lt;-[:USES_DEVICE]- (a)<br/>WITH d, COUNT(a) AS ring_size<br/>WHERE ring_size > 1<br/>RETURN d.id, ring_size DESC</code>
                                </div>
                                <div className="output-box">DEV123, 3 (largest ring)</div>
                            </li>
                            <li><strong>Risk scoring per account:</strong>
                                <div className="code-block">
                                    <button className="copy-btn" onClick={() => copyToClipboard('MATCH (a:Account) -[:USES_DEVICE|:USES_IP]-> (s) <-[:USES_DEVICE|:USES_IP]- (other:Account) WHERE a <> other WITH a, COUNT(other) AS connections RETURN a.id, connections ORDER BY connections DESC')}>Copy</button>
                                    <code style={{ whiteSpace: 'pre-wrap' }}>MATCH (a:Account)<br/>-[:USES_DEVICE|:USES_IP]-&gt; (s)<br/>&lt;-[:USES_DEVICE|:USES_IP]- (o)<br/>WHERE a &lt;&gt; o<br/>RETURN a.id, COUNT(o)</code>
                                </div>
                                <div className="output-box">ACC003, 2 (highest risk score)</div>
                            </li>
                        </ol>

                        <div className="expandable" onClick={() => toggleHint('exercise8_hint')} style={{ cursor: 'pointer', marginTop: '1.5rem' }}>
                            <div className="expandable-header">
                                <span>Hint</span>
                                <span className="expandable-chevron">▼</span>
                            </div>
                            {expandedHints['exercise8_hint'] && (
                                <div className="expandable-content">This is how PayPal and eBay detect fraud in production. The | (OR) follows multiple types: [:DEVICE|:IP]. WHERE a &lt;&gt; a2 excludes self-loops. COUNT connected nodes for risk scoring.</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function SelfCheckSection({ t, expandedQuizzes, toggleQuiz }) {
            const quizzes = [
                { id: 'q1', q: 'Main advantage of graphs over SQL?', a: 'Constant-time relationship traversal vs exponential JOINs. Friend-of-friend takes O(1) hops in graphs.' },
                { id: 'q2', q: 'What is a label?', a: 'A category/type for nodes (e.g., :Person). Multiple labels per node. Like tags.' },
                { id: 'q3', q: 'What does OPTIONAL MATCH do?', a: 'Matches pattern but returns NULL for non-matching branches instead of excluding rows.' },
                { id: 'q4', q: 'Difference between [] and *1..3?', a: '[] = exactly one relationship. *1..3 = 1-3 hops (variable length). *0.. = zero or more.' },
                { id: 'q5', q: 'What is MERGE?', a: 'Creates a node if missing, updates if exists. Idempotent (safe to repeat). Prevents duplicates.' },
                { id: 'q6', q: 'How to find communities?', a: 'Use variable-length paths (*) for clustering. Count connections. Graph algorithms like louvain().' },
                { id: 'q7', q: 'Purpose of WITH?', a: 'Pipes intermediate results to next clause. Allows filtering before next MATCH or RETURN.' },
                { id: 'q8', q: 'Design fraud detection graph?', a: 'Nodes: Account, Device, IP. Relationships: Account -[:USES_DEVICE]-> Device. Find multiple accounts per device.' },
                { id: 'q9', q: 'What is COLLECT()?', a: 'Aggregates values into lists. Useful for grouping: p.name, COLLECT(friend.name) AS friends' },
                { id: 'q10', q: 'Count relationships of type?', a: 'MATCH (n) -[r:TYPE]-> () RETURN COUNT(r). Or WHERE type(r) = "TYPE"' }
            ];

            return (
                <div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>Self-Check Questions</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>

                    <div className="card" style={{ padding: '2rem' }}>
                        <p style={{ marginBottom: '1.5rem' }}>Test your knowledge. Click to reveal answers.</p>
                        {quizzes.map(quiz => (
                            <div key={quiz.id} className="quiz-item">
                                <div className="expandable" onClick={() => toggleQuiz(quiz.id)} style={{ cursor: 'pointer' }}>
                                    <div className="expandable-header">
                                        <span>{quiz.q}</span>
                                        <span className="expandable-chevron">▼</span>
                                    </div>
                                    {expandedQuizzes[quiz.id] && (
                                        <div className="expandable-content">{quiz.a}</div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function ReflectionSection({ t }) {
            return (
                <div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>Reflection & Applications</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>

                    <div className="card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>Graph Thinking</h3>
                        <p style={{ marginBottom: '1rem' }}>You learned to think in connected entities. The world operates as graphs:</p>
                        <ul style={{ marginLeft: '1.5rem', lineHeight: '2' }}>
                            <li>Social networks: people, followers, groups</li>
                            <li>Supply chains: parts assembled into products</li>
                            <li>Biology: proteins, molecules, interactions</li>
                            <li>Law enforcement: criminals, cases, evidence</li>
                        </ul>
                    </div>

                    <div className="card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>When to Use Neo4j</h3>
                        <table className="comparison-table">
                            <thead>
                                <tr><th>Scenario</th><th>Neo4j?</th><th>Why</th></tr>
                            </thead>
                            <tbody>
                                <tr><td>Recommendations</td><td style={{ color: '#0b663c' }}>YES</td><td>Natural graph structure</td></tr>
                                <tr><td>Fraud detection</td><td style={{ color: '#0b663c' }}>YES</td><td>Find connected patterns</td></tr>
                                <tr><td>User profiles</td><td style={{ color: '#7f1d1d' }}>NO</td><td>Use SQL for flat data</td></tr>
                                <tr><td>Knowledge graphs</td><td style={{ color: '#0b663c' }}>YES</td><td>Semantic reasoning</td></tr>
                                <tr><td>Master data management</td><td style={{ color: '#0b663c' }}>YES</td><td>Link entities</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div className="card" style={{ padding: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>Career Paths</h3>
                        <ul style={{ marginLeft: '1.5rem', lineHeight: '2' }}>
                            <li><strong>Data Engineer:</strong> Graph pipelines, integration</li>
                            <li><strong>Machine Learning:</strong> Graph neural networks (GNNs)</li>
                            <li><strong>Data Scientist:</strong> Community detection, centrality</li>
                            <li><strong>Backend Dev:</strong> Recommendation APIs, fraud services</li>
                            <li><strong>Enterprise Architect:</strong> MDM, knowledge graphs</li>
                        </ul>
                    </div>
                </div>
            );
        }

        function TroubleshootingSection({ t }) {
            return (
                <div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>Troubleshooting</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>

                    <div className="card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>Common Issues</h3>

                        <h4 style={{ marginTop: '1.5rem', marginBottom: '0.5rem', color: '#E8792F', fontWeight: '600' }}>Neo4j not running</h4>
                        <p><strong>Error:</strong> "WebSocket connection refused"</p>
                        <p><strong>Fix:</strong> `docker restart neo4j` and verify `docker ps | grep neo4j`</p>

                        <h4 style={{ marginTop: '1.5rem', marginBottom: '0.5rem', color: '#E8792F', fontWeight: '600' }}>Auth failed</h4>
                        <p><strong>Error:</strong> "Unauthorized (401)"</p>
                        <p><strong>Fix:</strong> Default: user "neo4j", password from docker run. Change: `ALTER USER neo4j SET PASSWORD "newpass"`</p>

                        <h4 style={{ marginTop: '1.5rem', marginBottom: '0.5rem', color: '#E8792F', fontWeight: '600' }}>Cypher syntax error</h4>
                        <p><strong>Error:</strong> "Invalid input..."</p>
                        <p><strong>Fix:</strong> Check brackets: () for nodes, [] for relationships. Keywords usually UPPERCASE.</p>

                        <h4 style={{ marginTop: '1.5rem', marginBottom: '0.5rem', color: '#E8792F', fontWeight: '600' }}>No results</h4>
                        <p><strong>Error:</strong> MATCH returns empty (no error shown)</p>
                        <p><strong>Fix:</strong> `MATCH (n) RETURN COUNT(n)` to verify nodes. Check labels and property names.</p>

                        <h4 style={{ marginTop: '1.5rem', marginBottom: '0.5rem', color: '#E8792F', fontWeight: '600' }}>Out of memory</h4>
                        <p><strong>Error:</strong> "Java heap space"</p>
                        <p><strong>Fix:</strong> Use LIMIT. Docker: `docker run ... -m 4g` to increase memory.</p>

                        <h4 style={{ marginTop: '1.5rem', marginBottom: '0.5rem', color: '#E8792F', fontWeight: '600' }}>Relationship direction</h4>
                        <p><strong>Error:</strong> MATCH finds nothing but rel exists</p>
                        <p><strong>Fix:</strong> Use -[:TYPE]- (no arrows) to ignore direction. Or reverse: ()-[:TYPE]-></p>
                    </div>

                    <div className="card" style={{ padding: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>Tips & Tricks</h3>
                        <ul style={{ marginLeft: '1.5rem', lineHeight: '2' }}>
                            <li><strong>PROFILE:</strong> See execution plan before running</li>
                            <li><strong>EXPLAIN:</strong> Show plan without executing</li>
                            <li><strong>DISTINCT:</strong> Remove duplicates from results</li>
                            <li><strong>Indexes:</strong> `CREATE INDEX ON :Person(name)` speeds up lookups</li>
                            <li><strong>LIMIT:</strong> Restrict result set size</li>
                        </ul>
                    </div>
                </div>
            );
        }

        function ResourcesSection({ t }) {
            return (
                <div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>Further Resources</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>

                    <div className="card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>Official Docs</h3>
                        <ul style={{ marginLeft: '1.5rem', lineHeight: '2' }}>
                            <li><a href="https://neo4j.com/docs/" target="_blank" rel="noopener noreferrer" style={{ color: '#E8792F' }}>Neo4j Documentation</a></li>
                            <li><a href="https://neo4j.com/developer/cypher/" target="_blank" rel="noopener noreferrer" style={{ color: '#E8792F' }}>Cypher Manual</a></li>
                            <li><a href="https://neo4j.com/docs/graph-data-science/" target="_blank" rel="noopener noreferrer" style={{ color: '#E8792F' }}>Graph Data Science Library</a></li>
                        </ul>
                    </div>

                    <div className="card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>Learning Resources</h3>
                        <ul style={{ marginLeft: '1.5rem', lineHeight: '2' }}>
                            <li><a href="https://graphacademy.neo4j.com/" target="_blank" rel="noopener noreferrer" style={{ color: '#E8792F' }}>GraphAcademy (Free courses)</a></li>
                            <li><a href="https://sandbox.neo4j.com/" target="_blank" rel="noopener noreferrer" style={{ color: '#E8792F' }}>Neo4j Sandbox (Free cloud)</a></li>
                            <li><a href="https://neo4j.com/videos/" target="_blank" rel="noopener noreferrer" style={{ color: '#E8792F' }}>Video tutorials</a></li>
                        </ul>
                    </div>

                    <div className="card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>Quick Reference</h3>
                        <pre style={{ background: '#f9fafb', padding: '1rem', borderRadius: '0.5rem', fontFamily: 'monospace', fontSize: '0.9rem', lineHeight: '1.8', margin: 0 }}>{'CREATE (n:Label {prop: value})\nMATCH (n:Label) RETURN n\n(a) -[:TYPE]-> (b)\nWHERE n.prop > 5\nCOUNT, SUM, AVG, MAX, MIN, COLLECT\nMERGE, SET, DELETE\nWITH (pipeline)\n*1..3 (1-3 hops)'}</pre>
                    </div>

                    <div className="card" style={{ padding: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>Books</h3>
                        <ul style={{ marginLeft: '1.5rem', lineHeight: '2' }}>
                            <li><strong>"Learning Neo4j"</strong> by Rik Van Bruggen</li>
                            <li><strong>"Designing Graph Databases"</strong> by Raj Gupta</li>
                            <li>Neo4j Blog (fraud, recommendations, MDM)</li>
                        </ul>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
