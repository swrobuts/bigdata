  name: "Wireless Mouse",
  price: 29.99,
  category: "Electronics"
})

  name: "Max Mustermann",
  email: "max@example.com"
})

// Beziehungen erstellen
MATCH (c:Customer {name: "Max Mustermann"})
MATCH (p:Product {name: "Wireless Mouse"})
CREATE (c)-[:PURCHASED {date: date("2024-01-15"), quantity: 1}]->(p)

// Käufe abfragen
MATCH (c:Customer)-[:PURCHASED]->(p:Product)
RETURN c.name, p.name, p.price`,

                exercise2_1: `// Kategorien erstellen
CREATE (electronics:Category {name: "Electronics"})
CREATE (accessories:Category {name: "Accessories"})

// Produkte zu Kategorien hinzufügen
MATCH (cat:Category {name: "Electronics"})
CREATE (p:Product {
  name: "Laptop",
  price: 999.99
})-[:BELONGS_TO]->(cat)

// Käufe nach Kategorie abfragen
MATCH (c:Customer)-[:PURCHASED]->(p:Product)-[:BELONGS_TO]->(cat:Category)
RETURN c.name, cat.name, COUNT(p) AS purchases
ORDER BY purchases DESC`,

                exercise3_1: `// Finde Kunden, die gleiche Produkte kauften
MATCH (c1:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(c2:Customer)
WHERE c1 <> c2
RETURN c1.name, c2.name, COLLECT(DISTINCT p.name) AS shared_products

// Produktempfehlungen
MATCH (c:Customer {name: "Max Mustermann"})-[:PURCHASED]->(p:Product)
      <-[:PURCHASED]-(other:Customer)-[:PURCHASED]->(rec:Product)
WHERE NOT (c)-[:PURCHASED]->(rec)
RETURN rec.name, rec.price, COUNT(other) AS score
ORDER BY score DESC LIMIT 5`,

                exercise4_1: `// Umsatz nach Kategorie
MATCH (c:Customer)-[p:PURCHASED]->(prod:Product)-[:BELONGS_TO]->(cat:Category)
RETURN cat.name,
       SUM(p.quantity * prod.price) AS revenue,
       COUNT(DISTINCT c) AS customers
ORDER BY revenue DESC

// Kundensegmente
MATCH (c:Customer)-[p:PURCHASED]->(prod:Product)
WITH c, COUNT(p) AS purchases, SUM(p.quantity * prod.price) AS total_spent
RETURN CASE
  WHEN total_spent > 1000 THEN 'VIP'
  WHEN total_spent > 500 THEN 'Regular'
  ELSE 'New'
END AS segment, COUNT(c) AS customer_count`,

CREATE (volume:Attribute {name: "Volume", description: "Große Datenmengen"})
CREATE (concept)-[:HAS_ATTRIBUTE]->(volume)

// Lieferantennetzwerk-Analyse
MATCH (s:Supplier)-[:SUPPLIES]->(p:Product)-[:BELONGS_TO]->(c:Category)
RETURN s.name, COLLECT(DISTINCT c.name) AS categories, COUNT(p) AS product_count

// Gemeinschaftserkennung
CALL gds.louvain.stream('product-graph')
YIELD nodeId, communityId

        function ChallengeLevel({ level }) {
            const [open, setOpen] = useState(false);
            const t = translations[document.documentElement.lang || 'en'];
            const levelData = {
                1: { title: t.level1Title, desc: t.level1Desc },
                2: { title: t.level2Title, desc: t.level2Desc },
                3: { title: t.level3Title, desc: t.level3Desc },
                4: { title: t.level4Title, desc: t.level4Desc }
            };
            const badges = ['difficulty-beginner', 'difficulty-intermediate', 'difficulty-advanced', 'difficulty-boss'];

            return (
                <div className="challenge-card">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                        <div>
                            <h3 style={{ fontSize: '1.25rem', fontWeight: '600', marginBottom: '0.5rem', color: '#1B3A5C' }}>
                                {levelData[level].title}
                            </h3>
                            <span className={`difficulty-badge ${badges[level - 1]}`}>
                                {level}
                            </span>
                        </div>
                    </div>
                    <p style={{ marginTop: '1rem', color: '#374151' }}>{levelData[level].desc}</p>
                    <div onClick={() => setOpen(!open)} className="challenge-toggle">
                        {open ? t.hideSolution : t.showSolution}
                    </div>
                </div>
            );
        }
