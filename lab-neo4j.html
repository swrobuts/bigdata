            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;

        [dir="rtl"] .copy-btn { right: auto; left: 0.5rem; }

                exercise2: "Вправа 2",
                exercise3: "Вправа 3",
                exercise4: "Вправа 4",
                exercise5: "Вправа 5",
                exercise6: "Вправа 6",
                challenge: "Виклик",
                quiz: "Тест",
                outlook: "Перспективи",
                troubleshooting: "Підтримка",
                copy: "Копіювати",
                correct: "Правильно!",
                incorrect: "Неправильно",
            },
            es: {
                back: "← Volver",
                overview: "Descripción",
                setup: "Configuración",
                fundamentals: "Fundamentos",
                exercise1: "Ejercicio 1",
                exercise2: "Ejercicio 2",
                exercise3: "Ejercicio 3",
                exercise4: "Ejercicio 4",
                exercise5: "Ejercicio 5",
                exercise6: "Ejercicio 6",
                challenge: "Desafío",
                quiz: "Prueba",
                outlook: "Perspectivas",
                troubleshooting: "Soporte",
                copy: "Copiar",
                correct: "¡Correcto!",
                incorrect: "Incorrecto",
            },
            tr: {
                back: "← Geri",
                overview: "Genel Bakış",
                setup: "Kurulum",
                fundamentals: "Temel Bilgiler",
                exercise1: "Alıştırma 1",
                exercise2: "Alıştırma 2",
                exercise3: "Alıştırma 3",
                exercise4: "Alıştırma 4",
                exercise5: "Alıştırma 5",
                exercise6: "Alıştırma 6",
                challenge: "Zorluk",
                quiz: "Test",
                outlook: "Görünüm",
                troubleshooting: "Destek",
                copy: "Kopyala",
                correct: "Doğru!",
                incorrect: "Yanlış",
            },
        };

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function App() {
            const [language, setLanguage] = useState('de');
            const [activeSection, setActiveSection] = useState('overview');
            const [expandedItems, setExpandedItems] = useState({});
            const [quizAnswers, setQuizAnswers] = useState({});

            const t = new Proxy(translations[language], {
                get: (target, prop) => target[prop] !== undefined ? target[prop] : translations['de'][prop]
            });

            const toggleExpanded = (id) => {
                setExpandedItems(prev => ({
                    ...prev,
                    [id]: !prev[id]
                }));
            };

            const answerQuiz = (qNum, isCorrect) => {
                setQuizAnswers(prev => ({
                    ...prev,
                    [qNum]: isCorrect
                }));
            };

            const menuItems = [
                { id: 'overview', label: t.overview },
                { id: 'setup', label: t.setup },
                { id: 'fundamentals', label: t.fundamentals },
                { id: 'exercise1', label: t.exercise1 },
                { id: 'exercise2', label: t.exercise2 },
                { id: 'exercise3', label: t.exercise3 },
                { id: 'exercise4', label: t.exercise4 },
                { id: 'exercise5', label: t.exercise5 },
                { id: 'exercise6', label: t.exercise6 },
                { id: 'challenge', label: t.challenge },
                { id: 'quiz', label: t.quiz },
                { id: 'outlook', label: t.outlook },
                { id: 'troubleshooting', label: t.troubleshooting },
            ];

            const renderCodeBlock = (code, label) => (
                <div className="code-block">
                    <button className="copy-btn" onClick={() => copyToClipboard(code)}>
                        {t.copy}
                    </button>
                    <code>{code}</code>
                </div>
            );

            const renderExercise = (num, title, time, goal, showCode, output, explain, task, hint, solution, verify) => (
                <div className="section" style={{display: activeSection === `exercise${num}` ? 'block' : 'none'}}>
                    <h2 className="section-header">{title}</h2>
                    <div className="card">
                        <span className="badge badge-beginner">{t.exerciseTitle} {num}</span>
                        <span className="badge badge-intermediate">{time}</span>
                        <p><strong>{t.ex1Goal}:</strong> {goal}</p>
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">Beispiel (Show)</h3>
                        {renderCodeBlock(showCode, `Example ${num}`)}
                        <div className="output-box">{output}</div>
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">Erklärung (Explain)</h3>
                        <p>{explain}</p>
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">{t.yourTask}</h3>
                        <p>{task}</p>
                    </div>

                    <div className="hint-box">
                        <div className="hint-title">Hinweis:</div>
                        <p>{hint}</p>
                    </div>

                    <div className="expandable" onClick={() => toggleExpanded(`ex${num}sol`)} style={{cursor: 'pointer'}}>
                        <div className="expandable-header">
                            {t.solution}
                            <span className="expandable-chevron">▼</span>
                        </div>
                        {expandedItems[`ex${num}sol`] && (
                            <div className="expandable-content">
                                {renderCodeBlock(solution, `Solution ${num}`)}
                            </div>
                        )}
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">Überprüfung (Verify)</h3>
                        <p>{verify}</p>
                    </div>

                    <div className="next-button">
                        <button className="btn-accent" onClick={() => setActiveSection(`exercise${num === 6 ? 'challenge' : num + 1}`)}>
                            {t.nextExercise}
                        </button>
                    </div>
                </div>
            );

            return (
                <div>
                    <header className="header">
                        <div style={{display: 'flex', alignItems: 'center', gap: '1rem'}}>
                            <a href="index.html" style={{color: 'white', textDecoration: 'none', fontSize: '0.9rem', opacity: 0.8, whiteSpace: 'nowrap'}}>{t.backToHome}</a>
                            <h1>{t.welcome}</h1>
                        </div>
                        <div className="lang-switcher">
                            {['de', 'en', 'ar', 'uk', 'es', 'tr'].map(lang => (
                                <button
                                    key={lang}
                                    className={`lang-btn ${language === lang ? 'active' : ''}`}
                                    onClick={() => setLanguage(lang)}
                                >
                                    {lang.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    </header>

                    <aside className="sidebar">
                        {menuItems.map(item => (
                            <button
                                key={item.id}
                                className={`sidebar-item ${activeSection === item.id ? 'active' : ''}`}
                                onClick={() => setActiveSection(item.id)}
                            >
                                {item.label}
                            </button>
                        ))}
                    </aside>

                    <main className="main-content">
                        {/* OVERVIEW */}
                        <div className="section" style={{display: activeSection === 'overview' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.overview}</h2>

                            <div className="lesson-box">
                                <h3 className="subsection-header">{t.whatYouLearn}</h3>
                                <ul style={{marginLeft: '1.5rem'}}>
                                    <li>Grundkonzepte von Graph-Datenbanken verstehen</li>
                                    <li>Cypher-Abfragesprache beherrschen</li>
                                    <li>Knoten und Beziehungen erstellen und abfragen</li>
                                    <li>Pattern Matching für komplexe Abfragen nutzen</li>
                                    <li>Graph-Traversierung für Empfehlungssysteme implementieren</li>
                                </ul>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.neo4jIs}</h3>
                                <ul style={{marginLeft: '1.5rem'}}>
                                    <li><strong>{t.graphDatabase}</strong></li>
                                    <li><strong>{t.cypherLanguage}</strong></li>
                                    <li><strong>{t.acidCompliant}</strong></li>
                                </ul>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">Warum Neo4j?</h3>
                                <p>{t.realWorldMotivation}</p>
                                <ul style={{marginLeft: '1.5rem', marginTop: '1rem'}}>
                                    <li><strong>NASA:</strong> {t.nasaDesc}</li>
                                    <li><strong>Walmart:</strong> {t.walmartDesc}</li>
                                    <li><strong>eBay:</strong> {t.ebayDesc}</li>
                                </ul>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.estimatedTime}</h3>
                                <p>{t.timeValue}</p>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.prerequisites}</h3>
                                <p>{t.prereqValue}</p>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">MegaStore Szenario</h3>
                                <p>In diesem Labor arbeiten Sie mit einem E-Commerce-Datensatz namens MegaStore:</p>
                                <div className="table-responsive">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Tabelle</th>
                                                <th>Spalten</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td>customers</td>
                                                <td>customer_id, name, email, city, country, registration_date</td>
                                            </tr>
                                            <tr>
                                                <td>products</td>
                                                <td>product_id, name, category, unit_price, stock_quantity</td>
                                            </tr>
                                            <tr>
                                                <td>orders</td>
                                                <td>order_id, customer_id, order_date, order_total, status</td>
                                            </tr>
                                            <tr>
                                                <td>order_items</td>
                                                <td>order_item_id, order_id, product_id, quantity, unit_price</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* SETUP */}
                        <div className="section" style={{display: activeSection === 'setup' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.setup}</h2>
                            <p>{t.setupSteps}</p>

                            <div className="card">
                                <h3 className="subsection-header">Schritt 1: {t.step1}</h3>
                                <p>{t.step1Desc}</p>
                                {renderCodeBlock(t.step1Cmd, 'Setup Step 1')}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">Schritt 2: {t.step2}</h3>
                                <p>{t.step2Desc}</p>
                                {renderCodeBlock(t.step2Cmd, 'Setup Step 2')}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">Schritt 3: {t.step3}</h3>
                                <p>{t.step3Desc}</p>
                                {renderCodeBlock(t.step3Cmd, 'Setup Step 3')}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">Schritt 4: {t.step4}</h3>
                                <p>{t.step4Desc}</p>
                                {renderCodeBlock(t.step4Cmd, 'Setup Step 4')}
                            </div>

                            <div className="lesson-box">
                                <h3 className="subsection-header">{t.verifySetup}</h3>
                                <ul style={{marginLeft: '1.5rem'}}>
                                    <li>✓ {t.verifyStep1}</li>
                                    <li>✓ {t.verifyStep2}</li>
                                    <li>✓ {t.verifyStep3}</li>
                                </ul>
                            </div>
                        </div>

                        {/* FUNDAMENTALS */}
                        <div className="section" style={{display: activeSection === 'fundamentals' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.fundamentals}</h2>

                            <div className="card">
                                <h3 className="subsection-header">{t.nodesLabel}</h3>
                                <p>{t.nodesDesc}</p>
                                {renderCodeBlock(t.nodesCode, 'Nodes Example')}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.relationshipsLabel}</h3>
                                <p>{t.relationshipsDesc}</p>
                                {renderCodeBlock(t.relationshipsCode, 'Relationships Example')}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.cypherLabel}</h3>
                                <p>{t.cypherDesc}</p>
                                {renderCodeBlock(t.cypherCode, 'Cypher Example')}
                            </div>
                        </div>

                        {/* EXERCISES */}
                        {renderExercise(1, t.ex1Title, t.ex1Time, t.ex1Goal, t.ex1Show, t.ex1Output, t.ex1Explain, t.ex1Task, t.ex1Hint, t.ex1Solution, t.ex1Verify)}
                        {renderExercise(2, t.ex2Title, t.ex2Time, t.ex2Goal, t.ex2Show, t.ex2Output, t.ex2Explain, t.ex2Task, t.ex2Hint, t.ex2Solution, t.ex2Verify)}
                        {renderExercise(3, t.ex3Title, t.ex3Time, t.ex3Goal, t.ex3Show, t.ex3Output, t.ex3Explain, t.ex3Task, t.ex3Hint, t.ex3Solution, t.ex3Verify)}
                        {renderExercise(4, t.ex4Title, t.ex4Time, t.ex4Goal, t.ex4Show, t.ex4Output, t.ex4Explain, t.ex4Task, t.ex4Hint, t.ex4Solution, t.ex4Verify)}
                        {renderExercise(5, t.ex5Title, t.ex5Time, t.ex5Goal, t.ex5Show, t.ex5Output, t.ex5Explain, t.ex5Task, t.ex5Hint, t.ex5Solution, t.ex5Verify)}
                        {renderExercise(6, t.ex6Title, t.ex6Time, t.ex6Goal, t.ex6Show, t.ex6Output, t.ex6Explain, t.ex6Task, t.ex6Hint, t.ex6Solution, t.ex6Verify)}

                        {/* CHALLENGE */}
                        <div className="section" style={{display: activeSection === 'challenge' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.challengeTitle}</h2>
                            <div className="card">
                                <span className="badge badge-challenge">Challenge</span>
                                <p style={{marginTop: '1rem'}}>{t.challengeDesc}</p>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">Schritte:</h3>
                                <p style={{whiteSpace: 'pre-wrap'}}>{t.challengeSteps}</p>
                            </div>

                            <div className="hint-box">
                                <div className="hint-title">Hinweis:</div>
                                <p>{t.challengeHint}</p>
                            </div>

                            <div className="expandable" onClick={() => toggleExpanded('challsol')} style={{cursor: 'pointer'}}>
                                <div className="expandable-header">
                                    {t.solution}
                                    <span className="expandable-chevron">▼</span>
                                </div>
                                {expandedItems['challsol'] && (
                                    <div className="expandable-content">
                                        {renderCodeBlock(t.challengeSolution, 'Challenge Solution')}
                                    </div>
                                )}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">Erwartetes Ergebnis:</h3>
                                <p>{t.challengeExpected}</p>
                            </div>

                            <div className="next-button">
                                <button className="btn-accent" onClick={() => setActiveSection('quiz')}>
                                    {t.nextExercise}
                                </button>
                            </div>
                        </div>

                        {/* QUIZ */}
                        <div className="section" style={{display: activeSection === 'quiz' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.quizTitle}</h2>

                            {[1, 2, 3, 4, 5, 6].map(q => (
                                <div key={q} className="quiz-item">
                                    <div className="quiz-item-question">
                                        <span>Frage {q}: {t[`q${q}`]}</span>
                                    </div>
                                    <div className="quiz-options">
                                        {['a', 'b', 'c'].map(opt => {
                                            const isCorrect = t[`q${q}${opt}`] === t[`q${q}ans`];
                                            const answered = quizAnswers[`q${q}${opt}`];
                                            return (
                                                <div
                                                    key={opt}
                                                    className={`quiz-option ${answered ? (isCorrect ? 'correct' : 'incorrect') : ''}`}
                                                    onClick={() => answerQuiz(`q${q}${opt}`, isCorrect)}
                                                    style={{cursor: 'pointer'}}
                                                >
                                                    <strong>{opt})</strong> {t[`q${q}${opt}`]}
                                                    {answered && isCorrect && ` ✓ ${t.correct}`}
                                                    {answered && !isCorrect && ` ✗ ${t.incorrect} ${t[`q${q}ans`]}`}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}

                            <div className="next-button">
                                <button className="btn-accent" onClick={() => setActiveSection('outlook')}>
                                    {t.nextExercise}
                                </button>
                            </div>
                        </div>

                        {/* OUTLOOK */}
                        <div className="section" style={{display: activeSection === 'outlook' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.outlook}</h2>

                            <div className="outlook-section">
                                <div className="outlook-part">
                                    <h3 className="outlook-title">{t.outlookAdvanced}</h3>
                                    <ul className="outlook-list">
                                        <li>{t.outlookGDS}</li>
                                        <li>{t.outlookCommunity}</li>
                                        <li>{t.outlookPageRank}</li>
                                        <li>{t.outlookShortestPath}</li>
                                    </ul>
                                </div>

                                <div className="outlook-part">
                                    <h3 className="outlook-title">{t.outlookAI}</h3>
                                    <p>{t.outlookAIDesc}</p>
                                    <ul className="outlook-list">
                                        <li>{t.outlookExample1}</li>
                                        <li>{t.outlookExample2}</li>
                                        <li>{t.outlookExample3}</li>
                                    </ul>
                                </div>

                                <div className="outlook-part">
                                    <h3 className="outlook-title">Weiterführende Ressourcen</h3>
                                    <ul className="outlook-list">
                                        <li><a href="https://neo4j.com/docs/" target="_blank" rel="noopener noreferrer">Neo4j Dokumentation</a></li>
                                        <li><a href="https://neo4j.com/graphacademy/" target="_blank" rel="noopener noreferrer">Neo4j GraphAcademy</a></li>
                                        <li><a href="https://community.neo4j.com/" target="_blank" rel="noopener noreferrer">Neo4j Community</a></li>
                                        <li><a href="https://github.com/neo4j/neo4j" target="_blank" rel="noopener noreferrer">Neo4j GitHub</a></li>
                                    </ul>
                                </div>
                            </div>

                            <div className="next-button">
                                <button className="btn-accent" onClick={() => setActiveSection('troubleshooting')}>
                                    {t.nextExercise}
                                </button>
                            </div>
                        </div>

                        {/* TROUBLESHOOTING */}
                        <div className="section" style={{display: activeSection === 'troubleshooting' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.troubleshootTitle}</h2>

                            {[1, 2, 3, 4, 5].map(i => (
                                <div key={i} className="card">
                                    <h3 className="subsection-header">{t[`troubleshoot${i}Title`]}</h3>
                                    <p>{t[`troubleshoot${i}`]}</p>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
