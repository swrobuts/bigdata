                ex5Explain: "Zeile 1: MATCH definiert ein Multi-Hop-Pattern: (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product). Dies beschreibt einen Pfad durch 3 Knoten mit 2 Beziehungen - in SQL würde dies 2 JOINs erfordern.\nZeile 2: WHERE filtert auf Eigenschaftswert country='DE', wie in SQL.\nZeile 3: RETURN projiziert Spalten aus verschiedenen Knoten im Pfad (c, o, prod).\nZeile 4: LIMIT 10 begrenzt die Anzahl der Ergebniszeilen, wie in SQL.",

                ex5Hint: "Verwenden Sie ORDER BY o.order_total DESC. LIMIT 5 um Top 5 zu sehen.",
                ex5Solution: "MATCH (c:Customer)-[p:PLACED]->(o:Order)\nRETURN c.name, o.order_total\nORDER BY o.order_total DESC\nLIMIT 5",
                ex5Verify: "Sie sollten die 5 teuersten Bestellungen mit Kundenname und Gesamtsumme sehen.",
                ex6Title: "Übung 6: Empfehlungen generieren",
                ex6Time: "~15 Minuten",
                ex6Goal: "Verwenden Sie Graphmuster für Empfehlungslogik durch Collaborative Filtering. Dies ist ein klassisches Graph-Use-Case, wo Beziehungen zwischen ähnlichen Käufern Empfehlungen treiben - etwas, das in SQL sehr schwierig ist.",
                ex6Show: "MATCH (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer)\nWHERE c.name = 'Alice' AND other.name <> 'Alice'\nRETURN distinct other.name, count(p) as common_products\nORDER BY common_products DESC",
                ex6Output: "Bob | 2\nCharlie | 1",
                ex6Explain: "Zeile 1: MATCH definiert ein Diamond-Pattern: (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer). Dies findet alle Kunden, die Produkte gekauft haben, die Alice auch gekauft hat - ein klassisches Collaborative-Filtering-Pattern.\nZeile 2: WHERE c.name='Alice' UND other.name<>'Alice' filtert auf Alice und schließt Selbst-Referenzen aus.\nZeile 3: RETURN und count(p) zählt gemeinsame Produkte - ein Ähnlichkeitsmaß.\nZeile 4: ORDER BY sortiert nach Ähnlichkeit, um empfehlungswürdige Kunden zu identifizieren.",

                ex6Hint: "Muster: (alice)-[:PURCHASED]->(produkt)<-[:PURCHASED]-(anderer_kunde). Lesen Sie das Muster von links nach rechts: Alice kaufte ein Produkt, das auch ein anderer Kunde kaufte.",
                ex6Solution: "MATCH (c:Customer {name: 'Alice'})-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(similar:Customer)\nWHERE similar.name <> c.name\nRETURN similar.name, count(p) as shared_products\nORDER BY shared_products DESC",

            ex1Time: '~15 хвилин',
            ex1Goal: 'Створіть різні типи вузлів (мітки, такі як Person та Product) та дослідіть їх. Це перший крок у побудові мережі графу, подібний до створення таблиць у SQL.',
            ex1Show: 'CREATE (p1:Person {name: \'Alice\', age: 30})\nCREATE (p2:Product {name: \'Laptop\', price: 999})\nMATCH (n) RETURN n LIMIT 5',
            ex1Output: 'Створено два вузли:\n(p1:Person {name: \'Alice\', age: 30})\n(p2:Product {name: \'Laptop\', price: 999})',
            ex1Explain: 'Рядок 1: команда CREATE створює вузол Person (мітка :Person) зі властивостями name та age у фігурних дужках. Подібно до INSERT у SQL, але зберігає об\'єкт як вузол замість рядка.\nРядок 2: CREATE створює вузол Product з властивостями name та price.\nРядок 3: MATCH знаходить усі вузли (n) з будь-якою міткою й повертає їх — це запит графу, подібний до SELECT * у SQL.',
            ex1Task: 'Ваша система електронної комерції потребує даних про клієнтів. Створіть вузол Customer для \'Bob\' (email: bob@example.com) та вузол Order (order_id: 101, total: 1500). Потім запитайте всі вузли, щоб переконатися, що обидва збережені.',
            ex1Hint: 'Використовуйте ту саму структуру, що й у прикладі. CREATE з міткою :Label та властивостями у фігурних дужках.',
            ex1Solution: 'CREATE (c:Customer {name: \'Bob\', email: \'bob@example.com\'})\nCREATE (o:Order {order_id: 101, total: 1500})\nMATCH (n) RETURN n',
            ex1Verify: 'Ви повинні побачити два нових вузли: один з міткою Customer та один з міткою Order.',
            nextExercise: '← Наступна вправа',
            ex2Title: 'Вправа 2: Створення відносин',
            ex2Time: '~15 хвилин',
            ex2Goal: 'Пов\'яжіть вузли через ориєнтовані зв\'язки з типом. Це фундаментальна концепція баз даних графу: тоді як SQL пов\'язує табличні дані речення WHERE, Neo4j визначає явні шляхи між вузлами.',
            ex2Show: 'MATCH (p:Person {name: \'Alice\'}), (pr:Product {name: \'Laptop\'})\nCREATE (p)-[r:PURCHASED {date: \'2024-01-15\'}]->(pr)\nRETURN r',
            ex2Output: 'Створено один зв\'язок:\n(Alice)-[PURCHASED {date: \'2024-01-15\'}]->(Laptop)',
            ex2Explain: 'Рядки 1-2: MATCH знаходить два наявних вузли (Alice та Laptop). Це подібно до реченні WHERE у SQL, але більш інтуїтивно для графів.\nРядок 3: CREATE створює ориєнтований зв\'язок \'-[r:PURCHASED]->\' з властивостями, такими як date. Напрямок \'→\' критичний: він вказує від покупця до товару.\nРядок 4: RETURN повертає зв\'язок і підтверджує, що з\'єднання було створено.',
            ex2Task: 'Ваша модель географічних даних потребує зв\'язків місцезнаходження. Створіть зв\'язок LIVES_IN від вузла Person до вузла City. Це представляє відношення один-до-багатьох, як у SQL, але без дорогих операцій JOIN.',
            ex2Hint: 'Шаблон: (node1)-[TYPE]->(node2). Використовуйте команди MATCH або спочатку створіть вузли.',
            ex2Solution: 'CREATE (p:Person {name: \'Charlie\'})\nCREATE (c:City {name: \'Berlin\'})\nMATCH (per:Person {name: \'Charlie\'}), (city:City {name: \'Berlin\'})\nCREATE (per)-[r:LIVES_IN]->(city)\nRETURN r',
            ex2Verify: 'Ви повинні побачити зв\'язок LIVES_IN, який пов\'язує вузол Person з вузлом City.',
            ex3Title: 'Вправа 3: Запитування даних',
            ex3Time: '~15 хвилин',
            ex3Goal: 'Використовуйте зіставлення шаблонів із пропозиціями WHERE для фільтрування вузлів. Ця концепція подібна до WHERE в SQL, але працює з шаблонами графів замість стовпців таблиць.',
            ex3Show: 'MATCH (p:Person)\nWHERE p.age > 25\nRETURN p.name, p.age',
            ex3Output: 'Alice, 30\nCharlie, 28',
            ex3Explain: 'Рядок 1: MATCH (p:Person) знаходить усі вузли з позначкою Person і зберігає їх у змінній \'p\'. У SQL це був би SELECT з WHERE у таблиці Person.\nРядок 2: WHERE фільтрує за значеннями властивостей, як і в SQL. Це стандартне фільтрування.\nРядок 3: RETURN відображає лише стовпці (властивості) name і age, подібно до команди SELECT p.name, p.age в SQL.',
            ex3Task: 'Вашій платформі електронної комерції потрібен фільтр за бюджетом. Знайдіть усі продукти з ціною менше 500 для отримання знижки клієнтом. Повертайте назву та ціну для відображення доступних дешевих товарів.',
            ex3Hint: 'Використовуйте WHERE price < 500. Звертайте увагу на правильну назву властивості (price).',
            ex3Solution: 'MATCH (prod:Product)\nWHERE prod.price < 500\nRETURN prod.name, prod.price',
            ex3Verify: 'Ви повинні побачити всі продукти, ціна яких менше 500.',
            ex4Title: 'Вправа 4: Агрегування та сортування',
            ex4Time: '~15 хвилин',
            ex4Goal: 'Агрегуйте та обчислюйте дані за допомогою Cypher. Функції агрегування, такі як count() та avg(), є центральними для аналізу даних і працюють у Neo4j точно так само, як GROUP BY у SQL.',
            ex4Show: 'MATCH (p:Person)\nRETURN count(p) as total_persons, avg(p.age) as avg_age',
            ex4Output: 'total_persons: 3\navg_age: 29.33',
            ex4Explain: 'Рядок 1: MATCH (p:Person) знаходить усі вузли Person. На них мають бути виконані агрегування.\nРядок 2: count(p) підраховує загальну кількість вузлів (як COUNT(*) у SQL), а avg(p.age) обчислює середнє значення властивості age в усіх вузлах (як AVG(age) у SQL). Ці функції оптимізовані для роботи з вузлами графу.',
            ex4Task: 'Вашій команді управління запасами потрібна швидка статистика. Підрахуйте кількість продуктів у системі та обчисліть середню ціну для планування бюджету.',
            ex4Hint: 'Використовуйте MATCH для вузлів Product та count(), avg() для агрегувань.',
            ex4Solution: 'MATCH (prod:Product)\nRETURN count(prod) as total_products, avg(prod.price) as avg_price',
            ex4Verify: 'Ви повинні побачити загальну кількість та середню ціну.',
            ex5Title: 'Вправа 5: Дослідження графу MegaStore',
            ex5Time: '~15 хвилин',
            ex5Goal: 'Працюйте з реалістичним графом електронної комерції з багатострибковими взаємозв\'язками (Клієнт → Замовлення → Продукт). Це демонструє потужність графів: багатошарові запити без складних SQL JOIN.',
            ex5Show: 'MATCH (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product)\nWHERE c.country = \'DE\'\nRETURN c.name, o.order_total, prod.name\nLIMIT 10',
            ex5Output: 'Alice | 1500 | Laptop\nAlice | 299 | Monitor\nBob | 750 | Keyboard',
            ex5Explain: 'Рядок 1: MATCH визначає багатострибковий шаблон: (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product). Це описує шлях через 3 вузли з двома взаємозв\'язками — у SQL це вимагало б двох JOIN.\nРядок 2: WHERE фільтрує за значенням властивості country=\'DE\', як у SQL.\nРядок 3: RETURN відображає стовпці з різних вузлів у шляху (c, o, prod).\nРядок 4: LIMIT 10 обмежує кількість рядків результату, як у SQL.',
            ex5Task: 'Ваш відділ аналізу продажів хоче виявити найцінніших клієнтів. Знайдіть найдорожчі замовлення та повертайте ім\'я клієнта та суму. Відсортуйте за сумою в спадаючому порядку, щоб виявити високовартісних клієнтів.',
            ex5Hint: 'Використовуйте ORDER BY o.order_total DESC. Використовуйте LIMIT 5 для перегляду топ-5.',
            ex5Solution: 'MATCH (c:Customer)-[p:PLACED]->(o:Order)\nRETURN c.name, o.order_total\nORDER BY o.order_total DESC\nLIMIT 5',
            ex5Verify: 'Ви повинні побачити 5 найдорожчих замовлень з ім\'ям клієнта та сумою.',
            ex6Title: 'Вправа 6: Створення рекомендацій',
            ex6Time: '~15 хвилин',
            ex6Goal: 'Використовуйте графічні паттерни для логіки рекомендацій через колаборативну фільтрацію. Це класичний випадок використання графічної бази даних, де відношення між подібними покупцями керують рекомендаціями — щось, що значно складніше в SQL.',
            ex6Show: 'MATCH (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer)\nWHERE c.name = \'Alice\' AND other.name <> \'Alice\'\nRETURN distinct other.name, count(p) as common_products\nORDER BY common_products DESC',
            ex6Output: 'Bob | 2\nCharlie | 1',
            ex6Explain: 'Рядок 1: MATCH визначає ромбоподібний паттерн: (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer). Знаходить усіх покупців, які придбали продукти, куплені також Алісою — класичний паттерн колаборативної фільтрації.\nРядок 2: WHERE c.name=\'Alice\' та other.name<>\'Alice\' фільтрує Алісу та виключає самовідносини.\nРядок 3: RETURN та count(p) обчислює спільні продукти — міру схожості.\nРядок 4: ORDER BY впорядковує за схожістю, щоб визначити гідних рекомендацій покупців.',
            ex6Task: 'Знайдіть усіх покупців, які придбали той самий продукт, що й Аліса. У SQL вам потрібні множинні JOIN операції — у Neo4j ви вирішуєте це єдиним паттерном. Це сила графічних баз даних.',
            ex6Hint: 'Паттерн: (alice)-[:PURCHASED]->(product)<-[:PURCHASED]-(other_customer). Прочитайте паттерн зліва направо: Аліса купила продукт, який також купив інший покупець.',
            ex6Solution: 'MATCH (c:Customer {name: \'Alice\'})-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(similar:Customer)\nWHERE similar.name <> c.name\nRETURN similar.name, count(p) as shared_products\nORDER BY shared_products DESC',
            ex6Verify: 'Ви повинні побачити покупців, які купили подібні продукти.',

            ex1Task: 'Tu sistema de comercio electrónico necesita datos de clientes. Crea un nodo Customer para \'Bob\' (email: bob@example.com) y un nodo Order (order_id: 101, total: 1500). Luego consulta todos los nodos para verificar que ambos se guardaron.',

            ex1Solution: 'CREATE (c:Customer {name: \'Bob\', email: \'bob@example.com\'})\nCREATE (o:Order {order_id: 101, total: 1500})\nMATCH (n) RETURN n',
            ex1Verify: 'Deberías ver dos nodos nuevos: uno con etiqueta Customer y otro con etiqueta Order.',
            nextExercise: '← Siguiente ejercicio',
            ex2Title: 'Ejercicio 2: Crear relaciones',
            ex2Time: '~15 minutos',
            ex2Goal: 'Conecta nodos a través de relaciones con dirección y tipo. Este es un concepto fundamental en bases de datos de grafos: mientras que SQL conecta datos tabulares con sentencias WHERE, Neo4j define rutas explícitas entre nodos.',
            ex2Show: 'MATCH (p:Person {name: \'Alice\'}), (pr:Product {name: \'Laptop\'})\nCREATE (p)-[r:PURCHASED {date: \'2024-01-15\'}]->(pr)\nRETURN r',
            ex2Output: 'Se creó una relación:\n(Alice)-[PURCHASED {date: \'2024-01-15\'}]->(Laptop)',
            ex2Explain: 'Líneas 1-2: MATCH encuentra dos nodos existentes (Alice y Laptop). Esto es similar a una sentencia WHERE en SQL, pero es más intuitivo para grafos.\nLínea 3: CREATE crea una relación dirigida \'-[r:PURCHASED]->\' con propiedades como date. La dirección \'→\' es crucial: señala del comprador al producto.\nLínea 4: RETURN devuelve la relación y confirma que la conexión se creó.',
            ex2Task: 'Tu modelo de datos geográfico necesita relaciones de ubicación. Crea una relación LIVES_IN desde un nodo Person a un nodo City. Esto representa una relación uno-a-muchos como en SQL, pero sin operaciones JOIN costosas.',
            ex2Hint: 'El patrón es: (node1)-[TYPE]->(node2). Usa dos comandos MATCH o crea primero los nodos.',
            ex2Solution: 'CREATE (p:Person {name: \'Charlie\'})\nCREATE (c:City {name: \'Berlin\'})\nMATCH (per:Person {name: \'Charlie\'}), (city:City {name: \'Berlin\'})\nCREATE (per)-[r:LIVES_IN]->(city)\nRETURN r',
            ex2Verify: 'Deberías ver una relación LIVES_IN que conecta un nodo Person con un nodo City.',
            ex3Title: 'Ejercicio 3: Consultar los datos',
            ex3Time: '~15 minutos',
            ex3Goal: 'Utiliza la coincidencia de patrones con cláusulas WHERE para filtrar nodos. Este concepto es similar a WHERE en SQL, pero funciona con patrones de gráficos en lugar de columnas de tablas.',

            ex3Output: 'Alice, 30\nCharlie, 28',
            ex3Explain: 'Línea 1: MATCH (p:Person) encuentra todos los nodos etiquetados como Person y los almacena en la variable \'p\'. En SQL, esto sería SELECT con WHERE en una tabla Person.\nLínea 2: WHERE filtra según los valores de las propiedades, exactamente como en SQL. Este es un filtrado estándar.\nLínea 3: RETURN muestra solo las columnas (propiedades) name y age, similar al comando SELECT p.name, p.age en SQL.',
            ex3Task: 'Tu plataforma de comercio electrónico necesita un filtro de presupuesto. Busca todos los productos con un precio inferior a 500 para obtener el descuento del cliente. Devuelve el nombre y el precio para mostrar los artículos económicos disponibles.',
            ex3Hint: 'Utiliza WHERE price < 500. Presta atención al nombre correcto de la propiedad (price).',
            ex3Solution: 'MATCH (prod:Product)\nWHERE prod.price < 500\nRETURN prod.name, prod.price',
            ex3Verify: 'Deberías ver todos los productos con un precio inferior a 500.',
            ex4Title: 'Ejercicio 4: Agrupación y Ordenamiento',
            ex4Time: '~15 minutos',
            ex4Goal: 'Agrupa y suma datos utilizando Cypher. Las funciones de agregación como count() y avg() son fundamentales para el análisis de datos y funcionan en Neo4j exactamente como GROUP BY en SQL.',
            ex4Show: 'MATCH (p:Person)\nRETURN count(p) as total_persons, avg(p.age) as avg_age',
            ex4Output: 'total_persons: 3\navg_age: 29.33',
            ex4Explain: 'Línea 1: MATCH (p:Person) encuentra todos los nodos Person. Las agregaciones deben realizarse sobre ellos.\nLínea 2: count(p) cuenta el número total de nodos (como COUNT(*) en SQL), y avg(p.age) calcula el promedio de la propiedad age en todos los nodos (como AVG(age) en SQL). Estas funciones están optimizadas para funcionar con nodos de gráficos.',
            ex4Task: 'Tu equipo de gestión de inventario necesita estadísticas rápidas. Calcula el número de productos en el sistema y el precio promedio para planificar el presupuesto.',
            ex4Hint: 'Utiliza MATCH para nodos Product y count(), avg() para las agregaciones.',
            ex4Solution: 'MATCH (prod:Product)\nRETURN count(prod) as total_products, avg(prod.price) as avg_price',
            ex4Verify: 'Deberías ver el recuento total y el precio promedio.',
            ex5Title: 'Ejercicio 5: Explorar un Gráfico MegaStore',
            ex5Time: '~15 minutos',
            ex5Goal: 'Trabaja con un gráfico de comercio electrónico realista que contiene relaciones de múltiples saltos (Cliente → Pedido → Producto). Esto demuestra el poder de los gráficos: consultas de múltiples capas sin complejas operaciones SQL JOIN.',
            ex5Show: 'MATCH (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product)\nWHERE c.country = \'DE\'\nRETURN c.name, o.order_total, prod.name\nLIMIT 10',
            ex5Output: 'Alice | 1500 | Laptop\nAlice | 299 | Monitor\nBob | 750 | Keyboard',
            ex5Explain: 'Línea 1: MATCH define un patrón de múltiples saltos: (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product). Esto describe una ruta a través de 3 nodos con 2 relaciones - en SQL esto requeriría dos JOINs.\nLínea 2: WHERE filtra según el valor de la propiedad country=\'DE\', como en SQL.\nLínea 3: RETURN muestra columnas de diferentes nodos en la ruta (c, o, prod).\nLínea 4: LIMIT 10 restringe el número de filas de resultado, como en SQL.',
            ex5Task: 'Tu departamento de análisis de ventas quiere identificar los mejores clientes. Busca los pedidos más caros y devuelve el nombre del cliente y el total. Ordena por total en orden descendente para identificar clientes de alto valor.',
            ex5Hint: 'Utiliza ORDER BY o.order_total DESC. Utiliza LIMIT 5 para ver los mejores 5.',
            ex5Solution: 'MATCH (c:Customer)-[p:PLACED]->(o:Order)\nRETURN c.name, o.order_total\nORDER BY o.order_total DESC\nLIMIT 5',
            ex5Verify: 'Deberías ver los 5 pedidos más caros con el nombre del cliente y el total.',
            ex6Title: 'Ejercicio 6: Crear Recomendaciones',
            ex6Time: '~15 minutos',
            ex6Goal: 'Utiliza patrones de gráficos para lógica de recomendaciones mediante filtrado colaborativo. Este es un caso de uso de gráficos clásico donde las relaciones entre clientes similares impulsan recomendaciones - algo que es muy difícil en SQL.',
            ex6Show: 'MATCH (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer)\nWHERE c.name = \'Alice\' AND other.name <> \'Alice\'\nRETURN distinct other.name, count(p) as common_products\nORDER BY common_products DESC',
            ex6Output: 'Bob | 2\nCharlie | 1',
            ex6Explain: 'Línea 1: MATCH especifica el patrón de diamante: (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer). Encuentra todos los clientes que compraron productos que Alice también compró - un patrón de filtrado colaborativo clásico.\nLínea 2: WHERE c.name=\'Alice\' y other.name<>\'Alice\' filtra por Alice y excluye autorreferencias.\nLínea 3: RETURN y count(p) calcula productos compartidos - una medida de similitud.\nLínea 4: ORDER BY ordena por similitud para identificar clientes dignos de recomendación.',
            ex6Task: 'Encuentra todos los clientes que compraron el mismo producto que Alice. En SQL necesitarías múltiples operaciones JOIN - en Neo4j resuelves esto con un patrón único. Esta es la potencia de las bases de datos de gráficos.',
            ex6Hint: 'El patrón: (alice)-[:PURCHASED]->(product)<-[:PURCHASED]-(other_customer). Lee el patrón de izquierda a derecha: Alice compró un producto que otro cliente también compró.',
            ex6Solution: 'MATCH (c:Customer {name: \'Alice\'})-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(similar:Customer)\nWHERE similar.name <> c.name\nRETURN similar.name, count(p) as shared_products\nORDER BY shared_products DESC',
            ex6Verify: 'Deberías ver clientes que compraron productos similares.',

            nodesDesc: 'Düğümler grafikteki varlıklardır, SQL tablolarındaki kayıtlara benzerler ancak daha esnektirler. Her düğümün bir etiketi (sınıfı) ve özellikleri (Properties) vardır. \'Person\' etiketi ve name=\'Alice\' özelliğine sahip düğüm, daha sonra başvuru yapabileceğiniz ve arayabileceğiniz belirli bir varlıktır.',

            ex1Title: 'Egzersiz 1: İlk Düğümleri Oluşturma',
            ex1Time: '~15 dakika',
            ex1Goal: 'Farklı düğüm türleri oluşturun (Person ve Product gibi etiketler) ve bunları keşfedin. Bu, bir grafik ağı oluşturmanın ilk adımıdır; SQL\'de tablo oluşturmaya benzer.',

            ex1Output: 'İki düğüm oluşturuldu:\n(p1:Person {name: \'Alice\', age: 30})\n(p2:Product {name: \'Laptop\', price: 999})',
            ex1Explain: 'Satır 1: CREATE komutu bir Person düğümü (:Person etiketi) oluşturur ve name ve age özellikleri içerir. SQL\'deki INSERT\'e benzer, ancak nesneyi bir satır olarak depolamak yerine bir düğüm olarak depolar.\nSatır 2: CREATE, name ve price özellikleriyle bir Product düğümü oluşturur.\nSatır 3: MATCH, herhangi bir etiketle tüm düğümleri (n) bulur ve döndürür - bu, SQL\'deki SELECT * benzeri bir grafik sorgusudur.',
            ex1Task: 'E-ticaret sisteminizin müşteri verilerine ihtiyacı vardır. \'Bob\' için bir Customer düğümü (email: bob@example.com) ve bir Order düğümü (order_id: 101, total: 1500) oluşturun. Ardından her ikisinin de kaydedilip kaydedilmediğini doğrulamak için tüm düğümleri sorgulayın.',

            ex1Solution: 'CREATE (c:Customer {name: \'Bob\', email: \'bob@example.com\'})\nCREATE (o:Order {order_id: 101, total: 1500})\nMATCH (n) RETURN n',
            ex1Verify: 'İki yeni düğüm görmelisiniz: biri Customer etiketi, biri Order etiketi.',
            nextExercise: '← Sonraki Egzersiz',
            ex2Title: 'Egzersiz 2: İlişkiler Oluşturma',
            ex2Time: '~15 dakika',
            ex2Goal: 'Düğümleri yönelik ve türe sahip ilişkilerle bağlayın. Bu, grafik veritabanlarında temel bir kavramdır: SQL tablosal verileri WHERE cümleleriyle bağlarken, Neo4j düğümler arasında açık yolları tanımlar.',
            ex2Show: 'MATCH (p:Person {name: \'Alice\'}), (pr:Product {name: \'Laptop\'})\nCREATE (p)-[r:PURCHASED {date: \'2024-01-15\'}]->(pr)\nRETURN r',
            ex2Output: 'Bir ilişki oluşturuldu:\n(Alice)-[PURCHASED {date: \'2024-01-15\'}]->(Laptop)',
            ex2Explain: 'Satırlar 1-2: MATCH, varolan iki düğümü bulur (Alice ve Laptop). Bu, SQL\'deki bir WHERE cümlesine benzer, ancak grafikler için daha sezgiseldir.\nSatır 3: CREATE, yönelik bir ilişki (\'-[r:PURCHASED]->\') oluşturur ve date gibi özellikler ekler. Yön \'→\' kritiktir: alıcıdan ürüne işaret eder.\nSatır 4: RETURN, ilişkiyi döndürür ve bağlantının oluşturulduğunu doğrular.',
            ex2Task: 'Coğrafi veri modelinizin konum ilişkilerine ihtiyacı vardır. Bir Person düğümünden City düğümüne bir LIVES_IN ilişkisi oluşturun. Bu, SQL\'deki pahalı JOIN işlemleri olmadan bire-çok ilişkisini temsil eder.',
            ex2Hint: 'Desen: (node1)-[TYPE]->(node2). MATCH komutlarını kullanın veya önce düğümleri oluşturun.',
            ex2Solution: 'CREATE (p:Person {name: \'Charlie\'})\nCREATE (c:City {name: \'Berlin\'})\nMATCH (per:Person {name: \'Charlie\'}), (city:City {name: \'Berlin\'})\nCREATE (per)-[r:LIVES_IN]->(city)\nRETURN r',
            ex2Verify: 'Bir Person düğümünü City düğümüne bağlayan bir LIVES_IN ilişkisi görmelisiniz.',
            ex3Title: 'Egzersiz 3: Verileri Sorgulama',
            ex3Time: '~15 dakika',
            ex3Goal: 'Örüntü eşleştirmesini WHERE yan tümceleriyle birlikte kullanarak düğümleri filtreleyiniz. Bu kavram SQL\'deki WHERE\'ye benzer, ancak tablo sütunları yerine grafik örüntüleriyle çalışır.',
            ex3Show: 'MATCH (p:Person)\nWHERE p.age > 25\nRETURN p.name, p.age',
            ex3Output: 'Alice, 30\nCharlie, 28',
            ex3Explain: 'Satır 1: MATCH (p:Person), Person etiketine sahip tüm düğümleri bulur ve bunları \'p\' değişkeninde depolar. SQL\'de bu, Person tablosunda WHERE ile SELECT olacaktır.\nSatır 2: WHERE, SQL\'deki gibi özellik değerlerine göre filtreleme yapar. Bu standart bir filtrelemedir.\nSatır 3: RETURN, yalnızca name ve age sütunlarını (özellikleri) görüntüler; SQL\'deki SELECT p.name, p.age komutuna benzer.',
            ex3Task: 'E-ticaret platformunuz için bütçe filtresi gerekir. 500\'den düşük fiyata sahip tüm ürünleri arayarak müşteri indirimi elde ediniz. Mevcut ucuz öğeleri görüntülemek için adı ve fiyatı döndürünüz.',
            ex3Hint: 'WHERE price < 500 kullanınız. Doğru özellik adına (price) dikkat ediniz.',
            ex3Solution: 'MATCH (prod:Product)\nWHERE prod.price < 500\nRETURN prod.name, prod.price',
            ex3Verify: 'Fiyatı 500\'den düşük olan tüm ürünleri görmelisiniz.',
            ex4Title: 'Alıştırma 4: Gruplama ve Sıralama',
            ex4Time: '~15 dakika',
            ex4Goal: 'Cypher kullanarak verileri gruplayınız ve toplayınız. count() ve avg() gibi toplama işlevleri veri analizi için merkezi öneme sahiptir ve Neo4j\'de SQL\'deki GROUP BY gibi çalışır.',
            ex4Show: 'MATCH (p:Person)\nRETURN count(p) as total_persons, avg(p.age) as avg_age',
            ex4Output: 'total_persons: 3\navg_age: 29.33',
            ex4Explain: 'Satır 1: MATCH (p:Person), tüm Person düğümlerini bulur. Bunlar üzerinde toplamalar yapılmalıdır.\nSatır 2: count(p), düğümlerin toplam sayısını hesaplar (SQL\'deki COUNT(*) gibi) ve avg(p.age), tüm düğümler arasında age özelliğinin ortalamasını hesaplar (SQL\'deki AVG(age) gibi). Bu işlevler grafik düğümleriyle çalışmak için optimize edilmiştir.',
            ex4Task: 'Envanter yönetimi ekibiniz hızlı istatistikler gerektirmektedir. Sistemdeki ürün sayısını hesaplayınız ve bütçe planlaması için ortalama fiyatı belirleyiniz.',
            ex4Hint: 'Product düğümleri için MATCH ve toplamalar için count(), avg() kullanınız.',
            ex4Solution: 'MATCH (prod:Product)\nRETURN count(prod) as total_products, avg(prod.price) as avg_price',
            ex4Verify: 'Toplam sayı ve ortalama fiyatı görmelisiniz.',
            ex5Title: 'Alıştırma 5: MegaStore Grafiğini Keşfetme',
            ex5Time: '~15 dakika',
            ex5Goal: 'Çok atlamalı ilişkiler içeren gerçekçi bir e-ticaret grafiğiyle çalışınız (Müşteri → Sipariş → Ürün). Bu, grafiklerin gücünü gösterir: karmaşık SQL JOIN işlemleri olmadan çok katmanlı sorgular.',
            ex5Show: 'MATCH (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product)\nWHERE c.country = \'DE\'\nRETURN c.name, o.order_total, prod.name\nLIMIT 10',
            ex5Output: 'Alice | 1500 | Laptop\nAlice | 299 | Monitor\nBob | 750 | Keyboard',
            ex5Explain: 'Satır 1: MATCH, çok atlamalı bir örüntü tanımlar: (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product). Bu, iki ilişkiye sahip 3 düğüm arasında bir yolu tanımlar - SQL\'de bu iki JOIN gerektirirdi.\nSatır 2: WHERE, SQL\'deki gibi country=\'DE\' özellik değerine göre filtreleme yapar.\nSatır 3: RETURN, yoldaki farklı düğümlerden (c, o, prod) sütunları görüntüler.\nSatır 4: LIMIT 10, SQL\'deki gibi sonuç satırlarının sayısını sınırlar.',
            ex5Task: 'Satış analiz departmanınız en iyi müşterileri belirlemek istemektedir. En pahalı siparişleri arayınız ve müşteri adını ve toplamı döndürünüz. Yüksek değerli müşterileri tanımlamak için toplamı azalan sıraya göre sıralayınız.',
            ex5Hint: 'ORDER BY o.order_total DESC kullanınız. En iyi 5\'i görmek için LIMIT 5 kullanınız.',
            ex5Solution: 'MATCH (c:Customer)-[p:PLACED]->(o:Order)\nRETURN c.name, o.order_total\nORDER BY o.order_total DESC\nLIMIT 5',
            ex5Verify: 'En pahalı 5 siparişi müşteri adı ve toplam ile görmelisiniz.',
            ex6Title: 'Alıştırma 6: Öneriler Oluşturma',
            ex6Time: '~15 dakika',
            ex6Goal: 'Grafik desenlerini işbirlikçi filtreleme aracılığıyla tavsiye mantığı için kullanın. Bu, benzer müşteriler arasındaki ilişkilerin tavsiyeler sunduğu klasik bir grafik kullanım durumudur - SQL\'de gerçekleştirmesi çok zordur.',
            ex6Show: 'MATCH (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer)\nWHERE c.name = \'Alice\' AND other.name <> \'Alice\'\nRETURN distinct other.name, count(p) as common_products\nORDER BY common_products DESC',
            ex6Output: 'Bob | 2\nCharlie | 1',
            ex6Explain: 'Satır 1: MATCH, elmas desenini belirler: (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer). Alice\'in de satın aldığı ürünleri satın alan tüm müşterileri bulur - klasik işbirlikçi filtreleme deseni.\nSatır 2: WHERE c.name=\'Alice\' ve other.name<>\'Alice\', Alice\'i filtreler ve öz referansları dışlar.\nSatır 3: RETURN ve count(p), paylaşılan ürünleri sayar - benzerlik metriği.\nSatır 4: ORDER BY, tavsiye etmeye değer müşterileri belirlemek için benzerliğe göre sıralar.',
            ex6Task: 'Alice ile aynı ürünü satın alan tüm müşterileri bulun. SQL\'de birden fazla JOIN işlemine ihtiyacınız olur - Neo4j\'de bunu tek bir desenle çözersiniz. Bu, grafik veritabanlarının gücüdür.',
            ex6Hint: 'Desen: (alice)-[:PURCHASED]->(product)<-[:PURCHASED]-(other_customer). Deseni soldan sağa okuyun: Alice bir ürün satın aldı ve başka bir müşteri de bu ürünü satın aldı.',
            ex6Solution: 'MATCH (c:Customer {name: \'Alice\'})-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(similar:Customer)\nWHERE similar.name <> c.name\nRETURN similar.name, count(p) as shared_products\nORDER BY shared_products DESC',
            ex6Verify: 'Benzer ürünler satın alan müşterileri görmelisiniz.',

            correct: 'Doğru!',
            incorrect: 'Yanlış',
            outlookAdvanced: 'İleri Konular',
            outlookGDS: 'Grafik Veri Bilimi Kütüphanesi - Ağ analizi algoritmaları',
            outlookCommunity: 'Topluluk Tespit Etme - Grafikteki grupları keşfetme',
            outlookPageRank: 'PageRank - Düğümlerin önemini değerlendirme',
            outlookShortestPath: 'En Kısa Yol - Verimli yolu bulma',
            outlookAI: 'Yapay Zeka Entegrasyonu',
            outlookAIDesc: 'Neo4j, büyük dil modelleri (LLM\'ler) ile aşağıdaki amaçlar için entegre edilebilir:',
            outlookExample1: 'Örnek 1: Claude ile daha iyi öneriler için grafik bağlamı',
            outlookExample2: 'Örnek 2: Dil modeli tarafından örüntü analizi ve sınıflandırması aracılığıyla anomali tespiti',
            outlookExample3: 'Örnek 3: Claude Code ve MCP aracılığıyla doğal dil grafik sorguları',
            troubleshootTitle: 'Yaygın Sorunlar',
            troubleshoot1Title: 'Neo4j başlatma hatası',
            troubleshoot1: 'Docker\'ın çalışır durumda olduğunu kontrol edin. Deneyin: docker restart neo4j-lab. Port çakışmalarını kontrol edin.',
            troubleshoot2Title: 'Tarayıcı bağlantı kuramıyor',
            troubleshoot2: 'http://localhost:7474 adresinin erişilebilir olduğundan emin olun. Portları kontrol edin: docker ps',
            troubleshoot3Title: 'Kimlik doğrulama hatası',
            troubleshoot3: 'Varsayılan kimlik bilgileri: neo4j / password123. İlk oturum açmada parolayı değiştirmeniz gerekir.',
            troubleshoot4Title: 'Cypher söz dizimi hatası',
            troubleshoot4: 'Tarayıcıda söz dizimi vurgulaması ile kod düzenleyicisini kullanın. Etiketlerde harf büyüklüğüne dikkat edin.',
            troubleshoot5Title: 'Docker belleği yetersiz',
            troubleshoot5: 'Docker bellek ayırmasını artırın. Docker Desktop\'ı çalıştırın ve ayarlardan belleği artırın.'
        },
        };

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function App() {
            const [language, setLanguage] = useState('de');
            const [activeSection, setActiveSection] = useState('overview');
            const [expandedItems, setExpandedItems] = useState({});
            const [quizAnswers, setQuizAnswers] = useState({});

            const t = new Proxy(translations[language], {
                get: (target, prop) => target[prop] !== undefined ? target[prop] : translations['de'][prop]
            });

            const toggleExpanded = (id) => {
                setExpandedItems(prev => ({
                    ...prev,
                    [id]: !prev[id]
                }));
            };

            const answerQuiz = (qNum, isCorrect) => {
                setQuizAnswers(prev => ({
                    ...prev,
                    [qNum]: isCorrect
                }));
            };

            const menuItems = [
                { id: 'overview', label: t.overview },
                { id: 'setup', label: t.setup },
                { id: 'fundamentals', label: t.fundamentals },
                { id: 'exercise1', label: t.exercise1 },
                { id: 'exercise2', label: t.exercise2 },
                { id: 'exercise3', label: t.exercise3 },
                { id: 'exercise4', label: t.exercise4 },
                { id: 'exercise5', label: t.exercise5 },
                { id: 'exercise6', label: t.exercise6 },
                { id: 'exercise7', label: t.exercise7 },
                { id: 'exercise8', label: t.exercise8 },
                { id: 'exercise9', label: t.exercise9 },
                { id: 'exercise10', label: t.exercise10 },
                { id: 'exercise11', label: t.exercise11 },
                { id: 'exercise12', label: t.exercise12 },
                { id: 'challenge', label: t.challenge },
                { id: 'quiz', label: t.quiz },
                { id: 'outlook', label: t.outlook },
                { id: 'troubleshooting', label: t.troubleshooting },
            ];

            const StepItem = ({ number, children }) => (
                <div className="step-item">
                    <div className="step-number">{number}</div>
                    <div className="step-item-content">{children}</div>
                </div>
            );

            const renderCodeBlock = (code, label) => (
                <div className="code-block">
                    <button className="copy-btn" onClick={() => copyToClipboard(code)}>
                        {t.copy}
                    </button>
                    <code>{code}</code>
                </div>
            );

            const renderExercise = (num, title, time, goal, showCode, output, explain, task, hint, solution, verify) => (
                <div className="section" style={{display: activeSection === `exercise${num}` ? 'block' : 'none'}}>
                    <h2 className="section-header">{title}</h2>
                    <div className="card">
                        <span className="badge badge-beginner">{t.exerciseTitle} {num}</span>
                        <span className="badge badge-time">{time}</span>
                        <p><strong>{t.ex1Goal}:</strong> {goal}</p>
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">{t.exampleTitle} (Show)</h3>
                        {renderCodeBlock(showCode, `Example ${num}`)}
                        <div className="output-box">{output}</div>
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">{t.explainTitle} (Explain)</h3>
                        <p>{explain}</p>
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">{t.yourTask}</h3>
                        <p>{task}</p>
                    </div>

                    <div className="hint-box">
                        <div className="hint-title">Hinweis:</div>
                        <p>{hint}</p>
                    </div>

                    <div className="expandable" onClick={() => toggleExpanded(`ex${num}sol`)} style={{cursor: 'pointer'}}>
                        <div className="expandable-header">
                            {t.solution}
                            <span className="expandable-chevron">▼</span>
                        </div>
                        {expandedItems[`ex${num}sol`] && (
                            <div className="expandable-content">
                                {renderCodeBlock(solution, `Solution ${num}`)}
                            </div>
                        )}
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">{t.verifyTitle} (Verify)</h3>
                        <p>{verify}</p>
                    </div>

                    <div className="next-button">
                        <button className="btn-accent" onClick={() => setActiveSection(`exercise${num === 12 ? 'challenge' : num + 1}`)}>
                            {t.nextExercise}
                        </button>
                    </div>
                </div>
            );

            return (
                <div>
                    <header className="header">
                        <div style={{display: 'flex', alignItems: 'center', gap: '1rem'}}>
                            <a href="index.html" style={{color: 'white', textDecoration: 'none', fontSize: '0.9rem', opacity: 0.8, whiteSpace: 'nowrap'}}>{t.backToHome}</a>
                            <h1>{t.welcome}</h1>
                        </div>
                        <div className="lang-switcher">
                            {['de', 'en', 'ar', 'uk', 'es', 'tr'].map(lang => (
                                <button
                                    key={lang}
                                    className={`lang-btn ${language === lang ? 'active' : ''}`}
                                    onClick={() => setLanguage(lang)}
                                >
                                    {lang.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    </header>

                    <aside className="sidebar">
                        {menuItems.map(item => (
                            <button
                                key={item.id}
                                className={`sidebar-item ${activeSection === item.id ? 'active' : ''}`}
                                onClick={() => setActiveSection(item.id)}
                            >
                                {item.label}
                            </button>
                        ))}
                    </aside>

                    <main className="main-content">
                        {/* OVERVIEW */}
                        <div className="section" style={{display: activeSection === 'overview' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.overview}</h2>

                            <div className="lesson-box">
                                <h3 className="subsection-header">{t.whatYouLearn}</h3>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="✓">{t.whatYouLearn1}</StepItem>
                                    <StepItem number="✓">{t.whatYouLearn2}</StepItem>
                                    <StepItem number="✓">{t.whatYouLearn3}</StepItem>
                                    <StepItem number="✓">{t.whatYouLearn4}</StepItem>
                                    <StepItem number="✓">{t.whatYouLearn5}</StepItem>
                                </div>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.neo4jIs}</h3>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="✓">{t.graphDatabase}</StepItem>
                                    <StepItem number="✓">{t.cypherLanguage}</StepItem>
                                    <StepItem number="✓">{t.acidCompliant}</StepItem>
                                </div>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.whyNeo4j}</h3>
                                <p>{t.realWorldMotivation}</p>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="1"><strong>NASA:</strong> {t.nasaDesc}</StepItem>
                                    <StepItem number="2"><strong>Walmart:</strong> {t.walmartDesc}</StepItem>
                                    <StepItem number="3"><strong>eBay:</strong> {t.ebayDesc}</StepItem>
                                </div>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.estimatedTime}</h3>
                                <p>{t.timeValue}</p>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.prerequisites}</h3>
                                <p>{t.prereqValue}</p>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.megastoreScenarioTitle}</h3>
                                <p>In diesem Labor arbeiten Sie mit einem E-Commerce-Datensatz namens MegaStore:</p>
                                <div className="table-responsive">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Tabelle</th>
                                                <th>Spalten</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td>customers</td>
                                                <td>customer_id, name, email, city, country, registration_date</td>
                                            </tr>
                                            <tr>
                                                <td>products</td>
                                                <td>product_id, name, category, unit_price, stock_quantity</td>
                                            </tr>
                                            <tr>
                                                <td>orders</td>
                                                <td>order_id, customer_id, order_date, order_total, status</td>
                                            </tr>
                                            <tr>
                                                <td>order_items</td>
                                                <td>order_item_id, order_id, product_id, quantity, unit_price</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* SETUP */}
                        <div className="section" style={{display: activeSection === 'setup' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.setup}</h2>
                            <p>{t.setupSteps}</p>

                            <StepItem number="1">
                                <strong>{t.step1}</strong>
                                <p style={{margin: '0.4rem 0'}}>{t.step1Desc}</p>
                                {renderCodeBlock(t.step1Cmd, 'Setup Step 1')}
                            </StepItem>

                            <StepItem number="2">
                                <strong>{t.step2}</strong>
                                <p style={{margin: '0.4rem 0'}}>{t.step2Desc}</p>
                                {renderCodeBlock(t.step2Cmd, 'Setup Step 2')}
                            </StepItem>

                            <StepItem number="3">
                                <strong>{t.step3}</strong>
                                <p style={{margin: '0.4rem 0'}}>{t.step3Desc}</p>
                                {renderCodeBlock(t.step3Cmd, 'Setup Step 3')}
                            </StepItem>

                            <StepItem number="4">
                                <strong>{t.step4}</strong>
                                <p style={{margin: '0.4rem 0'}}>{t.step4Desc}</p>
                                {renderCodeBlock(t.step4Cmd, 'Setup Step 4')}
                            </StepItem>

                            <div className="lesson-box">
                                <h3 className="subsection-header">{t.verifySetup}</h3>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="✓">{t.verifyStep1}</StepItem>
                                    <StepItem number="✓">{t.verifyStep2}</StepItem>
                                    <StepItem number="✓">{t.verifyStep3}</StepItem>
                                </div>
                            </div>
                        </div>

                        {/* FUNDAMENTALS */}
                        <div className="section" style={{display: activeSection === 'fundamentals' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.fundamentals}</h2>

                            <div className="card">
                                <h3 className="subsection-header">{t.nodesLabel}</h3>
                                <p>{t.nodesDesc}</p>
                                {renderCodeBlock(t.nodesCode, 'Nodes Example')}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.relationshipsLabel}</h3>
                                <p>{t.relationshipsDesc}</p>
                                {renderCodeBlock(t.relationshipsCode, 'Relationships Example')}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.cypherLabel}</h3>
                                <p>{t.cypherDesc}</p>
                                {renderCodeBlock(t.cypherCode, 'Cypher Example')}
                            </div>
                        </div>

                        {/* EXERCISES */}
                        {renderExercise(1, t.ex1Title, t.ex1Time, t.ex1Goal, t.ex1Show, t.ex1Output, t.ex1Explain, t.ex1Task, t.ex1Hint, t.ex1Solution, t.ex1Verify)}
                        {renderExercise(2, t.ex2Title, t.ex2Time, t.ex2Goal, t.ex2Show, t.ex2Output, t.ex2Explain, t.ex2Task, t.ex2Hint, t.ex2Solution, t.ex2Verify)}
                        {renderExercise(3, t.ex3Title, t.ex3Time, t.ex3Goal, t.ex3Show, t.ex3Output, t.ex3Explain, t.ex3Task, t.ex3Hint, t.ex3Solution, t.ex3Verify)}
                        {renderExercise(4, t.ex4Title, t.ex4Time, t.ex4Goal, t.ex4Show, t.ex4Output, t.ex4Explain, t.ex4Task, t.ex4Hint, t.ex4Solution, t.ex4Verify)}
                        {renderExercise(5, t.ex5Title, t.ex5Time, t.ex5Goal, t.ex5Show, t.ex5Output, t.ex5Explain, t.ex5Task, t.ex5Hint, t.ex5Solution, t.ex5Verify)}
                        {renderExercise(6, t.ex6Title, t.ex6Time, t.ex6Goal, t.ex6Show, t.ex6Output, t.ex6Explain, t.ex6Task, t.ex6Hint, t.ex6Solution, t.ex6Verify)}
                        {renderExercise(7, t.ex7Title, t.ex7Time, t.ex7Goal, t.ex7Show, t.ex7Output, t.ex7Explain, t.ex7Task, t.ex7Hint, t.ex7Solution, t.ex7Verify)}
                        {renderExercise(8, t.ex8Title, t.ex8Time, t.ex8Goal, t.ex8Show, t.ex8Output, t.ex8Explain, t.ex8Task, t.ex8Hint, t.ex8Solution, t.ex8Verify)}
                        {renderExercise(9, t.ex9Title, t.ex9Time, t.ex9Goal, t.ex9Show, t.ex9Output, t.ex9Explain, t.ex9Task, t.ex9Hint, t.ex9Solution, t.ex9Verify)}
                        {renderExercise(10, t.ex10Title, t.ex10Time, t.ex10Goal, t.ex10Show, t.ex10Output, t.ex10Explain, t.ex10Task, t.ex10Hint, t.ex10Solution, t.ex10Verify)}
                        {renderExercise(11, t.ex11Title, t.ex11Time, t.ex11Goal, t.ex11Show, t.ex11Output, t.ex11Explain, t.ex11Task, t.ex11Hint, t.ex11Solution, t.ex11Verify)}
                        {renderExercise(12, t.ex12Title, t.ex12Time, t.ex12Goal, t.ex12Show, t.ex12Output, t.ex12Explain, t.ex12Task, t.ex12Hint, t.ex12Solution, t.ex12Verify)}

                        {/* CHALLENGE */}
                        <div className="section" style={{display: activeSection === 'challenge' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.challengeTitle}</h2>
                            <div className="card">
                                <span className="badge badge-challenge">Challenge</span>
                                <p style={{marginTop: '1rem'}}>{t.challengeDesc}</p>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.challengeSteps}</h3>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="1">{t.challengeStep1}</StepItem>
                                    <StepItem number="2">{t.challengeStep2}</StepItem>
                                    <StepItem number="3">{t.challengeStep3}</StepItem>
                                    <StepItem number="4">{t.challengeStep4}</StepItem>
                                    <StepItem number="5">{t.challengeStep5}</StepItem>
                                </div>
                            </div>

                            <div className="hint-box">
                                <div className="hint-title">Hinweis:</div>
                                <p>{t.challengeHint}</p>
                            </div>

                            <div className="expandable" onClick={() => toggleExpanded('challsol')} style={{cursor: 'pointer'}}>
                                <div className="expandable-header">
                                    {t.solution}
                                    <span className="expandable-chevron">▼</span>
                                </div>
                                {expandedItems['challsol'] && (
                                    <div className="expandable-content">
                                        {renderCodeBlock(t.challengeSolution, 'Challenge Solution')}
                                    </div>
                                )}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.expectedResult}</h3>
                                <p>{t.challengeExpected}</p>
                            </div>

                            <div className="next-button">
                                <button className="btn-accent" onClick={() => setActiveSection('quiz')}>
                                    {t.nextExercise}
                                </button>
                            </div>
                        </div>

                        {/* QUIZ */}
                        <div className="section" style={{display: activeSection === 'quiz' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.quizTitle}</h2>

                            {[1, 2, 3, 4, 5, 6].map(q => (
                                <div key={q} className="quiz-item">
                                    <div className="quiz-item-question">
                                        <span>Frage {q}: {t[`q${q}`]}</span>
                                    </div>
                                    <div className="quiz-options">
                                        {['a', 'b', 'c'].map(opt => {
                                            const isCorrect = t[`q${q}${opt}`] === t[`q${q}ans`];
                                            const answered = quizAnswers[`q${q}${opt}`];
                                            return (
                                                <div
                                                    key={opt}
                                                    className={`quiz-option ${answered ? (isCorrect ? 'correct' : 'incorrect') : ''}`}
                                                    onClick={() => answerQuiz(`q${q}${opt}`, isCorrect)}
                                                    style={{cursor: 'pointer'}}
                                                >
                                                    <strong>{opt})</strong> {t[`q${q}${opt}`]}
                                                    {answered && isCorrect && ` ✓ ${t.correct}`}
                                                    {answered && !isCorrect && ` ✗ ${t.incorrect} ${t[`q${q}ans`]}`}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}

                            <div className="next-button">
                                <button className="btn-accent" onClick={() => setActiveSection('outlook')}>
                                    {t.nextExercise}
                                </button>
                            </div>
                        </div>

                        {/* OUTLOOK */}
                        <div className="section" style={{display: activeSection === 'outlook' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.outlook}</h2>

                            <div className="outlook-section">
                                <div className="outlook-part">
                                    <h3 className="outlook-title">{t.outlookAdvanced}</h3>
                                    <div style={{marginTop: '0.75rem'}}>
                                        <StepItem number="1">{t.outlookGDS}</StepItem>
                                        <StepItem number="2">{t.outlookCommunity}</StepItem>
                                        <StepItem number="3">{t.outlookPageRank}</StepItem>
                                        <StepItem number="4">{t.outlookShortestPath}</StepItem>
                                    </div>
                                </div>

                                <div className="outlook-part">
                                    <h3 className="outlook-title">{t.outlookAI}</h3>
                                    <p>{t.outlookAIDesc}</p>
                                    <div style={{marginTop: '0.75rem'}}>
                                        <StepItem number="1">{t.outlookExample1}</StepItem>
                                        <StepItem number="2">{t.outlookExample2}</StepItem>
                                        <StepItem number="3">{t.outlookExample3}</StepItem>
                                    </div>
                                </div>

                                <div className="outlook-part">
                                    <h3 className="outlook-title">{t.furtherResources}</h3>
                                    <div style={{marginTop: '0.75rem'}}>
                                        <StepItem number="1"><a href="https://neo4j.com/docs/" target="_blank" rel="noopener noreferrer">Neo4j Dokumentation</a></StepItem>
                                        <StepItem number="2"><a href="https://neo4j.com/graphacademy/" target="_blank" rel="noopener noreferrer">Neo4j GraphAcademy</a></StepItem>
                                        <StepItem number="3"><a href="https://community.neo4j.com/" target="_blank" rel="noopener noreferrer">Neo4j Community</a></StepItem>
                                        <StepItem number="4"><a href="https://github.com/neo4j/neo4j" target="_blank" rel="noopener noreferrer">Neo4j GitHub</a></StepItem>
                                    </div>
                                </div>
                            </div>

                            <div className="next-button">
                                <button className="btn-accent" onClick={() => setActiveSection('troubleshooting')}>
                                    {t.nextExercise}
                                </button>
                            </div>
                        </div>

                        {/* TROUBLESHOOTING */}
                        <div className="section" style={{display: activeSection === 'troubleshooting' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.troubleshootTitle}</h2>

                            {[1, 2, 3, 4, 5].map(i => (
                                <div key={i} className="card">
                                    <h3 className="subsection-header">{t[`troubleshoot${i}Title`]}</h3>
                                    <p>{t[`troubleshoot${i}`]}</p>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
