            border: none;
            cursor: pointer;
            font-weight: 600;

        .code-block {
            background: #f5f5f5;

            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 1rem 0;
            position: relative;

        .code-block code { font-size: 0.9rem; line-height: 1.5; font-family: 'Monaco', 'Courier New', monospace; }

            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: #E8792F;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 0.4rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .copy-btn:hover { opacity: 0.9; }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: white;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            padding-top: 5rem;
            z-index: 40;
        }
        .main-content {
            margin-left: 280px;
            padding: 2rem;
            padding-top: 5rem;
            max-width: 900px;
        }
        .sidebar-item {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .sidebar-item:hover { background: #f5f5f5; }

        .numbered-list li { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; line-height: 1.6; }
        .numbered-list li::before { counter-increment: item; content: counter(item); display: inline-flex; align-items: center; justify-content: center; min-width: 32px; height: 32px; background: #E8792F; color: white; border-radius: 50%; font-size: 0.85rem; font-weight: 700; flex-shrink: 0; }
        .check-list { list-style: none; padding: 0; margin: 0; }
        .check-list li { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; line-height: 1.6; }
        .check-list li::before { content: "✓"; display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 28px; background: #E8792F; color: white; border-radius: 50%; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
        .source-link { font-size: 0.75rem; color: #888; margin-left: 0.25rem; text-decoration: none; }
        .source-link:hover { color: #E8792F; text-decoration: underline; }
        .language-switcher { display: flex; gap: 0.5rem; align-items: center; }
        .lang-btn { padding: 0.5rem 0.75rem; border-radius: 0.375rem; border: 2px solid #e5e7eb; background: white; cursor: pointer; font-weight: 600; font-size: 0.875rem; color: #666; transition: all 0.2s; }
        .lang-btn.active { background: #E8792F; color: white; border-color: #E8792F; }
        .lang-btn:hover { border-color: #E8792F; }
        .sidebar-item.active {
            border-left-color: #E8792F;
            background: #fef5f1;
            font-weight: 600;
            color: #E8792F;
        }
        .section { display: none; margin-bottom: 3rem; }
        .section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .quiz-item { border-left: 4px solid #E8792F; padding-left: 1rem; margin: 1rem 0; }
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .badge-beginner { background: #c7f0d8; color: #0b663c; }
        .badge-intermediate { background: #fef08a; color: #7c2d12; }
        .badge-advanced { background: #fed7aa; color: #7c2d12; }
        .badge-boss { background: #fecaca; color: #7f1d1d; }
        .expandable {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .expandable:hover { background: #f3f4f6; }
        .expandable-header { font-weight: 600; color: #E8792F; display: flex; align-items: center; justify-content: space-between; }
        .expandable-content { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e5e7eb; }
        .expandable.expanded .expandable-content { display: block; }
        .expandable-chevron { transition: transform 0.2s; }
        .expandable.expanded .expandable-chevron { transform: rotate(180deg); }
        .output-box {
            background: #1B3A5C;
            color: #00d084;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            margin: 1rem 0;
            border-left: 4px solid #E8792F;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
        }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .back-btn {
            background: none;
            border: none;
            color: #E8792F;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;
        }
        .lang-select {
            padding: 0.5rem 1rem;
            border: 1px solid #E8792F;
            border-radius: 0.4rem;
            background: white;
            color: #1B3A5C;
            cursor: pointer;
            font-weight: 600;
        }
        .comparison-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        .comparison-table th, .comparison-table td {
            padding: 1rem;
            text-align: left;
            border: 1px solid #e0e0e0;
        }
        .comparison-table th {
            background: #fef5f1;
            font-weight: 700;
            color: #E8792F;
        }
        .comparison-table tr:hover { background: #fafbfc; }
        .hint-box {
            background: #fffbeb;
            border-left: 4px solid #E8792F;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        .hint-title { font-weight: 600; color: #E8792F; margin-bottom: 0.5rem; }
        [dir="rtl"] { direction: rtl; text-align: right; }
        [dir="rtl"] .sidebar { left: auto; right: 0; border-right: none; border-left: 1px solid #e0e0e0; }
        [dir="rtl"] .main-content { margin-left: 0; margin-right: 280px; }

            background: #fef5f1;
            border-left: 4px solid #E8792F;
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
