                ex5Explain: "Zeile 1: MATCH definiert ein Multi-Hop-Pattern: (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product). Dies beschreibt einen Pfad durch 3 Knoten mit 2 Beziehungen - in SQL würde dies 2 JOINs erfordern.\nZeile 2: WHERE filtert auf Eigenschaftswert country='DE', wie in SQL.\nZeile 3: RETURN projiziert Spalten aus verschiedenen Knoten im Pfad (c, o, prod).\nZeile 4: LIMIT 10 begrenzt die Anzahl der Ergebniszeilen, wie in SQL.",

                ex5Hint: "Verwenden Sie ORDER BY o.order_total DESC. LIMIT 5 um Top 5 zu sehen.",
                ex5Solution: "MATCH (c:Customer)-[p:PLACED]->(o:Order)\nRETURN c.name, o.order_total\nORDER BY o.order_total DESC\nLIMIT 5",
                ex5Verify: "Sie sollten die 5 teuersten Bestellungen mit Kundenname und Gesamtsumme sehen.",
                ex6Title: "Übung 6: Empfehlungen generieren",
                ex6Time: "~15 Minuten",
                ex6Goal: "Verwenden Sie Graphmuster für Empfehlungslogik durch Collaborative Filtering. Dies ist ein klassisches Graph-Use-Case, wo Beziehungen zwischen ähnlichen Käufern Empfehlungen treiben - etwas, das in SQL sehr schwierig ist.",
                ex6Show: "MATCH (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer)\nWHERE c.name = 'Alice' AND other.name <> 'Alice'\nRETURN distinct other.name, count(p) as common_products\nORDER BY common_products DESC",
                ex6Output: "Bob | 2\nCharlie | 1",
                ex6Explain: "Zeile 1: MATCH definiert ein Diamond-Pattern: (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer). Dies findet alle Kunden, die Produkte gekauft haben, die Alice auch gekauft hat - ein klassisches Collaborative-Filtering-Pattern.\nZeile 2: WHERE c.name='Alice' UND other.name<>'Alice' filtert auf Alice und schließt Selbst-Referenzen aus.\nZeile 3: RETURN und count(p) zählt gemeinsame Produkte - ein Ähnlichkeitsmaß.\nZeile 4: ORDER BY sortiert nach Ähnlichkeit, um empfehlungswürdige Kunden zu identifizieren.",

                ex6Hint: "Muster: (alice)-[:PURCHASED]->(produkt)<-[:PURCHASED]-(anderer_kunde). Lesen Sie das Muster von links nach rechts: Alice kaufte ein Produkt, das auch ein anderer Kunde kaufte.",
                ex6Solution: "MATCH (c:Customer {name: 'Alice'})-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(similar:Customer)\nWHERE similar.name <> c.name\nRETURN similar.name, count(p) as shared_products\nORDER BY shared_products DESC",

CREATE (o:Order {order_id: 101, total: 1500})

            ex2Title: 'Вправа 2: Створення відносин',
            ex2Time: '~15 хвилин',
            ex2Goal: 'З\'єднайте вузли відносинами, які мають напрямок та тип. Це фундаментальна концепція графових баз даних: тоді як SQL поєднує табличні дані з WHERE, Neo4j визначає явні шляхи між вузлами.',

Рядок 3: CREATE створює спрямоване відношення \'-[r:PURCHASED]->\' з властивостями як дата. Напрямок \'→\' дуже важливий: він вказує від покупця до продукту.

            ex2Task: 'Ваша географічна модель даних потребує відносин місцезнаходження. Створіть відношення LIVES_IN від вузла Особи до вузла Міста. Це моделює один-до-багатьох відношення, як у SQL, але без дорогих операцій JOIN.',
            ex2Hint: 'Шаблон: (вузол1)-[ТИП]->(вузол2). Використовуйте два MATCH або спочатку створіть вузли за допомогою CREATE.',

CREATE (c:City {name: \'Berlin\'})
MATCH (per:Person {name: \'Charlie\'}), (city:City {name: \'Berlin\'})

RETURN r',
            ex2Verify: 'Ви повинні побачити відношення LIVES_IN, яке з\'єднує вузол Особи з вузлом Міста.',
            ex3Title: 'Вправа 3: Запит даних',
            ex3Time: '~15 хвилин',
            ex3Goal: 'Використовуйте зіставлення шаблонів з пропозиціями WHERE для фільтрування вузлів. Ця концепція подібна до WHERE у SQL, але працює з графічними шаблонами замість стовпців таблиці.',
            ex3Show: 'MATCH (p:Person)\nWHERE p.age > 25\nRETURN p.name, p.age',
            ex3Output: 'Alice, 30\nCharlie, 28',
            ex3Explain: 'Рядок 1: MATCH (p:Person) знаходить усі вузли з міткою Person і зберігає їх у змінній \'p\'. У SQL це було б SELECT у таблиці Person.\nРядок 2: WHERE фільтрує на основі значень властивостей, як у SQL. Це стандартне фільтрування.\nРядок 3: RETURN проектує лише стовпці name та age (властивості), подібно до SELECT p.name, p.age у SQL.',
            ex3Task: 'Ваша платформа електронної комерції потребує фільтра бюджету. Знайдіть усі товари з цінами нижче 500 для знижок покупців. Повніть ім\'я та ціну для відображення доступних недорогих товарів.',
            ex3Hint: 'Використовуйте WHERE price < 500. Зверніть увагу на правильну назву властивості (price).',
            ex3Solution: 'MATCH (prod:Product)\nWHERE prod.price < 500\nRETURN prod.name, prod.price',
            ex3Verify: 'Ви повинні побачити всі товари з ціною нижче 500.',
            ex4Title: 'Вправа 4: Агрегація та сортування',
            ex4Time: '~15 хвилин',
            ex4Goal: 'Групуйте та агрегуйте дані за допомогою Cypher. Функції агрегації, такі як count() та avg(), є фундаментальними для аналізу даних і працюють як GROUP BY у SQL у Neo4j.',
            ex4Show: 'MATCH (p:Person)\nRETURN count(p) as total_persons, avg(p.age) as avg_age',
            ex4Output: 'total_persons: 3\navg_age: 29.33',
            ex4Explain: 'Рядок 1: MATCH (p:Person) знаходить усі вузли Person. Їх необхідно агрегувати.\nРядок 2: count(p) підраховує загальну кількість вузлів (як COUNT(*) у SQL), avg(p.age) обчислює середнє значення властивості age на всіх вузлах (як AVG(age) у SQL). Ці функції оптимізовані для вузлів графіку.',
            ex4Task: 'Вашій команді управління запасами потрібна швидка статистика. Підрахуйте кількість товарів у системі та обчисліть середню ціну для бюджетного планування.',
            ex4Hint: 'Використовуйте MATCH для вузлів Product та використовуйте count(), avg() для агрегації.',
            ex4Solution: 'MATCH (prod:Product)\nRETURN count(prod) as total_products, avg(prod.price) as avg_price',
            ex4Verify: 'Ви повинні побачити загальну кількість та середню ціну.',
            ex5Title: 'Вправа 5: Дослідіть MegaStore-Graph',
            ex5Time: '~15 хвилин',
            ex5Goal: 'Працюйте з реалістичним графіком електронної комерції, що містить багатострибкові відносини (Клієнт → Замовлення → Товар). Це демонструє потужність графіків: багаторівневі запити без складних JOINs у SQL.',
            ex5Show: 'MATCH (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product)\nWHERE c.country = \'DE\'\nRETURN c.name, o.order_total, prod.name\nLIMIT 10',
            ex5Output: 'Alice | 1500 | Laptop\nAlice | 299 | Monitor\nBob | 750 | Keyboard',
            ex5Explain: 'Рядок 1: MATCH визначає багатострибковий шаблон: (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product). Це визначає маршрут через 3 вузли та 2 відносини - у SQL це потребувало б 2 JOINs.\nРядок 2: WHERE фільтрує за значенням властивості country=\'DE\', як у SQL.\nРядок 3: RETURN проектує стовпці з різних вузлів маршруту (c, o, prod).\nРядок 4: LIMIT 10 обмежує кількість рядків результату, як у SQL.',
            ex5Task: 'Ваш відділ аналізу продажів бажає визначити найкращих клієнтів. Знайдіть найдорожчі замовлення та повніть ім\'я клієнта з підсумком. Відсортуйте за підсумком у спадному порядку для визначення клієнтів з високою вартістю.',
            ex5Hint: 'Використовуйте ORDER BY o.order_total DESC. Використовуйте LIMIT 5 для перегляду перших 5.',
            ex5Solution: 'MATCH (c:Customer)-[p:PLACED]->(o:Order)\nRETURN c.name, o.order_total\nORDER BY o.order_total DESC\nLIMIT 5',
            ex5Verify: 'Ви повинні побачити 5 найдорожчих замовлень з ім\'ям клієнта та підсумком.',
            ex6Title: 'Вправа 6: Генеруйте рекомендації',
            ex6Time: '~15 хвилин',
            ex6Goal: 'Створити логіку рекомендацій, використовуючи патерни графів через колаборативну фільтрацію. Це класичний випадок використання графу, де відносини між подібними покупцями керують рекомендаціями — це дуже важко зробити в SQL.',
            ex6Show: 'MATCH (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer)\nWHERE c.name = \\\'Alice\\\' AND other.name <> \\\'Alice\\\'\nRETURN distinct other.name, count(p) as common_products\nORDER BY common_products DESC',
            ex6Output: 'Bob | 2\nCharlie | 1',
            ex6Explain: 'Рядок 1: MATCH визначає діамантоподібний патерн: (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer). Це знаходить усіх клієнтів, які придбали продукти, які також придбала Аліса — класичний патерн колаборативної фільтрації.\nРядок 2: WHERE c.name=\\\'Alice\\\' та other.name<>\\\'Alice\\\' фільтрує Алісу та виключає посилання на саму себе.\nРядок 3: RETURN та count(p) підраховують спільні продукти — міру подібності.\nРядок 4: ORDER BY впорядковує за подібністю та визначає клієнтів, гідних рекомендації.',
            ex6Task: 'Знайдіть усіх клієнтів, які придбали той самий продукт, що й Аліса. У SQL вам потрібно було б виконати кілька операцій JOIN — у Neo4j це вирішується одним патерном. Це сила баз даних графів.',

            ex1Goal: 'Farklı düğüm türleri oluşturun (Kişi, Ürün gibi etiketler) ve bunları inceleyin. Bu, bir grafik ağı oluşturmanın ilk adımıdır; SQL\'de tabloları oluşturmaya benzer.',

            ex1Explain: 'Satır 1: CREATE komutu, Kişi düğümü oluşturur (:Person etiketi) ve adı, yaşı gibi özellikleri küme parantezleri içine yerleştirir. SQL\'deki INSERT gibi olmakla birlikte nesneyi satır yerine düğüm olarak depolar.\nSatır 2: CREATE, adı ve fiyatı özellikleri olan bir Ürün düğümü oluşturur.\nSatır 3: MATCH herhangi bir etikete sahip tüm düğümleri (n) bulur ve geri döndürür - bu, SQL\'deki SELECT * ile benzer grafik sorgusudur.',

            ex1Verify: 'İki yeni düğüm görmelisiniz: biri Customer etiketine, diğeri Order etiketine sahip.',

            ex2Time: '~15 dakika',
            ex2Goal: 'Düğümleri yön ve türe sahip ilişkilerle bağlayın. Bu, grafik veritabanlarının temel bir konseptidir: SQL tabuler verileri WHERE cümleleriyle birleştirirken, Neo4j düğümler arasında açık yollar tanımlar.',
            ex2Show: 'MATCH (p:Person {name: \'Alice\'}), (pr:Product {name: \'Laptop\'})\nCREATE (p)-[r:PURCHASED {date: \'2024-01-15\'}]->(pr)\nRETURN r',
            ex2Output: '1 ilişki oluşturuldu:\n(Alice)-[PURCHASED {date: \'2024-01-15\'}]->(Laptop)',
            ex2Explain: 'Satır 1-2: MATCH iki mevcut düğümü (Alice ve Laptop) bulur. Bu SQL\'deki WHERE cümlesine benzer ancak grafikler için daha sezgiseldir.\nSatır 3: CREATE, tarih gibi özelliklere sahip yönlendirilmiş bir ilişki \'-[r:PURCHASED]->\' oluşturur. Yön \'→\' çok önemlidir: alıcıdan ürüne işaret eder.\nSatır 4: RETURN ilişkiyi döndürür ve bağlantının kurulduğunu kanıtlar.',
            ex2Task: 'Coğrafi veri modeliniz yer ilişkilerine ihtiyaç duyuyor. Bir Kişi düğümünden bir Şehir düğümüne LIVES_IN ilişkisi oluşturun. Bu, pahalı JOIN işlemleri olmadan SQL\'deki gibi bire-çok ilişkisini modeller.',

            ex2Verify: 'Bir Kişi düğümünü bir Şehir düğümüne bağlayan LIVES_IN ilişkisini görmelisiniz.',
            ex3Title: 'Alıştırma 3: Verileri Sorgulama',
            ex3Time: '~15 dakika',
            ex3Goal: 'Düğümleri filtrelemek için WHERE maddeleriyle Desen Eşleştirme kullanın. Bu kavram SQL WHERE\'ye benzer, ancak tablo sütunları yerine Grafik desenleriyle çalışır.',
            ex3Show: 'MATCH (p:Person)\nWHERE p.age > 25\nRETURN p.name, p.age',
            ex3Output: 'Alice, 30\nCharlie, 28',
            ex3Explain: 'Satır 1: MATCH (p:Person) tüm Person etiketli düğümleri bulur ve bunları \'p\' değişkeninde depolar. SQL\'de bu, bir Person tablosunda WHERE olan SELECT olurdu.\nSatır 2: WHERE özellik değerlerine dayanarak filtreler, tıpkı SQL\'de olduğu gibi. Bu standart bir filtrelemedir.\nSatır 3: RETURN yalnızca name ve age sütunlarını (özellikleri) yansıtır, SQL\'deki SELECT p.name, p.age\'ye benzer.',
            ex3Task: 'E-ticaret platformunuz bir bütçe filtresi gerektirir. Müşteri indirimi için 500\'den az fiyatlı tüm ürünleri bulun. Mevcut ucuz öğeleri göstermek için ad ve fiyat döndürün.',
            ex3Hint: 'WHERE price < 500 kullanın. Doğru özellik adına (price) dikkat edin.',
            ex3Solution: 'MATCH (prod:Product)\nWHERE prod.price < 500\nRETURN prod.name, prod.price',
            ex3Verify: 'Fiyatı 500\'den az olan tüm ürünleri görmelisiniz.',
            ex4Title: 'Alıştırma 4: Toplama ve Sıralama',
            ex4Time: '~15 Dakika',
            ex4Goal: 'Cypher ile verileri gruplandırın ve toplayın. count() ve avg() gibi toplama işlevleri veri analizi için merkezi olup Neo4j\'de SQL\'deki GROUP BY gibi çalışır.',
            ex4Show: 'MATCH (p:Person)\nRETURN count(p) as total_persons, avg(p.age) as avg_age',
            ex4Output: 'total_persons: 3\navg_age: 29.33',

            ex4Task: 'Envantar yönetimi ekibiniz hızlı istatistikler gerektirir. Sistemdeki ürün sayısını sayın ve bütçe planlaması için ortalama fiyatı hesaplayın.',
            ex4Hint: 'Product düğümleri için MATCH kullanın ve toplama için count(), avg() kullanın.',
            ex4Solution: 'MATCH (prod:Product)\nRETURN count(prod) as total_products, avg(prod.price) as avg_price',
            ex4Verify: 'Toplam sayı ve ortalama fiyatı görmelisiniz.',
            ex5Title: 'Alıştırma 5: MegaStore-Graph\'ı Keşfedin',
            ex5Time: '~15 Dakika',
            ex5Goal: 'Multi-Hop ilişkileri içeren gerçekçi bir e-ticaret grafıkle çalışın (Müşteri → Sipariş → Ürün). Bu, grafiklerin gücünü gösterir: karmaşık SQL JOIN\'ler olmadan çok katmanlı sorgular.',
            ex5Show: 'MATCH (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product)\nWHERE c.country = \'DE\'\nRETURN c.name, o.order_total, prod.name\nLIMIT 10',

            ex5Explain: 'Satır 1: MATCH çok-atlı bir desen tanımlar: (c:Customer)-[p:PLACED]->(o:Order)-[con:CONTAINS]->(prod:Product). Bu 3 düğüm ve 2 ilişki aracılığıyla bir yolu tanımlar - SQL\'de bu 2 JOIN gerektirir.\nSatır 2: WHERE özellik değerinde country=\'DE\' filtrelendirir, SQL\'de olduğu gibi.\nSatır 3: RETURN yoldaki farklı düğümlerden sütunları yansıtır (c, o, prod).\nSatır 4: LIMIT 10 sonuç satırlarının sayısını sınırlandırır, SQL\'de olduğu gibi.',
            ex5Task: 'Satış analizi bölümünüz en iyi müşterileri belirlemek istiyor. En pahalı siparişleri bulun ve müşteri adı ile toplam döndürün. Yüksek değerli müşterileri belirlemek için toplam başına azalan sırada sıralayın.',
            ex5Hint: 'ORDER BY o.order_total DESC kullanın. İlk 5\'i görmek için LIMIT 5 kullanın.',
            ex5Solution: 'MATCH (c:Customer)-[p:PLACED]->(o:Order)\nRETURN c.name, o.order_total\nORDER BY o.order_total DESC\nLIMIT 5',
            ex5Verify: 'Müşteri adı ve toplam ile 5 en pahalı siparişi görmelisiniz.',
            ex6Title: 'Alıştırma 6: Öneriler Oluşturun',
            ex6Time: '~15 Dakika',
            ex6Goal: 'Collaborative Filtering aracılığıyla grafik desenleri kullanarak öneri mantığı oluşturun. Bu, benzer alıcılar arasındaki ilişkilerin önerileri yönlendirdiği klasik bir grafik kullanım durumudur - SQL\'de bunu yapmak çok zordur.',
            ex6Show: 'MATCH (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer)\nWHERE c.name = \'Alice\' AND other.name <> \'Alice\'\nRETURN distinct other.name, count(p) as common_products\nORDER BY common_products DESC',
            ex6Output: 'Bob | 2\nCharlie | 1',
            ex6Explain: 'Satır 1: MATCH, bir elmas deseni tanımlar: (c:Customer)-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(other:Customer). Bu, Alice\'in de satın aldığı ürünleri satın alan tüm müşterileri bulur - klasik bir işbirlikçi filtreleme desenidir.\nSatır 2: WHERE c.name=\'Alice\' VE other.name<>\'Alice\', Alice\'e filtre yapar ve kendi kendine referansları hariç tutar.\nSatır 3: RETURN ve count(p), ortak ürünleri sayar - bir benzerlik ölçüsü.\nSatır 4: ORDER BY, benzerliğe göre sıralar ve önerilmeye değer müşterileri tanımlar.',
            ex6Task: 'Alice\'le aynı ürünü satın alan tüm müşterileri bulun. SQL\'de bunun için birden fazla JOIN işlemi yapmanız gerekir — Neo4j\'de bunu tek bir desenle çözersiniz. Bu, grafik veri tabanlarının gücüdür.',
            ex6Hint: 'Desen: (alice)-[:PURCHASED]->(produkt)<-[:PURCHASED]-(anderer_kunde). Deseni soldan sağa okuyun: Alice bir ürün satın aldı, başka bir müşteri de aynı ürünü satın aldı.',
            ex6Solution: 'MATCH (c:Customer {name: \'Alice\'})-[:PURCHASED]->(p:Product)<-[:PURCHASED]-(similar:Customer)\nWHERE similar.name <> c.name\nRETURN similar.name, count(p) as shared_products\nORDER BY shared_products DESC',
            ex6Verify: 'Benzer ürünler satın alan müşterileri görmelisiniz.',

            q4b: 'Veriler arasında birçok ilişki olduğunda',
            q4c: 'Basit tablo verileri için',
            q4ans: 'Veriler arasında birçok ilişki olduğunda',
            q5: 'MATCH (a)-[:PURCHASED]->(p) RETURN a, p ne gösterir?',
            q5a: 'Yalnızca ürünler',
            q5b: 'Tüm müşteriler ve satın aldıkları ürünler',
            q5c: 'Yalnızca müşteriler',
            q5ans: 'Tüm müşteriler ve satın aldıkları ürünler',
            q6: 'Grafik geçişinin bir avantajı nedir?',
            q6a: 'Daha hızlı depolama',
            q6b: 'Daha iyi şifreleme',
            q6c: 'Birleştirmeler olmadan ilişkiler üzerinde etkili gezinme',
            q6ans: 'Birleştirmeler olmadan ilişkiler üzerinde etkili gezinme',
            correct: 'Doğru!',
            incorrect: 'Yanlış',
            outlookAdvanced: 'İleri Konular',
            outlookGDS: 'Graph Data Science Library - Ağ analizi algoritmaları',
            outlookCommunity: 'Community Detection - Grafikte grupların keşfi',
            outlookPageRank: 'PageRank - Düğümlerin önem derecesinin değerlendirilmesi',
            outlookShortestPath: 'En Kısa Yol - Etkili yol bulma',
            outlookAI: 'Yapay Zeka Entegrasyonu',
            outlookAIDesc: 'Neo4j, şunlar için LLM\'lerle birleştirilebilir:',
            outlookExample1: 'Örnek 1: Claude ile daha iyi öneriler için grafik bağlamı',
            outlookExample2: 'Örnek 2: Desen analizi ve LLM sınıflandırması yoluyla anomali tespiti',
            outlookExample3: 'Örnek 3: Claude Kod + MCP aracılığıyla doğal dil grafik sorguları',
            troubleshootTitle: 'Sık Karşılaşılan Sorunlar',
            troubleshoot1Title: 'Neo4j başlamıyor',
            troubleshoot1: 'Docker\'ın çalışıp çalışmadığını kontrol edin. Şunu deneyin: docker restart neo4j-lab. Port çatışmalarını kontrol edin.',
            troubleshoot2Title: 'Tarayıcı bağlanamıyor',
            troubleshoot2: 'http://localhost:7474 adresine erişilebilir olduğundan emin olun. Portları şu komutla kontrol edin: docker ps',
            troubleshoot3Title: 'Kimlik doğrulama hatası',
            troubleshoot3: 'Standart kimlik bilgileri: neo4j / password123. Parola ilk girişte değiştirilmelidir.',
            troubleshoot4Title: 'Cypher\'de söz dizimi hatası',
            troubleshoot4: 'Tarayıcının kod düzenleyicisini söz dizimi vurgulama ile kullanın. Etiketlerde büyük/küçük harflere dikkat edin.',
            troubleshoot5Title: 'Yeterli Docker belleği yok',
            troubleshoot5: 'Docker bellek ayırmasını artırın. Docker Desktop\'ı başlatın ve Ayarlar\'da Belleği artırın.'
        },
        };

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function App() {
            const [language, setLanguage] = useState('de');
            const [activeSection, setActiveSection] = useState('overview');
            const [expandedItems, setExpandedItems] = useState({});
            const [quizAnswers, setQuizAnswers] = useState({});

            const t = new Proxy(translations[language], {
                get: (target, prop) => target[prop] !== undefined ? target[prop] : translations['de'][prop]
            });

            const toggleExpanded = (id) => {
                setExpandedItems(prev => ({
                    ...prev,
                    [id]: !prev[id]
                }));
            };

            const answerQuiz = (qNum, isCorrect) => {
                setQuizAnswers(prev => ({
                    ...prev,
                    [qNum]: isCorrect
                }));
            };

            const menuItems = [
                { id: 'overview', label: t.overview },
                { id: 'setup', label: t.setup },
                { id: 'fundamentals', label: t.fundamentals },
                { id: 'exercise1', label: t.exercise1 },
                { id: 'exercise2', label: t.exercise2 },
                { id: 'exercise3', label: t.exercise3 },
                { id: 'exercise4', label: t.exercise4 },
                { id: 'exercise5', label: t.exercise5 },
                { id: 'exercise6', label: t.exercise6 },
                { id: 'exercise7', label: t.exercise7 },
                { id: 'exercise8', label: t.exercise8 },
                { id: 'exercise9', label: t.exercise9 },
                { id: 'exercise10', label: t.exercise10 },
                { id: 'exercise11', label: t.exercise11 },
                { id: 'exercise12', label: t.exercise12 },
                { id: 'challenge', label: t.challenge },
                { id: 'quiz', label: t.quiz },
                { id: 'outlook', label: t.outlook },
                { id: 'troubleshooting', label: t.troubleshooting },
            ];

            const StepItem = ({ number, children }) => (
                <div className="step-item">
                    <div className="step-number">{number}</div>
                    <div className="step-item-content">{children}</div>
                </div>
            );

            const renderCodeBlock = (code, label) => (
                <div className="code-block">
                    <button className="copy-btn" onClick={() => copyToClipboard(code)}>
                        {t.copy}
                    </button>
                    <code>{code}</code>
                </div>
            );

            const renderExercise = (num, title, time, goal, showCode, output, explain, task, hint, solution, verify) => (
                <div className="section" style={{display: activeSection === `exercise${num}` ? 'block' : 'none'}}>
                    <h2 className="section-header">{title}</h2>
                    <div className="card">
                        <span className="badge badge-beginner">{t.exerciseTitle} {num}</span>
                        <span className="badge badge-time">{time}</span>
                        <p><strong>{t.ex1Goal}:</strong> {goal}</p>
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">{t.exampleTitle} (Show)</h3>
                        {renderCodeBlock(showCode, `Example ${num}`)}
                        <div className="output-box">{output}</div>
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">{t.explainTitle} (Explain)</h3>
                        <p>{explain}</p>
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">{t.yourTask}</h3>
                        <p>{task}</p>
                    </div>

                    <div className="hint-box">
                        <div className="hint-title">Hinweis:</div>
                        <p>{hint}</p>
                    </div>

                    <div className="expandable" onClick={() => toggleExpanded(`ex${num}sol`)} style={{cursor: 'pointer'}}>
                        <div className="expandable-header">
                            {t.solution}
                            <span className="expandable-chevron">▼</span>
                        </div>
                        {expandedItems[`ex${num}sol`] && (
                            <div className="expandable-content">
                                {renderCodeBlock(solution, `Solution ${num}`)}
                            </div>
                        )}
                    </div>

                    <div className="card">
                        <h3 className="subsection-header">{t.verifyTitle} (Verify)</h3>
                        <p>{verify}</p>
                    </div>

                    <div className="next-button">
                        <button className="btn-accent" onClick={() => setActiveSection(`exercise${num === 12 ? 'challenge' : num + 1}`)}>
                            {t.nextExercise}
                        </button>
                    </div>
                </div>
            );

            return (
                <div>
                    <header className="header">
                        <div style={{display: 'flex', alignItems: 'center', gap: '1rem'}}>
                            <a href="index.html" style={{color: 'white', textDecoration: 'none', fontSize: '0.9rem', opacity: 0.8, whiteSpace: 'nowrap'}}>{t.backToHome}</a>
                            <h1>{t.welcome}</h1>
                        </div>
                        <div className="lang-switcher">
                            {['de', 'en', 'ar', 'uk', 'es', 'tr'].map(lang => (
                                <button
                                    key={lang}
                                    className={`lang-btn ${language === lang ? 'active' : ''}`}
                                    onClick={() => setLanguage(lang)}
                                >
                                    {lang.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    </header>

                    <aside className="sidebar">
                        {menuItems.map(item => (
                            <button
                                key={item.id}
                                className={`sidebar-item ${activeSection === item.id ? 'active' : ''}`}
                                onClick={() => setActiveSection(item.id)}
                            >
                                {item.label}
                            </button>
                        ))}
                    </aside>

                    <main className="main-content">
                        {/* OVERVIEW */}
                        <div className="section" style={{display: activeSection === 'overview' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.overview}</h2>

                            <div className="lesson-box">
                                <h3 className="subsection-header">{t.whatYouLearn}</h3>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="✓">{t.whatYouLearn1}</StepItem>
                                    <StepItem number="✓">{t.whatYouLearn2}</StepItem>
                                    <StepItem number="✓">{t.whatYouLearn3}</StepItem>
                                    <StepItem number="✓">{t.whatYouLearn4}</StepItem>
                                    <StepItem number="✓">{t.whatYouLearn5}</StepItem>
                                </div>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.neo4jIs}</h3>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="✓">{t.graphDatabase}</StepItem>
                                    <StepItem number="✓">{t.cypherLanguage}</StepItem>
                                    <StepItem number="✓">{t.acidCompliant}</StepItem>
                                </div>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.whyNeo4j}</h3>
                                <p>{t.realWorldMotivation}</p>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="1"><strong>NASA:</strong> {t.nasaDesc}</StepItem>
                                    <StepItem number="2"><strong>Walmart:</strong> {t.walmartDesc}</StepItem>
                                    <StepItem number="3"><strong>eBay:</strong> {t.ebayDesc}</StepItem>
                                </div>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.estimatedTime}</h3>
                                <p>{t.timeValue}</p>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.prerequisites}</h3>
                                <p>{t.prereqValue}</p>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.megastoreScenarioTitle}</h3>
                                <p>In diesem Labor arbeiten Sie mit einem E-Commerce-Datensatz namens MegaStore:</p>
                                <div className="table-responsive">
                                    <table>
                                        <thead>
                                            <tr>
                                                <th>Tabelle</th>
                                                <th>Spalten</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td>customers</td>
                                                <td>customer_id, name, email, city, country, registration_date</td>
                                            </tr>
                                            <tr>
                                                <td>products</td>
                                                <td>product_id, name, category, unit_price, stock_quantity</td>
                                            </tr>
                                            <tr>
                                                <td>orders</td>
                                                <td>order_id, customer_id, order_date, order_total, status</td>
                                            </tr>
                                            <tr>
                                                <td>order_items</td>
                                                <td>order_item_id, order_id, product_id, quantity, unit_price</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        {/* SETUP */}
                        <div className="section" style={{display: activeSection === 'setup' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.setup}</h2>
                            <p>{t.setupSteps}</p>

                            <StepItem number="1">
                                <strong>{t.step1}</strong>
                                <p style={{margin: '0.4rem 0'}}>{t.step1Desc}</p>
                                {renderCodeBlock(t.step1Cmd, 'Setup Step 1')}
                            </StepItem>

                            <StepItem number="2">
                                <strong>{t.step2}</strong>
                                <p style={{margin: '0.4rem 0'}}>{t.step2Desc}</p>
                                {renderCodeBlock(t.step2Cmd, 'Setup Step 2')}
                            </StepItem>

                            <StepItem number="3">
                                <strong>{t.step3}</strong>
                                <p style={{margin: '0.4rem 0'}}>{t.step3Desc}</p>
                                {renderCodeBlock(t.step3Cmd, 'Setup Step 3')}
                            </StepItem>

                            <StepItem number="4">
                                <strong>{t.step4}</strong>
                                <p style={{margin: '0.4rem 0'}}>{t.step4Desc}</p>
                                {renderCodeBlock(t.step4Cmd, 'Setup Step 4')}
                            </StepItem>

                            <div className="lesson-box">
                                <h3 className="subsection-header">{t.verifySetup}</h3>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="✓">{t.verifyStep1}</StepItem>
                                    <StepItem number="✓">{t.verifyStep2}</StepItem>
                                    <StepItem number="✓">{t.verifyStep3}</StepItem>
                                </div>
                            </div>
                        </div>

                        {/* FUNDAMENTALS */}
                        <div className="section" style={{display: activeSection === 'fundamentals' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.fundamentals}</h2>

                            <div className="card">
                                <h3 className="subsection-header">{t.nodesLabel}</h3>
                                <p>{t.nodesDesc}</p>
                                {renderCodeBlock(t.nodesCode, 'Nodes Example')}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.relationshipsLabel}</h3>
                                <p>{t.relationshipsDesc}</p>
                                {renderCodeBlock(t.relationshipsCode, 'Relationships Example')}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.cypherLabel}</h3>
                                <p>{t.cypherDesc}</p>
                                {renderCodeBlock(t.cypherCode, 'Cypher Example')}
                            </div>
                        </div>

                        {/* EXERCISES */}
                        {renderExercise(1, t.ex1Title, t.ex1Time, t.ex1Goal, t.ex1Show, t.ex1Output, t.ex1Explain, t.ex1Task, t.ex1Hint, t.ex1Solution, t.ex1Verify)}
                        {renderExercise(2, t.ex2Title, t.ex2Time, t.ex2Goal, t.ex2Show, t.ex2Output, t.ex2Explain, t.ex2Task, t.ex2Hint, t.ex2Solution, t.ex2Verify)}
                        {renderExercise(3, t.ex3Title, t.ex3Time, t.ex3Goal, t.ex3Show, t.ex3Output, t.ex3Explain, t.ex3Task, t.ex3Hint, t.ex3Solution, t.ex3Verify)}
                        {renderExercise(4, t.ex4Title, t.ex4Time, t.ex4Goal, t.ex4Show, t.ex4Output, t.ex4Explain, t.ex4Task, t.ex4Hint, t.ex4Solution, t.ex4Verify)}
                        {renderExercise(5, t.ex5Title, t.ex5Time, t.ex5Goal, t.ex5Show, t.ex5Output, t.ex5Explain, t.ex5Task, t.ex5Hint, t.ex5Solution, t.ex5Verify)}
                        {renderExercise(6, t.ex6Title, t.ex6Time, t.ex6Goal, t.ex6Show, t.ex6Output, t.ex6Explain, t.ex6Task, t.ex6Hint, t.ex6Solution, t.ex6Verify)}
                        {renderExercise(7, t.ex7Title, t.ex7Time, t.ex7Goal, t.ex7Show, t.ex7Output, t.ex7Explain, t.ex7Task, t.ex7Hint, t.ex7Solution, t.ex7Verify)}
                        {renderExercise(8, t.ex8Title, t.ex8Time, t.ex8Goal, t.ex8Show, t.ex8Output, t.ex8Explain, t.ex8Task, t.ex8Hint, t.ex8Solution, t.ex8Verify)}
                        {renderExercise(9, t.ex9Title, t.ex9Time, t.ex9Goal, t.ex9Show, t.ex9Output, t.ex9Explain, t.ex9Task, t.ex9Hint, t.ex9Solution, t.ex9Verify)}
                        {renderExercise(10, t.ex10Title, t.ex10Time, t.ex10Goal, t.ex10Show, t.ex10Output, t.ex10Explain, t.ex10Task, t.ex10Hint, t.ex10Solution, t.ex10Verify)}
                        {renderExercise(11, t.ex11Title, t.ex11Time, t.ex11Goal, t.ex11Show, t.ex11Output, t.ex11Explain, t.ex11Task, t.ex11Hint, t.ex11Solution, t.ex11Verify)}
                        {renderExercise(12, t.ex12Title, t.ex12Time, t.ex12Goal, t.ex12Show, t.ex12Output, t.ex12Explain, t.ex12Task, t.ex12Hint, t.ex12Solution, t.ex12Verify)}

                        {/* CHALLENGE */}
                        <div className="section" style={{display: activeSection === 'challenge' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.challengeTitle}</h2>
                            <div className="card">
                                <span className="badge badge-challenge">Challenge</span>
                                <p style={{marginTop: '1rem'}}>{t.challengeDesc}</p>
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.challengeSteps}</h3>
                                <div style={{marginTop: '0.75rem'}}>
                                    <StepItem number="1">{t.challengeStep1}</StepItem>
                                    <StepItem number="2">{t.challengeStep2}</StepItem>
                                    <StepItem number="3">{t.challengeStep3}</StepItem>
                                    <StepItem number="4">{t.challengeStep4}</StepItem>
                                    <StepItem number="5">{t.challengeStep5}</StepItem>
                                </div>
                            </div>

                            <div className="hint-box">
                                <div className="hint-title">Hinweis:</div>
                                <p>{t.challengeHint}</p>
                            </div>

                            <div className="expandable" onClick={() => toggleExpanded('challsol')} style={{cursor: 'pointer'}}>
                                <div className="expandable-header">
                                    {t.solution}
                                    <span className="expandable-chevron">▼</span>
                                </div>
                                {expandedItems['challsol'] && (
                                    <div className="expandable-content">
                                        {renderCodeBlock(t.challengeSolution, 'Challenge Solution')}
                                    </div>
                                )}
                            </div>

                            <div className="card">
                                <h3 className="subsection-header">{t.expectedResult}</h3>
                                <p>{t.challengeExpected}</p>
                            </div>

                            <div className="next-button">
                                <button className="btn-accent" onClick={() => setActiveSection('quiz')}>
                                    {t.nextExercise}
                                </button>
                            </div>
                        </div>

                        {/* QUIZ */}
                        <div className="section" style={{display: activeSection === 'quiz' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.quizTitle}</h2>

                            {[1, 2, 3, 4, 5, 6].map(q => (
                                <div key={q} className="quiz-item">
                                    <div className="quiz-item-question">
                                        <span>Frage {q}: {t[`q${q}`]}</span>
                                    </div>
                                    <div className="quiz-options">
                                        {['a', 'b', 'c'].map(opt => {
                                            const isCorrect = t[`q${q}${opt}`] === t[`q${q}ans`];
                                            const answered = quizAnswers[`q${q}${opt}`];
                                            return (
                                                <div
                                                    key={opt}
                                                    className={`quiz-option ${answered ? (isCorrect ? 'correct' : 'incorrect') : ''}`}
                                                    onClick={() => answerQuiz(`q${q}${opt}`, isCorrect)}
                                                    style={{cursor: 'pointer'}}
                                                >
                                                    <strong>{opt})</strong> {t[`q${q}${opt}`]}
                                                    {answered && isCorrect && ` ✓ ${t.correct}`}
                                                    {answered && !isCorrect && ` ✗ ${t.incorrect} ${t[`q${q}ans`]}`}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}

                            <div className="next-button">
                                <button className="btn-accent" onClick={() => setActiveSection('outlook')}>
                                    {t.nextExercise}
                                </button>
                            </div>
                        </div>

                        {/* OUTLOOK */}
                        <div className="section" style={{display: activeSection === 'outlook' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.outlook}</h2>

                            <div className="outlook-section">
                                <div className="outlook-part">
                                    <h3 className="outlook-title">{t.outlookAdvanced}</h3>
                                    <div style={{marginTop: '0.75rem'}}>
                                        <StepItem number="1">{t.outlookGDS}</StepItem>
                                        <StepItem number="2">{t.outlookCommunity}</StepItem>
                                        <StepItem number="3">{t.outlookPageRank}</StepItem>
                                        <StepItem number="4">{t.outlookShortestPath}</StepItem>
                                    </div>
                                </div>

                                <div className="outlook-part">
                                    <h3 className="outlook-title">{t.outlookAI}</h3>
                                    <p>{t.outlookAIDesc}</p>
                                    <div style={{marginTop: '0.75rem'}}>
                                        <StepItem number="1">{t.outlookExample1}</StepItem>
                                        <StepItem number="2">{t.outlookExample2}</StepItem>
                                        <StepItem number="3">{t.outlookExample3}</StepItem>
                                    </div>
                                </div>

                                <div className="outlook-part">
                                    <h3 className="outlook-title">{t.furtherResources}</h3>
                                    <div style={{marginTop: '0.75rem'}}>
                                        <StepItem number="1"><a href="https://neo4j.com/docs/" target="_blank" rel="noopener noreferrer">Neo4j Dokumentation</a></StepItem>
                                        <StepItem number="2"><a href="https://neo4j.com/graphacademy/" target="_blank" rel="noopener noreferrer">Neo4j GraphAcademy</a></StepItem>
                                        <StepItem number="3"><a href="https://community.neo4j.com/" target="_blank" rel="noopener noreferrer">Neo4j Community</a></StepItem>
                                        <StepItem number="4"><a href="https://github.com/neo4j/neo4j" target="_blank" rel="noopener noreferrer">Neo4j GitHub</a></StepItem>
                                    </div>
                                </div>
                            </div>

                            <div className="next-button">
                                <button className="btn-accent" onClick={() => setActiveSection('troubleshooting')}>
                                    {t.nextExercise}
                                </button>
                            </div>
                        </div>

                        {/* TROUBLESHOOTING */}
                        <div className="section" style={{display: activeSection === 'troubleshooting' ? 'block' : 'none'}}>
                            <h2 className="section-header">{t.troubleshootTitle}</h2>

                            {[1, 2, 3, 4, 5].map(i => (
                                <div key={i} className="card">
                                    <h3 className="subsection-header">{t[`troubleshoot${i}Title`]}</h3>
                                    <p>{t[`troubleshoot${i}`]}</p>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
