                                    <div className="space-y-4">
                                        <div className="learning-objective">

                                            <a href="https://pymongo.readthedocs.io/" target="_blank" rel="noopener noreferrer" className="text-orange-600 hover:underline">

                                        </li>
                                    </ul>
                                </Section>

                                {/* Troubleshooting */}
                                <Section id="troubleshooting" title={t.troubleshootingTitle}>
                                    <div className="space-y-6">
                                        <div>
                                            <h3 className="text-xl font-bold mb-2 text-var(--color-dark)">{t.error1}</h3>
                                            <p className="text-gray-700 bg-red-50 p-3 rounded">{t.error1Solution}</p>
                                        </div>

                                        <div>
                                            <h3 className="text-xl font-bold mb-2 text-var(--color-dark)">{t.error2}</h3>
                                            <p className="text-gray-700 bg-red-50 p-3 rounded">{t.error2Solution}</p>
                                        </div>

                                        <div>
                                            <h3 className="text-xl font-bold mb-2 text-var(--color-dark)">{t.error3}</h3>
                                            <p className="text-gray-700 bg-red-50 p-3 rounded">{t.error3Solution}</p>
                                        </div>
                                    </div>
                                </Section>

                                {/* Back to top */}
                                <div className="mt-12 pt-8 border-t border-gray-200">
                                    <button
                                        onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
                                        className="text-orange-600 hover:text-orange-700 font-semibold"
                                    >
                                        ↑ {t.returnToTop}
                                    </button>
                                </div>
                            </main>
                        </div>
                    </div>
                </LanguageContext.Provider>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MongoDBLab />);
    </script>
