            font-weight: 600;

            overflow-x: auto;
            margin: 1rem 0;

            top: 0.5rem;
            right: 0.5rem;
            background: #E8792F;

            overflow-y: auto;
            padding-top: 5rem;

            padding: 2rem;

            transition: all 0.2s;
            font-size: 0.95rem;

            background: #fef5f1;
            font-weight: 600;
            color: #E8792F;

            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 0.5rem;

        .badge-advanced { background: #fed7aa; color: #7c2d12; }
        .badge-boss { background: #fecaca; color: #7f1d1d; }

            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .expandable:hover { background: #f3f4f6; }
        .expandable-header { font-weight: 600; color: #E8792F; display: flex; align-items: center; justify-content: space-between; }

        .expandable.expanded .expandable-content { display: block; }
        .expandable-chevron { transition: transform 0.2s; }

            background: #1B3A5C;
            color: #00d084;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            margin: 1rem 0;
            border-left: 4px solid #E8792F;

            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;

            background: none;
            border: none;
            color: #E8792F;
            font-size: 1.5rem;
            cursor: pointer;
            font-weight: bold;

            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

            padding: 1rem;
            text-align: left;
            border: 1px solid #e0e0e0;
        }

            background: #fef5f1;
            font-weight: 700;
            color: #E8792F;

            border-radius: 0.5rem;
            margin: 1rem 0;
