        exercise2SolutionCode: 'db.products.insertOne({\n  product_id: 999,\n  name: "Wireless Headphones",\n  category: "Electronics",\n  unit_price: 79.99,\n  stock_quantity: 50\n})',
        exercise2VerifyDesc: 'Sonuç, insertedId ile onaylanan bir ekleme göstermelidir.',
        exercise3Title: 'Alıştırma 3: Filtreli Sorgular',
        exercise3Goal: 'Filtre kriterleri ve sorgu operatörleri ile veri almayı öğrenin.',
        exercise3Code: 'db.customers.find({ city: "Berlin" })\n\ndb.products.find({ unit_price: { $gt: 50 } })\n\ndb.customers.find({\n  $and: [\n    { country: "Germany" },\n    { registration_date: { $gte: "2023-01-01" } }\n  ]\n})',
        exercise3Output: '[Berlin\'deki tüm müşteriler ve bunların alanları]\n[Fiyatı > 50 olan tüm ürünler]\n[2023-01-01 sonrası kayıt olan tüm Alman müşterileri]',
        exercise3Line1: 'find({ city: "Berlin" }): city = "Berlin" olan tüm belgeleri bulur — SQL\'deki "SELECT * FROM customers WHERE city = \'Berlin\'" gibidir. Sonuç birden çok belgeyi içeren bir imleçtir.',
        exercise3Line2: 'find({ unit_price: { $gt: 50 } }): unit_price değeri 50\'den büyük olan tüm ürünleri bulur. $gt operatörü (greater than) bir MongoDB sorgu operatörü söz dizimidir. Diğer operatörler: $lt (küçük), $gte (>=), $lte (<=), $ne (!=).',
        exercise3Line3: '$and: Birden çok koşulu mantıksal VE ile birleştirir. Örneğin { $and: [{ city: "Berlin" }, { country: "Germany" }] }. VEYA koşulları için $or da vardır.',
        exercise3TaskDesc: 'order_total değeri 100\'den büyük olan tüm siparişleri bulun. $gt operatörünü kullanın.',
        exercise3Hint: 'İpucu: db.orders.find({ order_total: { $gt: 100 } }) kullanın',
        exercise3SolutionCode: 'db.orders.find({ order_total: { $gt: 100 } })',
        exercise3VerifyDesc: 'order_total > 100 olan tüm siparişleri görmelisiniz.',
        exercise4Title: 'Alıştırma 4: Sıralama ve Projeksiyon',
        exercise4Goal: 'Sonuçları sıralamayı, sınırlamayı ve yalnızca belirli alanları seçmeyi öğrenin.',
        exercise4Code: 'db.customers.find(\n  { city: "Berlin" },\n  { name: 1, email: 1, city: 1 }\n).sort({ name: 1 }).limit(5)\n\ndb.orders.find()\n  .sort({ order_total: -1 })\n  .limit(10)',
        exercise4Output: '[Berlin\'deki ilk 5 müşteri ad sırasına göre, yalnızca name, email, city alanları]\n[Toplam tutara göre azalan sırada ilk 10 sipariş]',
        exercise4Line1: '{ name: 1, email: 1 }: Projeksiyon — SQL\'deki "SELECT name, email FROM table" ifadesine benzer. 1 = alanı göster, 0 = alanı gizle. Bu veri miktarını azaltır ve sorgu performansını iyileştirir.',
        exercise4Line2: '.sort({ name: 1 }): Sonucu sıralar (SQL\'deki ORDER BY\'a benzer). 1 = artan sıra (A-Z, 0-9), -1 = azalan sıra (Z-A, 9-0). Örneğin .sort({ price: -1 }) en pahalı ürünleri önce gösterir.',
        exercise4Line3: '.limit(5): Sonucu en fazla 5 belgeyle sınırlandırır (SQL\'deki LIMIT\'e benzer). Bu sayfalandırma ve çok fazla veri aynı anda yüklenmesini önlemek için önemlidir.',
        exercise4TaskDesc: 'En pahalı 3 ürünü alın ve yalnızca name ve unit_price alanlarını gösterin.',
        exercise4Hint: 'İpucu: .sort({ unit_price: -1 }).limit(3) ve bir projeksiyon kullanın.',
        exercise4SolutionCode: 'db.products.find(\n  {},\n  { name: 1, unit_price: 1 }\n).sort({ unit_price: -1 }).limit(3)',
        exercise4VerifyDesc: 'En yüksek fiyatlara sahip 3 ürün görmelisiniz, ancak yalnızca name ve unit_price alanları.',
        exercise5Title: 'Alıştırma 5: Toplamalar',
        exercise5Goal: 'Toplama Pipeline\'ı kullanarak karmaşık veri analizlerini nasıl gerçekleştirebileceğinizi öğrenin.',
        exercise5Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $group: { _id: "$customer_id", total_spent: { $sum: "$order_total" }, order_count: { $sum: 1 } } },\n  { $sort: { total_spent: -1 } },\n  { $limit: 5 }\n])',
        exercise5Output: '[Toplam harcama açısından ilk 5 müşteri, sipariş sayısı ile birlikte]',
        exercise5Line1: '$match: Toplama öncesinde verileri filtreler (SQL\'deki WHERE\'e benzer). Örnek: { $match: { status: "completed" } } yalnızca tamamlanan siparişleri daha sonraki toplamaya dahil eder.',
        exercise5Line2: '$group: Belgeleri bir alana göre gruplandırır ve metrikleri hesaplar (SQL\'deki GROUP BY\'a benzer). Örn. { _id: "$customer_id" } müşteriye göre gruplandırır. Daha sonra $sum, $avg, $count gibi metrikleri hesaplayabilirsiniz.',
        exercise5Line3: '$sum "$order_total": Her grup içindeki tüm order_total değerlerini toplar. Belge sayısını saymak için { $sum: 1 } da yazabilirsiniz. Diğer toplamalar: $avg (ortalama), $min, $max.',
        exercise5TaskDesc: 'Siparişleri statüye göre sayın (completed, pending, cancelled) ve her statü için toplam geliri hesaplayın. Bu, yönetim için sipariş hattının genel görünümünü sağlar.',
        exercise5Hint: 'İpucu: _id: "$status" ve total_orders: { $sum: 1 } ile total_revenue: { $sum: "$order_total" } kullanarak $group kullanın',
        exercise5SolutionCode: 'db.orders.aggregate([\n  { $group: {\n    _id: "$status",\n    total_orders: { $sum: 1 },\n    total_revenue: { $sum: "$order_total" }\n  } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise5VerifyDesc: 'Statü değerlerini (completed, pending, cancelled) sayı ve toplam gelirle birlikte görmelisiniz.',
        exercise6Title: 'Alıştırma 6: MegaStore Analizi',
        exercise6Goal: 'Tüm teknikleri birleştirin: Toplamalar, Birleştirmeler ($lookup) ve karmaşık analiz soruları.',
        exercise6Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } },\n  { $unwind: "$customer_info" },\n  { $group: { _id: "$customer_id", customer_name: { $first: "$customer_info.name" }, total_revenue: { $sum: "$order_total" }, orders: { $sum: 1 } } },\n  { $sort: { total_revenue: -1 } },\n  { $limit: 5 }\n])',
        exercise6Output: '[Ad, toplam gelir ve sipariş sayısı ile ilk 5 müşteri]',
        exercise6Line1: '$lookup: Başka bir Collection\'dan verileri birleştirir (SQL JOIN\'e benzer). Örnek: { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } } siparişe müşteri verilerini getirir.',
        exercise6Line2: '$unwind: Bir dizi alanını ayrı belgelere genişletir. $lookup\'tan sonra, örneğin "customer_info" alanı bir dizi içerir — $unwind her dizi öğesi için bir belge oluşturur. Daha sonraki toplama için önemlidir.',
        exercise6Line3: '$first: Bir grup içinde bir alanın ilk değerini alır. Örneğin { customer_name: { $first: "$customer_info.name" } } gruptaki ilk müşterinin adını verir (yalnızca bir temsilci gerektiğinde yararlı).',
        exercise6TaskDesc: 'Hangi ürün kategorisinin en fazla gelir üretti olduğunu analiz edin. Products verilerini bağlamak için $lookup kullanın ve kategori bazında toplayın.',
        exercise6Hint: 'İpucu: order_items\'i products\'la bağlamak için $lookup kullanın ve geliri kategori bazında toplayın.',
        exercise6SolutionCode: 'db.order_items.aggregate([\n  { $lookup: { from: "products", localField: "product_id", foreignField: "product_id", as: "product_info" } },\n  { $unwind: "$product_info" },\n  { $group: { _id: "$product_info.category", total_revenue: { $sum: { $multiply: ["$quantity", "$unit_price"] } } } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise6VerifyDesc: 'Ürün kategorilerini toplam satış tutarıyla birlikte görmelisiniz, satışa göre sıralanmış olarak.',
        exercise7: 'Alıştırma 7: Verileri Güncelleme',
        exercise7Title: 'Alıştırma 7: Verileri Güncelleme',
        exercise7Goal: 'updateOne() ve updateMany() kullanarak belgeleri hedefli bir şekilde nasıl değiştireceğinizi öğrenin.',
        exercise7Code: 'db.customers.updateOne(\n  { customer_id: 999 },\n  { $set: { city: \"Berlin\", country: \"Germany\" } }\n)\n\ndb.products.updateMany(\n  { category: \"Electronics\" },\n  { $inc: { stock_quantity: 10 } }\n)',
        exercise7Output: '{ acknowledged: true, matchedCount: 1, modifiedCount: 1 }\n{ acknowledged: true, matchedCount: 45, modifiedCount: 45 }',
        exercise7Line1: '$set: Belgeyi üzerine yazmadan alanları yeni değerlere ayarlar. { $set: { city: \"Berlin\" } } yalnızca city alanını değiştirir — diğer tüm alanlar korunur.',
        exercise7Line2: '$inc: Sayısal bir değeri artırır veya azaltır. { $inc: { stock_quantity: 10 } } stoğa 10 ekler. Sayaçlar ve envanter yönetimi için kullanışlıdır.',
        exercise7Line3: 'updateMany() vs updateOne(): updateOne() eşleşen ilk belgeyi değiştirir, updateMany() tüm belgeleri değiştirir. Filtre olmaksızın updateMany({}) tüm koleksiyonu değiştirir!',
        exercise7TaskDesc: '\"Clothing\" kategorisindeki tüm ürünlerin fiyatını %5 artırın. $mul operatörünü kullanın: { $mul: { unit_price: 1.05 } }',
        exercise7Hint: 'İpucu: db.products.updateMany({ category: \"Clothing\" }, { $mul: { unit_price: 1.05 } })',
        exercise7SolutionCode: 'db.products.updateMany(\n  { category: \"Clothing\" },\n  { $mul: { unit_price: 1.05 } }\n)',
        exercise7VerifyDesc: 'db.products.find({ category: \"Clothing\" }) ile fiyatların arttığını kontrol edin.',
        exercise8: 'Alıştırma 8: Verileri Silme ve Temizleme',
        exercise8Title: 'Alıştırma 8: Verileri Silme ve Temizleme',
        exercise8Goal: 'Belgeleri güvenli bir şekilde nasıl sileceğinizi ve koleksiyonları nasıl temizleyeceğinizi öğrenin.',
        exercise8Code: '// Tek bir belgeyi sil\ndb.customers.deleteOne({ customer_id: 999 })\n\n// Birden çok belgeyi sil\ndb.orders.deleteMany({ status: \"cancelled\" })\n\n// Silmeden sonra say\ndb.orders.countDocuments()\ndb.orders.countDocuments({ status: \"completed\" })',
        exercise8Output: '{ acknowledged: true, deletedCount: 1 }\n{ acknowledged: true, deletedCount: 23 }\n977\n750',
        exercise8Line1: 'deleteOne(): Eşleşen ilk belgeyi siler. İstenmeyen silmeleri önlemek için her zaman benzersiz bir alan (örn. customer_id) ile kullanın.',
        exercise8Line2: 'deleteMany(): Eşleşen tüm belgeleri siler. DİKKAT: Filtre olmaksızın deleteMany({}) tüm koleksiyonu siler! Her zaman bir filtre belirtin.',
        exercise8Line3: 'countDocuments(): İsteğe bağlı filtreyle belgeleri sayar — silme işlemlerinden önce ve sonra doğrulama için idealdir. Kullanım dışı count() yönteminin modern alternatifidir.',
        exercise8TaskDesc: 'stock_quantity = 0 olan tüm ürünleri silin. Doğruluğu kontrol etmek için öncesinde ve sonrasında sayım yapın.',
        exercise8Hint: 'İpucu: Önce db.products.countDocuments({ stock_quantity: 0 }), sonra deleteMany, sonra tekrar countDocuments().',
        exercise8SolutionCode: '// Öncesi\ndb.products.countDocuments({ stock_quantity: 0 })\n// Sil\ndb.products.deleteMany({ stock_quantity: 0 })\n// Sonrası\ndb.products.countDocuments()',
        exercise8VerifyDesc: 'Silme işleminden sonra ürün sayısı öncekinden daha az olmalıdır.',
        exercise9: 'Alıştırma 9: İndeksler ve Performans',
        exercise9Title: 'Alıştırma 9: İndeksler ve Performans',
        exercise9Goal: 'İndekslerin sorguları nasıl hızlandırdığını ve ne zaman mantıklı olduğunu anlayın.',
        exercise9Code: '// İndeks oluştur\ndb.customers.createIndex({ city: 1 })\n\n// Bileşik indeks\ndb.orders.createIndex({ customer_id: 1, order_date: -1 })\n\n// explain() ile performans karşılaştırması\ndb.customers.find({ city: \"Berlin\" }).explain(\"executionStats\")\n\n// Tüm indeksleri göster\ndb.customers.getIndexes()',
        exercise9Output: '{ numIndexesBefore: 1, numIndexesAfter: 2 }\n// explain() gösterir: COLLSCAN (indeks olmadan) vs IXSCAN (indeksle)',
        exercise9Line1: 'createIndex({ city: 1 }): Artan bir dizin oluşturur. Dizin olmaksızın: Collection Scan (tüm belgeler). Dizin ile: Index Scan (yalnızca eşleşmeler) — büyük veri kümeleri için son derece hızlı.',
        exercise9Line2: 'Bileşik dizin: { customer_id: 1, order_date: -1 } — sorgular customer_id\'ye göre filtrelediğinde VE order_date\'e göre sıralandığında optimal.',
        exercise9Line3: 'explain(\"executionStats\"): Yürütme planını gösterir — totalDocsExamined, executionTimeMillis. Performans analizleri için vazgeçilmez.',
        exercise9TaskDesc: 'customers koleksiyonunun email alanında bir dizin oluşturun. IXSCAN\'ın COLLSCAN yerine kullanılıp kullanılmadığını explain() ile kontrol edin.',
        exercise9Hint: 'İpucu: db.customers.createIndex({ email: 1 }), ardından .find({ email: \"alice@example.com\" }).explain(\"executionStats\")',
        exercise9SolutionCode: 'db.customers.createIndex({ email: 1 })\ndb.customers.find({ email: \"alice@example.com\" }).explain(\"executionStats\")',
        exercise9VerifyDesc: 'explain() içinde COLLSCAN yerine IXSCAN görünmesi gerekir — bu dizinin kullanıldığını gösterir.',
        exercise10: 'Alıştırma 10: Dizi İşlemleri',
        exercise10Title: 'Alıştırma 10: Dizi İşlemleri',
        exercise10Goal: 'Belgelerdeki dizi alanlarını yönetmeyi öğrenin: öğe ekleme, kaldırma ve arama.',
        exercise10Code: '// Öğe ekleme\ndb.customers.updateOne({ customer_id: 1 }, { $push: { wishlist: \"product_42\" } })\n\n// Çoğaltmalar olmadan ekleme\ndb.customers.updateOne({ customer_id: 1 }, { $addToSet: { tags: { $each: [\"vip\", \"newsletter\"] } } })\n\n// Öğe kaldırma\ndb.customers.updateOne({ customer_id: 1 }, { $pull: { wishlist: \"product_42\" } })\n\n// Etikete sahip müşterileri arama\ndb.customers.find({ tags: \"vip\" })',
        exercise10Output: '{ acknowledged: true, matchedCount: 1, modifiedCount: 1 }',
        exercise10Line1: '$push: Bir diziye öğe ekler. Alan mevcut değilse, otomatik olarak dizi olarak oluşturulur.',
        exercise10Line2: '$addToSet: $push gibi, ancak çoğaltmaları önler. Değer zaten dizide varsa, hiçbir şey olmaz. Etiketler veya kategoriler için ideal.',
        exercise10Line3: '$pull: Bir diziden bir değerin tüm oluşumlarını kaldırır. $push\'ın tersidir.',
        exercise10TaskDesc: 'customer_id 1 olan müşteriye \"premium\" etiketini ekleyin. Ardından \"premium\" etiketine sahip tüm müşterileri arayın.',
        exercise10Hint: 'İpucu: { $addToSet: { tags: \"premium\" } }, ardından find({ tags: \"premium\" })',
        exercise10SolutionCode: 'db.customers.updateOne(\n  { customer_id: 1 },\n  { $addToSet: { tags: \"premium\" } }\n)\ndb.customers.find({ tags: \"premium\" })',
        exercise10VerifyDesc: '\"premium\" etiketine sahip müşterileri görmelisiniz.',
        exercise11: 'Alıştırma 11: Metin Araması ve Desen Eşleştirme',
        exercise11Title: 'Alıştırma 11: Metin Araması ve Desen Eşleştirme',
        exercise11Goal: '$regex ve $in ile esnek arama sorguları oluşturmayı öğrenin.',
        exercise11Code: '// \"Sch\" ile başlayan adlar (büyük/küçük harfe duyarsız)\ndb.customers.find({ name: { $regex: \"^Sch\", $options: \"i\" } })\n\n// Gmail adreslerini bulma\ndb.customers.find({ email: { $regex: \"@gmail\\\\.com$\" } })\n\n// $in: birden fazla değeri kontrol etme\ndb.orders.find({ status: { $in: [\"completed\", \"shipped\"] } })',
        exercise11Output: '[\"Sch\" ile başlayan adlara sahip tüm müşteriler]\n[Gmail adresine sahip tüm müşteriler]\n[Tamamlanan ve gönderilen tüm siparişler]',
        exercise11Line1: '$regex: Normal ifadelere izin verir. ^ = başlangıç, $ = bitiş, i = büyük/küçük harfe duyarsız. Kesin değer bilinmediğinde kullanışlıdır.',
        exercise11Line2: '$options: \"i\" — \"berlin\" aynı zamanda \"Berlin\" ve \"BERLIN\" bulur. Kullanıcı girişi aramaları için önemlidir.',
        exercise11Line3: '$in: Bir değerin listede olup olmadığını kontrol eder — SQL\'deki IN (...) gibi. Birden fazla $or koşulundan daha verimlidir.',
        exercise11TaskDesc: 'Adı \"Pro\" sözcüğünü içeren tüm ürünleri bulun (büyük/küçük harfe duyarsız). @example.com e-postasına sahip müşterileri sayın.',
        exercise11Hint: 'İpucu: Ürünler için { name: { $regex: \"Pro\", $options: \"i\" } }. Saymak için countDocuments() kullanın.',
        exercise11SolutionCode: 'db.products.find({ name: { $regex: \"Pro\", $options: \"i\" } })\ndb.customers.countDocuments({ email: { $regex: \"@example\\\\.com$\" } })',
        exercise11VerifyDesc: '"Pro" adında bulunan ve example.com müşterilerine sahip ürünler.',
        exercise12: 'Alıştırma 12: Pano-İşlem Hattı',
        exercise12Title: 'Alıştırma 12: Pano-İşlem Hattı',
        exercise12Goal: 'Tüm toplama aşamalarını birleştiren eksiksiz bir analiz işlem hattı oluşturunuz.',
        exercise12Code: 'db.order_items.aggregate([\n  // Produktdaten verknüpfen\n  { $lookup: { from: \"products\", localField: \"product_id\", foreignField: \"product_id\", as: \"product\" }},\n  { $unwind: \"$product\" },\n  // Umsatz berechnen\n  { $addFields: { revenue: { $multiply: [\"$quantity\", \"$unit_price\"] } }},\n  // Nach Kategorie gruppieren\n  { $group: {\n    _id: \"$product.category\",\n    total_revenue: { $sum: \"$revenue\" },\n    total_sold: { $sum: \"$quantity\" }\n  }},\n  { $sort: { total_revenue: -1 }}\n])',
        exercise12Output: '[Kategoriler toplam gelir ve satılan birimlerle birlikte, gelire göre sıralanmış]',
        exercise12Line1: 'Bu işlem hattı $lookup, $unwind, $addFields, $group ve $sort — şu ana kadar öğrenilen tüm operatörleri gerçekçi bir Analitik sorgusunda birleştirir.',
        exercise12Line2: '$multiply: İki değerin çarpımını hesaplar. { $multiply: [\"$quantity\", \"$unit_price\"] } = sipariş kalemine göre gelir.',
        exercise12Line3: 'Çok aşamalı işlem hatları verileri adım adım dönüştürür — SQL alt sorgularına benzer, ancak daha okunabilir ve esnek.',
        exercise12TaskDesc: 'İşlem hattını genişletiniz: Başına { $match: { ... } } ekleyerek yalnızca \"completed\" siparişlerinden kalemleri dikkate alınız. Bunu yapmak için order_items ile orders arasında birleştirme yapınız.',
        exercise12Hint: 'db.orders.aggregate([ { $match: { status: \"completed\" } }, { $lookup: { from: \"order_items\", ... } } ]) ile başlayınız',
        exercise12SolutionCode: 'db.orders.aggregate([\n  { $match: { status: \"completed\" } },\n  { $lookup: { from: \"order_items\", localField: \"order_id\", foreignField: \"order_id\", as: \"items\" }},\n  { $unwind: \"$items\" },\n  { $lookup: { from: \"products\", localField: \"items.product_id\", foreignField: \"product_id\", as: \"product\" }},\n  { $unwind: \"$product\" },\n  { $group: { _id: \"$product.category\", revenue: { $sum: { $multiply: [\"$items.quantity\", \"$items.unit_price\"] } } }},\n  { $sort: { revenue: -1 } }\n])',
        exercise12VerifyDesc: 'Yalnızca tamamlanan siparişlerden elde edilen gelir ile kategoriler.',
        challengeTitle: 'Zorluk: RFM Müşteri Segmentasyonu',
        challengeDesc: 'Müşterileri segmentlere ayırmak için Recency-Frequency-Monetary (RFM) analizi yapınız. RFM pazarlamada klasik bir yöntemdir: Recency (son siparişten bu yana geçen gün sayısı), Frequency (sipariş sayısı), Monetary (toplam gelir).',
        step1Challenge: 'Adım 1: Her müşteri için Recency\'i hesapleyiniz (son siparişten bu yana geçen gün sayısı)',
        step2Challenge: 'Adım 2: Müşteri başına Frequency\'i sayınız (sipariş sayısı)',
