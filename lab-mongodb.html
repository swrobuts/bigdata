db = client['megastore']

# Insert customer
customer = {
    "name": "Max Mustermann",
    "email": "max@example.com",
    "address": {
        "street": "Hauptstraße 1",
        "city": "Würzburg",
        "zip": "97070"
    }
}
result = db.customers.insert_one(customer)
print(f"Inserted: {result.inserted_id}")

# Query with projection
electronics = db.products.find(
    {"category": "Electronics"},
    {"name": 1, "price": 1, "_id": 0}
).sort("price", -1)

for product in electronics:
    print(product)

# Update with operators
db.products.update_many(
    {"category": "Electronics"},
    {"$mul": {"price": 0.9}}  # 10% discount
)

# Count and aggregate
count = db.products.count_documents({"price": {"$gt": 50}})
print(f"Products over 50€: {count}")`,

            aggregation: `// Revenue per category
db.orders.aggregate([
  { $unwind: "$items" },
  { $group: {
      _id: "$items.category",
      totalRevenue: { $sum: { $multiply: ["$items.price", "$items.quantity"] } },
      orderCount: { $sum: 1 }
  }},
  { $sort: { totalRevenue: -1 } },
  { $project: {
      category: "$_id",
      totalRevenue: { $round: ["$totalRevenue", 2] },
      orderCount: 1,
      _id: 0
  }}
])

// Top 10 customers by spending
db.orders.aggregate([
  { $group: {
      _id: "$customer_id",
      totalSpent: { $sum: "$total" },
      orderCount: { $sum: 1 },
      avgOrder: { $avg: "$total" }
  }},
  { $match: { orderCount: { $gte: 3 } } },
  { $sort: { totalSpent: -1 } },
  { $limit: 10 }
])`

        ReactDOM.render(<App />, document.getElementById('root'));
