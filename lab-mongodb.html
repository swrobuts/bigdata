                        <button className="next-button" onClick={() => setActiveSection('challenge')}>
                            {t.nextExercise}
                        </button>
                    </section>
                )}

                {activeSection === 'challenge' && (
                    <section className="section active">
                        <h2>{t.challengeTitle}</h2>
                        <span className="badge badge-challenge">Challenge</span>
                        <p>{t.challengeDesc}</p>

                        <h3>{t.challenge}</h3>
                        <ol style={{ marginLeft: '2rem', marginTop: '1rem' }}>
                            <li style={{ marginBottom: '0.5rem' }}>{t.step1Challenge}</li>
                            <li style={{ marginBottom: '0.5rem' }}>{t.step2Challenge}</li>
                            <li style={{ marginBottom: '0.5rem' }}>{t.step3Challenge}</li>
                            <li style={{ marginBottom: '0.5rem' }}>{t.step4Challenge}</li>
                            <li style={{ marginBottom: '0.5rem' }}>{t.step5Challenge}</li>
                        </ol>

                        <div className="hint-box"><strong>{t.hint}:</strong> {t.challengeHint}</div>

                        <Expandable id="challenge-sol" title={t.challengeSolution}>
                            <CodeBlock code={t.challengeSolutionCode} />
                            <p><strong>{t.verification}:</strong> {t.challengeExpected}</p>
                        </Expandable>

                        <button className="next-button" onClick={() => setActiveSection('quiz')}>
                            {t.nextExercise}
                        </button>
                    </section>
                )}

                {activeSection === 'quiz' && (
                    <section className="section active">
                        <h2>{t.quizTitle}</h2>

                        {[1, 2, 3, 4, 5, 6].map(qNum => (
                            <div className="card" key={`q${qNum}`}>
                                <h4>{t[`question${qNum}`]}</h4>
                                <div className="quiz-options">
                                    {['a', 'b', 'c', 'd'].map(opt => {
                                        const isSelected = quizAnswers[qNum] === opt;
                                        const feedback = quizAnswers[qNum] ? getQuizFeedback(qNum, opt) : null;
                                        let className = 'quiz-option';
                                        if (isSelected && feedback) {
                                            className += feedback.correct ? ' correct' : ' incorrect';
                                        }
                                        return (
                                            <div
                                                key={opt}
                                                className={className}
                                                onClick={() => handleQuizAnswer(qNum, opt)}
                                            >
                                                <strong>{opt})</strong> {t[`question${qNum}${opt}`]}
                                            </div>
                                        );
                                    })}
                                </div>
                                {quizAnswers[qNum] && (
                                    <div className={`quiz-feedback ${getQuizFeedback(qNum, quizAnswers[qNum]).correct ? 'correct' : 'incorrect'}`}>
                                        <strong>{getQuizFeedback(qNum, quizAnswers[qNum]).correct ? t.correct : t.incorrect}</strong><br/>
                                        {getQuizFeedback(qNum, quizAnswers[qNum]).explain}
                                    </div>
                                )}
                            </div>
                        ))}

                        <button className="next-button" onClick={() => setActiveSection('outlook')}>
                            {t.nextExercise}
                        </button>
                    </section>
                )}

                {activeSection === 'outlook' && (
                    <section className="section active">
                        <h2>{t.outlookTitle}</h2>

                        <h3>{t.advancedTopics}</h3>
                        <div className="card">
                            <ul>
                                <li>{t.advancedTopic1}</li>
                                <li>{t.advancedTopic2}</li>
                                <li>{t.advancedTopic3}</li>
                                <li>{t.advancedTopic4}</li>
                            </ul>
                        </div>

                        <h3>{t.aiIntegration}</h3>
                        <p>{t.aiExplain}</p>

                        <div className="card">
                            <h4>{t.promptExample1Title}</h4>
                            <p><em>"{t.promptExample1}"</em></p>
                        </div>

                        <div className="card">
                            <h4>{t.promptExample2Title}</h4>
                            <p><em>"{t.promptExample2}"</em></p>
                        </div>

                        <div className="card">
                            <h4>{t.promptExample3Title}</h4>
                            <p><em>"{t.promptExample3}"</em></p>
                        </div>

                        <h3>{t.furtherResources}</h3>
                        <div className="card">
                            <ul>
                                <li><a href="https://docs.mongodb.com/" target="_blank" rel="noopener noreferrer">{t.resource1}</a></li>
                                <li><a href="https://university.mongodb.com/" target="_blank" rel="noopener noreferrer">{t.resource2}</a></li>
                                <li><a href="https://docs.mongodb.com/manual/aggregation/" target="_blank" rel="noopener noreferrer">{t.resource3}</a></li>
                                <li>{t.resource4}</li>
                            </ul>
                        </div>

                        <button className="next-button" onClick={() => setActiveSection('troubleshooting')}>
                            {t.nextExercise}
                        </button>
                    </section>
                )}

                {activeSection === 'troubleshooting' && (
                    <section className="section active">
                        <h2>{t.troubleshootingTitle}</h2>

                        {[1, 2, 3, 4, 5].map(pNum => (
                            <div className="card" key={`p${pNum}`}>
                                <h4>{t[`problem${pNum}`]}</h4>
                                <p>{t[`solution${pNum}`].split('\n').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>)}</p>
                            </div>
                        ))}
                    </section>
                )}
            </main>
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
