        exercise3Line3: '$and: Kombiniert mehrere Bedingungen mit logischem UND. Z.B. { $and: [{ city: "Berlin" }, { country: "Germany" }] }. Es gibt auch $or für ODER-Bedingungen.',
        exercise3TaskDesc: 'Finden Sie alle Bestellungen mit einem order_total größer als 100. Verwenden Sie den $gt Operator.',
        exercise3Hint: 'Hinweis: Verwenden Sie db.orders.find({ order_total: { $gt: 100 } })',
        exercise3SolutionCode: 'db.orders.find({ order_total: { $gt: 100 } })',
        exercise3VerifyDesc: 'Sie sollten alle Bestellungen mit order_total > 100 sehen.',
        exercise4Title: 'Übung 4: Sortieren & Projektion',
        exercise4Goal: 'Lernen Sie, wie Sie Ergebnisse sortieren, begrenzen und nur bestimmte Felder auswählen.',
        exercise4Code: 'db.customers.find(\n  { city: "Berlin" },\n  { name: 1, email: 1, city: 1 }\n).sort({ name: 1 }).limit(5)\n\ndb.orders.find()\n  .sort({ order_total: -1 })\n  .limit(10)',
        exercise4Output: '[Top 5 Berliner Kunden nach Name sortiert, nur name, email, city Felder]\n[Top 10 Bestellungen nach Gesamtbetrag absteigend]',
        exercise4Line1: '{ name: 1, email: 1 }: Projektion — ähnlich wie "SELECT name, email FROM table" in SQL. 1 = Feld zeigen, 0 = Feld verstecken. Dies reduziert die Datenmenge und verbessert die Abfrage-Performance.',
        exercise4Line2: '.sort({ name: 1 }): Sortiert das Ergebnis (ähnlich ORDER BY in SQL). 1 = aufsteigend (A-Z, 0-9), -1 = absteigend (Z-A, 9-0). Z.B. .sort({ price: -1 }) zeigt teuerste Produkte zuerst.',
        exercise4Line3: '.limit(5): Begrenzt das Ergebnis auf maximal 5 Dokumente (ähnlich LIMIT in SQL). Dies ist wichtig für Pagination und um zu viele Daten auf einmal zu vermeiden.',
        exercise4TaskDesc: 'Rufen Sie die 3 teuersten Produkte ab und zeigen Sie nur die Felder name und unit_price an.',
        exercise4Hint: 'Hinweis: Verwenden Sie .sort({ unit_price: -1 }).limit(3) und eine Projektion.',
        exercise4SolutionCode: 'db.products.find(\n  {},\n  { name: 1, unit_price: 1 }\n).sort({ unit_price: -1 }).limit(3)',
        exercise4VerifyDesc: 'Sie sollten 3 Produkte mit den höchsten Preisen sehen, aber nur name und unit_price Felder.',
        exercise5Title: 'Übung 5: Aggregationen',
        exercise5Goal: 'Lernen Sie, wie Sie komplexe Datenanalysen mit der Aggregation Pipeline durchführen.',
        exercise5Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $group: { _id: "$customer_id", total_spent: { $sum: "$order_total" }, order_count: { $sum: 1 } } },\n  { $sort: { total_spent: -1 } },\n  { $limit: 5 }\n])',
        exercise5Output: '[Top 5 Kunden nach Gesamtausgaben, mit Bestellanzahl]',
        exercise5Line1: '$match: Filtert Daten vor der Aggregation (ähnlich WHERE in SQL). Beispiel: { $match: { status: "completed" } } berücksichtigt nur abgeschlossene Bestellungen für die weitere Aggregation.',
        exercise5Line2: '$group: Gruppiert Dokumente nach einem Feld und berechnet Metriken (ähnlich GROUP BY in SQL). Z.B. { _id: "$customer_id" } gruppiert nach Kunde. Dann können Sie Metriken wie $sum, $avg, $count berechnen.',
        exercise5Line3: '$sum "$order_total": Summiert alle order_total Werte innerhalb jeder Gruppe. Sie könnten auch { $sum: 1 } schreiben um die Anzahl der Dokumente zu zählen. Andere Aggregatoren: $avg (Durchschnitt), $min, $max.',
        exercise5TaskDesc: 'Zählen Sie die Bestellungen pro Status (completed, pending, cancelled) und berechnen Sie den Gesamtumsatz pro Status. Das gibt dem Management einen Überblick über die Bestellpipeline.',
        exercise5Hint: 'Hinweis: Verwenden Sie $group mit _id: "$status" und total_orders: { $sum: 1 } sowie total_revenue: { $sum: "$order_total" }',
        exercise5SolutionCode: 'db.orders.aggregate([\n  { $group: {\n    _id: "$status",\n    total_orders: { $sum: 1 },\n    total_revenue: { $sum: "$order_total" }\n  } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise5VerifyDesc: 'Sie sollten die Statuswerte (completed, pending, cancelled) mit Anzahl und Gesamtumsatz sehen.',
        exercise6Title: 'Übung 6: MegaStore-Analyse',
        exercise6Goal: 'Kombinieren Sie alle Techniken: Aggregationen, Joins ($lookup) und komplexe Analysefragen.',
        exercise6Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } },\n  { $unwind: "$customer_info" },\n  { $group: { _id: "$customer_id", customer_name: { $first: "$customer_info.name" }, total_revenue: { $sum: "$order_total" }, orders: { $sum: 1 } } },\n  { $sort: { total_revenue: -1 } },\n  { $limit: 5 }\n])',
        exercise6Output: '[Top 5 Kunden mit Name, Gesamtumsatz und Bestellanzahl]',
        exercise6Line1: '$lookup: Verbindet Daten aus einer anderen Collection (ähnlich SQL JOIN). Beispiel: { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } } holt Kundendaten zur Bestellung.',
        exercise6Line2: '$unwind: Expandiert ein Array-Feld in separate Dokumente. Nach $lookup enthält das Feld z.B. "customer_info" ein Array — $unwind erstellt ein Dokument pro Array-Element. Wichtig für die weitere Aggregation.',
        exercise6Line3: '$first: Holt den ersten Wert aus einer Gruppe innerhalb von $group. Z.B. { customer_name: { $first: "$customer_info.name" } } gibt den Namen des ersten Kunden in der Gruppe aus (nützlich wenn Sie nur einen Repräsentanten brauchen).',
        exercise6TaskDesc: 'Analysieren Sie, welche Produktkategorie am meisten Umsatz generiert hat. Nutzen Sie $lookup, um Products-Daten zu verbinden, und aggregieren Sie nach Kategorie.',
        exercise6Hint: 'Hinweis: Verwenden Sie $lookup um order_items mit products zu verbinden und aggregieren Sie den Umsatz nach category.',
        exercise6SolutionCode: 'db.order_items.aggregate([\n  { $lookup: { from: "products", localField: "product_id", foreignField: "product_id", as: "product_info" } },\n  { $unwind: "$product_info" },\n  { $group: { _id: "$product_info.category", total_revenue: { $sum: { $multiply: ["$quantity", "$unit_price"] } } } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise6VerifyDesc: 'Sie sollten Produktkategorien mit ihrem Gesamtumsatz sehen, sortiert nach Umsatz.',
        exercise7: 'Übung 7: Daten aktualisieren',
        exercise7Title: 'Übung 7: Daten aktualisieren',
        exercise7Goal: 'Lernen Sie, wie Sie Dokumente mit updateOne() und updateMany() gezielt verändern.',
        exercise7Code: 'db.customers.updateOne(\n  { customer_id: 999 },\n  { $set: { city: \"Berlin\", country: \"Germany\" } }\n)\n\ndb.products.updateMany(\n  { category: \"Electronics\" },\n  { $inc: { stock_quantity: 10 } }\n)',
        exercise7Output: '{ acknowledged: true, matchedCount: 1, modifiedCount: 1 }\n{ acknowledged: true, matchedCount: 45, modifiedCount: 45 }',
        exercise7Line1: '$set: Setzt Felder auf neue Werte ohne das Dokument zu überschreiben. { $set: { city: \"Berlin\" } } ändert nur das city-Feld — alle anderen Felder bleiben erhalten.',
        exercise7Line2: '$inc: Erhöht oder verringert einen numerischen Wert. { $inc: { stock_quantity: 10 } } addiert 10 zum Bestand. Nützlich für Zähler und Lagerbestände.',
        exercise7Line3: 'updateMany() vs updateOne(): updateOne() ändert das erste passende Dokument, updateMany() alle. Ohne Filter ändert updateMany({}) die gesamte Collection!',
        exercise7TaskDesc: 'Erhöhen Sie den Preis aller Produkte der Kategorie \"Clothing\" um 5%. Verwenden Sie $mul: { $mul: { unit_price: 1.05 } }',
        exercise7Hint: 'Hinweis: db.products.updateMany({ category: \"Clothing\" }, { $mul: { unit_price: 1.05 } })',
        exercise7SolutionCode: 'db.products.updateMany(\n  { category: \"Clothing\" },\n  { $mul: { unit_price: 1.05 } }\n)',
        exercise7VerifyDesc: 'Prüfen Sie mit db.products.find({ category: \"Clothing\" }) ob die Preise gestiegen sind.',
        exercise8: 'Übung 8: Daten löschen & bereinigen',
        exercise8Title: 'Übung 8: Daten löschen & bereinigen',
        exercise8Goal: 'Lernen Sie, wie Sie Dokumente sicher löschen und Collections aufräumen.',
        exercise8Code: '// Einzelnes Dokument löschen\ndb.customers.deleteOne({ customer_id: 999 })\n\n// Mehrere Dokumente löschen\ndb.orders.deleteMany({ status: \"cancelled\" })\n\n// Zählen nach dem Löschen\ndb.orders.countDocuments()\ndb.orders.countDocuments({ status: \"completed\" })',
        exercise8Output: '{ acknowledged: true, deletedCount: 1 }\n{ acknowledged: true, deletedCount: 23 }\n977\n750',
        exercise8Line1: 'deleteOne(): Löscht das erste passende Dokument. Immer mit eindeutigem Feld (z.B. customer_id) nutzen um ungewollte Löschungen zu vermeiden.',
        exercise8Line2: 'deleteMany(): Löscht alle passenden Dokumente. ACHTUNG: deleteMany({}) ohne Filter löscht die gesamte Collection! Immer einen Filter angeben.',
        exercise8Line3: 'countDocuments(): Zählt Dokumente mit optionalem Filter — ideal zur Verifikation vor und nach Löschoperationen. Moderner Ersatz für das veraltete count().',
        exercise8TaskDesc: 'Löschen Sie alle Produkte mit stock_quantity = 0. Zählen Sie vorher und nachher um die Korrektheit zu prüfen.',
        exercise8Hint: 'Hinweis: Erst db.products.countDocuments({ stock_quantity: 0 }), dann deleteMany, dann nochmals countDocuments().',
        exercise8SolutionCode: '// Vorher\ndb.products.countDocuments({ stock_quantity: 0 })\n// Löschen\ndb.products.deleteMany({ stock_quantity: 0 })\n// Nachher\ndb.products.countDocuments()',
        exercise8VerifyDesc: 'Die Produktanzahl sollte nach dem Löschen kleiner sein als vorher.',
        exercise9: 'Übung 9: Indizes & Performance',
        exercise9Title: 'Übung 9: Indizes & Performance',
        exercise9Goal: 'Verstehen Sie, wie Indizes Abfragen beschleunigen und wann sie sinnvoll sind.',
        exercise9Code: '// Index erstellen\ndb.customers.createIndex({ city: 1 })\n\n// Zusammengesetzter Index\ndb.orders.createIndex({ customer_id: 1, order_date: -1 })\n\n// Performancevergleich mit explain()\ndb.customers.find({ city: \"Berlin\" }).explain(\"executionStats\")\n\n// Alle Indizes anzeigen\ndb.customers.getIndexes()',
        exercise9Output: '{ numIndexesBefore: 1, numIndexesAfter: 2 }\n// explain() zeigt: COLLSCAN (ohne Index) vs IXSCAN (mit Index)',
        exercise9Line1: 'createIndex({ city: 1 }): Erstellt einen aufsteigenden Index. Ohne Index: Collection Scan (alle Dokumente). Mit Index: Index Scan (nur Treffer) — enorm schneller bei großen Datenmengen.',
        exercise9Line2: 'Zusammengesetzter Index: { customer_id: 1, order_date: -1 } — optimal wenn Abfragen nach customer_id filtern UND nach order_date sortieren.',
        exercise9Line3: 'explain(\"executionStats\"): Zeigt den Ausführungsplan — totalDocsExamined, executionTimeMillis. Unverzichtbar für Performance-Analysen.',
        exercise9TaskDesc: 'Erstellen Sie einen Index auf dem Feld email in der customers-Collection. Prüfen Sie mit explain() ob IXSCAN statt COLLSCAN verwendet wird.',
        exercise9Hint: 'Hinweis: db.customers.createIndex({ email: 1 }), dann .find({ email: \"alice@example.com\" }).explain(\"executionStats\")',
        exercise9SolutionCode: 'db.customers.createIndex({ email: 1 })\ndb.customers.find({ email: \"alice@example.com\" }).explain(\"executionStats\")',
        exercise9VerifyDesc: 'In explain() sollte IXSCAN statt COLLSCAN erscheinen — das zeigt dass der Index genutzt wird.',
        exercise10: 'Übung 10: Array-Operationen',
        exercise10Title: 'Übung 10: Array-Operationen',
        exercise10Goal: 'Lernen Sie, wie Sie Array-Felder in Dokumenten verwalten: Elemente hinzufügen, entfernen und suchen.',
        exercise10Code: '// Element hinzufügen\ndb.customers.updateOne({ customer_id: 1 }, { $push: { wishlist: \"product_42\" } })\n\n// Ohne Duplikate hinzufügen\ndb.customers.updateOne({ customer_id: 1 }, { $addToSet: { tags: { $each: [\"vip\", \"newsletter\"] } } })\n\n// Element entfernen\ndb.customers.updateOne({ customer_id: 1 }, { $pull: { wishlist: \"product_42\" } })\n\n// Kunden mit Tag suchen\ndb.customers.find({ tags: \"vip\" })',
        exercise10Output: '{ acknowledged: true, matchedCount: 1, modifiedCount: 1 }',
        exercise10Line1: '$push: Fügt ein Element zu einem Array hinzu. Falls das Feld nicht existiert, wird es automatisch als Array angelegt.',
        exercise10Line2: '$addToSet: Wie $push, aber verhindert Duplikate. Wenn der Wert bereits im Array ist, passiert nichts. Ideal für Tags oder Kategorien.',
        exercise10Line3: '$pull: Entfernt alle Vorkommen eines Wertes aus einem Array. Gegenteil von $push.',
        exercise10TaskDesc: 'Fügen Sie dem Kunden mit customer_id 1 das Tag \"premium\" hinzu. Suchen Sie dann alle Kunden mit dem Tag \"premium\".',
        exercise10Hint: 'Hinweis: { $addToSet: { tags: \"premium\" } }, dann find({ tags: \"premium\" })',
        exercise10SolutionCode: 'db.customers.updateOne(\n  { customer_id: 1 },\n  { $addToSet: { tags: \"premium\" } }\n)\ndb.customers.find({ tags: \"premium\" })',
        exercise10VerifyDesc: 'Sie sollten Kunden mit dem Tag \"premium\" sehen.',
        exercise11: 'Übung 11: Textsuche & Musterabgleich',
        exercise11Title: 'Übung 11: Textsuche & Musterabgleich',
        exercise11Goal: 'Lernen Sie, flexible Suchabfragen mit $regex und $in zu erstellen.',
        exercise11Code: '// Namen die mit \"Sch\" beginnen (case-insensitive)\ndb.customers.find({ name: { $regex: \"^Sch\", $options: \"i\" } })\n\n// Gmail-Adressen finden\ndb.customers.find({ email: { $regex: \"@gmail\\\\.com$\" } })\n\n// $in: mehrere Werte prüfen\ndb.orders.find({ status: { $in: [\"completed\", \"shipped\"] } })',
        exercise11Output: '[Alle Kunden mit Namen die mit \"Sch\" beginnen]\n[Alle Kunden mit Gmail-Adresse]\n[Alle abgeschlossenen und versendeten Bestellungen]',
        exercise11Line1: '$regex: Erlaubt reguläre Ausdrücke. ^ = Anfang, $ = Ende, i = case-insensitiv. Nützlich wenn der genaue Wert nicht bekannt ist.',
        exercise11Line2: '$options: \"i\" — \"berlin\" findet auch \"Berlin\" und \"BERLIN\". Wichtig für Suchen auf Benutzereingaben.',
        exercise11Line3: '$in: Prüft ob ein Wert in einer Liste vorkommt — wie IN (...) in SQL. Effizienter als mehrere $or-Bedingungen.',
        exercise11TaskDesc: 'Finden Sie alle Produkte deren Name das Wort \"Pro\" enthält (case-insensitive). Zählen Sie Kunden mit einer @example.com E-Mail.',
        exercise11Hint: 'Hinweis: { name: { $regex: \"Pro\", $options: \"i\" } } für Produkte. countDocuments() zum Zählen.',
        exercise11SolutionCode: 'db.products.find({ name: { $regex: \"Pro\", $options: \"i\" } })\ndb.customers.countDocuments({ email: { $regex: \"@example\\\\.com$\" } })',
        exercise11VerifyDesc: 'Produkte mit \"Pro\" im Namen und Anzahl der example.com-Kunden.',
        exercise12: 'Übung 12: Dashboard-Pipeline',
        exercise12Title: 'Übung 12: Dashboard-Pipeline',
        exercise12Goal: 'Erstellen Sie eine vollständige Analyse-Pipeline, die alle Aggregationsstufen kombiniert.',
        exercise12Code: 'db.order_items.aggregate([\n  // Produktdaten verknüpfen\n  { $lookup: { from: \"products\", localField: \"product_id\", foreignField: \"product_id\", as: \"product\" }},\n  { $unwind: \"$product\" },\n  // Umsatz berechnen\n  { $addFields: { revenue: { $multiply: [\"$quantity\", \"$unit_price\"] } }},\n  // Nach Kategorie gruppieren\n  { $group: {\n    _id: \"$product.category\",\n    total_revenue: { $sum: \"$revenue\" },\n    total_sold: { $sum: \"$quantity\" }\n  }},\n  { $sort: { total_revenue: -1 }}\n])',
        exercise12Output: '[Kategorien mit Gesamtumsatz und verkauften Einheiten, sortiert nach Umsatz]',
        exercise12Line1: 'Diese Pipeline kombiniert $lookup, $unwind, $addFields, $group und $sort — alle bisher gelernten Operatoren in einem realistischen Analytics-Query.',
        exercise12Line2: '$multiply: Berechnet das Produkt zweier Werte. { $multiply: [\"$quantity\", \"$unit_price\"] } = Umsatz pro Bestellposition.',
        exercise12Line3: 'Mehrstufige Pipelines transformieren Daten Schritt für Schritt — ähnlich wie SQL-Unterabfragen, aber lesbarer und flexibler.',
        exercise12TaskDesc: 'Erweitern Sie die Pipeline: Fügen Sie am Anfang { $match: { ... } } hinzu um nur Positionen von \"completed\" Bestellungen zu berücksichtigen. Joinen Sie dazu order_items mit orders.',
        exercise12Hint: 'Beginnen Sie mit db.orders.aggregate([ { $match: { status: \"completed\" } }, { $lookup: { from: \"order_items\", ... } } ])',
        exercise12SolutionCode: 'db.orders.aggregate([\n  { $match: { status: \"completed\" } },\n  { $lookup: { from: \"order_items\", localField: \"order_id\", foreignField: \"order_id\", as: \"items\" }},\n  { $unwind: \"$items\" },\n  { $lookup: { from: \"products\", localField: \"items.product_id\", foreignField: \"product_id\", as: \"product\" }},\n  { $unwind: \"$product\" },\n  { $group: { _id: \"$product.category\", revenue: { $sum: { $multiply: [\"$items.quantity\", \"$items.unit_price\"] } } }},\n  { $sort: { revenue: -1 } }\n])',
        exercise12VerifyDesc: 'Kategorien mit Umsatz aus nur abgeschlossenen Bestellungen.',
        challengeTitle: 'Challenge: RFM-Kundensegmentierung',
        challengeDesc: 'Führen Sie eine Recency-Frequency-Monetary (RFM) Analyse durch um Kunden zu segmentieren. RFM ist eine klassische Methode im Marketing: Recency (wie lange ist die letzte Bestellung her), Frequency (wie viele Bestellungen), Monetary (wie viel Umsatz).',
        step1Challenge: 'Schritt 1: Berechnen Sie für jeden Kunden das Recency (Tage seit letzter Bestellung)',
        step2Challenge: 'Schritt 2: Zählen Sie die Frequency (Anzahl der Bestellungen) pro Kunde',
        step3Challenge: 'Schritt 3: Summieren Sie das Monetary (Gesamtumsatz) pro Kunde',
        step4Challenge: 'Schritt 4: Erstellen Sie RFM-Scores (1-5 Punkte pro Kategorie)',
        step5Challenge: 'Schritt 5: Segmentieren Sie Kunden in Kategorien wie "Champions" (hohe RFM-Scores) oder "At-Risk" (niedrige RFM)',
        challengeHint: 'Hinweis: Verwenden Sie $dateSubtract um Tage zu berechnen, $group für Aggregationen, und $cond um Scores zuzuweisen.',
        challengeSolution: 'Lösung anzeigen',
        challengeSolutionCode: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $group: {\n    _id: "$customer_id",\n    last_order_date: { $max: "$order_date" },\n    frequency: { $sum: 1 },\n    monetary: { $sum: "$order_total" }\n  } },\n  { $addFields: {\n    recency_score: {\n      $cond: [\n        { $lt: [{ $dateDiff: { startDate: "$last_order_date", endDate: new Date(), unit: "day" } }, 30] },\n        5,\n        { $cond: [{ $lt: [{ $dateDiff: { startDate: "$last_order_date", endDate: new Date(), unit: "day" } }, 90] }, 3, 1] }\n      ]\n    },\n    frequency_score: { $cond: [{ $gte: ["$frequency", 5] }, 5, { $cond: [{ $gte: ["$frequency", 2] }, 3, 1] }] },\n    monetary_score: { $cond: [{ $gte: ["$monetary", 500] }, 5, { $cond: [{ $gte: ["$monetary", 200] }, 3, 1] }] }\n  } },\n  { $addFields: {\n    rfm_score: { $avg: ["$recency_score", "$frequency_score", "$monetary_score"] }\n  } },\n  { $addFields: {\n    segment: {\n      $cond: [\n        { $gte: ["$rfm_score", 4] },\n        "Champions",\n        { $cond: [{ $gte: ["$rfm_score", 3] }, "Loyal Customers", "At-Risk"] }\n      ]\n    }\n  } },\n  { $sort: { rfm_score: -1 } }\n])',

        exercise2Goal: 'Learn how to insert new data into MongoDB using insertOne() and insertMany().',
        exercise2Code: 'db.customers.insertOne({\n  customer_id: 999,\n  name: "Bob Mueller",\n  email: "bob@example.com",\n  city: "Munich",\n  country: "Germany",\n  registration_date: "2024-03-01"\n})\n\ndb.customers.insertMany([\n  { customer_id: 1000, name: "Carol Wagner", email: "carol@example.com", city: "Hamburg", country: "Germany", registration_date: "2024-02-15" },\n  { customer_id: 1001, name: "David Fischer", email: "david@example.com", city: "Cologne", country: "Germany", registration_date: "2024-03-05" }\n])',
        exercise2Output: '{ acknowledged: true, insertedId: ObjectId("...") }\n{ acknowledged: true, insertedIds: [ ObjectId("..."), ObjectId("...") ] }',
        exercise2Line1: 'db.customers.insertOne({...}): Inserts a single document and returns the result (with "insertedId" — an automatically generated ObjectId, which is MongoDB\'s unique identifier, similar to a primary key in SQL).',
        exercise2Line2: 'db.customers.insertMany([...]): Inserts multiple documents at once and returns all insertedIds. This is much more efficient for bulk operations than multiple insertOne() calls.',
        exercise2TaskDesc: 'Insert a new product with insertOne() into the products collection. Use a unique product_id, name, category, price, and stock quantity.',

        exercise2VerifyDesc: 'The result should show a confirmed insertion with an insertedId.',
        exercise3Title: 'Exercise 3: Querying with Filters',
        exercise3Goal: 'Learn how to retrieve data with filter criteria and query operators.',
        exercise3Code: 'db.customers.find({ city: "Berlin" })\n\ndb.products.find({ unit_price: { $gt: 50 } })\n\ndb.customers.find({\n  $and: [\n    { country: "Germany" },\n    { registration_date: { $gte: "2023-01-01" } }\n  ]\n})',
        exercise3Output: '[All customers from Berlin with their fields]\n[All products with price > 50]\n[All German customers registered after 2023-01-01]',
        exercise3Line1: 'find({ city: "Berlin" }): Finds all documents with city = "Berlin" — similar to "SELECT * FROM customers WHERE city = \'Berlin\'" in SQL. The result is a cursor with multiple documents.',
        exercise3Line2: 'find({ unit_price: { $gt: 50 } }): Finds all products with unit_price greater than 50. The $gt operator (greater than) is MongoDB\'s query operator syntax. Other operators: $lt (less than), $gte (>=), $lte (<=), $ne (!=).',
        exercise3Line3: '$and: Combines multiple conditions with logical AND. For example, { $and: [{ city: "Berlin" }, { country: "Germany" }] }. There is also $or for OR conditions.',
        exercise3TaskDesc: 'Find all orders with an order_total greater than 100. Use the $gt operator.',
        exercise3Hint: 'Hint: Use db.orders.find({ order_total: { $gt: 100 } })',

        exercise3VerifyDesc: 'You should see all orders with order_total > 100.',
        exercise4Title: 'Exercise 4: Sorting & Projection',
        exercise4Goal: 'Learn how to sort results, limit them, and select only specific fields.',
        exercise4Code: 'db.customers.find(\n  { city: "Berlin" },\n  { name: 1, email: 1, city: 1 }\n).sort({ name: 1 }).limit(5)\n\ndb.orders.find()\n  .sort({ order_total: -1 })\n  .limit(10)',
        exercise4Output: '[Top 5 Berlin customers sorted by name, showing only name, email, city fields]\n[Top 10 orders sorted by total amount in descending order]',
        exercise4Line1: '{ name: 1, email: 1 }: Projection — similar to "SELECT name, email FROM table" in SQL. 1 = show field, 0 = hide field. This reduces data volume and improves query performance.',
        exercise4Line2: '.sort({ name: 1 }): Sorts the result (similar to ORDER BY in SQL). 1 = ascending (A-Z, 0-9), -1 = descending (Z-A, 9-0). For example, .sort({ price: -1 }) shows most expensive products first.',
        exercise4Line3: '.limit(5): Limits the result to a maximum of 5 documents (similar to LIMIT in SQL). This is important for pagination and to avoid fetching too much data at once.',
        exercise4TaskDesc: 'Retrieve the 3 most expensive products and show only the name and unit_price fields.',
        exercise4Hint: 'Hint: Use .sort({ unit_price: -1 }).limit(3) with a projection.',
        exercise4SolutionCode: 'db.products.find(\n  {},\n  { name: 1, unit_price: 1 }\n).sort({ unit_price: -1 }).limit(3)',
        exercise4VerifyDesc: 'You should see 3 products with the highest prices, but only name and unit_price fields.',
        exercise5Title: 'Exercise 5: Aggregations',
        exercise5Goal: 'Learn how to perform complex data analysis using the aggregation pipeline.',
        exercise5Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $group: { _id: "$customer_id", total_spent: { $sum: "$order_total" }, order_count: { $sum: 1 } } },\n  { $sort: { total_spent: -1 } },\n  { $limit: 5 }\n])',
        exercise5Output: '[Top 5 customers by total spending with order count]',
        exercise5Line1: '$match: Filters data before aggregation (similar to WHERE in SQL). Example: { $match: { status: "completed" } } only considers completed orders for further aggregation.',
        exercise5Line2: '$group: Groups documents by a field and computes metrics (similar to GROUP BY in SQL). For example, { _id: "$customer_id" } groups by customer. Then you can calculate metrics like $sum, $avg, $count.',
        exercise5Line3: '$sum "$order_total": Sums all order_total values within each group. You could also write { $sum: 1 } to count the number of documents. Other aggregators: $avg (average), $min, $max.',
        exercise5TaskDesc: 'Count the number of orders per status (completed, pending, cancelled) and calculate the total revenue per status. This gives management an overview of the order pipeline.',
        exercise5Hint: 'Hint: Use $group with _id: "$status" and total_orders: { $sum: 1 } plus total_revenue: { $sum: "$order_total" }',
        exercise5SolutionCode: 'db.orders.aggregate([\n  { $group: {\n    _id: "$status",\n    total_orders: { $sum: 1 },\n    total_revenue: { $sum: "$order_total" }\n  } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise5VerifyDesc: 'You should see the statuses (completed, pending, cancelled) with their order count and total revenue.',
        exercise6Title: 'Exercise 6: MegaStore Analysis',
        exercise6Goal: 'Combine all techniques: aggregations, joins ($lookup), and complex analytical questions.',
        exercise6Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } },\n  { $unwind: "$customer_info" },\n  { $group: { _id: "$customer_id", customer_name: { $first: "$customer_info.name" }, total_revenue: { $sum: "$order_total" }, orders: { $sum: 1 } } },\n  { $sort: { total_revenue: -1 } },\n  { $limit: 5 }\n])',
        exercise6Output: '[Top 5 customers with name, total revenue, and order count]',
        exercise6Line1: '$lookup: Joins data from another collection (similar to SQL JOIN). Example: { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } } fetches customer data linked to the order.',
        exercise6Line2: '$unwind: Expands an array field into separate documents. After $lookup, the field (e.g., "customer_info") may contain an array — $unwind creates one document per array element. Essential for further aggregation.',
        exercise6Line3: '$first: Gets the first value from a group within $group. For example, { customer_name: { $first: "$customer_info.name" } } returns the name of the first customer in the group (useful when you need just one representative).',
        exercise6TaskDesc: 'Analyze which product category generated the most revenue. Use $lookup to join products data and aggregate revenue by category.',
        exercise6Hint: 'Hint: Use $lookup to join order_items with products and aggregate revenue by category.',
        exercise6SolutionCode: 'db.order_items.aggregate([\n  { $lookup: { from: "products", localField: "product_id", foreignField: "product_id", as: "product_info" } },\n  { $unwind: "$product_info" },\n  { $group: { _id: "$product_info.category", total_revenue: { $sum: { $multiply: ["$quantity", "$unit_price"] } } } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise6VerifyDesc: 'You should see product categories with their total revenue, sorted by revenue.',
        exercise7: 'Exercise 7: Updating Data',

        exercise7Code: 'db.customers.updateOne(\n  { customer_id: 999 },\n  { $set: { city: \"Berlin\", country: \"Germany\" } }\n)\n\ndb.products.updateMany(\n  { category: \"Electronics\" },\n  { $inc: { stock_quantity: 10 } }\n)',

        exercise7Line2: '$inc: Increments or decrements a numeric field. { $inc: { stock_quantity: 10 } } adds 10 to the current stock. Useful for counters and inventory.',
        exercise7Line3: 'updateMany() vs updateOne(): updateOne() changes the first match, updateMany() changes all matches. Without a filter, updateMany({}) affects the entire collection!',
        exercise7TaskDesc: 'Increase the price of all \"Clothing\" products by 5%. Use $mul: { $mul: { unit_price: 1.05 } }',

        exercise8: 'Exercise 8: Deleting & Cleanup',

        exercise8Goal: 'Learn how to safely delete documents and clean up collections.',
        exercise8Code: '// Delete one document\ndb.customers.deleteOne({ customer_id: 999 })\n\n// Delete multiple documents\ndb.orders.deleteMany({ status: \"cancelled\" })\n\n// Count after deletion\ndb.orders.countDocuments()\ndb.orders.countDocuments({ status: \"completed\" })',

        exercise9: 'Exercise 9: Indexes & Performance',
        exercise9Title: 'Exercise 9: Indexes & Performance',
        exercise9Goal: 'Understand how indexes speed up queries and when they are useful.',
        exercise9Code: '// Create an index\ndb.customers.createIndex({ city: 1 })\n\n// Compound index\ndb.orders.createIndex({ customer_id: 1, order_date: -1 })\n\n// Performance comparison\ndb.customers.find({ city: \"Berlin\" }).explain(\"executionStats\")\n\n// Show all indexes\ndb.customers.getIndexes()',
        exercise9Output: '{ numIndexesBefore: 1, numIndexesAfter: 2 }\n// explain() shows: COLLSCAN (no index) vs IXSCAN (with index)',

        exercise9TaskDesc: 'Create an index on the email field in the customers collection. Use explain() to verify IXSCAN is used instead of COLLSCAN.',

        exercise10: 'Exercise 10: Array Operations',

        exercise10Goal: 'Learn how to manage array fields in documents: add, remove, and search elements.',
        exercise10Code: '// Add element\ndb.customers.updateOne({ customer_id: 1 }, { $push: { wishlist: \"product_42\" } })\n\n// Add without duplicates\ndb.customers.updateOne({ customer_id: 1 }, { $addToSet: { tags: { $each: [\"vip\", \"newsletter\"] } } })\n\n// Remove element\ndb.customers.updateOne({ customer_id: 1 }, { $pull: { wishlist: \"product_42\" } })\n\n// Find customers with tag\ndb.customers.find({ tags: \"vip\" })',

        exercise12: 'Exercise 12: Dashboard Pipeline',

        exercise12Goal: 'Build a complete analytics pipeline combining all aggregation stages.',
        exercise12Code: 'db.order_items.aggregate([\n  // Join product data\n  { $lookup: { from: \"products\", localField: \"product_id\", foreignField: \"product_id\", as: \"product\" }},\n  { $unwind: \"$product\" },\n  // Calculate revenue\n  { $addFields: { revenue: { $multiply: [\"$quantity\", \"$unit_price\"] } }},\n  // Group by category\n  { $group: {\n    _id: \"$product.category\",\n    total_revenue: { $sum: \"$revenue\" },\n    total_sold: { $sum: \"$quantity\" }\n  }},\n  { $sort: { total_revenue: -1 }}\n])',

        exercise3VerifyDesc: 'يجب أن تشاهد جميع الطلبات ذات order_total > 100.',
        exercise4Title: 'التمرين 4: الفرز والإسقاط',
        exercise4Goal: 'تعلم كيفية فرز النتائج وتحديدها واختيار حقول معينة فقط.',
        exercise4Code: 'db.customers.find(\n  { city: "Berlin" },\n  { name: 1, email: 1, city: 1 }\n).sort({ name: 1 }).limit(5)\n\ndb.orders.find()\n  .sort({ order_total: -1 })\n  .limit(10)',
        exercise4Output: '[أفضل 5 عملاء برلينيين مرتبين حسب الاسم، الحقول name وemail وcity فقط]\n[أفضل 10 طلبيات مرتبة حسب إجمالي المبلغ بترتيب تنازلي]',
        exercise4Line1: '{ name: 1, email: 1 }: الإسقاط (Projection) — يشبه "SELECT name, email FROM table" في SQL. 1 = إظهار الحقل، 0 = إخفاء الحقل. يقلل هذا من حجم البيانات ويحسن أداء الاستعلام.',

        exercise4Line3: '.limit(5): تحديد النتيجة لأقصى 5 مستندات (يشبه LIMIT في SQL). هذا مهم للتقسيم إلى صفحات وتجنب استرجاع كميات كبيرة من البيانات في وقت واحد.',

        exercise5Title: 'التمرين 5: التجميع',
        exercise5Goal: 'تعلم كيفية إجراء تحليلات بيانات معقدة باستخدام خط أنابيب التجميع.',
        exercise5Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $group: { _id: "$customer_id", total_spent: { $sum: "$order_total" }, order_count: { $sum: 1 } } },\n  { $sort: { total_spent: -1 } },\n  { $limit: 5 }\n])',
        exercise5Output: '[أفضل 5 عملاء حسب إجمالي النفقات، مع عدد الطلبيات]',
        exercise5Line1: '$match: تصفية البيانات قبل التجميع (يشبه WHERE في SQL). مثال: { $match: { status: "completed" } } يأخذ في الاعتبار فقط الطلبيات المكتملة للتجميع الإضافي.',
        exercise5Line2: '$group: تجميع المستندات حسب حقل وحساب المقاييس (يشبه GROUP BY في SQL). على سبيل المثال، { _id: "$customer_id" } يجمع حسب العميل. بعد ذلك يمكنك حساب مقاييس مثل $sum و $avg و $count.',
        exercise5Line3: '$sum "$order_total": جمع جميع قيم order_total داخل كل مجموعة. يمكنك أيضاً كتابة { $sum: 1 } لعد المستندات. عوامل تجميع أخرى: $avg (المتوسط)، $min، $max.',
        exercise5TaskDesc: 'عد الطلبيات حسب الحالة (completed وpending وcancelled) واحسب إجمالي الإيرادات لكل حالة. يعطي هذا الإدارة لمحة عامة عن خط أنابيب الطلبيات.',
        exercise5Hint: 'تلميح: استخدم $group مع _id: "$status" وtotal_orders: { $sum: 1 } وكذلك total_revenue: { $sum: "$order_total" }',
        exercise5SolutionCode: 'db.orders.aggregate([\n  { $group: {\n    _id: "$status",\n    total_orders: { $sum: 1 },\n    total_revenue: { $sum: "$order_total" }\n  } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise5VerifyDesc: 'يجب أن تشاهد قيم الحالة (completed وpending وcancelled) مع العدد والإيرادات الإجمالية.',
        exercise6Title: 'التمرين 6: تحليل MegaStore',
        exercise6Goal: 'اجمع كل التقنيات: التجميع والربط ($lookup) والأسئلة التحليلية المعقدة.',
        exercise6Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } },\n  { $unwind: "$customer_info" },\n  { $group: { _id: "$customer_id", customer_name: { $first: "$customer_info.name" }, total_revenue: { $sum: "$order_total" }, orders: { $sum: 1 } } },\n  { $sort: { total_revenue: -1 } },\n  { $limit: 5 }\n])',
        exercise6Output: '[أفضل 5 عملاء مع الاسم وإجمالي الإيرادات وعدد الطلبيات]',
        exercise6Line1: '$lookup: ربط البيانات من مجموعة أخرى (يشبه SQL JOIN). مثال: { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } } يستجلب بيانات العميل المرتبطة بالطلبية.',
        exercise6Line2: '$unwind: توسيع حقل المصفوفة إلى مستندات منفصلة. بعد $lookup، يحتوي الحقل مثلاً "customer_info" على مصفوفة — $unwind ينشئ مستند واحد لكل عنصر من المصفوفة. مهم للتجميع الإضافي.',
        exercise6Line3: '$first: الحصول على القيمة الأولى من مجموعة داخل $group. على سبيل المثال، { customer_name: { $first: "$customer_info.name" } } يعيد اسم العميل الأول في المجموعة (مفيد عندما تحتاج إلى ممثل واحد فقط).',
        exercise6TaskDesc: 'حلل أي فئة منتج أنتجت أكثر إيرادات. استخدم $lookup لربط بيانات Products والتجميع حسب الفئة.',
        exercise6Hint: 'تلميح: استخدم $lookup لربط order_items مع products والتجميع حسب الإيرادات في الفئة.',
        exercise6SolutionCode: 'db.order_items.aggregate([\n  { $lookup: { from: "products", localField: "product_id", foreignField: "product_id", as: "product_info" } },\n  { $unwind: "$product_info" },\n  { $group: { _id: "$product_info.category", total_revenue: { $sum: { $multiply: ["$quantity", "$unit_price"] } } } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise6VerifyDesc: 'يجب أن تشاهد فئات المنتجات مع إجمالي إيراداتها، مرتبة حسب الإيراد.',
        exercise7: 'التمرين 7: تحديث البيانات',

        exercise9: 'التمرين 9: الفهارس والأداء',
        exercise9Title: 'التمرين 9: الفهارس والأداء',
        exercise9Goal: 'افهم كيف تسرع الفهارس الاستعلامات ومتى تكون مفيدة.',
        exercise9Code: '// إنشاء فهرس\ndb.customers.createIndex({ city: 1 })\n\n// فهرس مركب\ndb.orders.createIndex({ customer_id: 1, order_date: -1 })\n\n// مقارنة الأداء مع explain()\ndb.customers.find({ city: \"Berlin\" }).explain(\"executionStats\")\n\n// عرض جميع الفهارس\ndb.customers.getIndexes()',

        exercise10: 'التمرين 10: عمليات المصفوفات',
        exercise10Title: 'التمرين 10: عمليات المصفوفات',
        exercise10Goal: 'تعلم كيفية إدارة حقول المصفوفات في المستندات: إضافة العناصر وحذفها والبحث عنها.',
        exercise10Code: '// إضافة عنصر\ndb.customers.updateOne({ customer_id: 1 }, { $push: { wishlist: "product_42" } })\n\n// إضافة بدون تكرارات\ndb.customers.updateOne({ customer_id: 1 }, { $addToSet: { tags: { $each: ["vip", "newsletter"] } } })\n\n// حذف عنصر\ndb.customers.updateOne({ customer_id: 1 }, { $pull: { wishlist: "product_42" } })\n\n// البحث عن عملاء بعلامة معينة\ndb.customers.find({ tags: "vip" })',

        exercise11: 'التمرين 11: البحث النصي والتطابق النمطي',

        exercise3Code: 'db.customers.find({ city: "Berlin" })\n\ndb.products.find({ unit_price: { $gt: 50 } })\n\ndb.customers.find({\n  $and: [\n    { country: "Germany" },\n    { registration_date: { $gte: "2023-01-01" } }\n  ]\n})',
        exercise3Output: '[Усі клієнти з Берліна з їхніми полями]\n[Усі продукти з ціною > 50]\n[Усі німецькі клієнти, зареєстровані після 2023-01-01]',
        exercise3Line1: 'find({ city: "Berlin" }): знаходить усі документи з city = "Berlin" — подібно до "SELECT * FROM customers WHERE city = \'Berlin\'" у SQL. Результат є курсором із кількома документами.',
        exercise3Line2: 'find({ unit_price: { $gt: 50 } }): знаходить усі продукти з unit_price більшим за 50. Оператор $gt (greater than) є синтаксисом оператора запиту MongoDB. Інші оператори: $lt (менше), $gte (>=), $lte (<=), $ne (!=).',

        exercise3SolutionCode: 'db.orders.find({ order_total: { $gt: 100 } })',
        exercise3VerifyDesc: 'Ви повинні побачити усі замовлення з order_total > 100.',
        exercise4Title: 'Вправа 4: Сортування й проекція',
        exercise4Goal: 'Дізнайтеся, як сортувати результати, обмежувати їх і вибирати лише певні поля.',
        exercise4Code: 'db.customers.find(\n  { city: "Berlin" },\n  { name: 1, email: 1, city: 1 }\n).sort({ name: 1 }).limit(5)\n\ndb.orders.find()\n  .sort({ order_total: -1 })\n  .limit(10)',
        exercise4Output: '[Топ 5 берлінських клієнтів відсортованих за ім\'ям, тільки поля name, email, city]\n[Топ 10 замовлень за загальною сумою в спаданому порядку]',
        exercise4Line1: '{ name: 1, email: 1 }: Проекція — аналогічно «SELECT name, email FROM table» у SQL. 1 = показувати поле, 0 = приховувати поле. Це зменшує обсяг даних і покращує продуктивність запиту.',
        exercise4Line2: '.sort({ name: 1 }): Сортує результат (аналогічно ORDER BY у SQL). 1 = за зростанням (A-Z, 0-9), -1 = за спаданням (Z-A, 9-0). Наприклад, .sort({ price: -1 }) показує найдорожчі товари першими.',
        exercise4Line3: '.limit(5): Обмежує результат максимум 5 документами (аналогічно LIMIT у SQL). Це важливо для розбиття на сторінки та уникнення надто великого обсягу даних одночасно.',

        exercise4VerifyDesc: 'Ви маєте бачити 3 товари з найвищими цінами, але тільки поля name та unit_price.',
        exercise5Title: 'Вправа 5: Агрегації',
        exercise5Goal: 'Навчіться виконувати складні аналізи даних за допомогою конвеєра агрегації.',
        exercise5Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $group: { _id: "$customer_id", total_spent: { $sum: "$order_total" }, order_count: { $sum: 1 } } },\n  { $sort: { total_spent: -1 } },\n  { $limit: 5 }\n])',
        exercise5Output: '[Топ 5 клієнтів за загальними витратами, з кількістю замовлень]',
        exercise5Line1: '$match: Фільтрує дані перед агрегацією (аналогічно WHERE у SQL). Приклад: { $match: { status: "completed" } } враховує тільки завершені замовлення для подальшої агрегації.',
        exercise5Line2: '$group: Групує документи за полем та обчислює метрики (аналогічно GROUP BY у SQL). Наприклад, { _id: "$customer_id" } групує за клієнтом. Потім ви можете обчислити метрики такі як $sum, $avg, $count.',
        exercise5Line3: '$sum "$order_total": Підсумовує всі значення order_total у межах кожної групи. Ви також можете написати { $sum: 1 }, щоб підрахувати кількість документів. Інші агрегатори: $avg (середнє значення), $min, $max.',
        exercise5TaskDesc: 'Підрахуйте замовлення за статусом (completed, pending, cancelled) та обчисліть загальний дохід за кожним статусом. Це дасть керівництву огляд конвеєра замовлень.',
        exercise5Hint: 'Підказка: Використовуйте $group з _id: "$status" та total_orders: { $sum: 1 } та total_revenue: { $sum: "$order_total" }',
        exercise5SolutionCode: 'db.orders.aggregate([\n  { $group: {\n    _id: "$status",\n    total_orders: { $sum: 1 },\n    total_revenue: { $sum: "$order_total" }\n  } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise5VerifyDesc: 'Ви маєте бачити значення статусу (completed, pending, cancelled) з кількістю та загальним доходом.',
        exercise6Title: 'Вправа 6: Аналіз MegaStore',
        exercise6Goal: 'Поєднайте всі методи: агрегації, об\'єднання ($lookup) та складні аналітичні запитання.',
        exercise6Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } },\n  { $unwind: "$customer_info" },\n  { $group: { _id: "$customer_id", customer_name: { $first: "$customer_info.name" }, total_revenue: { $sum: "$order_total" }, orders: { $sum: 1 } } },\n  { $sort: { total_revenue: -1 } },\n  { $limit: 5 }\n])',
        exercise6Output: '[Топ 5 клієнтів з ім\'ям, загальним доходом та кількістю замовлень]',
        exercise6Line1: '$lookup: Об\'єднує дані з іншої колекції (аналогічно SQL JOIN). Приклад: { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } } отримує дані клієнта для замовлення.',
        exercise6Line2: '$unwind: Розширює поле масиву в окремі документи. Після $lookup поле, наприклад, "customer_info" містить масив — $unwind створює один документ для кожного елемента масиву. Важливо для подальшої агрегації.',
        exercise6Line3: '$first: Отримує перше значення з групи в межах $group. Наприклад, { customer_name: { $first: "$customer_info.name" } } повертає ім\'я першого клієнта в групі (корисно, якщо вам потрібен тільки один представник).',
        exercise6TaskDesc: 'Проаналізуйте, яка категорія товарів сгенерувала найбільше доходу. Використовуйте $lookup для об\'єднання даних Products та агрегуйте за категорією.',
        exercise6Hint: 'Підказка: Використовуйте $lookup для об\'єднання order_items з products та агрегуйте дохід за категорією.',
        exercise6SolutionCode: 'db.order_items.aggregate([\n  { $lookup: { from: "products", localField: "product_id", foreignField: "product_id", as: "product_info" } },\n  { $unwind: "$product_info" },\n  { $group: { _id: "$product_info.category", total_revenue: { $sum: { $multiply: ["$quantity", "$unit_price"] } } } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise6VerifyDesc: 'Ви повинні побачити категорії продуктів з їхніми загальними доходами, відсортовані за доходом.',
        exercise7: 'Вправа 7: Оновлення даних',
        exercise7Title: 'Вправа 7: Оновлення даних',

        exercise7Output: '{ acknowledged: true, matchedCount: 1, modifiedCount: 1 }\n{ acknowledged: true, matchedCount: 45, modifiedCount: 45 }',

        exercise7Line2: '$inc: збільшує або зменшує числове значення. { $inc: { stock_quantity: 10 } } додає 10 до запасу. Корисно для лічильників і складських запасів.',
        exercise7Line3: 'updateMany() порівняно з updateOne(): updateOne() змінює перший відповідний документ, updateMany() змінює всі. Без фільтра updateMany({}) змінює всю колекцію!',
        exercise7TaskDesc: 'Збільшіть ціну всіх продуктів категорії \"Clothing\" на 5%. Використовуйте $mul: { $mul: { unit_price: 1.05 } }',
        exercise7Hint: 'Підказка: db.products.updateMany({ category: \"Clothing\" }, { $mul: { unit_price: 1.05 } })',
        exercise7SolutionCode: 'db.products.updateMany(\n  { category: \"Clothing\" },\n  { $mul: { unit_price: 1.05 } }\n)',
        exercise7VerifyDesc: 'Перевірте за допомогою db.products.find({ category: \"Clothing\" }) чи збільшилися ціни.',
        exercise8: 'Вправа 8: Видалення даних і очищення',
        exercise8Title: 'Вправа 8: Видалення даних і очищення',
        exercise8Goal: 'Дізнайтеся, як безпечно видаляти документи та упорядковувати колекції.',
        exercise8Code: '// Видалення одного документа\ndb.customers.deleteOne({ customer_id: 999 })\n\n// Видалення кількох документів\ndb.orders.deleteMany({ status: \"cancelled\" })\n\n// Підрахунок після видалення\ndb.orders.countDocuments()\ndb.orders.countDocuments({ status: \"completed\" })',
        exercise8Output: '{ acknowledged: true, deletedCount: 1 }\n{ acknowledged: true, deletedCount: 23 }\n977\n750',
        exercise8Line1: 'deleteOne(): видаляє перший відповідний документ. Завжди використовуйте з унікальним полем (наприклад, customer_id), щоб уникнути ненавмисного видалення.',
        exercise8Line2: 'deleteMany(): видаляє всі відповідні документи. УВАГА: deleteMany({}) без фільтра видаляє всю колекцію! Завжди вказуйте фільтр.',
        exercise8Line3: 'countDocuments(): підраховує документи з необов\'язковим фільтром — ідеально для перевірки перед і після операцій видалення. Сучасна альтернатива застарілій функції count().',
        exercise8TaskDesc: 'Видаліть всі продукти зі stock_quantity = 0. Підрахуйте кількість до і після, щоб перевірити коректність.',

        exercise8VerifyDesc: 'Кількість продуктів повинна бути меншою після видалення, ніж раніше.',
        exercise9: 'Вправа 9: Індекси та продуктивність',
        exercise9Title: 'Вправа 9: Індекси та продуктивність',
        exercise9Goal: 'Зрозумійте, як індекси прискорюють запити та коли вони доцільні.',
        exercise9Code: '// Створення індексу\ndb.customers.createIndex({ city: 1 })\n\n// Складений індекс\ndb.orders.createIndex({ customer_id: 1, order_date: -1 })\n\n// Порівняння продуктивності з explain()\ndb.customers.find({ city: \"Berlin\" }).explain(\"executionStats\")\n\n// Відображення всіх індексів\ndb.customers.getIndexes()',
        exercise9Output: '{ numIndexesBefore: 1, numIndexesAfter: 2 }\n// explain() показує: COLLSCAN (без індексу) порівняно з IXSCAN (з індексом)',
        exercise9Line1: 'createIndex({ city: 1 }): Створює індекс у зростаючому порядку. Без індексу: Collection Scan (усі документи). З індексом: Index Scan (лише результати) — істотно швидше при великих обсягах даних.',

        exercise9Line3: 'explain("executionStats"): Показує план виконання — totalDocsExamined, executionTimeMillis. Незамінний для аналізу продуктивності.',
        exercise9TaskDesc: 'Створіть індекс на полі email у колекції customers. Перевірте за допомогою explain(), чи використовується IXSCAN замість COLLSCAN.',

        exercise10: 'Вправа 10: Операції з масивами',

        exercise11: 'Вправа 11: Текстовий пошук і зіставлення шаблонів',
        exercise11Title: 'Вправа 11: Текстовий пошук і зіставлення шаблонів',

        exercise11VerifyDesc: 'Продукти зі словом "Pro" у назві та кількість клієнтів example.com.',
        exercise12: 'Вправа 12: Конвеєр інформаційної панелі',
        exercise12Title: 'Вправа 12: Конвеєр інформаційної панелі',
        exercise12Goal: 'Створіть повний аналітичний конвеєр, який поєднує всі етапи агрегації.',
        exercise12Code: 'db.order_items.aggregate([\n  // Продуктові дані пов\'язати\n  { $lookup: { from: \"products\", localField: \"product_id\", foreignField: \"product_id\", as: \"product\" }},\n  { $unwind: \"$product\" },\n  // Обчислити дохід\n  { $addFields: { revenue: { $multiply: [\"$quantity\", \"$unit_price\"] } }},\n  // Групувати за категоріями\n  { $group: {\n    _id: \"$product.category\",\n    total_revenue: { $sum: \"$revenue\" },\n    total_sold: { $sum: \"$quantity\" }\n  }},\n  { $sort: { total_revenue: -1 }}\n])',
        exercise12Output: '[Категорії з загальним доходом та проданими одиницями, відсортовані за доходом]',
        exercise12Line1: 'Цей конвеєр поєднує $lookup, $unwind, $addFields, $group та $sort — усі попередньо вивчені оператори в реалістичному запиті аналітики.',
        exercise12Line2: '$multiply: Обчислює добуток двох значень. { $multiply: [\"$quantity\", \"$unit_price\"] } = дохід за позицією замовлення.',
        exercise12Line3: 'Багатоетапні конвеєри трансформують дані крок за кроком — подібно до SQL-підзапитів, але зрозуміліше та гнучкіше.',
        exercise12TaskDesc: 'Розширте конвеєр: додайте на початку { $match: { ... } }, щоб врахувати лише позиції з \"completed\" замовлень. Для цього об\'єднайте order_items з orders.',

        exercise12VerifyDesc: 'Категорії з доходом лише від завершених замовлень.',
        challengeTitle: 'Виклик: RFM-сегментація клієнтів',
        challengeDesc: 'Проведіть аналіз Recency-Frequency-Monetary (RFM) для сегментації клієнтів. RFM — це класичний метод у маркетингу: Recency (як давно було останнє замовлення), Frequency (скільки замовлень), Monetary (скільки доходу).',
        step1Challenge: 'Крок 1: Обчисліть для кожного клієнта Recency (дні з останнього замовлення)',
        step2Challenge: 'Крок 2: Підрахуйте Frequency (кількість замовлень) на одного клієнта',
        step3Challenge: 'Крок 3: Підсумуйте Monetary (загальний дохід) на одного клієнта',
        step4Challenge: 'Крок 4: Створіть RFM-оцінки (1–5 балів на категорію)',
        step5Challenge: 'Крок 5: Сегментуйте клієнтів на категорії як-от "Champions" (високі RFM-оцінки) або "At-Risk" (низькі RFM)',
        challengeHint: 'Порада: використовуйте $dateSubtract для обчислення днів, $group для агрегацій та $cond для присвоєння оцінок.',
        challengeSolution: 'Показати розв\'язання',
        challengeSolutionCode: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $group: {\n    _id: "$customer_id",\n    last_order_date: { $max: "$order_date" },\n    frequency: { $sum: 1 },\n    monetary: { $sum: "$order_total" }\n  } },\n  { $addFields: {\n    recency_score: {\n      $cond: [\n        { $lt: [{ $dateDiff: { startDate: "$last_order_date", endDate: new Date(), unit: "day" } }, 30] },\n        5,\n        { $cond: [{ $lt: [{ $dateDiff: { startDate: "$last_order_date", endDate: new Date(), unit: "day" } }, 90] }, 3, 1] }\n      ]\n    },\n    frequency_score: { $cond: [{ $gte: ["$frequency", 5] }, 5, { $cond: [{ $gte: ["$frequency", 2] }, 3, 1] }] },\n    monetary_score: { $cond: [{ $gte: ["$monetary", 500] }, 5, { $cond: [{ $gte: ["$monetary", 200] }, 3, 1] }] }\n  } },\n  { $addFields: {\n    rfm_score: { $avg: ["$recency_score", "$frequency_score", "$monetary_score"] }\n  } },\n  { $addFields: {\n    segment: {\n      $cond: [\n        { $gte: ["$rfm_score", 4] },\n        "Champions",\n        { $cond: [{ $gte: ["$rfm_score", 3] }, "Loyal Customers", "At-Risk"] }\n      ]\n    }\n  } },\n  { $sort: { rfm_score: -1 } }\n])',

        exercise1Line1: 'use megastore: cambia a la base de datos "megastore". Si la base de datos no existe, se creará automáticamente al insertar datos por primera vez — no se necesita un comando CREATE DATABASE como en SQL.',

        exercise1TaskDesc: 'Conéctese a MongoDB e imprima todas las colecciones. Luego, ejecute una consulta para mostrar el primer documento de la colección products.',
        exercise1Hint: 'Sugerencia: Utilice db.products.findOne() para mostrar el primer producto.',

        exercise1SolutionCode: 'use megastore\nshow collections\ndb.products.findOne()',
        exercise1Verify: 'Verificación',
        exercise1VerifyDesc: 'El resultado debe ser un documento con los campos product_id, name, category, unit_price y stock_quantity.',
        nextExercise: 'Siguiente ejercicio →',
        exercise2Title: 'Ejercicio 2: Insertar datos',
        exercise2Goal: 'Aprenda cómo insertar nuevos datos en MongoDB utilizando insertOne() e insertMany().',
        exercise2Code: 'db.customers.insertOne({\n  customer_id: 999,\n  name: "Bob Mueller",\n  email: "bob@example.com",\n  city: "Munich",\n  country: "Germany",\n  registration_date: "2024-03-01"\n})\n\ndb.customers.insertMany([\n  { customer_id: 1000, name: "Carol Wagner", email: "carol@example.com", city: "Hamburg", country: "Germany", registration_date: "2024-02-15" },\n  { customer_id: 1001, name: "David Fischer", email: "david@example.com", city: "Cologne", country: "Germany", registration_date: "2024-03-05" }\n])',
        exercise2Output: '{ acknowledged: true, insertedId: ObjectId("...") }\n{ acknowledged: true, insertedIds: [ ObjectId("..."), ObjectId("...") ] }',
        exercise2Line1: 'db.customers.insertOne({...}): Inserta un documento individual y devuelve el resultado (con "insertedId" — un ObjectId generado automáticamente, que es el identificador único de MongoDB, similar a una clave principal en SQL).',
        exercise2Line2: 'db.customers.insertMany([...]): Inserta múltiples documentos a la vez y devuelve todos los insertedIds. Esto es mucho más eficiente para operaciones en lote que múltiples llamadas a insertOne().',
        exercise2TaskDesc: 'Inserte un nuevo producto en la colección products utilizando insertOne(). Utilice un product_id único, nombre, categoría, precio y cantidad en stock.',
        exercise2Hint: 'Sugerencia: El documento del producto debe contener al menos los campos product_id, name, category, unit_price y stock_quantity.',
        exercise2SolutionCode: 'db.products.insertOne({\n  product_id: 999,\n  name: "Wireless Headphones",\n  category: "Electronics",\n  unit_price: 79.99,\n  stock_quantity: 50\n})',
        exercise2VerifyDesc: 'El resultado debe mostrar una inserción confirmada con un insertedId.',
        exercise3Title: 'Ejercicio 3: Consultas con filtros',
        exercise3Goal: 'Aprenda cómo recuperar datos con criterios de filtro y operadores de consulta.',
        exercise3Code: 'db.customers.find({ city: "Berlin" })\n\ndb.products.find({ unit_price: { $gt: 50 } })\n\ndb.customers.find({\n  $and: [\n    { country: "Germany" },\n    { registration_date: { $gte: "2023-01-01" } }\n  ]\n})',
        exercise3Output: '[Todos los clientes de Berlín con sus campos]\n[Todos los productos con precio > 50]\n[Todos los clientes alemanes registrados después de 2023-01-01]',
        exercise3Line1: 'find({ city: "Berlin" }): Encuentra todos los documentos con city = "Berlin" — similar a "SELECT * FROM customers WHERE city = \'Berlin\'" en SQL. El resultado es un cursor con múltiples documentos.',
        exercise3Line2: 'find({ unit_price: { $gt: 50 } }): Encuentra todos los productos con unit_price mayor que 50. El operador $gt (mayor que) es la sintaxis del operador de consulta de MongoDB. Otros operadores: $lt (menor que), $gte (>=), $lte (<=), $ne (!=).',
        exercise3Line3: '$and: Combina múltiples condiciones con AND lógico. Por ejemplo, { $and: [{ city: "Berlin" }, { country: "Germany" }] }. También existe $or para condiciones OR.',
        exercise3TaskDesc: 'Encuentre todos los pedidos con un order_total mayor que 100. Utilice el operador $gt.',
        exercise3Hint: 'Sugerencia: Utilice db.orders.find({ order_total: { $gt: 100 } })',
        exercise3SolutionCode: 'db.orders.find({ order_total: { $gt: 100 } })',
        exercise3VerifyDesc: 'Debería ver todos los pedidos con order_total > 100.',
        exercise4Title: 'Ejercicio 4: Ordenar y proyección',
        exercise4Goal: 'Aprenda cómo ordenar los resultados, limitarlos y seleccionar solo campos específicos.',
        exercise4Code: 'db.customers.find(\n  { city: "Berlin" },\n  { name: 1, email: 1, city: 1 }\n).sort({ name: 1 }).limit(5)\n\ndb.orders.find()\n  .sort({ order_total: -1 })\n  .limit(10)',
        exercise4Output: '[Top 5 clientes de Berlín ordenados por nombre, solo campos name, email, city]\n[Top 10 pedidos por monto total descendente]',
        exercise4Line1: '{ name: 1, email: 1 }: Proyección — similar a "SELECT name, email FROM table" en SQL. 1 = mostrar campo, 0 = ocultar campo. Esto reduce la cantidad de datos y mejora el rendimiento de la consulta.',
        exercise4Line2: '.sort({ name: 1 }): Ordena el resultado (similar a ORDER BY en SQL). 1 = ascendente (A-Z, 0-9), -1 = descendente (Z-A, 9-0). Por ejemplo, .sort({ price: -1 }) muestra los productos más caros primero.',
        exercise4Line3: '.limit(5): Limita el resultado a un máximo de 5 documentos (similar a LIMIT en SQL). Esto es importante para paginación y para evitar recuperar demasiados datos de una vez.',
        exercise4TaskDesc: 'Recupere los 3 productos más caros y muestre solo los campos name y unit_price.',
        exercise4Hint: 'Consejo: Utilice .sort({ unit_price: -1 }).limit(3) y una proyección.',
        exercise4SolutionCode: 'db.products.find(\n  {},\n  { name: 1, unit_price: 1 }\n).sort({ unit_price: -1 }).limit(3)',
        exercise4VerifyDesc: 'Debe ver 3 productos con los precios más altos, pero solo los campos name y unit_price.',
        exercise5Title: 'Ejercicio 5: Agregaciones',
        exercise5Goal: 'Aprenda cómo realizar análisis de datos complejos utilizando la pipeline de agregación.',
        exercise5Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $group: { _id: "$customer_id", total_spent: { $sum: "$order_total" }, order_count: { $sum: 1 } } },\n  { $sort: { total_spent: -1 } },\n  { $limit: 5 }\n])',
        exercise5Output: '[Top 5 clientes por gasto total, con cantidad de pedidos]',
        exercise5Line1: '$match: Filtra datos antes de la agregación (similar a WHERE en SQL). Ejemplo: { $match: { status: "completed" } } considera solo pedidos completados para la agregación posterior.',
        exercise5Line2: '$group: Agrupa documentos por un campo y calcula métricas (similar a GROUP BY en SQL). Por ejemplo, { _id: "$customer_id" } agrupa por cliente. Luego puede calcular métricas como $sum, $avg, $count.',
        exercise5Line3: '$sum "$order_total": Suma todos los valores order_total dentro de cada grupo. También puede escribir { $sum: 1 } para contar la cantidad de documentos. Otros agregadores: $avg (promedio), $min, $max.',
        exercise5TaskDesc: 'Cuente los pedidos por estado (completed, pending, cancelled) y calcule el ingresos totales por estado. Esto proporciona a la gerencia una visión general del flujo de pedidos.',
        exercise5Hint: 'Consejo: Utilice $group con _id: "$status" y total_orders: { $sum: 1 } así como total_revenue: { $sum: "$order_total" }',
        exercise5SolutionCode: 'db.orders.aggregate([\n  { $group: {\n    _id: "$status",\n    total_orders: { $sum: 1 },\n    total_revenue: { $sum: "$order_total" }\n  } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise5VerifyDesc: 'Debe ver los valores de estado (completed, pending, cancelled) con cantidad e ingresos totales.',
        exercise6Title: 'Ejercicio 6: Análisis de MegaStore',
        exercise6Goal: 'Combine todas las técnicas: agregaciones, uniones ($lookup) y preguntas de análisis complejas.',
        exercise6Code: 'db.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } },\n  { $unwind: "$customer_info" },\n  { $group: { _id: "$customer_id", customer_name: { $first: "$customer_info.name" }, total_revenue: { $sum: "$order_total" }, orders: { $sum: 1 } } },\n  { $sort: { total_revenue: -1 } },\n  { $limit: 5 }\n])',
        exercise6Output: '[Top 5 clientes con nombre, ingresos totales y cantidad de pedidos]',
        exercise6Line1: '$lookup: Une datos de otra colección (similar a SQL JOIN). Ejemplo: { $lookup: { from: "customers", localField: "customer_id", foreignField: "customer_id", as: "customer_info" } } obtiene datos de cliente asociados al pedido.',
        exercise6Line2: '$unwind: Expande un campo de matriz en documentos separados. Después de $lookup, el campo, por ejemplo, "customer_info" contiene una matriz — $unwind crea un documento por elemento de matriz. Importante para la agregación posterior.',
        exercise6Line3: '$first: Obtiene el primer valor de un grupo dentro de $group. Por ejemplo, { customer_name: { $first: "$customer_info.name" } } devuelve el nombre del primer cliente del grupo (útil cuando solo necesita un representante).',
        exercise6TaskDesc: 'Analice qué categoría de producto ha generado más ingresos. Utilice $lookup para conectar datos de Products y agregue por categoría.',
        exercise6Hint: 'Consejo: Utilice $lookup para conectar order_items con products y agregue los ingresos por category.',
        exercise6SolutionCode: 'db.order_items.aggregate([\n  { $lookup: { from: "products", localField: "product_id", foreignField: "product_id", as: "product_info" } },\n  { $unwind: "$product_info" },\n  { $group: { _id: "$product_info.category", total_revenue: { $sum: { $multiply: ["$quantity", "$unit_price"] } } } },\n  { $sort: { total_revenue: -1 } }\n])',
        exercise6VerifyDesc: 'Debería ver categorías de productos con sus ingresos totales, ordenados por ingresos.',
        exercise7: 'Ejercicio 7: Actualizar datos',
        exercise7Title: 'Ejercicio 7: Actualizar datos',
        exercise7Goal: 'Aprenda cómo modificar documentos de forma selectiva usando updateOne() y updateMany().',
        exercise7Code: 'db.customers.updateOne(\n  { customer_id: 999 },\n  { $set: { city: \"Berlin\", country: \"Germany\" } }\n)\n\ndb.products.updateMany(\n  { category: \"Electronics\" },\n  { $inc: { stock_quantity: 10 } }\n)',
        exercise7Output: '{ acknowledged: true, matchedCount: 1, modifiedCount: 1 }\n{ acknowledged: true, matchedCount: 45, modifiedCount: 45 }',
        exercise7Line1: '$set: Establece campos a nuevos valores sin sobrescribir el documento. { $set: { city: \"Berlin\" } } cambia solo el campo city — todos los demás campos se conservan.',
        exercise7Line2: '$inc: Aumenta o disminuye un valor numérico. { $inc: { stock_quantity: 10 } } suma 10 al inventario. Útil para contadores e inventarios.',
        exercise7Line3: 'updateMany() vs updateOne(): updateOne() modifica el primer documento coincidente, updateMany() modifica todos. ¡Sin filtro, updateMany({}) modifica toda la colección!',
        exercise7TaskDesc: 'Aumente el precio de todos los productos de la categoría \"Clothing\" un 5%. Utilice $mul: { $mul: { unit_price: 1.05 } }',
        exercise7Hint: 'Sugerencia: db.products.updateMany({ category: \"Clothing\" }, { $mul: { unit_price: 1.05 } })',
        exercise7SolutionCode: 'db.products.updateMany(\n  { category: \"Clothing\" },\n  { $mul: { unit_price: 1.05 } }\n)',
        exercise7VerifyDesc: 'Verifique con db.products.find({ category: \"Clothing\" }) si los precios han aumentado.',
        exercise8: 'Ejercicio 8: Eliminar datos y limpiar',
        exercise8Title: 'Ejercicio 8: Eliminar datos y limpiar',
        exercise8Goal: 'Aprenda cómo eliminar documentos de forma segura y organizar colecciones.',
        exercise8Code: '// Eliminar un documento\ndb.customers.deleteOne({ customer_id: 999 })\n\n// Eliminar varios documentos\ndb.orders.deleteMany({ status: \"cancelled\" })\n\n// Contar después de eliminar\ndb.orders.countDocuments()\ndb.orders.countDocuments({ status: \"completed\" })',
        exercise8Output: '{ acknowledged: true, deletedCount: 1 }\n{ acknowledged: true, deletedCount: 23 }\n977\n750',
        exercise8Line1: 'deleteOne(): Elimina el primer documento coincidente. Siempre use con un campo único (por ejemplo, customer_id) para evitar eliminaciones no deseadas.',
        exercise8Line2: 'deleteMany(): Elimina todos los documentos coincidentes. ADVERTENCIA: deleteMany({}) sin filtro elimina toda la colección. Siempre especifique un filtro.',
        exercise8Line3: 'countDocuments(): Cuenta documentos con un filtro opcional — ideal para verificar antes y después de operaciones de eliminación. Reemplazo moderno de count() obsoleto.',
        exercise8TaskDesc: 'Elimine todos los productos con stock_quantity = 0. Cuente antes y después para verificar la precisión.',
        exercise8Hint: 'Sugerencia: Primero db.products.countDocuments({ stock_quantity: 0 }), luego deleteMany, luego countDocuments() nuevamente.',
        exercise8SolutionCode: '// Antes\ndb.products.countDocuments({ stock_quantity: 0 })\n// Eliminar\ndb.products.deleteMany({ stock_quantity: 0 })\n// Después\ndb.products.countDocuments()',
        exercise8VerifyDesc: 'La cantidad de productos debe ser menor después de eliminar que antes.',
        exercise9: 'Ejercicio 9: Índices y rendimiento',
        exercise9Title: 'Ejercicio 9: Índices y rendimiento',
        exercise9Goal: 'Comprenda cómo los índices aceleran las consultas y cuándo son útiles.',
        exercise9Code: '// Crear un índice\ndb.customers.createIndex({ city: 1 })\n\n// Índice compuesto\ndb.orders.createIndex({ customer_id: 1, order_date: -1 })\n\n// Comparación de rendimiento con explain()\ndb.customers.find({ city: \"Berlin\" }).explain(\"executionStats\")\n\n// Mostrar todos los índices\ndb.customers.getIndexes()',
        exercise9Output: '{ numIndexesBefore: 1, numIndexesAfter: 2 }\n// explain() muestra: COLLSCAN (sin índice) vs IXSCAN (con índice)',
        exercise9Line1: 'createIndex({ city: 1 }): Crea un índice ascendente. Sin índice: Collection Scan (todos los documentos). Con índice: Index Scan (solo coincidencias) — enormemente más rápido con grandes volúmenes de datos.',
        exercise9Line2: 'Índice compuesto: { customer_id: 1, order_date: -1 } — óptimo cuando las consultas filtran por customer_id Y ordenan por order_date.',
        exercise9Line3: 'explain("executionStats"): Muestra el plan de ejecución — totalDocsExamined, executionTimeMillis. Imprescindible para análisis de rendimiento.',
        exercise9TaskDesc: 'Cree un índice en el campo email en la colección customers. Verifique con explain() si se utiliza IXSCAN en lugar de COLLSCAN.',
        exercise9Hint: 'Sugerencia: db.customers.createIndex({ email: 1 }), luego .find({ email: "alice@example.com" }).explain("executionStats")',
        exercise9SolutionCode: 'db.customers.createIndex({ email: 1 })\ndb.customers.find({ email: "alice@example.com" }).explain("executionStats")',
        exercise9VerifyDesc: 'En explain() debe aparecer IXSCAN en lugar de COLLSCAN — esto indica que se está utilizando el índice.',
        exercise10: 'Ejercicio 10: Operaciones con matrices',
        exercise10Title: 'Ejercicio 10: Operaciones con matrices',
        exercise10Goal: 'Aprenda cómo gestionar campos de matriz en documentos: agregar, eliminar y buscar elementos.',
        exercise10Code: '// Agregar elemento\ndb.customers.updateOne({ customer_id: 1 }, { $push: { wishlist: "product_42" } })\n\n// Agregar sin duplicados\ndb.customers.updateOne({ customer_id: 1 }, { $addToSet: { tags: { $each: ["vip", "newsletter"] } } })\n\n// Eliminar elemento\ndb.customers.updateOne({ customer_id: 1 }, { $pull: { wishlist: "product_42" } })\n\n// Buscar clientes con etiqueta\ndb.customers.find({ tags: "vip" })',
        exercise10Output: '{ acknowledged: true, matchedCount: 1, modifiedCount: 1 }',
        exercise10Line1: '$push: Agrega un elemento a una matriz. Si el campo no existe, se crea automáticamente como una matriz.',
        exercise10Line2: '$addToSet: Como $push, pero evita duplicados. Si el valor ya está en la matriz, no ocurre nada. Ideal para etiquetas o categorías.',
        exercise10Line3: '$pull: Elimina todas las ocurrencias de un valor de una matriz. Opuesto a $push.',
        exercise10TaskDesc: 'Agregue la etiqueta "premium" al cliente con customer_id 1. Luego busque todos los clientes con la etiqueta "premium".',
        exercise10Hint: 'Sugerencia: { $addToSet: { tags: "premium" } }, luego find({ tags: "premium" })',
        exercise10SolutionCode: 'db.customers.updateOne(\n  { customer_id: 1 },\n  { $addToSet: { tags: "premium" } }\n)\ndb.customers.find({ tags: "premium" })',
        exercise10VerifyDesc: 'Debería ver clientes con la etiqueta "premium".',
        exercise11: 'Ejercicio 11: Búsqueda de texto y coincidencia de patrones',
        exercise11Title: 'Ejercicio 11: Búsqueda de texto y coincidencia de patrones',
        exercise11Goal: 'Aprenda a crear consultas de búsqueda flexible con $regex e $in.',
        exercise11Code: '// Nombres que comienzan con "Sch" (sin distinción de mayúsculas)\ndb.customers.find({ name: { $regex: "^Sch", $options: "i" } })\n\n// Encontrar direcciones de Gmail\ndb.customers.find({ email: { $regex: "@gmail\\.com$" } })\n\n// $in: verificar múltiples valores\ndb.orders.find({ status: { $in: ["completed", "shipped"] } })',
        exercise11Output: '[Todos los clientes con nombres que comienzan con "Sch"]\n[Todos los clientes con dirección de Gmail]\n[Todos los pedidos completados y enviados]',
        exercise11Line1: '$regex: Permite expresiones regulares. ^ = inicio, $ = fin, i = sin distinción de mayúsculas. Útil cuando el valor exacto no se conoce.',
        exercise11Line2: '$options: "i" — "berlin" encuentra también "Berlin" y "BERLIN". Importante para búsquedas en entradas de usuario.',
        exercise11Line3: '$in: Verifica si un valor está en una lista — como IN (...) en SQL. Más eficiente que múltiples condiciones $or.',
        exercise11TaskDesc: 'Encuentre todos los productos cuyo nombre contiene la palabra "Pro" (sin distinción de mayúsculas). Cuente clientes con correo electrónico @example.com.',

        exercise2Code: 'db.customers.insertOne({\n  customer_id: 999,\n  name: "Bob Mueller",\n  email: "bob@example.com",\n  city: "Munich",\n  country: "Germany",\n  registration_date: "2024-03-01"\n})\n\ndb.customers.insertMany([\n  { customer_id: 1000, name: "Carol Wagner", email: "carol@example.com", city: "Hamburg", country: "Germany", registration_date: "2024-02-15" },\n  { customer_id: 1001, name: "David Fischer", email: "david@example.com", city: "Cologne", country: "Germany", registration_date: "2024-03-05" }\n])',

        exercise2Line1: 'db.customers.insertOne({...}): Tek bir belgeyi ekler ve sonucu döndürür ("insertedId" ile — MongoDB\'nin benzersiz tanımlayıcısı olan otomatik olarak oluşturulan ObjectId, SQL\'deki Birincil Anahtar\'a benzer).',
        exercise2Line2: 'db.customers.insertMany([...]): Birden çok belgeyi aynı anda ekler ve tüm insertedId\'leri döndürür. Bu, birden çok insertOne() çağrısından çok daha verimlidir toplu işlemler için.',
