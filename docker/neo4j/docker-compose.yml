# Neo4j Lab - Graph Database for Relationships
# Quick Start: docker-compose up -d
# Access: Neo4j Browser on localhost:7474

version: '3.8'

services:
  neo4j:
    image: neo4j:5.18-community
    container_name: megastore-neo4j
    ports:
      - "7474:7474"    # HTTP
      - "7687:7687"    # Bolt protocol
    environment:
      # Disable authentication for educational purposes
      NEO4J_AUTH: none
      # Memory configuration for single-node setup
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
      # Enable APOC plugin
      NEO4J_PLUGINS: '["apoc"]'
      # Disable deprecation warnings for cleaner logs
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      # Mount data directory for import (CSV files for LOAD CSV)
      - ../data/megastore:/var/lib/neo4j/import:ro
      # Mount Cypher import scripts
      - ./import:/scripts:ro
      # Persistent database storage
      - neo4j_data:/var/lib/neo4j/data
      # Configuration directory
      - neo4j_conf:/var/lib/neo4j/conf
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474/browser/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - megastore

volumes:
  neo4j_data:
  neo4j_conf:

networks:
  megastore:
    driver: bridge
