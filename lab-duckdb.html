        .quiz-option.incorrect { border-color: #f44336; background-color: #ffebee; }
        .quiz-feedback {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.375rem;
            font-weight: 500;
        }
        .quiz-feedback.correct { background-color: #e8f5e9; color: #2e7d32; }
        .quiz-feedback.incorrect { background-color: #ffebee; color: #c62828; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }
        table th, table td {
            padding: 0.75rem;
            text-align: left;
            border: 1px solid #ddd;
        }
        table th {
            background-color: #f5f5f5;
            font-weight: 600;
        }

                exercise2Goal: 'Lernen Sie, CSV-Dateien automatisch zu laden und das Datenschema zu untersuchen. Sie werden verstehen, wie DuckDB Datentypen erkennt und wie Sie Tabellenstrukturen überprüfen.',

                exercise4Solution: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\nresult = conn.execute(\n  \'SELECT name, unit_price FROM read_csv_auto("products.csv") ORDER BY unit_price ASC LIMIT 10\'\n).fetchall()\nprint(result)',

                exercise6Code: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\n\n# Umsatz nach Produktkategorie\nresult = conn.execute(\n  \'SELECT p.category, SUM(oi.quantity * oi.unit_price) as revenue\n   FROM read_csv_auto("order_items.csv") oi\n   JOIN read_csv_auto("products.csv") p ON oi.product_id = p.product_id\n   GROUP BY p.category ORDER BY revenue DESC\'\n).fetchall()\nprint(result)',

        exercise7: 'Übung 7: Window Functions',
        exercise7Title: 'Übung 7: Window Functions',
        exercise7Goal: 'Berechne Rankings und laufende Summen über Gruppen – ohne Daten zu verdichten.',
        exercise7Code: "import duckdb\n\nconn = duckdb.connect(':memory:')\nconn.execute(\"\"\"\nCREATE TABLE orders AS SELECT * FROM read_csv_auto('/home/jovyan/data/orders.csv');\n\"\"\")\n\nresult = conn.execute(\"\"\"\nSELECT\n  customer_id,\n  order_date,\n  total_amount,\n  ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY order_date) AS order_num,\n  SUM(total_amount) OVER (PARTITION BY customer_id ORDER BY order_date) AS cumulative_spend\nFROM orders\nORDER BY customer_id, order_date\n\"\"\").fetchdf()\nprint(result.head(10))",
        exercise7Output: "   customer_id  order_date  total_amount  order_num  cumulative_spend\n0            1  2023-01-05        125.99          1            125.99\n1            1  2023-02-12        349.50          2            475.49\n2            1  2023-03-08         89.99          3            565.48\n3            2  2023-01-20        210.00          1            210.00",
        exercise7Explain: "Window Functions berechnen Werte ÜBER eine Partition ohne zu gruppieren – jede Zeile bleibt erhalten. PARTITION BY customer_id = eigenes Fenster pro Kunde. ROW_NUMBER() nummeriert innerhalb jedes Fensters. SUM(...) OVER (...) = kumulativ aufsummiert.",
        exercise7Task: "Berechnen Sie für jeden Kunden den Rang seiner Bestellungen nach Bestellwert (höchste zuerst). Verwenden Sie RANK() OVER (PARTITION BY customer_id ORDER BY total_amount DESC).",
        exercise7Hint: "Tipp: Ersetzen Sie ROW_NUMBER() durch RANK() und ändern Sie ORDER BY order_date auf ORDER BY total_amount DESC.",
        exercise7Solution: "result = conn.execute(\"\"\"\nSELECT customer_id, order_date, total_amount,\n  RANK() OVER (PARTITION BY customer_id ORDER BY total_amount DESC) AS amount_rank\nFROM orders\nORDER BY customer_id, amount_rank\n\"\"\").fetchdf()\nprint(result.head(10))",
        exercise7Verify: "Jeder Kunde hat einen Rang 1 (teuerste Bestellung), der zweithöchste Rang 2 usw.",
        exercise8: 'Übung 8: CTEs – Lesbarer SQL',
        exercise8Title: 'Übung 8: CTEs – Lesbarer SQL',
        exercise8Goal: 'Strukturiere komplexe Abfragen mit Common Table Expressions (CTEs).',
        exercise8Code: "import duckdb\n\nconn = duckdb.connect(':memory:')\nconn.execute(\"\"\"\nCREATE TABLE orders AS SELECT * FROM read_csv_auto('/home/jovyan/data/orders.csv');\nCREATE TABLE customers AS SELECT * FROM read_csv_auto('/home/jovyan/data/customers.csv');\n\"\"\")\n\nresult = conn.execute(\"\"\"\nWITH customer_totals AS (\n  SELECT customer_id, SUM(total_amount) AS total_spend\n  FROM orders\n  GROUP BY customer_id\n),\nhigh_value AS (\n  SELECT customer_id, total_spend\n  FROM customer_totals\n  WHERE total_spend > 500\n)\nSELECT c.name, hv.total_spend\nFROM high_value hv\nJOIN customers c USING (customer_id)\nORDER BY hv.total_spend DESC\n\"\"\").fetchdf()\nprint(result)",
        exercise8Output: "           name  total_spend\n0      Alice Müller       1250.40\n1   Bob Schneider        890.75\n2   Clara Fischer        623.10",
        exercise8Explain: "WITH name AS (...) definiert eine temporäre Tabelle – nur in dieser Abfrage sichtbar. CTEs machen SQL lesbar: erst Zwischenergebnis berechnen, dann weiterverarbeiten. Man kann mehrere CTEs hintereinander definieren und aufeinander verweisen.",
        exercise8Task: "Erweitern Sie die Abfrage um einen dritten CTE: Berechnen Sie die Anzahl der Bestellungen pro Hochwertkunde (high_value). Joinen Sie ihn mit high_value.",
        exercise8Hint: "Tipp: WITH order_counts AS (SELECT customer_id, COUNT(*) AS n_orders FROM orders GROUP BY customer_id) dann JOIN mit high_value.",
        exercise8Solution: "result = conn.execute(\"\"\"\nWITH customer_totals AS (\n  SELECT customer_id, SUM(total_amount) AS total_spend FROM orders GROUP BY customer_id\n),\nhigh_value AS (\n  SELECT customer_id, total_spend FROM customer_totals WHERE total_spend > 500\n),\norder_counts AS (\n  SELECT customer_id, COUNT(*) AS n_orders FROM orders GROUP BY customer_id\n)\nSELECT c.name, hv.total_spend, oc.n_orders\nFROM high_value hv\nJOIN customers c USING (customer_id)\nJOIN order_counts oc USING (customer_id)\nORDER BY hv.total_spend DESC\n\"\"\").fetchdf()\nprint(result)",
        exercise8Verify: "Hochwertkunden mit Gesamtumsatz und Bestellanzahl – drei Spalten.",
        exercise9: 'Übung 9: Parquet-Dateien lesen',
        exercise9Title: 'Übung 9: Parquet-Dateien lesen',
        exercise9Goal: 'Lerne das effiziente Spalten-Format Parquet kennen und vergleiche es mit CSV.',
        exercise9Code: "import duckdb, pandas as pd\n\nconn = duckdb.connect(':memory:')\n\n# Pandas-DataFrame aus CSV laden und als Parquet speichern\ndf = pd.read_csv('/home/jovyan/data/orders.csv')\ndf.to_parquet('/tmp/orders.parquet', index=False)\n\n# DuckDB liest Parquet direkt\nresult = conn.execute(\"\"\"\nSELECT COUNT(*) AS anzahl, AVG(total_amount) AS avg_betrag\nFROM read_parquet('/tmp/orders.parquet')\n\"\"\").fetchdf()\nprint(result)\n\n# Mehrere Dateien auf einmal (Glob)\n# conn.execute(\"SELECT * FROM read_parquet('/data/*.parquet')\")",
        exercise9Output: "   anzahl  avg_betrag\n0    1000      234.56",
        exercise9Explain: "Parquet ist ein spaltenorientiertes Format – ideal für Analytics. Nur benötigte Spalten werden gelesen (nicht die ganze Datei). DuckDB liest Parquet nativ ohne Konvertierung. read_parquet() funktioniert genauso wie read_csv_auto().",
        exercise9Task: "Lesen Sie die Parquet-Datei und berechnen Sie den maximalen und minimalen Bestellwert sowie die Standardabweichung (STDDEV) des Bestellwerts.",
        exercise9Hint: "Tipp: SELECT MAX(total_amount), MIN(total_amount), STDDEV(total_amount) FROM read_parquet('/tmp/orders.parquet')",
        exercise9Solution: "result = conn.execute(\"\"\"\nSELECT\n  MAX(total_amount) AS max_betrag,\n  MIN(total_amount) AS min_betrag,\n  ROUND(STDDEV(total_amount), 2) AS stddev_betrag\nFROM read_parquet('/tmp/orders.parquet')\n\"\"\").fetchdf()\nprint(result)",
        exercise9Verify: "Max, Min und Standardabweichung des Bestellwerts aus der Parquet-Datei.",
        exercise10: 'Übung 10: CASE WHEN – Bedingte Logik',
        exercise10Title: 'Übung 10: CASE WHEN – Bedingte Logik',
        exercise10Goal: 'Kategorisiere Daten mit CASE WHEN – das SQL-Äquivalent zu if/elif/else.',
        exercise10Code: "import duckdb\n\nconn = duckdb.connect(':memory:')\nconn.execute(\"\"\"\nCREATE TABLE orders AS SELECT * FROM read_csv_auto('/home/jovyan/data/orders.csv');\n\"\"\")\n\nresult = conn.execute(\"\"\"\nSELECT\n  order_id,\n  total_amount,\n  CASE\n    WHEN total_amount < 50  THEN 'Klein'\n    WHEN total_amount < 200 THEN 'Mittel'\n    WHEN total_amount < 500 THEN 'Groß'\n    ELSE 'Premium'\n  END AS order_category,\n  CASE WHEN status = 'completed' THEN 1 ELSE 0 END AS is_completed\nFROM orders\nLIMIT 10\n\"\"\").fetchdf()\nprint(result)",
        exercise10Output: "   order_id  total_amount order_category  is_completed\n0         1        125.99         Mittel             1\n1         2        349.50          Groß             0\n2         3         89.99         Mittel             1",
        exercise10Explain: "CASE WHEN wertet Bedingungen der Reihe nach aus – erste zutreffende Bedingung gewinnt. ELSE fängt alle anderen Fälle ab. Sehr nützlich für Segmentierung, Flags und Business-Logik direkt in SQL.",
        exercise10Task: "Berechnen Sie pro order_category (Klein/Mittel/Groß/Premium) die Anzahl der Bestellungen und den durchschnittlichen Bestellwert. Verwenden Sie GROUP BY order_category.",
        exercise10Hint: "Tipp: Wickeln Sie die CASE-Abfrage in einen CTE ein: WITH categorized AS (...) SELECT order_category, COUNT(*), AVG(total_amount) FROM categorized GROUP BY order_category",
        exercise10Solution: "result = conn.execute(\"\"\"\nWITH categorized AS (\n  SELECT total_amount,\n    CASE WHEN total_amount < 50 THEN 'Klein'\n         WHEN total_amount < 200 THEN 'Mittel'\n         WHEN total_amount < 500 THEN 'Groß'\n         ELSE 'Premium' END AS order_category\n  FROM orders\n)\nSELECT order_category, COUNT(*) AS anzahl, ROUND(AVG(total_amount), 2) AS avg_betrag\nFROM categorized\nGROUP BY order_category\nORDER BY avg_betrag\n\"\"\").fetchdf()\nprint(result)",
        exercise10Verify: "4 Kategorien mit Anzahl und Durchschnittswert, aufsteigend nach Durchschnittswert sortiert.",
        exercise11: 'Übung 11: String-Funktionen & Datumsauswertung',
        exercise11Title: 'Übung 11: String-Funktionen & Datumsauswertung',
        exercise11Goal: 'Analysiere Text und Datumswerte direkt in SQL ohne Python-Vorverarbeitung.',
        exercise11Code: "import duckdb\n\nconn = duckdb.connect(':memory:')\nconn.execute(\"\"\"\nCREATE TABLE customers AS SELECT * FROM read_csv_auto('/home/jovyan/data/customers.csv');\nCREATE TABLE orders AS SELECT * FROM read_csv_auto('/home/jovyan/data/orders.csv');\n\"\"\")\n\nresult = conn.execute(\"\"\"\nSELECT\n  UPPER(name) AS name_gross,\n  LOWER(email) AS email_klein,\n  LENGTH(name) AS name_laenge,\n  EXTRACT(YEAR FROM CAST(created_at AS DATE)) AS jahr,\n  EXTRACT(MONTH FROM CAST(created_at AS DATE)) AS monat\nFROM customers\nLIMIT 5\n\"\"\").fetchdf()\nprint(result)",
        exercise11Output: "         name_gross          email_klein  name_laenge  jahr  monat\n0    ALICE MÜLLER  alice@example.com           12  2023      1\n1  BOB SCHNEIDER  bob@example.com             13  2023      2",
        exercise11Explain: "UPPER/LOWER: Groß-/Kleinschreibung umwandeln. LENGTH: Zeichenlänge. EXTRACT(YEAR/MONTH FROM ...): Datumsteile extrahieren. CAST(...AS DATE): String zu Datum konvertieren. Alles direkt in SQL – kein pandas nötig.",
        exercise11Task: "Zählen Sie Bestellungen pro Monat und Jahr (aus order_date). Sortieren Sie chronologisch. Tipp: EXTRACT(YEAR FROM CAST(order_date AS DATE)) AS jahr",
        exercise11Hint: "Tipp: GROUP BY EXTRACT(YEAR FROM CAST(order_date AS DATE)), EXTRACT(MONTH FROM ...) dann COUNT(*) AS anzahl",
        exercise11Solution: "result = conn.execute(\"\"\"\nSELECT\n  EXTRACT(YEAR FROM CAST(order_date AS DATE)) AS jahr,\n  EXTRACT(MONTH FROM CAST(order_date AS DATE)) AS monat,\n  COUNT(*) AS anzahl\nFROM orders\nGROUP BY jahr, monat\nORDER BY jahr, monat\n\"\"\").fetchdf()\nprint(result)",
        exercise11Verify: "Bestellungen pro Monat, chronologisch sortiert.",
        exercise12: 'Übung 12: Sales-Dashboard komplett',
        exercise12Title: 'Übung 12: Sales-Dashboard komplett',
        exercise12Goal: 'Kombiniere alle gelernten Techniken zu einem realistischen Sales-Report.',
        exercise12Code: "import duckdb, pandas as pd\n\nconn = duckdb.connect(':memory:')\nconn.execute(\"\"\"\nCREATE TABLE orders AS SELECT * FROM read_csv_auto('/home/jovyan/data/orders.csv');\nCREATE TABLE customers AS SELECT * FROM read_csv_auto('/home/jovyan/data/customers.csv');\n\"\"\")\n\nresult = conn.execute(\"\"\"\nWITH monatlich AS (\n  SELECT\n    EXTRACT(YEAR FROM CAST(order_date AS DATE)) AS jahr,\n    EXTRACT(MONTH FROM CAST(order_date AS DATE)) AS monat,\n    COUNT(*) AS bestellungen,\n    ROUND(SUM(total_amount), 2) AS umsatz\n  FROM orders\n  WHERE status = 'completed'\n  GROUP BY jahr, monat\n)\nSELECT\n  jahr, monat, bestellungen, umsatz,\n  ROUND(SUM(umsatz) OVER (ORDER BY jahr, monat), 2) AS kumulierter_umsatz\nFROM monatlich\nORDER BY jahr, monat\n\"\"\").fetchdf()\nprint(result)",
        exercise12Output: "   jahr  monat  bestellungen    umsatz  kumulierter_umsatz\n0  2023      1            42   8234.50            8234.50\n1  2023      2            38   7102.30           15336.80",
        exercise12Explain: "Diese Pipeline kombiniert CTE, WHERE-Filter, GROUP BY, Window Function (SUM OVER ORDER BY = laufende Summe) und ROUND – alles in einer lesbaren Abfrage. Genau so sehen echte Analytics-Queries aus.",
        exercise12Task: "Fügen Sie eine Spalte monatliches_wachstum hinzu: prozentualer Unterschied zum Vormonat. Verwenden Sie LAG(umsatz) OVER (ORDER BY jahr, monat) um den Vormonatsumsatz zu holen.",
        exercise12Hint: "Tipp: ROUND((umsatz - LAG(umsatz) OVER (ORDER BY jahr, monat)) / LAG(umsatz) OVER (...) * 100, 1) AS wachstum_pct",
        exercise12Solution: "result = conn.execute(\"\"\"\nWITH monatlich AS (\n  SELECT\n    EXTRACT(YEAR FROM CAST(order_date AS DATE)) AS jahr,\n    EXTRACT(MONTH FROM CAST(order_date AS DATE)) AS monat,\n    COUNT(*) AS bestellungen,\n    ROUND(SUM(total_amount), 2) AS umsatz\n  FROM orders WHERE status = 'completed'\n  GROUP BY jahr, monat\n)\nSELECT jahr, monat, bestellungen, umsatz,\n  ROUND(SUM(umsatz) OVER (ORDER BY jahr, monat), 2) AS kumulierter_umsatz,\n  ROUND((umsatz - LAG(umsatz) OVER (ORDER BY jahr, monat)) / LAG(umsatz) OVER (ORDER BY jahr, monat) * 100, 1) AS wachstum_pct\nFROM monatlich ORDER BY jahr, monat\n\"\"\").fetchdf()\nprint(result)",
        exercise12Verify: "Monatlicher Umsatz mit kumulierter Summe und prozentualem Wachstum zum Vormonat.",

                conceptsTitle: 'Core Concepts',
                concept1: 'In-Process Database',
                concept1Desc: 'DuckDB is an "in-process" database, meaning the entire database runs directly in your Python process — there is no separate server. This has three major advantages: (1) Fast — no network latencies, (2) Simple — no database administration needed, (3) Portable — your code runs anywhere. Perfect for data science, prototyping, and local analysis.',
                concept2: 'Columnar Storage',
                concept2Desc: 'Unlike traditional databases like SQLite (row-oriented), DuckDB stores data column-wise (columnar). This means: if you only need 2 of 20 columns, DuckDB reads only those 2 columns from disk — not all 20. This is enormously faster for analytical queries on large datasets. Additionally, column-wise storage compresses similar data better.',
                concept3: 'CSV Integration',
                concept3Desc: 'CSV files are everywhere in data science. DuckDB makes working with them extremely easy: with a single function read_csv_auto() you load a CSV directly as a SQL table. DuckDB automatically infers the correct data types (date, number, text) without requiring manual specification. This saves code and prevents type errors. You can immediately write SQL queries on CSV data.',

                // Exercise 1
                exercise1Title: 'Getting Started with DuckDB',
                exercise1Goal: 'Learn how to connect to DuckDB and run your first SQL queries. You will understand how in-memory databases work and how to use SELECT statements to retrieve data.',
                exercise1Code: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\nresult = conn.execute(\'SELECT 42 AS answer\').fetchall()\nprint(result)',
                exercise1Output: '[(42,)]',
                exercise1Explain: 'Line 1-2: Import the duckdb module and create an in-memory connection (all data lives in RAM and is lost after the program ends — perfect for quick testing). Line 3: The SELECT command is the foundation of all SQL queries and is used to read data. The \"AS answer\" gives the column a name. Line 4: fetchall() retrieves all results as a list of tuples.',
                exercise1Task: 'Create a new database connection and modify the query to return 100 instead of 42. This demonstrates how to change values in SQL queries.',
                exercise1Hint: 'Just change the number 42 to 100.',
                exercise1Solution: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\nresult = conn.execute(\'SELECT 100 AS answer\').fetchall()\nprint(result)',
                exercise1Verify: 'Your result should be [(100,)].',

                // Exercise 2
                exercise2Title: 'Loading & Exploring Data',
                exercise2Goal: 'Learn how to automatically load CSV files and inspect data schemas. You will understand how DuckDB auto-detects data types and how to verify table structures.',
                exercise2Code: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\n\n# Load CSV\ncustomers = conn.execute(\'SELECT * FROM read_csv_auto("customers.csv")\').fetchall()\n\n# Show table schema\nschema = conn.execute(\'DESCRIBE read_csv_auto("customers.csv")\').fetchall()\nprint(schema)',
                exercise2Output: '[(\'customer_id\', \'BIGINT\'), (\'name\', \'VARCHAR\'), (\'email\', \'VARCHAR\'), ...]',
                exercise2Explain: 'Line 1-2: Import and connect. Line 5: read_csv_auto() is a DuckDB specialty — it automatically infers data types (VARCHAR for text, BIGINT for numbers, etc.) instead of requiring manual specification. This saves time and reduces errors. Line 8: DESCRIBE is a SQL command that shows a table\'s schema (structure) — all column names and their data types. Line 9: Examining the schema helps you understand what data you\'re working with.',
                exercise2Task: 'Load the products.csv file and display the first 3 rows. Use LIMIT 3 to restrict results — this is useful for large files to quickly get an overview.',
                exercise2Hint: 'Use SELECT * FROM read_csv_auto("products.csv") LIMIT 3',
                exercise2Solution: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\nresult = conn.execute(\'SELECT * FROM read_csv_auto("products.csv") LIMIT 3\').fetchall()\nprint(result)',
                exercise2Verify: 'You should see 3 product rows with all columns.',

                // Exercise 3
                exercise3Title: 'Filtering Queries',
                exercise3Goal: 'Learn how to filter data with WHERE clauses and narrow down searches. You will understand how conditions are used to extract only relevant records — a fundamental skill in data analysis.',
                exercise3Code: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\n\n# Customers from Germany\nresult = conn.execute(\n  \'SELECT name, city FROM read_csv_auto("customers.csv") WHERE country = "Germany"\'\n).fetchall()\nprint(result)',
                exercise3Output: '[(\'Anna Mueller\', \'Berlin\'), (\'Klaus Schmidt\', \'Munich\'), ...]',
                exercise3Explain: 'Line 5-7: SELECT specifies which columns you want (name, city). FROM specifies where data comes from (customers.csv). WHERE is the filtering keyword — it applies a condition (country = "Germany"). Only rows where the WHERE condition is true are returned. This is the fastest way to reduce large datasets to relevant entries.',
                exercise3Task: 'Filter all customers from the city "London" from customers.csv. Your marketing team wants to create a targeted list to contact London-based customers.',
                exercise3Hint: 'Change the WHERE clause to city = "London"',
                exercise3Solution: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\nresult = conn.execute(\n  \'SELECT name, city FROM read_csv_auto("customers.csv") WHERE city = "London"\'\n).fetchall()\nprint(result)',
                exercise3Verify: 'You should see only customers from London.',

                // Exercise 4
                exercise4Title: 'Sorting & Limiting',
                exercise4Goal: 'Learn to sort results with ORDER BY and limit with LIMIT. You will understand how to identify the most or least important values — critical for business analysis.',
                exercise4Code: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\n\n# Top 5 most expensive products\nresult = conn.execute(\n  \'SELECT name, unit_price FROM read_csv_auto("products.csv") ORDER BY unit_price DESC LIMIT 5\'\n).fetchall()\nprint(result)',
                exercise4Output: '[(\'Laptop\', 1200.00), (\'Monitor\', 450.00), (\'Keyboard\', 120.00), ...]',
                exercise4Explain: 'Line 5-7: ORDER BY sorts data by a column — here unit_price DESC means descending (largest first). Important: ORDER BY without DESC is ascending (ASC), smallest first. LIMIT 5 restricts results to only 5 rows — practical for \"Top 5\" or \"Bottom 10\" analyses. Together, this query shows the 5 most expensive products, which is valuable for inventory management or marketing strategies.',
                exercise4Task: 'Find the 10 cheapest (most affordable) products and sort in ascending order (ASC). This helps the purchasing team find budget-friendly options for customers.',
                exercise4Hint: 'Use ORDER BY unit_price ASC LIMIT 10',
                exercise4Solution: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\nresult = conn.execute(\n  \'SELECT name, unit_price FROM read_csv_auto("products.csv") ORDER BY unit_price ASC LIMIT 10\'\n).fetchall()\nprint(result)',
                exercise4Verify: 'You should see 10 products, sorted from cheap to expensive.',

                // Exercise 5
                exercise5Title: 'Aggregations',
                exercise5Goal: 'Learn aggregation functions like COUNT, SUM and AVG with GROUP BY. You will understand how to summarize large datasets — essential for reports and KPI analysis.',
                exercise5Code: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\n\n# Average price per category\nresult = conn.execute(\n  \'SELECT category, AVG(unit_price) as avg_price, COUNT(*) as product_count\n   FROM read_csv_auto("products.csv") GROUP BY category\'\n).fetchall()\nprint(result)',
                exercise5Output: '[(\'Electronics\', 450.00, 12), (\'Clothing\', 45.50, 8), ...]',
                exercise5Explain: 'Line 6-9: GROUP BY category is key to aggregations — it divides data into groups (here each product category). Aggregate functions (AVG, COUNT, SUM, MIN, MAX) then compute per group: AVG() gives average price per category, COUNT(*) counts products per category. Without GROUP BY, these functions would work across all rows. The result is a summary report per category — essential for management reports.',
                exercise5Task: 'Calculate the total spending and number of orders per customer. The finance team wants to see which customers are most valuable and how frequently they purchase.',
                exercise5Hint: 'Use GROUP BY customer_id and SUM(order_total), COUNT(*)',
                exercise5Solution: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\nresult = conn.execute(\n  \'SELECT customer_id, SUM(order_total) as total_spent, COUNT(*) as order_count\n   FROM read_csv_auto("orders.csv") GROUP BY customer_id\'\n).fetchall()\nprint(result)',
                exercise5Verify: 'You should see per customer their total spending and order count.',

                // Exercise 6
                exercise6Title: 'MegaStore Analysis',
                exercise6Goal: 'Combine JOINs and aggregations for real business analysis. You will understand how to merge data from multiple tables and analyze it — the foundation of professional data processing.',
                exercise6Code: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\n\n# Revenue by product category\nresult = conn.execute(\n  \'SELECT p.category, SUM(oi.quantity * oi.unit_price) as revenue\n   FROM read_csv_auto("order_items.csv") oi\n   JOIN read_csv_auto("products.csv") p ON oi.product_id = p.product_id\n   GROUP BY p.category ORDER BY revenue DESC\'\n).fetchall()\nprint(result)',
                exercise6Output: '[(\'Electronics\', 150000.00), (\'Clothing\', 45000.00), ...]',
                exercise6Explain: 'Line 6-11: This is a real business query! JOIN combines two tables (order_items and products) using a shared column (product_id) — essential since data is often distributed across multiple tables. SUM() calculates total revenue per category. GROUP BY categorizes results. ORDER BY DESC sorts categories by revenue descending, so most profitable appear first. Such queries help leadership identify trends and allocate resources optimally.',
                exercise6Task: 'Find the top 5 most valuable customers by total spending and combine customers with orders. This gives the account management team insight into which customers should receive priority.',
                exercise6Hint: 'Join customers with orders, sum order_total, and order by spending.',
                exercise6Solution: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\nresult = conn.execute(\n  \'SELECT c.name, SUM(o.order_total) as total_spent\n   FROM read_csv_auto("orders.csv") o\n   JOIN read_csv_auto("customers.csv") c ON o.customer_id = c.customer_id\n   GROUP BY c.name ORDER BY total_spent DESC LIMIT 5\'\n).fetchall()\nprint(result)',
                exercise6Verify: 'You should see 5 customers with their total spending sorted descending.',
        exercise7: 'Exercise 7: Window Functions',
        exercise7Title: 'Exercise 7: Window Functions',
        exercise7Goal: 'Calculate rankings and running totals across groups – without collapsing rows.',
        exercise7Code: "import duckdb\n\nconn = duckdb.connect(':memory:')\nconn.execute(\"\"\"\nCREATE TABLE orders AS SELECT * FROM read_csv_auto('/home/jovyan/data/orders.csv');\n\"\"\")\n\nresult = conn.execute(\"\"\"\nSELECT\n  customer_id,\n  order_date,\n  total_amount,\n  ROW_NUMBER() OVER (PARTITION BY customer_id ORDER BY order_date) AS order_num,\n  SUM(total_amount) OVER (PARTITION BY customer_id ORDER BY order_date) AS cumulative_spend\nFROM orders\nORDER BY customer_id, order_date\n\"\"\").fetchdf()\nprint(result.head(10))",
        exercise7Output: "   customer_id  order_date  total_amount  order_num  cumulative_spend\n0            1  2023-01-05        125.99          1            125.99\n1            1  2023-02-12        349.50          2            475.49\n2            2  2023-01-20        210.00          1            210.00",
        exercise7Explain: "Window Functions compute values OVER a partition without collapsing rows – each row remains visible. PARTITION BY customer_id = separate window per customer. ROW_NUMBER() numbers rows within each window. SUM(...) OVER (...) = running cumulative total.",
        exercise7Task: "Calculate the rank of each order per customer by order amount (highest first). Use RANK() OVER (PARTITION BY customer_id ORDER BY total_amount DESC).",
        exercise7Hint: "Hint: Replace ROW_NUMBER() with RANK() and change ORDER BY order_date to ORDER BY total_amount DESC.",
        exercise7Solution: "result = conn.execute(\"\"\"\nSELECT customer_id, order_date, total_amount,\n  RANK() OVER (PARTITION BY customer_id ORDER BY total_amount DESC) AS amount_rank\nFROM orders\nORDER BY customer_id, amount_rank\n\"\"\").fetchdf()\nprint(result.head(10))",
        exercise7Verify: "Each customer has rank 1 for their most expensive order, rank 2 for second, etc.",
        exercise8: 'Exercise 8: CTEs – Readable SQL',
        exercise8Title: 'Exercise 8: CTEs – Readable SQL',
        exercise8Goal: 'Structure complex queries with Common Table Expressions (CTEs).',
        exercise8Code: "import duckdb\n\nconn = duckdb.connect(':memory:')\nconn.execute(\"\"\"\nCREATE TABLE orders AS SELECT * FROM read_csv_auto('/home/jovyan/data/orders.csv');\nCREATE TABLE customers AS SELECT * FROM read_csv_auto('/home/jovyan/data/customers.csv');\n\"\"\")\n\nresult = conn.execute(\"\"\"\nWITH customer_totals AS (\n  SELECT customer_id, SUM(total_amount) AS total_spend\n  FROM orders\n  GROUP BY customer_id\n),\nhigh_value AS (\n  SELECT customer_id, total_spend\n  FROM customer_totals\n  WHERE total_spend > 500\n)\nSELECT c.name, hv.total_spend\nFROM high_value hv\nJOIN customers c USING (customer_id)\nORDER BY hv.total_spend DESC\n\"\"\").fetchdf()\nprint(result)",
        exercise8Output: "           name  total_spend\n0      Alice Mueller       1250.40\n1   Bob Schneider        890.75\n2   Clara Fischer        623.10",
        exercise8Explain: "WITH name AS (...) defines a temporary table – visible only within this query. CTEs make SQL readable: compute intermediate results first, then use them. Multiple CTEs can be chained and reference each other.",
        exercise8Task: "Add a third CTE: calculate the number of orders per high-value customer. Join it with high_value to show name, total spend, and order count.",
        exercise8Hint: "Hint: WITH order_counts AS (SELECT customer_id, COUNT(*) AS n_orders FROM orders GROUP BY customer_id) then JOIN with high_value.",
        exercise8Solution: "result = conn.execute(\"\"\"\nWITH customer_totals AS (\n  SELECT customer_id, SUM(total_amount) AS total_spend FROM orders GROUP BY customer_id\n),\nhigh_value AS (\n  SELECT customer_id, total_spend FROM customer_totals WHERE total_spend > 500\n),\norder_counts AS (\n  SELECT customer_id, COUNT(*) AS n_orders FROM orders GROUP BY customer_id\n)\nSELECT c.name, hv.total_spend, oc.n_orders\nFROM high_value hv\nJOIN customers c USING (customer_id)\nJOIN order_counts oc USING (customer_id)\nORDER BY hv.total_spend DESC\n\"\"\").fetchdf()\nprint(result)",
        exercise8Verify: "High-value customers with total spend and order count – three columns.",
        exercise9: 'Exercise 9: Reading Parquet Files',
        exercise9Title: 'Exercise 9: Reading Parquet Files',
        exercise9Goal: 'Learn the efficient columnar Parquet format and compare it with CSV.',
        exercise9Code: "import duckdb, pandas as pd\n\nconn = duckdb.connect(':memory:')\n\n# Load pandas DataFrame from CSV and save as Parquet\ndf = pd.read_csv('/home/jovyan/data/orders.csv')\ndf.to_parquet('/tmp/orders.parquet', index=False)\n\n# DuckDB reads Parquet natively\nresult = conn.execute(\"\"\"\nSELECT COUNT(*) AS count, AVG(total_amount) AS avg_amount\nFROM read_parquet('/tmp/orders.parquet')\n\"\"\").fetchdf()\nprint(result)\n\n# Multiple files at once (glob)\n# conn.execute(\"SELECT * FROM read_parquet('/data/*.parquet')\")",
        exercise9Output: "   count  avg_amount\n0   1000      234.56",
        exercise9Explain: "Parquet is a columnar format – ideal for analytics. Only the required columns are read (not the whole file). DuckDB reads Parquet natively without conversion. read_parquet() works just like read_csv_auto().",
        exercise9Task: "Read the Parquet file and calculate the maximum and minimum order value plus the standard deviation (STDDEV) of the order amount.",
        exercise9Hint: "Hint: SELECT MAX(total_amount), MIN(total_amount), STDDEV(total_amount) FROM read_parquet('/tmp/orders.parquet')",
        exercise9Solution: "result = conn.execute(\"\"\"\nSELECT\n  MAX(total_amount) AS max_amount,\n  MIN(total_amount) AS min_amount,\n  ROUND(STDDEV(total_amount), 2) AS stddev_amount\nFROM read_parquet('/tmp/orders.parquet')\n\"\"\").fetchdf()\nprint(result)",
        exercise9Verify: "Max, min and standard deviation of order amounts from the Parquet file.",
        exercise10: 'Exercise 10: CASE WHEN – Conditional Logic',
        exercise10Title: 'Exercise 10: CASE WHEN – Conditional Logic',
        exercise10Goal: 'Categorize data with CASE WHEN – the SQL equivalent of if/elif/else.',
        exercise10Code: "import duckdb\n\nconn = duckdb.connect(':memory:')\nconn.execute(\"\"\"\nCREATE TABLE orders AS SELECT * FROM read_csv_auto('/home/jovyan/data/orders.csv');\n\"\"\")\n\nresult = conn.execute(\"\"\"\nSELECT\n  order_id,\n  total_amount,\n  CASE\n    WHEN total_amount < 50  THEN 'Small'\n    WHEN total_amount < 200 THEN 'Medium'\n    WHEN total_amount < 500 THEN 'Large'\n    ELSE 'Premium'\n  END AS order_category,\n  CASE WHEN status = 'completed' THEN 1 ELSE 0 END AS is_completed\nFROM orders\nLIMIT 10\n\"\"\").fetchdf()\nprint(result)",
        exercise10Output: "   order_id  total_amount order_category  is_completed\n0         1        125.99         Medium             1\n1         2        349.50          Large             0\n2         3         89.99         Medium             1",
        exercise10Explain: "CASE WHEN evaluates conditions in order – first matching condition wins. ELSE catches all remaining cases. Very useful for segmentation, flags, and business logic directly in SQL.",
        exercise10Task: "Calculate for each order_category (Small/Medium/Large/Premium) the number of orders and the average order value. Use GROUP BY order_category.",
        exercise10Hint: "Hint: Wrap the CASE query in a CTE: WITH categorized AS (...) SELECT order_category, COUNT(*), AVG(total_amount) FROM categorized GROUP BY order_category",
        exercise10Solution: "result = conn.execute(\"\"\"\nWITH categorized AS (\n  SELECT total_amount,\n    CASE WHEN total_amount < 50 THEN 'Small'\n         WHEN total_amount < 200 THEN 'Medium'\n         WHEN total_amount < 500 THEN 'Large'\n         ELSE 'Premium' END AS order_category\n  FROM orders\n)\nSELECT order_category, COUNT(*) AS count, ROUND(AVG(total_amount), 2) AS avg_amount\nFROM categorized\nGROUP BY order_category\nORDER BY avg_amount\n\"\"\").fetchdf()\nprint(result)",
        exercise10Verify: "4 categories with count and average value, sorted ascending by average.",
        exercise11: 'Exercise 11: String Functions & Date Analysis',
        exercise11Title: 'Exercise 11: String Functions & Date Analysis',
        exercise11Goal: 'Analyze text and date values directly in SQL without Python preprocessing.',
        exercise11Code: "import duckdb\n\nconn = duckdb.connect(':memory:')\nconn.execute(\"\"\"\nCREATE TABLE customers AS SELECT * FROM read_csv_auto('/home/jovyan/data/customers.csv');\nCREATE TABLE orders AS SELECT * FROM read_csv_auto('/home/jovyan/data/orders.csv');\n\"\"\")\n\nresult = conn.execute(\"\"\"\nSELECT\n  UPPER(name) AS name_upper,\n  LOWER(email) AS email_lower,\n  LENGTH(name) AS name_length,\n  EXTRACT(YEAR FROM CAST(created_at AS DATE)) AS year,\n  EXTRACT(MONTH FROM CAST(created_at AS DATE)) AS month\nFROM customers\nLIMIT 5\n\"\"\").fetchdf()\nprint(result)",
        exercise11Output: "      name_upper       email_lower  name_length  year  month\n0   ALICE MUELLER  alice@example.com           13  2023      1\n1  BOB SCHNEIDER  bob@example.com              13  2023      2",
        exercise11Explain: "UPPER/LOWER: convert case. LENGTH: character count. EXTRACT(YEAR/MONTH FROM ...): extract date parts. CAST(...AS DATE): convert string to date. Everything directly in SQL – no pandas needed.",
        exercise11Task: "Count orders per month and year (from order_date). Sort chronologically. Hint: EXTRACT(YEAR FROM CAST(order_date AS DATE)) AS year.",
        exercise11Hint: "Hint: GROUP BY EXTRACT(YEAR FROM CAST(order_date AS DATE)), EXTRACT(MONTH FROM ...) then COUNT(*) AS count.",
        exercise11Solution: "result = conn.execute(\"\"\"\nSELECT\n  EXTRACT(YEAR FROM CAST(order_date AS DATE)) AS year,\n  EXTRACT(MONTH FROM CAST(order_date AS DATE)) AS month,\n  COUNT(*) AS count\nFROM orders\nGROUP BY year, month\nORDER BY year, month\n\"\"\").fetchdf()\nprint(result)",
        exercise11Verify: "Orders per month, sorted chronologically.",
        exercise12: 'Exercise 12: Complete Sales Dashboard',
        exercise12Title: 'Exercise 12: Complete Sales Dashboard',
        exercise12Goal: 'Combine all learned techniques into a realistic sales report.',
        exercise12Code: "import duckdb, pandas as pd\n\nconn = duckdb.connect(':memory:')\nconn.execute(\"\"\"\nCREATE TABLE orders AS SELECT * FROM read_csv_auto('/home/jovyan/data/orders.csv');\nCREATE TABLE customers AS SELECT * FROM read_csv_auto('/home/jovyan/data/customers.csv');\n\"\"\")\n\nresult = conn.execute(\"\"\"\nWITH monthly AS (\n  SELECT\n    EXTRACT(YEAR FROM CAST(order_date AS DATE)) AS year,\n    EXTRACT(MONTH FROM CAST(order_date AS DATE)) AS month,\n    COUNT(*) AS orders,\n    ROUND(SUM(total_amount), 2) AS revenue\n  FROM orders\n  WHERE status = 'completed'\n  GROUP BY year, month\n)\nSELECT\n  year, month, orders, revenue,\n  ROUND(SUM(revenue) OVER (ORDER BY year, month), 2) AS cumulative_revenue\nFROM monthly\nORDER BY year, month\n\"\"\").fetchdf()\nprint(result)",
        exercise12Output: "   year  month  orders   revenue  cumulative_revenue\n0  2023      1      42   8234.50            8234.50\n1  2023      2      38   7102.30           15336.80",
        exercise12Explain: "This pipeline combines CTE, WHERE filter, GROUP BY, Window Function (SUM OVER ORDER BY = running total) and ROUND – all in one readable query. This is exactly how real analytics queries look.",
        exercise12Task: "Add a monthly_growth column: percentage change vs. the previous month. Use LAG(revenue) OVER (ORDER BY year, month) to get the previous month's revenue.",
        exercise12Hint: "Hint: ROUND((revenue - LAG(revenue) OVER (ORDER BY year, month)) / LAG(revenue) OVER (...) * 100, 1) AS growth_pct",
        exercise12Solution: "result = conn.execute(\"\"\"\nWITH monthly AS (\n  SELECT\n    EXTRACT(YEAR FROM CAST(order_date AS DATE)) AS year,\n    EXTRACT(MONTH FROM CAST(order_date AS DATE)) AS month,\n    COUNT(*) AS orders,\n    ROUND(SUM(total_amount), 2) AS revenue\n  FROM orders WHERE status = 'completed'\n  GROUP BY year, month\n)\nSELECT year, month, orders, revenue,\n  ROUND(SUM(revenue) OVER (ORDER BY year, month), 2) AS cumulative_revenue,\n  ROUND((revenue - LAG(revenue) OVER (ORDER BY year, month)) / LAG(revenue) OVER (ORDER BY year, month) * 100, 1) AS growth_pct\nFROM monthly ORDER BY year, month\n\"\"\").fetchdf()\nprint(result)",
        exercise12Verify: "Monthly revenue with cumulative total and percentage growth vs. previous month.",

        function QuizQuestion({ number, question, options, correct, t }) {
            const [selected, setSelected] = React.useState(null);
            const [answered, setAnswered] = React.useState(false);

            const handleClick = (option) => {
                setSelected(option);
                setAnswered(true);
            };

            const isCorrect = selected === correct;

            return (
                <div className="quiz-question">
                    <h4>{number}. {question}</h4>
                    <div className="quiz-options">
                        {options.map((opt, idx) => {
                            const key = String.fromCharCode(97 + idx);
                            let className = 'quiz-option';
                            if (answered) {
                                if (opt === correct) className += ' correct';
                                else if (opt === selected && selected !== correct) className += ' incorrect';
                            } else if (opt === selected) {
                                className += ' selected';
                            }
                            return (
                                <div key={idx} className={className} onClick={() => !answered && handleClick(opt)}>
                                    <strong>{key})</strong> {opt}
                                </div>
                            );
                        })}
                    </div>
                    {answered && (
                        <div className={`quiz-feedback ${isCorrect ? 'correct' : 'incorrect'}`}>
                            {isCorrect ? t[`q${number}Correct`] : t[`q${number}Incorrect`]}
                        </div>
                    )}
                </div>
            );
