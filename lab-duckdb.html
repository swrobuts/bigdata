                challenges: { title: "Прогресивні виклики", level1: { title: "Початківець - Топ 5 категорій продуктів", challenge: "Знайдіть 5 категорій продуктів з найбільшою кількістю продуктів", hypothesis: "Перш ніж писати запит: які категорії, на вашу думку, мають найбільше продуктів? Чому?", solution: "SELECT category, COUNT(*) as cnt FROM products GROUP BY category ORDER BY cnt DESC LIMIT 5", insight: "Електроніка та Дім та Сад, як правило, домінують. Менеджери категорій використовують ці дані для розподілу полиць та бюджетів маркетингу." }, level2: { title: "Глибший аналіз - Цінні клієнти", challenge: "Визначте клієнтів, які витратили більше 1000 доларів", hint: "Підказка: використовуйте GROUP BY та HAVING з SUM()", realWorld: "Аналіз клієнтів критичний для утримання та цільованого маркетингу." }, level3: { title: "Продвинутий - Аналіз ринкового кошика", challenge: "Для кожного продукту знайдіть 3 продукти, які найчастіше купуються разом", hint: "Підказка: самозз'єднання order_items та підрахунок часто кооккурентних пар", realWorld: "Amazon отримує 35% доходу від рекомендацій. Це основа їх бізнес-моделі." }, level4: { title: "Виклик босса - Аналіз когорт", challenge: "Виконайте аналіз когорт: когорти клієнтів за місяцем першого покупки, потім відстежуйте утримання за місяцем", concept: "Аналіз когорт: групуйте клієнтів за першою відвідиною/покупкою, потім відстежуйте їхню поведінку з часом", realWorld: "Аналіз когорт є основою для прогнозування відтоку та моделей вартості за весь період." } },
                selfCheck: { title: "Самоперевірка - Перевірте своє розуміння", questions: [{ q: "Яка головна перевага DuckDB перед SQLite?", a: "DuckDB оптимізована для аналітичних запитів (OLAP), тоді як SQLite орієнтована на транзакційні навантаження (OLTP). DuckDB використовує хранилище на основі стовпців та векторизацію." }, { q: "Чому Parquet швидший за CSV для аналітичних запитів?", a: "Parquet заснована на стовпцях, тому завантажуються лише необхідні стовпці. CSV завантажує всі рядки та стовпці, навіть якщо вам потрібен лише один стовпець." }, { q: "Що роблять Window Functions у SQL?", a: "Window Functions обчислюють агрегати через вікно рядків без групування. Приклади: ROW_NUMBER(), SUM() OVER(), LAG(), LEAD()" }, { q: "Коли б ви використовували DATEDIFF замість ручного розрахунку дати?", a: "DATEDIFF автоматично обчислює різницю між двома датами у вказаній одиниці (день, місяць, рік) і легко підтримується та точна." }, { q: "Чому слід конвертувати великі CSV-файли в Parquet?", a: "Parquet економить місце (стиск), швидше читається, підтримує розділення та ідеальна для повторних аналітичних запитів." }] },

                theory: { title: "Descripción general de la teoría", whatIs: "¿Qué es DuckDB?", whatIsDesc: "DuckDB es una base de datos OLAP en proceso optimizada para cargas de trabajo analíticas. A diferencia de SQLite y sistemas relacionales, DuckDB se enfoca en consultas analíticas rápidas con características SQL avanzadas.", columnar: "Almacenamiento orientado a columnas", columnarDesc: "DuckDB almacena datos en columnas en lugar de filas, lo que hace que las consultas analíticas sean dramáticamente más rápidas. Solo se cargan las columnas requeridas del almacenamiento.", vectorized: "Ejecución vectorizada", vectorizedDesc: "Los procesadores modernos soportan operaciones SIMD. DuckDB usa esto para procesar múltiples filas en paralelo, mejorando significativamente el rendimiento de las consultas.", parquet: "Formato Parquet", parquetDesc: "Un formato de almacenamiento orientado a columnas optimizado con DuckDB. Mucho más rápido que CSV para consultas analíticas y ahorra espacio de almacenamiento.", whenToUseDuckDB: "¿Cuándo usar DuckDB?", whenToUseDuckDBDesc: ["Consultas analíticas rápidas sobre archivos CSV/Parquet grandes", "Análisis en proceso sin servidor de base de datos", "Exploración de datos y análisis ad-hoc", "Tuberías ETL y transformación de datos", "Integración Python para ciencia de datos"] },

                challenges: { title: "Desafíos progresivos", level1: { title: "Principiante - Top 5 categorías de productos", challenge: "Encuentre las 5 categorías de productos con más productos", hypothesis: "Antes de escribir la consulta: ¿Qué categorías cree que tienen más productos? ¿Por qué?", solution: "SELECT category, COUNT(*) as cnt FROM products GROUP BY category ORDER BY cnt DESC LIMIT 5", insight: "Electrónica y Hogar & Jardín típicamente dominan. Los administradores de categorías usan estos datos para asignación de espacio en estantería y presupuestos de marketing." }, level2: { title: "Análisis más profundo - Clientes de alto valor", challenge: "Identifique a los clientes que han gastado más de $1000", hint: "Consejo: Use GROUP BY y HAVING con SUM()", realWorld: "El análisis de clientes es crítico para la retención y el marketing dirigido." }, level3: { title: "Avanzado - Análisis de cesta de mercado", challenge: "Para cada producto, encuentre los 3 productos que se compran juntos con más frecuencia", hint: "Consejo: Unión automática de order_items y cuente pares que aparecen frecuentemente", realWorld: "Amazon genera el 35% de los ingresos de recomendaciones. Este es el núcleo de su modelo de negocio." }, level4: { title: "Desafío del jefe - Análisis de cohortes", challenge: "Realice análisis de cohortes: cohortes de clientes por mes de primera compra, luego retención por mes", concept: "Análisis de cohortes: Agrupe clientes por primera visita/compra, luego rastrée su comportamiento en el tiempo", realWorld: "El análisis de cohortes es la base para predicciones de deserción y modelos de valor de vida útil." } },
                selfCheck: { title: "Autoevaluación - Verifique su comprensión", questions: [{ q: "¿Cuál es la principal ventaja de DuckDB sobre SQLite?", a: "DuckDB está optimizado para consultas analíticas (OLAP), mientras que SQLite se enfoca en cargas transaccionales (OLTP). DuckDB usa almacenamiento orientado a columnas y vectorización." }, { q: "¿Por qué Parquet es más rápido que CSV para consultas analíticas?", a: "Parquet está orientado a columnas, por lo que solo se cargan las columnas necesarias. CSV carga todas las filas y columnas, incluso si solo necesita una columna." }, { q: "¿Qué hacen las Window Functions en SQL?", a: "Las Window Functions calculan agregados sobre una ventana de filas sin agrupar. Ejemplos: ROW_NUMBER(), SUM() OVER(), LAG(), LEAD()" }, { q: "¿Cuándo usaría DATEDIFF en lugar del cálculo manual de fechas?", a: "DATEDIFF calcula automáticamente la diferencia entre dos fechas en la unidad especificada (día, mes, año) y es mantenible y precisa." }, { q: "¿Por qué debería convertir archivos CSV grandes a Parquet?", a: "Parquet ahorra espacio (compresión), se lee más rápido, soporta particionamiento y es ideal para consultas analíticas repetidas." }] },

                challenges: { title: "Kademeli Zorluklar", level1: { title: "Başlangıç - En İyi 5 Ürün Kategorisi", challenge: "En fazla ürüne sahip 5 ürün kategorisini bulun", hypothesis: "Sorguyu yazmadan önce: Hangi kategorilerin en fazla ürüne sahip olduğunu düşünüyorsunuz? Neden?", solution: "SELECT category, COUNT(*) as cnt FROM products GROUP BY category ORDER BY cnt DESC LIMIT 5", insight: "Elektronik ve Ev & Bahçe tipik olarak hakim olur. Kategori yöneticileri bu verileri raf alanı dağıtımı ve pazarlama bütçeleri için kullanırlar." }, level2: { title: "Derin Dalış - Yüksek Değer Müşteriler", challenge: "$1000'den fazla harcayan müşterileri belirleyin", hint: "İpucu: GROUP BY ve HAVING ile SUM() kullanın", realWorld: "Müşteri analizi elde tutma ve hedefli pazarlama için kritiktir." }, level3: { title: "Gelişmiş - Pazar Sepeti Analizi", challenge: "Her ürün için, en sık birlikte satın alınan 3 ürünü bulun", hint: "İpucu: order_items'i kendi kendine birleştirin ve sık görülen çiftleri sayın", realWorld: "Amazon gelirinin %35'ini önerilerden elde eder. Bu iş modelinin özüdür." }, level4: { title: "Boss Zorluk - Kohort Analizi", challenge: "Kohort analizi gerçekleştirin: İlk satın alma ayına göre müşteri kohortları, ardından ayda tutma izlemesi", concept: "Kohort Analizi: Müşterileri ilk ziyaret/satın almaya göre gruplandırın, sonra davranışlarını zaman içinde izleyin", realWorld: "Kohort analizi, churn tahmini ve yaşam boyu değer modelleri için temeldir." } },
                selfCheck: { title: "Öz Kontrol - Anlayışınızı Test Edin", questions: [{ q: "DuckDB'nin SQLite üzerindeki ana avantajı nedir?", a: "DuckDB analitik sorgular (OLAP) için optimize edilmiştir, SQLite işlem yükleri (OLTP) için hedeflenmiştir. DuckDB sütun yönelimli depolama ve vektörleştirme kullanır." }, { q: "Parquet neden analitik sorgular için CSV'den daha hızlıdır?", a: "Parquet sütun yönelimlidir, bu nedenle yalnızca gerekli sütunlar yüklenir. CSV tüm satırları ve sütunları yükler, hatta yalnızca bir sütuna ihtiyacınız olsa bile." }, { q: "SQL'de Window Functions ne yapar?", a: "Window Functions satırlar gruplanmadan satır penceresi üzerinde agregat hesaplar. Örnekler: ROW_NUMBER(), SUM() OVER(), LAG(), LEAD()" }, { q: "Manuel tarih hesaplaması yerine DATEDIFF'i ne zaman kullanırsınız?", a: "DATEDIFF, belirtilen birimde (gün, ay, yıl) iki tarih arasındaki farkı otomatik olarak hesaplar ve bakımlanabilir ve hassastır." }, { q: "Büyük CSV dosyalarını neden Parquet'a dönüştürmelisiniz?", a: "Parquet alan tasarrufu sağlar (sıkıştırma), daha hızlı okunur, bölümlemeyi destekler ve tekrarlanan analitik sorgular için idealdir." }] },
                reflection: { title: "Yansıtma ve Gerçek Dünya Uygulamaları", prompts: [{ title: "Sizi neyin şaşırttığı?", desc: "DuckDB'nin hangi yönü beklenmedik miydi? Tanıdığınız SQL veritabanlarından nasıl farklıydı?" }, { title: "En zorlayıcı kısım ne oldu?", desc: "Hangi SQL kavramları en zorluydu? Daha fazla pratiye nerede ihtiyacınız var?" }, { title: "DuckDB'yi teknisyen olmayan bir CEO'ya açıklayın", desc: "Hızlı veri analizi için DuckDB'nin faydalarını basit terimlerle nasıl açıklarsınız?" }, { title: "Hangi iş sorusu en ilginçti?", desc: "Tüm MegaStore senaryolarından: Hangisi sizi en çok etkiledi ve neden?" }], realWorld: "DuckDB Gerçek Dünyada Kullanıldığı Yerler", useCases: [{ title: "Veri Keşfi", desc: "Veritabanı sunucusu olmaksızın CSV/Parquet üzerinde hızlı SQL sorguları. Veri bilimciler ve analitikçiler için ideal." }, { title: "ETL İşlem Hatları", desc: "Veri dönüştürme ve temizleme doğrudan Python'da. DuckDB verileri bir kez yükler ve birden fazla dönüştürme çalıştırır." }, { title: "Gerçek Zamanlı Panolar", desc: "Web uygulamaları için işlem içi analitik. DuckDB, gerçek zamanlı içgörüler için tarihsel verileri hızlı bir şekilde işler." }, { title: "Data Lake Sorguları", desc: "ETL olmaksızın S3/bulut depolamada Parquet dosyalarının doğrudan sorgulanması. Sıfır kopya performansı için Arrow entegrasyonu." }] },
                troubleshooting: { title: "Sorun Giderme", commonErrors: "Yaygın Hatalar ve Çözümler", errors: [{ problem: "ModuleNotFoundError: No module named 'duckdb'", solution: "DuckDB'yi kurun: !pip install duckdb" }, { problem: "CSV okurken dosya bulunamadı", solution: "/home/jovyan/data'dan göreli yollar kullanın veya os.listdir() ile dosya boyutunu kontrol edin" }, { problem: "JULIANDAY() tanımlanmamış", solution: "JULIANDAY() yerine DATE_TRUNC() kullanın. JULIANDAY SQLite'a özgüdür." }] },
                util: { copyCode: "Kodu Kopyala", copied: "Kopyalandı!" }
            }
        };

        const codeExamples = {
            setup: `# Install DuckDB\n!pip install duckdb\n\n# Import and verify\nimport duckdb\ncon = duckdb.connect(':memory:')\nprint(duckdb.__version__)`,
            exercise1: `import duckdb\ncon = duckdb.connect(':memory:')\n\n# Load CSV\ncon.execute("CREATE TABLE orders AS SELECT * FROM read_csv_auto('data/orders.csv')")\ncon.execute("CREATE TABLE products AS SELECT * FROM read_csv_auto('data/products.csv')")\n\n# Basic queries\nprint(con.execute("SELECT COUNT(*) FROM orders").fetchone())\nprint(con.execute("SELECT category, COUNT(*) as cnt FROM products GROUP BY category ORDER BY cnt DESC").fetchdf())`,
            exercise2: `-- Window Functions: Running total\nSELECT order_date,\n       order_total,\n       SUM(order_total) OVER (ORDER BY order_date) as running_total\nFROM orders\nORDER BY order_date;\n\n-- Revenue by month with growth\nWITH monthly AS (\n  SELECT DATE_TRUNC('month', order_date) AS month,\n         SUM(order_total) AS revenue\n  FROM orders GROUP BY 1\n)\nSELECT month, revenue,\n       LAG(revenue) OVER (ORDER BY month) AS prev_month,\n       ROUND((revenue - LAG(revenue) OVER (ORDER BY month)) /\n             LAG(revenue) OVER (ORDER BY month) * 100, 2) AS growth_pct\nFROM monthly ORDER BY month;\n\n-- Top customers (RFM-style)\nSELECT customer_id,\n       COUNT(*) AS frequency,\n       SUM(order_total) AS monetary,\n       MAX(order_date) AS last_order\nFROM orders\nGROUP BY customer_id\nORDER BY monetary DESC\nLIMIT 20;`,
            exercise3: `import time\n\n# CSV performance\nstart = time.time()\ncon.execute("SELECT category, SUM(order_total) FROM read_csv_auto('data/orders.csv') GROUP BY category")\ncsv_time = time.time() - start\n\n# Convert to Parquet\ncon.execute("COPY (SELECT * FROM orders) TO 'data/orders.parquet' (FORMAT PARQUET)")\n\n# Parquet performance\nstart = time.time()\ncon.execute("SELECT category, SUM(order_total) FROM read_parquet('data/orders.parquet') GROUP BY category")\nparquet_time = time.time() - start\n\nprint(f"CSV: {csv_time:.3f}s | Parquet: {parquet_time:.3f}s | Speedup: {csv_time/parquet_time:.1f}x")`,
            exercise4: `-- Cohort Analysis\nWITH first_order AS (\n  SELECT customer_id, DATE_TRUNC('month', MIN(order_date)) AS cohort_month\n  FROM orders GROUP BY customer_id\n),\norders_with_cohort AS (\n  SELECT o.*, f.cohort_month,\n         DATEDIFF('month', f.cohort_month, DATE_TRUNC('month', o.order_date)) AS months_since\n  FROM orders o JOIN first_order f ON o.customer_id = f.customer_id\n)\nSELECT cohort_month, months_since,\n       COUNT(DISTINCT customer_id) AS customers\nFROM orders_with_cohort\nGROUP BY cohort_month, months_since\nORDER BY cohort_month, months_since;\n\n-- Market Basket Analysis\nWITH pairs AS (\n  SELECT a.product_id AS product_a, b.product_id AS product_b,\n         COUNT(*) AS frequency\n  FROM order_items a\n  JOIN order_items b ON a.order_id = b.order_id AND a.product_id < b.product_id\n  GROUP BY a.product_id, b.product_id\n)\nSELECT p1.product_name AS product_a, p2.product_name AS product_b, frequency\nFROM pairs\nJOIN products p1 ON pairs.product_a = p1.product_id\nJOIN products p2 ON pairs.product_b = p2.product_id\nORDER BY frequency DESC\nLIMIT 10;`
        };

        function CodeBlock({ code, language = 'python' }) {
            const [copied, setCopied] = useState(false);

            const handleCopy = () => {
                navigator.clipboard.writeText(code);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="code-block">
                    <div className="code-block-header">
                        <span>{language}</span>
                        <button className={`copy-button ${copied ? 'copied' : ''}`} onClick={handleCopy}>
                            {copied ? '✓ Copied' : 'Copy'}
                        </button>
                    </div>
                    <div className="code-block-content">
                        <code>{code}</code>
                    </div>
                </div>
            );
        }

        function ChallengeCard({ challenge }) {
            const [expanded, setExpanded] = useState(false);
            return (
                <div className="challenge-card">
                    <div className="challenge-header" onClick={() => setExpanded(!expanded)}>
                        <span className="challenge-title">{challenge.title}</span>
                        <span className={`challenge-toggle ${expanded ? 'open' : ''}`}>›</span>
                    </div>
                    <div className={`challenge-content ${expanded ? 'open' : ''}`}>
                        <p><strong>Challenge:</strong> {challenge.challenge}</p>
                        {challenge.hypothesis && <div className="info-box hypothesis-box"><strong>Hypothesis:</strong> {challenge.hypothesis}</div>}
                        {challenge.hint && <p><strong>Hint:</strong> {challenge.hint}</p>}
                        {challenge.solution && <p><strong>Solution:</strong> <code>{challenge.solution}</code></p>}
                        {challenge.concept && <p><strong>Concept:</strong> {challenge.concept}</p>}
                        {(challenge.insight || challenge.realWorld) && <div className="info-box insight-box"><strong>Real World:</strong> {challenge.insight || challenge.realWorld}</div>}
                    </div>
                </div>
            );
        }

        function SelfCheckQuestion({ question }) {
            const [expanded, setExpanded] = useState(false);
            return (
                <div className="self-check-question">
                    <div className="question-text" onClick={() => setExpanded(!expanded)}>
                        <span>{question.q}</span>
                        <span className="answer-toggle">{expanded ? '▼' : '▶'}</span>
                    </div>
                    <div className={`answer-text ${expanded ? 'open' : ''}`}>
                        {question.a}
                    </div>
                </div>
            );
        }

        function App() {
            const [lang, setLang] = useState('en');
            const [activeSection, setActiveSection] = useState('learningObjectives');
            const [sidebarOpen, setSidebarOpen] = useState(false);

            useEffect(() => {
                document.documentElement.lang = lang;
                document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            }, [lang]);

            const t = translations[lang];

            const sections = [
                { id: 'learningObjectives', label: t.sidebar.learningObjectives },
                { id: 'setupInstallation', label: t.sidebar.setupInstallation },
                { id: 'theoryOverview', label: t.sidebar.theoryOverview },
                { id: 'dataModel', label: t.sidebar.dataModel },
                { id: 'exercise1', label: t.sidebar.exercise1 },
                { id: 'exercise2', label: t.sidebar.exercise2 },
                { id: 'exercise3', label: t.sidebar.exercise3 },
                { id: 'exercise4', label: t.sidebar.exercise4 },
                { id: 'challenges', label: t.sidebar.challenges },
                { id: 'selfCheck', label: t.sidebar.selfCheck },
                { id: 'reflection', label: t.sidebar.reflection },
                { id: 'troubleshooting', label: t.sidebar.troubleshooting }
            ];

            return (
                <div className="flex flex-col min-h-screen">
                    <nav className="navbar sticky top-0 z-50">
                        <div className="navbar-content">
                            <div className="flex items-center gap-2">
                                <button className="mobile-menu-toggle" onClick={() => setSidebarOpen(!sidebarOpen)}>☰</button>
                                <div className="logo">DuckDB Lab</div>
                            </div>
                            <div className="language-switcher flex gap-2">
                                {['en', 'de', 'ar', 'uk', 'es', 'tr'].map(l => (
                                    <button key={l} className={`lang-btn ${lang === l ? 'active' : ''}`} onClick={() => { setLang(l); setSidebarOpen(false); }}>
                                        {l.toUpperCase()}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <div className="flex flex-1">
                        {sidebarOpen && <div className="fixed inset-0 top-16 bg-black/50 z-30" onClick={() => setSidebarOpen(false)}></div>}
                        <aside className={`sidebar ${sidebarOpen ? 'active' : ''}`}>
                            {sections.map(section => (
                                <button key={section.id} className={`sidebar-link ${activeSection === section.id ? 'active' : ''}`} onClick={() => { setActiveSection(section.id); setSidebarOpen(false); }}>
                                    {section.label}
                                </button>
                            ))}
                        </aside>

                        <main className="flex-1 max-w-5xl mx-auto px-4 py-8">
                            {activeSection === 'learningObjectives' && (
                                <section className="section" id="learningObjectives">
                                    <div className="hero-section rounded-lg p-8 mb-8">
                                        <h1 className="text-4xl font-bold mb-2">{t.hero.title}</h1>
                                        <p className="text-lg mb-4">{t.hero.chapter}</p>
                                        <div className="flex gap-4 flex-wrap">
                                            <span>{t.hero.difficulty}: <span className="difficulty-badge difficulty-beginner">{t.hero.beginner}</span></span>
                                            <span>{t.hero.estimatedTime}: {t.hero.hours}</span>
                                        </div>
                                    </div>
                                    <h2 className="section-header">{t.sidebar.learningObjectives}</h2>
                                    <div className="space-y-3 mb-8">
                                        {t.objectives.map((obj, i) => <div key={i} className="card">{obj}</div>)}
                                    </div>
                                </section>
                            )}

                            {activeSection === 'setupInstallation' && (
                                <section className="section" id="setupInstallation">
                                    <h2 className="section-header">{t.setup.title}</h2>
                                    <p className="mb-4">{t.setup.intro}</p>
                                    <CodeBlock code={t.setup.dockerRun} language="bash" />
                                    <h3 className="subsection-header">{t.setup.pythonSetup}</h3>
                                    <CodeBlock code={t.setup.pythonInstall} language="python" />
                                    <h3 className="subsection-header">{t.setup.verify}</h3>
                                    <ul className="space-y-2 mb-8">
                                        {t.setup.verifySteps.map((step, i) => <li key={i} className="card">✓ {step}</li>)}
                                    </ul>
                                </section>
                            )}

                            {activeSection === 'theoryOverview' && (
                                <section className="section" id="theoryOverview">
                                    <h2 className="section-header">{t.theory.title}</h2>
                                    <div className="card">
                                        <h3 className="subsection-header">{t.theory.whatIs}</h3>
                                        <p>{t.theory.whatIsDesc}</p>
                                    </div>
                                    <div className="card">
                                        <h3 className="subsection-header">{t.theory.columnar}</h3>
                                        <p>{t.theory.columnarDesc}</p>
                                    </div>
                                    <div className="card">
                                        <h3 className="subsection-header">{t.theory.vectorized}</h3>
                                        <p>{t.theory.vectorizedDesc}</p>
                                    </div>
                                    <div className="card">
                                        <h3 className="subsection-header">{t.theory.parquet}</h3>
                                        <p>{t.theory.parquetDesc}</p>
                                    </div>
                                    <div className="card">
                                        <h3 className="subsection-header">{t.theory.whenToUseDuckDB}</h3>
                                        <ul className="space-y-2">
                                            {t.theory.whenToUseDuckDBDesc.map((item, i) => <li key={i}>• {item}</li>)}
                                        </ul>
                                    </div>
                                </section>
                            )}

                            {activeSection === 'dataModel' && (
                                <section className="section" id="dataModel">
                                    <h2 className="section-header">{t.dataModel.title}</h2>
                                    <p className="mb-4">{t.dataModel.intro}</p>
                                    <div className="space-y-3">
                                        <div className="card"><strong>orders:</strong> {t.dataModel.orders}</div>
                                        <div className="card"><strong>order_items:</strong> {t.dataModel.items}</div>
                                        <div className="card"><strong>clickstream:</strong> {t.dataModel.clickstream}</div>
                                        <div className="card"><strong>products:</strong> {t.dataModel.products}</div>
                                        <div className="card"><strong>customers:</strong> {t.dataModel.customers}</div>
                                    </div>
                                </section>
                            )}

                            {activeSection === 'exercise1' && (
                                <section className="section" id="exercise1">
                                    <h2 className="section-header">{t.exercise1.title}</h2>
                                    <p className="mb-4">{t.exercise1.intro}</p>
                                    <CodeBlock code={codeExamples.exercise1} language="python" />
                                </section>
                            )}

                            {activeSection === 'exercise2' && (
                                <section className="section" id="exercise2">
                                    <h2 className="section-header">{t.exercise2.title}</h2>
                                    <p className="mb-4">{t.exercise2.intro}</p>
                                    <CodeBlock code={codeExamples.exercise2} language="sql" />
                                </section>
                            )}

                            {activeSection === 'exercise3' && (
                                <section className="section" id="exercise3">
                                    <h2 className="section-header">{t.exercise3.title}</h2>
                                    <p className="mb-4">{t.exercise3.intro}</p>
                                    <CodeBlock code={codeExamples.exercise3} language="python" />
                                </section>
                            )}

                            {activeSection === 'exercise4' && (
                                <section className="section" id="exercise4">
                                    <h2 className="section-header">{t.exercise4.title}</h2>
                                    <p className="mb-4">{t.exercise4.intro}</p>
                                    <CodeBlock code={codeExamples.exercise4} language="sql" />
                                </section>
                            )}

                            {activeSection === 'challenges' && (
                                <section className="section" id="challenges">
                                    <h2 className="section-header">{t.challenges.title}</h2>
                                    <ChallengeCard challenge={t.challenges.level1} />
                                    <ChallengeCard challenge={t.challenges.level2} />
                                    <ChallengeCard challenge={t.challenges.level3} />
                                    <ChallengeCard challenge={t.challenges.level4} />
                                </section>
                            )}

                            {activeSection === 'selfCheck' && (
                                <section className="section" id="selfCheck">
                                    <h2 className="section-header">{t.selfCheck.title}</h2>
                                    <div className="space-y-3">
                                        {t.selfCheck.questions.map((q, i) => <SelfCheckQuestion key={i} question={q} />)}
                                    </div>
                                </section>
                            )}

                            {activeSection === 'reflection' && (
                                <section className="section" id="reflection">
                                    <h2 className="section-header">{t.reflection.title}</h2>
                                    <div className="space-y-3 mb-8">
                                        {t.reflection.prompts.map((p, i) => <div key={i} className="card"><strong>{p.title}:</strong> {p.desc}</div>)}
                                    </div>
                                    <h3 className="subsection-header">{t.reflection.realWorld}</h3>
                                    <div className="space-y-3">
                                        {t.reflection.useCases.map((uc, i) => <div key={i} className="card"><strong>{uc.title}:</strong> {uc.desc}</div>)}
                                    </div>
                                </section>
                            )}

                            {activeSection === 'troubleshooting' && (
                                <section className="section" id="troubleshooting">
                                    <h2 className="section-header">{t.troubleshooting.title}</h2>
                                    <h3 className="subsection-header">{t.troubleshooting.commonErrors}</h3>
                                    <div className="space-y-3">
                                        {t.troubleshooting.errors.map((err, i) => (
                                            <div key={i} className="card">
                                                <p><strong>Problem:</strong> {err.problem}</p>
                                                <p><strong>Solution:</strong> {err.solution}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
