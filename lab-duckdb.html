                exercise1Title: 'Erste Schritte mit DuckDB',

                // Exercise 2
                exercise2Title: 'Daten laden & erkunden',
                exercise2Goal: 'Lernen Sie, CSV-Dateien automatisch zu laden und das Datenschema zu untersuchen. Sie werden verstehen, wie DuckDB Datentypen erkennt und wie Sie Tabellenstrukturen überprüfen.',

                exercise2Explain: 'Zeile 1-2: Importieren und verbinden. Zeile 5: read_csv_auto() ist eine DuckDB-Besonderheit — die Funktion erkennt automatisch die Datentypen (VARCHAR für Text, BIGINT für Zahlen, etc.) statt dass Sie sie manuell angeben müssen. Dies spart Zeit und reduziert Fehler. Zeile 8: DESCRIBE ist ein SQL-Befehl, der das Schema (Struktur) einer Tabelle anzeigt — alle Spaltennamen und ihre Datentypen. Zeile 9: Das Ausgeben des Schemas hilft Ihnen zu verstehen, mit welchen Daten Sie arbeiten.',

                exercise3Title: 'Abfragen mit Filtern',
                exercise3Goal: 'Lernen Sie, Daten mit WHERE-Klauseln zu filtern und zu durchsuchen. Sie werden verstehen, wie Bedingungen verwendet werden, um nur relevante Datensätze zu extrahieren — eine essenzielle Fähigkeit für Datenanalyse.',
                exercise3Code: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\n\n# Kunden aus Deutschland\nresult = conn.execute(\n  \'SELECT name, city FROM read_csv_auto("customers.csv") WHERE country = "Germany"\'\n).fetchall()\nprint(result)',
                exercise3Output: '[(\'Anna Mueller\', \'Berlin\'), (\'Klaus Schmidt\', \'Munich\'), ...]',
                exercise3Explain: 'Zeile 5-7: SELECT gibt an, welche Spalten Sie möchten (name, city). Die FROM-Klausel gibt an, wo die Daten kommen (customers.csv). WHERE ist der Schlüsselbegriff für Filterung — er führt eine Bedingung aus (country = "Germany"). Nur Zeilen, bei denen die WHERE-Bedingung wahr ist, werden zurückgegeben. Dies ist der schnellste Weg, um große Datensätze auf relevante Einträge zu reduzieren.',
                exercise3Task: 'Filtern Sie alle Kunden aus der Stadt "London" aus der customers.csv. Ihre Marketing-Abteilung möchte eine Liste erstellen, um gezielt Londoner Kunden zu kontaktieren.',

                exercise3Solution: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\nresult = conn.execute(\n  \'SELECT name, city FROM read_csv_auto("customers.csv") WHERE city = "London"\'\n).fetchall()\nprint(result)',
                exercise3Verify: 'Sie sollten nur Kunden aus London sehen.',

                // Exercise 4
                exercise4Title: 'Sortieren & Begrenzen',
                exercise4Goal: 'Lernen Sie, Ergebnisse mit ORDER BY zu sortieren und mit LIMIT zu begrenzen. Sie werden verstehen, wie Sie die wichtigsten oder extremsten Werte identifizieren — kritisch für Business-Analysen.',

                exercise4Explain: 'Zeile 5-7: ORDER BY sortiert Daten nach einer Spalte — hier unit_price DESC bedeutet absteigend (größte zuerst). Wichtig: ORDER BY ohne DESC ist aufsteigend (ASC), kleinste zuerst. LIMIT 5 begrenzt das Ergebnis auf nur 5 Zeilen — praktisch für \"Top 5\" oder \"Bottom 10\" Analysen. Zusammen zeigt die Abfrage die 5 teuersten Produkte, was für die Lagerverwaltung oder Marketingstrategien wertvoll ist.',
                exercise4Task: 'Finden Sie die 10 günstigsten (preiswertesten) Produkte und sortieren Sie aufsteigend (ASC). Dies hilft dem Einkaufsteam, Budget-freundliche Optionen für Kunden zu finden.',
                exercise4Hint: 'Verwenden Sie ORDER BY unit_price ASC LIMIT 10',
                exercise4Solution: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\nresult = conn.execute(\n  \'SELECT name, unit_price FROM read_csv_auto("products.csv") ORDER BY unit_price ASC LIMIT 10\'\n).fetchall()\nprint(result)',
                exercise4Verify: 'Sie sollten 10 Produkte sehen, von billig zu teuer sortiert.',

                // Exercise 5
                exercise5Title: 'Aggregationen',
                exercise5Goal: 'Lernen Sie Aggregationsfunktionen wie COUNT, SUM und AVG mit GROUP BY. Sie werden verstehen, wie man große Datenmengen zusammenfasst — unverzichtbar für Reports und KPI-Analysen.',
                exercise5Code: 'import duckdb\n\nconn = duckdb.connect(\':memory:\')\n\n# Durchschnittlicher Preis pro Kategorie\nresult = conn.execute(\n  \'SELECT category, AVG(unit_price) as avg_price, COUNT(*) as product_count\n   FROM read_csv_auto("products.csv") GROUP BY category\'\n).fetchall()\nprint(result)',
                exercise5Output: '[(\'Electronics\', 450.00, 12), (\'Clothing\', 45.50, 8), ...]',
                exercise5Explain: 'Zeile 6-9: GROUP BY category ist der Schlüssel zu Aggregationen — es teilt die Daten in Gruppen (hier jede Produktkategorie). Aggregatsfunktionen (AVG, COUNT, SUM, MIN, MAX) berechnen dann pro Gruppe: AVG() gibt den Durchschnittspreis pro Kategorie, COUNT(*) zählt wie viele Produkte pro Kategorie. Ohne GROUP BY würden diese Funktionen über alle Zeilen arbeiten. Das Ergebnis ist ein Summen-Report pro Kategorie — essentiell für Management-Reports.',

                exercise5Verify: 'Sie sollten pro Kunde die Gesamtausgaben und Bestellanzahl sehen.',

                // Exercise 6

        function QuizQuestion({ number, question, options, correct, t }) {
            const [selected, setSelected] = React.useState(null);
            const [answered, setAnswered] = React.useState(false);

            const handleClick = (option) => {
                setSelected(option);
                setAnswered(true);
            };

            const isCorrect = selected === correct;

            return (
                <div className="quiz-question">
                    <h4>{number}. {question}</h4>
                    <div className="quiz-options">
                        {options.map((opt, idx) => {
                            const key = String.fromCharCode(97 + idx);
                            let className = 'quiz-option';
                            if (answered) {
                                if (opt === correct) className += ' correct';
                                else if (opt === selected && selected !== correct) className += ' incorrect';
                            } else if (opt === selected) {
                                className += ' selected';
                            }
                            return (
                                <div key={idx} className={className} onClick={() => !answered && handleClick(opt)}>
                                    <strong>{key})</strong> {opt}
                                </div>
                            );
                        })}
                    </div>
                    {answered && (
                        <div className={`quiz-feedback ${isCorrect ? 'correct' : 'incorrect'}`}>
                            {isCorrect ? t[`q${number}Correct`] : t[`q${number}Incorrect`]}
                        </div>
                    )}
                </div>
            );
        }
