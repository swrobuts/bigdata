        function LabDuckDB() {
            const [currentLang, setCurrentLang] = React.useState('de');
            const [activeSection, setActiveSection] = React.useState('hero');
            const t = translations[currentLang].sections;
            const nav = translations[currentLang].navigation;

            const toggleRTL = (lang) => {
                const html = document.documentElement;
                if (lang === 'ar') {
                    html.classList.add('rtl');
                } else {
                    html.classList.remove('rtl');
                }
            };

            const handleLanguageChange = (lang) => {
                setCurrentLang(lang);
                toggleRTL(lang);
            };

            React.useEffect(() => {
                toggleRTL(currentLang);
            }, []);

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                alert(currentLang === 'de' ? 'Kopiert!' : 'Copied!');
            };

            const CodeBlock = ({ language, code }) => (
                <div className="code-block">
                    <div className="code-block-header">
                        <span className="code-block-language">{language}</span>
                        <button
                            className="copy-btn"
                            onClick={() => copyToClipboard(code)}
                        >
                            {currentLang === 'de' ? 'Kopieren' : 'Copy'}
                        </button>
                    </div>
                    <pre><code className={`language-${language.toLowerCase()}`}>{code}</code></pre>
                </div>
            );

            const CollapsibleChallenge = ({ title, difficulty, task, hypothesis, solution, code, hint, guidance, insight }) => {
                const [isOpen, setIsOpen] = React.useState(false);
                const difficultyColors = {
                    easy: '#10b981',
                    medium: '#f59e0b',
                    hard: '#f97316',
                    boss: '#e53e3e'
                };
                const difficultyLabels = {
                    easy: currentLang === 'de' ? 'Einstieg' : 'Getting Started',
                    medium: currentLang === 'de' ? 'Vertiefung' : 'Deepening',
                    hard: currentLang === 'de' ? 'Fortgeschritten' : 'Advanced',
                    boss: currentLang === 'de' ? 'Boss-Challenge' : 'Boss Challenge'
                };
                
                return (
                    <div className="challenge-card">
                        <div className="challenge-header" onClick={() => setIsOpen(!isOpen)}>
                            <div>
                                <h3 style={{margin: '0 0 0.5rem 0'}}>{title}</h3>
                                <span style={{
                                    backgroundColor: difficultyColors[difficulty],
                                    color: 'white',
                                    padding: '0.25rem 0.75rem',
                                    borderRadius: '20px',
                                    fontSize: '0.875rem',
                                    fontWeight: '600'
                                }}>
                                    {difficultyLabels[difficulty]}
                                </span>
                            </div>
                            <span style={{fontSize: '1.5rem'}}>{isOpen ? '▼' : '▶'}</span>
                        </div>
                        {isOpen && (
                            <div className="challenge-content">
                                <div style={{marginBottom: '1rem'}}>
                                    <strong>{currentLang === 'de' ? 'Aufgabe:' : 'Task:'}</strong>
                                    <p>{task}</p>
                                </div>
                                {hypothesis && (
                                    <div className="hypothesis-box">
                                        <strong>{currentLang === 'de' ? 'Hypothese:' : 'Hypothesis:'}</strong>
                                        <p>{hypothesis}</p>
                                    </div>
                                )}
                                {hint && (
                                    <div className="hypothesis-box">
                                        <strong>{currentLang === 'de' ? 'Hinweis:' : 'Hint:'}</strong>
                                        <p>{hint}</p>
                                    </div>
                                )}
                                {guidance && (
                                    <div className="hypothesis-box">
                                        <strong>{currentLang === 'de' ? 'Anleitung:' : 'Guidance:'}</strong>
                                        <p>{guidance}</p>
                                    </div>
                                )}
                                {code && (
                                    <>
                                        <p><strong>{solution || (currentLang === 'de' ? 'Lösung:' : 'Solution:')}</strong></p>
                                        <CodeBlock language="sql" code={code} />
                                    </>
                                )}
                                {insight && (
                                    <div className="insight-box">
                                        <strong>{currentLang === 'de' ? 'Geschäftseinblick:' : 'Business Insight:'}</strong>
                                        <p>{insight}</p>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                );
            };

            const SelfCheckCard = ({ question }) => {
                const [isOpen, setIsOpen] = React.useState(false);
                return (
                    <div className="self-check-card" onClick={() => setIsOpen(!isOpen)}>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>

                            <span>{isOpen ? '▼' : '▶'}</span>
                        </div>

                            <div style={{marginTop: '1rem', padding: '1rem', backgroundColor: '#f0fdf4', borderRadius: '0.5rem'}}>

                                <CodeBlock language="sql" code={`WITH first_orders AS (
    SELECT
        customer_id,
        DATE_TRUNC('month', MIN(order_date)) as cohort_month
    FROM orders
    GROUP BY customer_id
)
SELECT
    cohort_month,
    DATE_TRUNC('month', o.order_date) as order_month,
    COUNT(DISTINCT o.customer_id) as num_customers,
    SUM(o.total_amount) as revenue
FROM orders o
JOIN first_orders fo ON o.customer_id = fo.customer_id
GROUP BY cohort_month, DATE_TRUNC('month', o.order_date)
ORDER BY cohort_month, order_month`} />
                                <h3>{t.exercise4.rfm}</h3>
                                <CodeBlock language="sql" code={`WITH customer_metrics AS (
    SELECT
        c.customer_id,
        c.customer_name,
        COUNT(DISTINCT o.order_id) as frequency,
        SUM(o.total_amount) as monetary,
        CAST((JULIANDAY('now') - JULIANDAY(MAX(o.order_date)))/365.0 AS INT) as recency_years
    FROM customers c
    LEFT JOIN orders o ON c.customer_id = o.customer_id
    GROUP BY c.customer_id, c.customer_name
)
SELECT
    customer_id,
    customer_name,
    frequency,
    monetary,
    recency_years,
    CASE
        WHEN monetary > 1000 THEN 'High Value'
        WHEN monetary > 500 THEN 'Medium Value'
        ELSE 'Low Value'
    END as segment
FROM customer_metrics
ORDER BY monetary DESC`} />
                                <h3>{t.exercise4.funnel}</h3>
                                <CodeBlock language="sql" code={`WITH events AS (
    SELECT
        user_id,
        product_id,
        event_type,
        event_timestamp,
        ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY event_timestamp) as event_seq
    FROM clickstream
)
SELECT
    SUM(CASE WHEN event_type = 'view' THEN 1 ELSE 0 END) as views,
    SUM(CASE WHEN event_type = 'add_to_cart' THEN 1 ELSE 0 END) as add_to_cart,
    SUM(CASE WHEN event_type = 'purchase' THEN 1 ELSE 0 END) as purchases,
    ROUND(100.0 * SUM(CASE WHEN event_type = 'add_to_cart' THEN 1 ELSE 0 END) /
        SUM(CASE WHEN event_type = 'view' THEN 1 ELSE 0 END), 2) as cart_conversion_rate,
    ROUND(100.0 * SUM(CASE WHEN event_type = 'purchase' THEN 1 ELSE 0 END) /
        SUM(CASE WHEN event_type = 'view' THEN 1 ELSE 0 END), 2) as purchase_conversion_rate
FROM events`} />
                                <h3>{t.exercise4.growth}</h3>

    SELECT
        YEAR(order_date) as year,
        SUM(total_amount) as revenue
    FROM orders
    GROUP BY YEAR(order_date)
)
SELECT
    year,
    revenue,
    LAG(revenue) OVER (ORDER BY year) as prev_year_revenue,
    ROUND(100.0 * (revenue - LAG(revenue) OVER (ORDER BY year)) /
        LAG(revenue) OVER (ORDER BY year), 2) as yoy_growth_pct
FROM yearly_revenue
ORDER BY year`} />
