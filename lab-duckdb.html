            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.8rem;

        .main-content {
            margin-left: 280px;
            padding-top: 5rem;
            padding: 5rem 2rem 2rem 2rem;

            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;

            background-color: #f5f5f5;
            border-left-color: #E8792F;
            color: #E8792F;
            font-weight: 600;
        }
        .badge {
            display: inline-block;
            background-color: #E8792F;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }

        .badge-intermediate { background-color: #FF9800; }
        .badge-advanced { background-color: #F44336; }
        .expandable {
            border: 1px solid #e0e0e0;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
        .expandable-header {
            padding: 1rem;
            background: #f9f9f9;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;

        .expandable-content {
            padding: 1rem;
            display: none;
        }

            border: 2px solid #e0e0e0;
            border-radius: 0.5rem;

                joinOpt3: "LEFT JOIN sol tablonun tüm satırlarını tutar",
                joinExpl: "INNER JOIN yalnızca her iki tabloda da bulunan satırları gösterir. LEFT JOIN sol tablonun tüm satırlarını gösterir ve sağdan eşleşmeleri ekler.",
                cteQuestion: "CTE nedir?",
                cteOpt1: "Veritabanında bir tablo",
                cteOpt2: "WITH ile adlandırılmış geçici sorgu",
                cteOpt3: "Bir SQL yorumu",
                cteExpl: "Common Table Expression (CTE), WITH cümlesi ile tanımlanan ve yeniden kullanılabilen adlandırılmış bir alt sorgudur.",
                orderQuestion: "ORDER BY DESC LIMIT 5 ne yapar?",
                orderOpt1: "Tabloyu gerçek zamanlı olarak sıralar",

                orderExpl: "ORDER BY DESC LIMIT 5, satırları azalan sırada sıralar ve yalnızca ilk (en yüksek) 5 satırı döndürür.",
                duckdbQuestion: "MongoDB yerine ne zaman DuckDB kullanılmalı?",
                duckdbOpt1: "Yapılandırılmamış belgeler için",
                duckdbOpt2: "Yapılandırılmış veriler üzerinde analitik SQL sorguları için",
                duckdbOpt3: "Büyük dağıtılmış sistemler için",
                duckdbExpl: "DuckDB, bir dosya veya yerel olarak yapılandırılmış veriler üzerinde analitik sorgular için idealdir. MongoDB, belgeye yöneliktir, yapılandırılmamış veriler için daha uygundur.",
                advancedTopics: "İleri konular",
                windowFunctionsList: "Sıralamaları ve eğilimleri için pencere işlevleri",
                partitionedParquet: "DuckDB ile bölümlü Parquet dosyaları",
                remoteQueries: "Uzak sorgular: S3, bulut depolama",
                webAssembly: "DuckDB in WebAssembly",
                aiIntegration: "YZ Entegrasyonu",
                aiIntegrationDesc: "DuckDB, akıllı veri analizi için LLM'ler ile birleştirilebilir:",
                prompt1: "Pencere işlevleri ile satış eğilimlerini analiz edin",
                prompt2: "CTE ile kohort analizleri oluşturun",
                prompt3: "Karmaşık birleştirmeleri otomatik olarak optimize edin",
                mcp: "Model Context Protocol (MCP)",
                mcpDesc: "DuckDB, YZ tarafından desteklenen sorgu oluşturma için MCP sunucuları aracılığıyla sağlanabilir.",
                commonIssues: "Yaygın sorunlar",
                issue1: "CSV dosyası yüklenmiyor",
                issue1Desc: "Dosya yolunun doğru olduğundan ve DuckDB'nin gerekli izinlere sahip olduğundan emin olun.",
                issue2: "Büyük dosyalarla bellek hatası",
                issue2Desc: "DuckDB büyük dosyalar için otomatik olarak optimize eder, ancak dosyayı doğru yüklediğinizden emin olun.",
                issue3: "Docker konteyner hatası",
                issue3Desc: "DuckDB Docker konteynerinin doğru şekilde başlatıldığından ve doğru görüntüyü kullandığından emin olun.",
                copyCode: "Kodu kopyala",
                codeCopied: "Kopyalandı!",
                beginnerBadge: "BAŞLANGIÇ",
                bestPractices: "En İyi Uygulamalar",
                practice1: "Okunabilirlik için CTE kullanın",
                practice2: "Sık filtrelenen sütunları indeksleyin",
                practice3: "Sorguları analiz etmek için EXPLAIN kullanın",
                whatYouLearn: "Öğrenecekleriniz",
                realWorldMotivation: "DuckDB, analitik veri işleme için önde gelen şirketler tarafından kullanılmaktadır:",
                motherDuckDesc: "MotherDuck: hızlı analitik için bulut hizmeti olarak DuckDB sağlar",
                dbtDesc: "dbt Labs: SQL tabanlı veri dönüşümü için DuckDB'yi entegre eder",
                observableDesc: "Observable: etkileşimli veri görselleştirmeleri için DuckDB kullanır",
                duckdbIs: "DuckDB Nedir?",
                inProcessDb: "İşlem İçi Veritabanı: DuckDB sunucu olmadan tek bir makinenin belleğinde çalışır",
                columnarStorage: "Sütunlu Depolama: Yüksek performanslı sütunlu format ile analitik sorgular için optimize edilmiştir",
                sqlNative: "SQL Yerel: OLAP iş yükleri için tam SQL desteği",
                estimatedTime: "Tahmini Süre",
                timeValue: "60-90 Dakika",
                prerequisites: "Ön Koşullar",
                prereqValue: "Temel SQL bilgisi, Python yüklenmiş",
            }
        };

        // Main App Component
        const DuckDBLab = () => {
            const [language, setLanguage] = useState('de');
            const [activeSection, setActiveSection] = useState('overview');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [rtl, setRtl] = useState(language === 'ar');
            const [copiedCode, setCopiedCode] = useState(null);

            const t = translations[language];

            useEffect(() => {
                setRtl(language === 'ar');
                document.documentElement.dir = language === 'ar' ? 'rtl' : 'ltr';
            }, [language]);

            const copyToClipboard = (code, id) => {
                navigator.clipboard.writeText(code);
                setCopiedCode(id);
                setTimeout(() => setCopiedCode(null), 2000);
            };

            const CodeBlock = ({ code, language: lang = 'sql', id }) => {
                return (
                    <div className="code-block">
                        <button
                            className="copy-btn"
                            onClick={() => copyToClipboard(code, id)}
                        >
                            {copiedCode === id ? t.codeCopied : t.copyCode}
                        </button>
                        <pre><code className={`language-${lang}`}>{code}</code></pre>
                    </div>
                );
            };

            const QuizQuestion = ({ question, options, correct, explanation }) => {
                const [selected, setSelected] = useState(null);
                const [answered, setAnswered] = useState(false);

                const handleAnswer = (index) => {
                    setSelected(index);
                    setAnswered(true);
                };

                const isCorrect = selected === correct;

                return (
                    <div className="card">
                        <h4 className="font-bold mb-4">{question}</h4>
                        {options.map((opt, idx) => (
                            <div
                                key={idx}
                                className={`quiz-option ${selected === idx ? 'selected' : ''} ${
                                    answered && idx === correct ? 'correct' : ''
                                } ${answered && idx === selected && !isCorrect ? 'incorrect' : ''}`}
                                onClick={() => !answered && handleAnswer(idx)}
                            >
                                {opt}
                            </div>
                        ))}
                        {answered && (
                            <div className={`quiz-feedback ${isCorrect ? 'feedback-correct' : 'feedback-incorrect'}`}>
                                {isCorrect ? t.correct : t.incorrect}
                                <p className="mt-2 font-normal">{t.explanation} {explanation}</p>
                            </div>
                        )}
                    </div>
                );
            };

            const Expandable = ({ title, children }) => {
                const [open, setOpen] = useState(false);
                return (
                    <div className="expandable">
                        <div className="expandable-header" onClick={() => setOpen(!open)}>
                            {title}
                            <span>{open ? '▼' : '▶'}</span>
                        </div>
                        {open && <div className="expandable-content open">{children}</div>}
                    </div>
                );
            };

            const renderSection = () => {
                switch(activeSection) {
                    case 'overview':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.overview}</h2>
                                <div className="lesson-box">
                                    <h3 style={{ color: '#E8792F', marginBottom: '1rem' }}>{t.whatYouLearn}</h3>
                                    <p>{t.realWorldMotivation}</p>
                                    <ul style={{ listStyle: 'none', paddingLeft: 0, marginTop: '1rem' }}>
                                        <li style={{ marginBottom: '0.5rem' }}><strong>MotherDuck:</strong> {t.motherDuckDesc}</li>
                                        <li style={{ marginBottom: '0.5rem' }}><strong>dbt Labs:</strong> {t.dbtDesc}</li>
                                        <li><strong>Observable:</strong> {t.observableDesc}</li>
                                    </ul>
                                </div>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3" style={{ color: '#1B3A5C' }}>{t.duckdbIs}</h3>
                                    <ul style={{ listStyle: 'none', paddingLeft: 0 }}>
                                        <li style={{ marginBottom: '0.75rem' }}><strong>{t.inProcessDb}</strong></li>
                                        <li style={{ marginBottom: '0.75rem' }}><strong>{t.columnarStorage}</strong></li>
                                        <li><strong>{t.sqlNative}</strong></li>
                                    </ul>
                                </div>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3" style={{ color: '#1B3A5C' }}>{t.estimatedTime}</h3>
                                    <p><strong>{t.timeValue}</strong></p>
                                    <p style={{ marginTop: '1rem' }}><strong>{t.prerequisites}</strong> {t.prereqValue}</p>
                                </div>
                            </div>
                        );
                    case 'setup':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.setup}</h2>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">Installation</h3>
                                    <CodeBlock
                                        code={`pip install duckdb\npip install pandas`}
                                        id="setup-1"
                                    />
                                </div>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">Docker Setup</h3>
                                    <CodeBlock
                                        code={`docker run -it duckdb/duckdb`}
                                        id="setup-2"
                                    />
                                </div>
                            </div>
                        );
                    case 'fundamentals':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.fundamentals}</h2>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.queryBasics}</h3>
                                    <p className="mb-3">SQL Grundlagen mit DuckDB:</p>
                                    <CodeBlock
                                        code={`SELECT column1, column2\nFROM table_name\nWHERE condition\nORDER BY column1;`}
                                        id="fund-1"
                                    />
                                </div>
                            </div>
                        );
                    case 'exercise1':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.exercise1} <span className="badge badge-beginner">{t.beginnerBadge}</span></h2>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.loadCSV}</h3>
                                    <CodeBlock
                                        code={`SELECT * FROM 'customers.csv' LIMIT 5;`}
                                        id="ex1-1"
                                    />
                                </div>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">DESCRIBE Query</h3>
                                    <CodeBlock
                                        code={`DESCRIBE SELECT * FROM 'customers.csv';`}
                                        id="ex1-2"
                                    />
                                </div>
                            </div>
                        );
                    case 'exercise2':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.exercise2} <span className="badge badge-beginner">{t.beginnerBadge}</span></h2>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.selectWhere}</h3>
                                    <CodeBlock
                                        code={`SELECT * FROM 'customers.csv'\nWHERE age > 30\nORDER BY total DESC\nLIMIT 10;`}
                                        id="ex2-1"
                                    />
                                </div>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.betweenOperator}</h3>
                                    <CodeBlock
                                        code={`SELECT * FROM 'customers.csv'\nWHERE city = 'Berlin' AND age BETWEEN 25 AND 35;`}
                                        id="ex2-2"
                                    />
                                </div>
                            </div>
                        );
                    case 'exercise3':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.exercise3} <span className="badge badge-beginner">{t.beginnerBadge}</span></h2>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.groupBy}</h3>
                                    <CodeBlock
                                        code={`SELECT city, COUNT(*) as customer_count, AVG(age) as avg_age\nFROM 'customers.csv'\nGROUP BY city;`}
                                        id="ex3-1"
                                    />
                                </div>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.having}</h3>
                                    <CodeBlock
                                        code={`SELECT product_category, SUM(total) as revenue\nFROM 'orders.csv'\nGROUP BY product_category\nHAVING SUM(total) > 10000;`}
                                        id="ex3-2"
                                    />
                                </div>
                            </div>
                        );
                    case 'exercise4':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.exercise4} <span className="badge badge-beginner">{t.beginnerBadge}</span></h2>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.innerJoin}</h3>
                                    <CodeBlock
                                        code={`SELECT c.name, o.order_id, o.total\nFROM 'customers.csv' c\nINNER JOIN 'orders.csv' o ON c.id = o.customer_id;`}
                                        id="ex4-1"
                                    />
                                </div>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.leftJoin}</h3>
                                    <CodeBlock
                                        code={`SELECT c.name, COUNT(o.order_id) as order_count\nFROM 'customers.csv' c\nLEFT JOIN 'orders.csv' o ON c.id = o.customer_id\nGROUP BY c.name;`}
                                        id="ex4-2"
                                    />
                                </div>
                            </div>
                        );
                    case 'exercise5':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.exercise5} <span className="badge badge-beginner">{t.beginnerBadge}</span></h2>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.subqueryBasics}</h3>
                                    <CodeBlock
                                        code={`SELECT * FROM 'customers.csv'\nWHERE total > (SELECT AVG(total) FROM 'customers.csv');`}
                                        id="ex5-1"
                                    />
                                </div>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.cteWith}</h3>
                                    <CodeBlock
                                        code={`WITH top_customers AS (\n  SELECT name, total\n  FROM 'customers.csv'\n  WHERE total > 5000\n)\nSELECT * FROM top_customers ORDER BY total DESC;`}
                                        id="ex5-2"
                                    />
                                </div>
                            </div>
                        );
                    case 'exercise6':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.exercise6} <span className="badge badge-beginner">{t.beginnerBadge}</span></h2>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.revenueByCategory}</h3>
                                    <CodeBlock
                                        code={`SELECT product_category, SUM(total) as revenue\nFROM 'orders.csv'\nGROUP BY product_category\nORDER BY revenue DESC;`}
                                        id="ex6-1"
                                    />
                                </div>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.topCustomers}</h3>
                                    <CodeBlock
                                        code={`SELECT name, SUM(total) as total_spending\nFROM 'customers.csv' c\nLEFT JOIN 'orders.csv' o ON c.id = o.customer_id\nGROUP BY c.name\nORDER BY total_spending DESC\nLIMIT 10;`}
                                        id="ex6-2"
                                    />
                                </div>
                            </div>
                        );
                    case 'challenge':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.challenge}</h2>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.umsatzTrend}</h3>
                                    <p className="mb-4">Verwende Window Functions um monatliche Umsätze und Trends zu analysieren:</p>
                                    <Expandable title={t.hint}>
                                        <p>Nutze ROW_NUMBER(), LAG() oder RANK() Window Functions</p>
                                    </Expandable>
                                    <Expandable title={t.solution}>
                                        <CodeBlock
                                            code={`WITH monthly_revenue AS (\n  SELECT DATE_TRUNC('month', order_date) as month, SUM(total) as revenue\n  FROM 'orders.csv'\n  GROUP BY DATE_TRUNC('month', order_date)\n)\nSELECT month, revenue,\n       LAG(revenue) OVER (ORDER BY month) as prev_month_revenue,\n       ROUND((revenue - LAG(revenue) OVER (ORDER BY month)) / LAG(revenue) OVER (ORDER BY month) * 100, 2) as growth_percent\nFROM monthly_revenue\nORDER BY month;`}
                                            id="challenge-1"
                                        />
                                    </Expandable>
                                </div>
                            </div>
                        );
                    case 'quiz':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.testYourKnowledge}</h2>
                                <QuizQuestion
                                    question={t.whatIs}
                                    options={[t.option1, t.option2, t.option3]}
                                    correct={1}
                                    explanation={t.duckdbExplanation}
                                />
                                <QuizQuestion
                                    question={t.groupByQuestion}
                                    options={[t.groupByOpt1, t.groupByOpt2, t.groupByOpt3]}
                                    correct={1}
                                    explanation={t.groupByExpl}
                                />
                                <QuizQuestion
                                    question={t.joinDiffQuestion}
                                    options={[t.joinOpt1, t.joinOpt2, t.joinOpt3]}
                                    correct={2}
                                    explanation={t.joinExpl}
                                />
                                <QuizQuestion
                                    question={t.cteQuestion}
                                    options={[t.cteOpt1, t.cteOpt2, t.cteOpt3]}
                                    correct={1}
                                    explanation={t.cteExpl}
                                />
                                <QuizQuestion
                                    question={t.orderQuestion}
                                    options={[t.orderOpt1, t.orderOpt2, t.orderOpt3]}
                                    correct={1}
                                    explanation={t.orderExpl}
                                />
                                <QuizQuestion
                                    question={t.duckdbQuestion}
                                    options={[t.duckdbOpt1, t.duckdbOpt2, t.duckdbOpt3]}
                                    correct={1}
                                    explanation={t.duckdbExpl}
                                />
                            </div>
                        );
                    case 'outlook':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.outlook}</h2>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.advancedTopics}</h3>
                                    <ul className="space-y-2">
                                        <li><strong>{t.windowFunctionsList}</strong> - ROW_NUMBER, RANK, DENSE_RANK, LAG, LEAD</li>
                                        <li><strong>{t.partitionedParquet}</strong> - Effiziente Abfragen auf großen Datenmengen</li>
                                        <li><strong>{t.remoteQueries}</strong> - Direktes Abfragen von Cloud-Dateien</li>
                                        <li><strong>{t.webAssembly}</strong> - DuckDB im Browser</li>
                                    </ul>
                                </div>
                                <div className="card">
                                    <h3 className="text-xl font-bold mb-3">{t.aiIntegration}</h3>
                                    <p className="mb-4">{t.aiIntegrationDesc}</p>
                                    <ol className="space-y-3">
                                        <li>1. {t.prompt1}</li>
                                        <li>2. {t.prompt2}</li>
                                        <li>3. {t.prompt3}</li>
                                    </ol>
                                    <p className="mt-4 font-semibold">{t.mcp}: {t.mcpDesc}</p>
                                </div>
                            </div>
                        );
                    case 'troubleshooting':
                        return (
                            <div>
                                <h2 className="text-3xl font-bold mb-4 accent-line pb-3">{t.troubleshooting}</h2>
                                <div className="card">
                                    <h4 className="font-bold mb-2">{t.issue1}</h4>
                                    <p>{t.issue1Desc}</p>
                                </div>
                                <div className="card">
                                    <h4 className="font-bold mb-2">{t.issue2}</h4>
                                    <p>{t.issue2Desc}</p>
                                </div>
                                <div className="card">
                                    <h4 className="font-bold mb-2">{t.issue3}</h4>
                                    <p>{t.issue3Desc}</p>
                                </div>
                            </div>
                        );
                    default:
                        return null;
                }
            };

            const sections = [
                { id: 'overview', label: t.overview },
                { id: 'setup', label: t.setup },
                { id: 'fundamentals', label: t.fundamentals },
                { id: 'exercise1', label: t.exercise1 },
                { id: 'exercise2', label: t.exercise2 },
                { id: 'exercise3', label: t.exercise3 },
                { id: 'exercise4', label: t.exercise4 },
                { id: 'exercise5', label: t.exercise5 },
                { id: 'exercise6', label: t.exercise6 },
                { id: 'challenge', label: t.challenge },
                { id: 'quiz', label: t.quiz },
                { id: 'outlook', label: t.outlook },
                { id: 'troubleshooting', label: t.troubleshooting },
            ];

            return (
                <>
                    <div className="header">
                        <div className="header-left">
                            <a className="back-btn" href="index.html">{t.back}</a>
                            <div className="header-title">DuckDB Lab</div>
                        </div>
                        <div className="lang-switcher">
                            {['de', 'en', 'ar', 'uk', 'es', 'tr'].map(lang => (
                                <button key={lang} className={'lang-btn ' + (language === lang ? 'active' : '')} onClick={() => setLanguage(lang)}>
                                    {lang.toUpperCase()}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="sidebar">
                        <div className="p-4">
                            {sections.map((section) => (
                                <div
                                    key={section.id}
                                    className={`sidebar-item ${activeSection === section.id ? 'active' : ''}`}
                                    onClick={() => setActiveSection(section.id)}
                                >
                                    {section.label}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="main-content">
                        {renderSection()}
                    </div>
                </>
            );
        };

        ReactDOM.render(<DuckDBLab />, document.getElementById('root'));
    </script>
</body>
</html>
