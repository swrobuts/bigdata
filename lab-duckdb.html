            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            font-weight: 600;

            padding: 1rem;

            top: 0.5rem;
            right: 0.5rem;
            background: #E8792F;
            color: white;
            border: none;

            border-radius: 0.4rem;

            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
            cursor: pointer;
            transition: all 0.2s;

            background: #1B3A5C;
            color: #00d084;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            margin: 1rem 0;
            border-left: 4px solid #E8792F;

            top: 0;
            left: 0;
            right: 0;
            background: white;
            border-bottom: 1px solid #e0e0e0;

            color: #1B3A5C;

            text-align: left;
            border: 1px solid #e0e0e0;

            font-weight: 700;
            color: #E8792F;

            background: #fffbeb;

            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;

            border-left: 4px solid #E8792F;
            padding: 1.5rem;
            border-radius: 0.5rem;

                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>

                    <div className="card" style={{ padding: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>Objective</h3>
                        <p>Combine window functions, CTEs, and aggregations for real-world business analytics.</p>

                        <h3 className="card-title" style={{ marginTop: '2rem', marginBottom: '1rem' }}>RFM Segmentation</h3>
                        <p style={{ marginBottom: '1rem' }}>RFM = Recency (last order), Frequency (how often), Monetary (how much spent)</p>
                        <div className="code-block">
                            <button className="copy-btn" onClick={() => copyToClipboard('WITH rfm_base AS (\n  SELECT \n    c.id, c.name,\n    MAX(o.order_date) as last_order_date,\n    COUNT(o.id) as frequency,\n    SUM(o.total_amount) as monetary\n  FROM customers c\n  LEFT JOIN orders o ON c.id = o.customer_id\n  GROUP BY c.id, c.name\n),\nrfm_scores AS (\n  SELECT *,\n    CASE WHEN frequency = 0 THEN \'Lost\'\n         WHEN DATEDIFF(day, last_order_date, CURRENT_DATE) < 30 AND frequency > 2 THEN \'VIP\'\n         WHEN DATEDIFF(day, last_order_date, CURRENT_DATE) < 90 THEN \'Regular\'\n         ELSE \'At Risk\'\n    END as segment\n  FROM rfm_base\n)\nSELECT segment, COUNT(*) as customer_count, AVG(monetary) as avg_spent\nFROM rfm_scores\nGROUP BY segment\nORDER BY customer_count DESC;')}>Copy</button>
                            <code style={{ whiteSpace: 'pre-wrap', fontSize: '0.75rem' }}>WITH rfm_base AS (<br/>  SELECT c.id, c.name,<br/>    MAX(o.order_date) as last_order_date,<br/>    COUNT(o.id) as frequency,<br/>    SUM(o.total_amount) as monetary<br/>  FROM customers c<br/>  LEFT JOIN orders o ON c.id = o.customer_id<br/>  GROUP BY c.id, c.name<br/>),<br/>rfm_scores AS (...)<br/>SELECT segment, COUNT(*) as customer_count<br/>FROM rfm_scores<br/>GROUP BY segment;</code>
                        </div>

                        <h3 className="card-title" style={{ marginTop: '2rem', marginBottom: '1rem' }}>Cohort Analysis</h3>
                        <p style={{ marginBottom: '1rem' }}>Track customer behavior by their signup month</p>
                        <div className="code-block">
                            <button className="copy-btn" onClick={() => copyToClipboard('WITH cohorts AS (\n  SELECT \n    DATE_TRUNC(\'month\', c.signup_date) as cohort_month,\n    c.id as customer_id,\n    DATE_TRUNC(\'month\', o.order_date) as order_month\n  FROM customers c\n  LEFT JOIN orders o ON c.id = o.customer_id\n)\nSELECT \n  cohort_month,\n  order_month,\n  COUNT(DISTINCT customer_id) as customers\nFROM cohorts\nWHERE order_month IS NOT NULL\nGROUP BY cohort_month, order_month\nORDER BY cohort_month, order_month;')}>Copy</button>
                            <code style={{ whiteSpace: 'pre-wrap', fontSize: '0.75rem' }}>WITH cohorts AS (...)<br/>SELECT \n  cohort_month,<br/>  order_month,<br/>  COUNT(DISTINCT customer_id) as customers<br/>FROM cohorts<br/>WHERE order_month IS NOT NULL<br/>GROUP BY cohort_month, order_month;</code>
                        </div>

                        <h3 className="card-title" style={{ marginTop: '2rem', marginBottom: '1rem' }}>Year-over-Year Growth</h3>
                        <div className="code-block">
                            <button className="copy-btn" onClick={() => copyToClipboard('WITH monthly_revenue AS (\n  SELECT \n    EXTRACT(month FROM order_date) as month,\n    EXTRACT(year FROM order_date) as year,\n    SUM(total_amount) as revenue\n  FROM orders\n  GROUP BY EXTRACT(year FROM order_date), EXTRACT(month FROM order_date)\n)\nSELECT \n  month,\n  MAX(CASE WHEN year = 2023 THEN revenue END) as revenue_2023,\n  MAX(CASE WHEN year = 2024 THEN revenue END) as revenue_2024,\n  ROUND(100.0 * (MAX(CASE WHEN year = 2024 THEN revenue END) - MAX(CASE WHEN year = 2023 THEN revenue END)) / MAX(CASE WHEN year = 2023 THEN revenue END), 2) as yoy_growth_pct\nFROM monthly_revenue\nGROUP BY month\nORDER BY month;')}>Copy</button>
                            <code style={{ whiteSpace: 'pre-wrap', fontSize: '0.7rem' }}>WITH monthly_revenue AS (...)<br/>SELECT month,<br/>  MAX(CASE WHEN year = 2023<br/>      THEN revenue END) as revenue_2023,<br/>  MAX(CASE WHEN year = 2024<br/>      THEN revenue END) as revenue_2024<br/>FROM monthly_revenue<br/>GROUP BY month;</code>
                        </div>

                        <div className="expandable" onClick={() => toggleHint('ex8_hint')} style={{ cursor: 'pointer', marginTop: '1.5rem' }}>
                            <div className="expandable-header">
                                <span>Hint</span>
                                <span className="expandable-chevron">▼</span>
                            </div>
                            {expandedHints['ex8_hint'] && (
                                <div className="expandable-content">CTEs (WITH clauses) help break complex queries into readable steps. Use CASE WHEN for conditional logic. Test each part separately before combining.</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }
