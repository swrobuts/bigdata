            margin: 1rem 0;
            cursor: pointer;

            border-radius: 0.5rem;

            margin: 1rem 0;

            left: 0;
            right: 0;

            font-size: 1.5rem;

            color: #1B3A5C;

            color: #E8792F;

                        <div className="code-block">
                            <button className="copy-btn" onClick={() => copyToClipboard('duckdb')}>Copy</button>
                            <code>duckdb</code>
                        </div>
                    </div>

                    <div className="card" style={{ padding: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>{t.option3Python}</h3>
                        <h4 style={{ marginTop: '1.5rem', marginBottom: '0.5rem', color: '#1B3A5C', fontWeight: '600' }}>{t.installPip}</h4>
                        <div className="code-block">
                            <button className="copy-btn" onClick={() => copyToClipboard('pip install duckdb')}>Copy</button>
                            <code>pip install duckdb</code>
                        </div>
                    </div>
                </div>
            );
        }

        function FundamentalsSection({ t, copyToClipboard, toggleQuiz, expandedQuizzes }) {
            return (
                <div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>{t.sqlFundamentalsTitle}</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>

                    <div className="card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>{t.selectGetData}</h3>
                        <p style={{ marginBottom: '1rem' }}>{t.selectDesc}</p>
                        <div className="code-block">
                            <button className="copy-btn" onClick={() => copyToClipboard('SELECT 1 as num, \'hello\' as text;')}>Copy</button>
                            <code>SELECT 1 as num, 'hello' as text;</code>
                        </div>
                        <div className="expandable" onClick={() => toggleQuiz('sql_select')}>
                            <div className="expandable-header"><span>{t.quizSelectAll}</span><span className="expandable-chevron">▼</span></div>
                            {expandedQuizzes['sql_select'] && <div className="expandable-content">{t.quizSelectAnswer}</div>}
                        </div>
                    </div>

                    <div className="card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>{t.fromSpecifyTable}</h3>
                        <p style={{ marginBottom: '1rem' }}>{t.fromDesc}</p>
                        <div className="code-block">
                            <button className="copy-btn" onClick={() => copyToClipboard('SELECT * FROM users;')}>Copy</button>
                            <code>SELECT * FROM users;</code>
                        </div>
                    </div>

                    <div className="card" style={{ padding: '2rem', marginBottom: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>{t.whereFilterRows}</h3>
                        <p style={{ marginBottom: '1rem' }}>{t.whereDesc}</p>
                        <div className="code-block">
                            <button className="copy-btn" onClick={() => copyToClipboard('SELECT * FROM users WHERE id = 1;')}>Copy</button>
                            <code>SELECT * FROM users WHERE id = 1;</code>
                        </div>
                        <div className="expandable" onClick={() => toggleQuiz('sql_where')}>
                            <div className="expandable-header"><span>{t.quizWhereQ}</span><span className="expandable-chevron">▼</span></div>
                            {expandedQuizzes['sql_where'] && <div className="expandable-content">{t.quizWhereA}</div>}
                        </div>
                    </div>

                    <div className="card" style={{ padding: '2rem' }}>
                        <h3 className="card-title" style={{ marginBottom: '1rem' }}>{t.orderBySortResults}</h3>
                        <div className="code-block">
                            <button className="copy-btn" onClick={() => copyToClipboard('SELECT * FROM users ORDER BY name DESC;')}>Copy</button>
                            <code>SELECT * FROM users ORDER BY name DESC;</code>
                        </div>
                        <div className="expandable" onClick={() => toggleQuiz('sql_order')}>
                            <div className="expandable-header"><span>{t.quizOrderQ}</span><span className="expandable-chevron">▼</span></div>
                            {expandedQuizzes['sql_order'] && <div className="expandable-content">{t.quizOrderA}</div>}
                        </div>
                    </div>
                </div>
            );
        }

        function Exercise1Section({ t, copyToClipboard, toggleHint, expandedHints, setActiveSection }) {
            return (
                <div>
                    <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem' }}>
                        <span className="badge badge-beginner">{t.beginner}</span>
                    </div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>{t.exercise1Title}</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>

                    <div className="card" style={{ padding: '2rem' }}>
                        <h3 className="card-title">{t.exercise1Objective}</h3>
                        <h3 className="card-title" style={{ marginTop: '2rem' }}>{t.exercise1Steps}</h3>
                        <ol style={{ marginLeft: '1.5rem', lineHeight: '2' }}>
                            <li><strong>{t.exercise1Step1}</strong><div className="code-block"><button className="copy-btn" onClick={() => copyToClipboard('duckdb')}>Copy</button><code>duckdb</code></div></li>
                            <li><strong>{t.exercise1Step2}</strong><div className="code-block"><button className="copy-btn" onClick={() => copyToClipboard('SELECT 42 as answer;')}>Copy</button><code>SELECT 42 as answer;</code></div></li>
                            <li><strong>{t.exercise1Step3}</strong><div className="code-block"><button className="copy-btn" onClick={() => copyToClipboard('SELECT \'Hello, \' || \'World!\' as greeting;')}>Copy</button><code>SELECT 'Hello, ' || 'World!' as greeting;</code></div></li>
                            <li><strong>{t.exercise1Step4}</strong><div className="code-block"><button className="copy-btn" onClick={() => copyToClipboard('SELECT 10 + 5 as sum, 10 * 5 as product, 10 / 5 as division;')}>Copy</button><code>SELECT 10 + 5 as sum, 10 * 5 as product, 10 / 5 as division;</code></div></li>
                            <li><strong>{t.exercise1Step5}</strong><div className="code-block"><button className="copy-btn" onClick={() => copyToClipboard('SELECT CURRENT_DATE as today, CURRENT_TIME as now;')}>Copy</button><code>SELECT CURRENT_DATE as today, CURRENT_TIME as now;</code></div></li>
                            <li><strong>{t.exercise1Step6}</strong><div className="code-block"><button className="copy-btn" onClick={() => copyToClipboard('SELECT 1 as num UNION ALL SELECT 2 UNION ALL SELECT 3;')}>Copy</button><code>SELECT 1 as num UNION ALL SELECT 2 UNION ALL SELECT 3;</code></div></li>
                        </ol>

                        <h3 className="card-title" style={{ marginTop: '2rem' }}>{t.exercise1Verify}</h3>
                        <div className="hint-box">
                            <div className="hint-title">{t.exercise1VerifyText}</div>
                            <div style={{ marginTop: '0.5rem' }}>{t.exercise1ReadyFor}</div>
                        </div>

                        <div className="expandable" onClick={() => toggleHint('ex1_hint')} style={{ marginTop: '1.5rem' }}>
                            <div className="expandable-header"><span>{t.hint}</span><span className="expandable-chevron">▼</span></div>
                            {expandedHints['ex1_hint'] && <div className="expandable-content">{t.exercise1Hint}</div>}
                        </div>
                    </div>
                    <div style={{ textAlign: 'right', marginTop: '2rem' }}>
                        <button className="btn-accent" onClick={() => setActiveSection('exercise2')} style={{ fontSize: '0.9rem' }}>
                            {t.nextExercise} 2 →
                        </button>
                    </div>
                </div>
            );
        }

        function PlaceholderSection({ t, title, exerciseNum, setActiveSection }) {
            const getDifficultyBadge = (num) => {
                if (num <= 2) return 'beginner';
                if (num <= 5) return 'intermediate';
                if (num <= 7) return 'advanced';
                return 'boss';
            };

            const badgeKey = getDifficultyBadge(exerciseNum);
            const badgeClass = badgeKey === 'beginner' ? 'badge-beginner' :
                              badgeKey === 'intermediate' ? 'badge-intermediate' :
                              badgeKey === 'advanced' ? 'badge-advanced' : 'badge-boss';
            const badgeText = badgeKey === 'beginner' ? t.beginner :
                            badgeKey === 'intermediate' ? t.intermediate :
                            badgeKey === 'advanced' ? t.advanced : t.boss;

            const nextExerciseNum = exerciseNum + 1;
            const isLastExercise = exerciseNum === 8;

            return (
                <div>
                    <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem' }}>
                        <span className={`badge ${badgeClass}`}>{badgeText}</span>
                    </div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>{title}</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>
                    <div className="card" style={{ padding: '2rem' }}>
                        <p>{t.contentComingSoon}</p>
                    </div>
                    {!isLastExercise && (
                        <div style={{ textAlign: 'right', marginTop: '2rem' }}>
                            <button className="btn-accent" onClick={() => setActiveSection('exercise' + nextExerciseNum)} style={{ fontSize: '0.9rem' }}>
                                {t.nextExercise} {nextExerciseNum} →
                            </button>
                        </div>
                    )}
                    {isLastExercise && (
                        <div style={{ textAlign: 'right', marginTop: '2rem' }}>
                            <button className="btn-accent" onClick={() => setActiveSection('selfCheck')} style={{ fontSize: '0.9rem' }}>
                                {t.nextSelfCheck} →
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function SelfCheckSection({ t, expandedQuizzes, toggleQuiz }) {
            const quizzes = [
                { id: 'q1', q: t.quizSelectAll, a: t.quizSelectAnswer },
                { id: 'q2', q: t.quizWhereQ, a: t.quizWhereA },
                { id: 'q3', q: t.quizOrderQ, a: t.quizOrderA }
            ];

            return (
                <div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>{t.selfCheck}</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>
                    {quizzes.map(quiz => (
                        <div key={quiz.id} className="card" style={{ padding: '2rem', marginBottom: '1rem', cursor: 'pointer' }} onClick={() => toggleQuiz(quiz.id)}>
                            <div style={{ fontWeight: '600' }}>{quiz.q}</div>
                            {expandedQuizzes[quiz.id] && <div style={{ marginTop: '1rem', paddingTop: '1rem', borderTop: '1px solid #e5e7eb' }}>{quiz.a}</div>}
                        </div>
                    ))}
                </div>
            );
        }

        function ReflectionSection({ t }) {
            return (
                <div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>{t.reflection}</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>
                    <div className="card" style={{ padding: '2rem' }}><p>{t.reflectionContentComingSoon}</p></div>
                </div>
            );
        }

        function TroubleshootingSection({ t }) {
            return (
                <div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>{t.troubleshooting}</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>
                    <div className="card" style={{ padding: '2rem' }}><p>{t.troubleshootingContentComingSoon}</p></div>
                </div>
            );
        }

        function ResourcesSection({ t }) {
            return (
                <div>
                    <h2 style={{ fontSize: '2rem', marginBottom: '1.5rem', color: '#1B3A5C' }}>{t.resources}</h2>
                    <div className="accent-line" style={{ marginBottom: '2rem' }}></div>
                    <div className="card" style={{ padding: '2rem' }}>
                        <ul className="check-list">
                            <li><a href="https://duckdb.org/docs/" target="_blank">{t.duckdbOfficialDocumentation}</a></li>
                            <li><a href="https://duckdb.org/community" target="_blank">{t.duckdbCommunity}</a></li>
                            <li><a href="https://github.com/duckdb/duckdb" target="_blank">{t.duckdbGitHubRepository}</a></li>
                        </ul>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
